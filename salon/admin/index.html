<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>予約管理 | hair atelier hibi（管理画面・デモ）</title>
<meta name="description" content="hair atelier hibi の予約管理画面。オンライン予約フォームから届いた予約をAI事前整理つきで一覧表示し、ステータス管理ができる架空サロンのポートフォリオデモ。" />
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233f3a36'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='17' fill='%23d8c3a5' text-anchor='middle'%3Eh%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --charcoal: #3f3a36; --charcoal-soft: #56504a; --greige: #b9aa97; --greige-light: #e8e0d6;
    --cream: #f6f2ec; --paper: #fbf9f5; --accent: #a98c6b; --accent-deep: #8a7050;
    --line: #ddd3c6; --text: #4a443f; --text-soft: #7a726a; --white: #ffffff;
    --shadow-sm: 0 4px 16px rgba(63,58,54,.06); --shadow-md: 0 14px 40px rgba(63,58,54,.12);
    --serif-en: 'Cormorant Garamond', serif; --serif-ja: 'Shippori Mincho', serif; --sans-ja: 'Zen Kaku Gothic New', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans-ja); color: var(--text); background: var(--cream); line-height: 1.7; font-size: 15px; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* gate */
  #gate { min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; }
  .gate-card { width: min(400px, 100%); background: var(--white); border: 1px solid var(--line); border-radius: 14px; padding: 2.4rem 2rem; box-shadow: var(--shadow-md); text-align: center; }
  .gate-card .logo { font-family: var(--serif-en); font-size: 1.8rem; font-weight: 600; letter-spacing: .18em; color: var(--charcoal); }
  .gate-card .sub { font-size: .7rem; letter-spacing: .4em; color: var(--text-soft); margin-bottom: 1.6rem; }
  .gate-card h1 { font-family: var(--serif-ja); font-size: 1.2rem; color: var(--charcoal); margin-bottom: .4rem; }
  .gate-card p { font-size: .82rem; color: var(--text-soft); margin-bottom: 1.4rem; }
  .gate-card input { width: 100%; text-align: center; letter-spacing: .5em; font-size: 1.2rem; padding: .7rem; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); }
  .gate-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(169,140,107,.15); }
  .gate-err { color: #b4452f; font-size: .8rem; min-height: 1.2em; margin-top: .5rem; }
  .gate-hint { font-size: .74rem; color: var(--text-soft); margin-top: 1rem; }
  .gate-hint b { color: var(--accent-deep); letter-spacing: .2em; }

  /* app shell */
  #app { display: none; min-height: 100vh; }
  .topbar { background: var(--charcoal); color: var(--greige-light); display: flex; align-items: center; justify-content: space-between; padding: .9rem clamp(1rem, 4vw, 2.2rem); position: sticky; top: 0; z-index: 20; }
  .topbar .brand { display: flex; align-items: baseline; gap: .8rem; }
  .topbar .brand .logo { font-family: var(--serif-en); font-size: 1.3rem; font-weight: 600; letter-spacing: .16em; color: var(--white); }
  .topbar .brand .tag { font-size: .72rem; letter-spacing: .2em; opacity: .7; }
  .topbar nav { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
  .tbtn { background: transparent; border: 1px solid rgba(255,255,255,.22); color: var(--greige-light); font-size: .76rem; letter-spacing: .06em; padding: .42rem .8rem; border-radius: 999px; transition: .2s; }
  .tbtn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.4); }
  .tbtn.primary { background: var(--accent); border-color: var(--accent); color: var(--white); }
  .tbtn.primary:hover { background: var(--accent-deep); }

  main { width: min(1080px, 94vw); margin: 0 auto; padding: clamp(1.4rem, 4vw, 2.4rem) 0 4rem; }
  .page-head { margin-bottom: 1.4rem; }
  .page-head h2 { font-family: var(--serif-ja); font-size: 1.4rem; color: var(--charcoal); }
  .page-head p { font-size: .82rem; color: var(--text-soft); }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 1.6rem; }
  .kpi { background: var(--white); border: 1px solid var(--line); border-radius: 12px; padding: 1.1rem 1.2rem; }
  .kpi.accent { background: var(--charcoal); border-color: var(--charcoal); color: var(--white); }
  .kpi .l { font-size: .76rem; color: var(--text-soft); letter-spacing: .04em; }
  .kpi.accent .l { color: var(--greige-light); }
  .kpi .n { font-family: var(--serif-en); font-size: 2rem; font-weight: 600; color: var(--charcoal); line-height: 1.2; margin-top: .2rem; }
  .kpi.accent .n { color: var(--white); }
  .kpi .n small { font-family: var(--sans-ja); font-size: .8rem; font-weight: 400; margin-left: 2px; }
  .kpi .s { font-size: .72rem; color: var(--text-soft); margin-top: .2rem; }
  .kpi.accent .s { color: var(--greige); }

  /* filter bar */
  .filterbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 1.2rem; }
  .filterbar input, .filterbar select { font-family: inherit; font-size: .86rem; color: var(--text); background: var(--white); border: 1px solid var(--line); border-radius: 8px; padding: .55rem .8rem; }
  .filterbar input:focus, .filterbar select:focus { outline: none; border-color: var(--accent); }
  .filterbar .search { flex: 1; min-width: 180px; }
  .seg { display: inline-flex; background: var(--white); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .seg button { background: transparent; border: none; font-size: .78rem; color: var(--text-soft); padding: .35rem .85rem; border-radius: 999px; letter-spacing: .03em; }
  .seg button.active { background: var(--accent); color: var(--white); }

  /* list */
  .list { display: grid; gap: 14px; }
  .rcard { background: var(--white); border: 1px solid var(--line); border-radius: 12px; padding: 1.2rem 1.3rem; transition: box-shadow .25s ease; }
  .rcard:hover { box-shadow: var(--shadow-sm); }
  .rcard.s-new { border-left: 3px solid var(--accent); }
  .rcard.s-confirmed { border-left: 3px solid #6f8f6a; }
  .rcard.s-done { border-left: 3px solid var(--greige); opacity: .85; }
  .rcard.s-canceled { border-left: 3px solid #c2654c; opacity: .7; }
  .rtop { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
  .rname { font-size: 1.05rem; font-weight: 500; color: var(--charcoal); }
  .rname .visit { font-size: .68rem; font-weight: 500; margin-left: .6rem; padding: .1rem .55rem; border-radius: 999px; background: var(--cream); color: var(--text-soft); letter-spacing: .04em; vertical-align: 2px; }
  .rname .visit.first { background: #efe2d6; color: var(--accent-deep); }
  .rmeta { font-size: .84rem; color: var(--text-soft); margin-top: .25rem; }
  .rmeta .menu { color: var(--charcoal); font-weight: 500; }
  .rwhen { text-align: right; font-size: .82rem; color: var(--text-soft); flex: none; }
  .rwhen .dt { font-family: var(--serif-ja); color: var(--charcoal); font-size: .92rem; }
  .status-pill { display: inline-block; font-size: .74rem; font-weight: 500; padding: .18rem .7rem; border-radius: 999px; letter-spacing: .05em; }
  .sp-new { background: #efe2d6; color: var(--accent-deep); }
  .sp-confirmed { background: #e3ede0; color: #4f6b4a; }
  .sp-done { background: var(--cream); color: var(--text-soft); }
  .sp-canceled { background: #f6e2da; color: #a44a32; }

  .rbody { margin-top: .9rem; padding-top: .9rem; border-top: 1px dashed var(--line); display: none; }
  .rcard.open .rbody { display: block; }
  .cat-badge { display: inline-block; font-size: .72rem; font-weight: 500; padding: .15rem .6rem; border-radius: 999px; }
  .cat-rose { background: #f3e3e1; color: #9c5a52; } .cat-sage { background: #e3ede0; color: #4f6b4a; }
  .cat-gold { background: #efe2d6; color: var(--accent-deep); } .cat-blue { background: #e0e6ec; color: #4a5a6b; }
  .cat-plum { background: #ece0e6; color: #79546b; } .cat-gray { background: var(--cream); color: var(--text-soft); }
  .concern { font-size: .86rem; color: var(--text); background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: .7rem .9rem; margin: .7rem 0; }
  .ai-summary { font-size: .82rem; color: var(--text-soft); margin: .5rem 0; }
  .checks { list-style: none; display: grid; gap: .4rem; }
  .checks li { display: flex; gap: .5rem; font-size: .82rem; }
  .checks svg { width: 14px; height: 14px; flex: none; margin-top: 4px; color: var(--accent); }
  .ractions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; align-items: center; }
  .abtn { font-size: .78rem; padding: .42rem .9rem; border-radius: 999px; border: 1px solid var(--line); background: var(--white); color: var(--charcoal); transition: .2s; }
  .abtn:hover { border-color: var(--accent); color: var(--accent-deep); }
  .abtn.go { background: var(--accent); border-color: var(--accent); color: var(--white); }
  .abtn.go:hover { background: var(--accent-deep); }
  .abtn.danger:hover { border-color: #c2654c; color: #a44a32; }
  .expand { margin-left: auto; font-size: .76rem; color: var(--accent-deep); background: none; border: none; }
  .empty { background: var(--white); border: 1px dashed var(--line); border-radius: 12px; padding: 3rem 1rem; text-align: center; color: var(--text-soft); }
  .empty .big { font-family: var(--serif-ja); color: var(--charcoal); font-size: 1.05rem; margin-bottom: .4rem; }

  /* toast */
  #toast { position: fixed; left: 50%; bottom: 1.4rem; transform: translateX(-50%) translateY(20px); background: var(--charcoal); color: var(--white); font-size: .82rem; padding: .7rem 1.3rem; border-radius: 999px; opacity: 0; pointer-events: none; transition: .3s; z-index: 60; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .rwhen { text-align: left; } }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="logo">hibi</div>
    <div class="sub">HAIR ATELIER — ADMIN</div>
    <h1>予約管理画面</h1>
    <p>スタッフ用のデモ管理画面です。パスコードを入力してください。</p>
    <input id="passInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••" aria-label="パスコード" />
    <div class="gate-err" id="passErr"></div>
    <button class="tbtn primary" id="passBtn" style="width:100%;padding:.7rem;">ログイン</button>
    <p class="gate-hint">デモ用パスコード： <b>2026</b></p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand"><span class="logo">hibi</span><span class="tag">予約管理 / Admin</span></div>
    <nav>
      <button class="tbtn" id="reloadBtn">最新に更新</button>
      <button class="tbtn" id="resetBtn">デモを初期化</button>
      <a class="tbtn" href="../booking/" target="_blank" rel="noopener">予約フォーム ↗</a>
      <a class="tbtn" href="../" target="_blank" rel="noopener">サイト ↗</a>
      <button class="tbtn" id="logoutBtn">ログアウト</button>
    </nav>
  </div>

  <main>
    <div class="page-head">
      <h2>予約一覧</h2>
      <p>オンライン予約フォームから届いた予約を、AIの事前整理つきで管理します。ステータスを切り替えると即座に保存されます。</p>
    </div>

    <div class="kpis" id="kpis"></div>

    <div class="filterbar">
      <input class="search" id="search" type="search" placeholder="名前・メニュー・お悩みで検索" aria-label="検索" />
      <div class="seg" id="statusSeg">
        <button data-s="" class="active">すべて</button>
        <button data-s="new">未対応</button>
        <button data-s="confirmed">確定</button>
        <button data-s="done">来店済</button>
      </div>
      <select id="menuFilter" aria-label="メニューで絞り込み"><option value="">すべてのメニュー</option></select>
    </div>

    <div class="list" id="list"></div>
  </main>
</div>

<div id="toast"></div>

<script src="../assets/data.js"></script>
<script src="../assets/ai.js"></script>
<script src="../assets/store.js"></script>
<script>
"use strict";
(function () {
  var PASSCODE = "2026";
  var ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>';
  var STATUS_LABEL = { new: "未対応", confirmed: "確定", done: "来店済", canceled: "キャンセル" };
  var state = { bookings: [], status: "", menu: "", search: "" };
  var $ = function (s) { return document.querySelector(s); };

  function el(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text !== undefined) e.textContent = text; return e; }
  function toast(msg) {
    var t = $("#toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove("show"); }, 2000);
  }
  function fmtDT(v) {
    if (!v) return "—";
    var d = new Date(v); if (isNaN(d.getTime())) return v;
    var w = ["日","月","火","水","木","金","土"][d.getDay()];
    return (d.getMonth() + 1) + "/" + d.getDate() + "(" + w + ") " + ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2);
  }
  function ago(ts) {
    var diff = Date.now() - ts;
    if (diff < 36e5) return Math.max(1, Math.floor(diff / 6e4)) + "分前";
    if (diff < 864e5) return Math.floor(diff / 36e5) + "時間前";
    return Math.floor(diff / 864e5) + "日前";
  }

  function load() { state.bookings = window.HibiStore.getBookings(); render(); }

  function passFilter(b) {
    if (state.status && b.status !== state.status) return false;
    if (state.menu && b.menu !== state.menu) return false;
    if (state.search) {
      var q = state.search.toLowerCase();
      if ([b.name, b.menu, b.concern, b.category, b.stylist].join(" ").toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  }

  function render() { renderKpis(); renderMenuFilter(); renderList(); }

  function renderKpis() {
    var b = state.bookings;
    var nNew = b.filter(function (x) { return x.status === "new"; }).length;
    var nConf = b.filter(function (x) { return x.status === "confirmed"; }).length;
    var nDone = b.filter(function (x) { return x.status === "done"; }).length;
    var nFirst = b.filter(function (x) { return x.isFirstVisit && x.status !== "canceled"; }).length;
    var active = b.filter(function (x) { return x.status !== "canceled"; }).length;
    var firstRate = active ? Math.round((nFirst / active) * 100) : 0;
    var kpis = $("#kpis"); kpis.replaceChildren();
    kpis.append(
      kpiCard("総予約数", String(b.length), "件", "キャンセル含む", false),
      kpiCard("未対応", String(nNew), "件", "要対応の予約", true),
      kpiCard("確定", String(nConf), "件", "来店待ち", false),
      kpiCard("初回比率", String(firstRate), "%", nFirst + "件 / 有効" + active + "件", false)
    );
  }
  function kpiCard(label, n, unit, sub, accent) {
    var c = el("div", "kpi" + (accent ? " accent" : ""));
    c.appendChild(el("div", "l", label));
    var nn = el("div", "n"); nn.appendChild(document.createTextNode(n));
    if (unit) nn.appendChild(el("small", null, unit));
    c.appendChild(nn); c.appendChild(el("div", "s", sub));
    return c;
  }

  function renderMenuFilter() {
    var sel = $("#menuFilter"); var cur = state.menu;
    sel.replaceChildren();
    var all = el("option", null, "すべてのメニュー"); all.value = ""; sel.appendChild(all);
    var menus = [];
    state.bookings.forEach(function (b) { if (menus.indexOf(b.menu) === -1) menus.push(b.menu); });
    menus.forEach(function (m) { var o = el("option", null, m); o.value = m; sel.appendChild(o); });
    sel.value = cur;
  }

  function renderList() {
    var list = $("#list"); list.replaceChildren();
    var visible = state.bookings.filter(passFilter);
    if (visible.length === 0) {
      var e = el("div", "empty");
      e.appendChild(el("div", "big", "該当する予約がありません"));
      e.appendChild(document.createTextNode("検索・絞り込み条件を変更してください。"));
      list.appendChild(e); return;
    }
    visible.forEach(function (b) { list.appendChild(card(b)); });
  }

  function card(b) {
    var c = el("div", "rcard s-" + b.status);

    var top = el("div", "rtop");
    var left = el("div");
    var nm = el("div", "rname"); nm.appendChild(document.createTextNode(b.name + " 様"));
    var visit = el("span", "visit" + (b.isFirstVisit ? " first" : ""), b.isFirstVisit ? "初回" : "再来");
    nm.appendChild(visit); left.appendChild(nm);
    var meta = el("div", "rmeta");
    meta.appendChild(el("span", "menu", b.menu));
    meta.appendChild(document.createTextNode("　/　" + (b.stylist || "指名なし") + "　/　申込 " + ago(b.createdAt)));
    left.appendChild(meta);
    top.appendChild(left);

    var rwhen = el("div", "rwhen");
    rwhen.appendChild(el("div", "dt", fmtDT(b.firstChoice)));
    rwhen.appendChild(el("span", "status-pill sp-" + b.status, STATUS_LABEL[b.status]));
    top.appendChild(rwhen);
    c.appendChild(top);

    var expandBtn = el("button", "expand", "詳細・AI整理 ▾");
    var actionsTop = el("div"); actionsTop.style.cssText = "display:flex;gap:8px;align-items:center;margin-top:.7rem;";
    var catCls = "cat-" + ((window.HibiAI.CAT_META[b.category]) || "gray");
    actionsTop.appendChild(el("span", "cat-badge " + catCls, b.category));
    actionsTop.appendChild(expandBtn);
    c.appendChild(actionsTop);

    var body = el("div", "rbody");
    var concern = el("div", "concern"); concern.textContent = "「" + b.concern + "」"; body.appendChild(concern);
    body.appendChild(el("div", "ai-summary", b.aiSummary));
    var ttl = el("div"); ttl.style.cssText = "font-size:.78rem;color:var(--accent-deep);margin:.3rem 0 .4rem;";
    ttl.textContent = "▸ カウンセリング時の確認ポイント"; body.appendChild(ttl);
    var ul = el("ul", "checks");
    (b.aiChecks || []).forEach(function (ch) {
      var li = el("li"); li.insertAdjacentHTML("beforeend", ICON_CHECK);
      li.appendChild(el("span", null, ch)); ul.appendChild(li);
    });
    body.appendChild(ul);
    body.appendChild(contactLine(b));
    body.appendChild(actions(b, c));
    c.appendChild(body);

    expandBtn.onclick = function () {
      var open = c.classList.toggle("open");
      expandBtn.textContent = open ? "詳細を閉じる ▴" : "詳細・AI整理 ▾";
    };
    return c;
  }

  function contactLine(b) {
    var d = el("div"); d.style.cssText = "font-size:.8rem;color:var(--text-soft);margin-top:.7rem;";
    d.textContent = "連絡先：" + b.email + " / " + b.phone + (b.secondChoice ? "　第二希望：" + fmtDT(b.secondChoice) : "");
    return d;
  }

  function actions(b, cardEl) {
    var wrap = el("div", "ractions");
    if (b.status === "new") wrap.appendChild(actBtn("確定にする", "go", b, "confirmed", cardEl));
    if (b.status === "confirmed") wrap.appendChild(actBtn("来店済にする", "go", b, "done", cardEl));
    if (b.status === "done") wrap.appendChild(actBtn("未対応に戻す", "", b, "new", cardEl));
    if (b.status !== "canceled" && b.status !== "done") wrap.appendChild(actBtn("キャンセル", "danger", b, "canceled", cardEl));
    if (b.status === "canceled") wrap.appendChild(actBtn("未対応に戻す", "", b, "new", cardEl));
    return wrap;
  }
  function actBtn(label, cls, b, next, cardEl) {
    var btn = el("button", "abtn " + cls, label);
    btn.onclick = function () {
      window.HibiStore.setStatus(b.id, next);
      load();
      toast("「" + b.name + " 様」を" + STATUS_LABEL[next] + "にしました");
    };
    return btn;
  }

  // ---- auth & events ----
  function start() { $("#gate").style.display = "none"; $("#app").style.display = "block"; load(); }
  function tryLogin() {
    if ($("#passInput").value === PASSCODE) { sessionStorage.setItem("hibi_admin", "1"); start(); }
    else { $("#passErr").textContent = "パスコードが違います"; $("#passInput").value = ""; }
  }

  document.addEventListener("DOMContentLoaded", function () {
    $("#passBtn").onclick = tryLogin;
    $("#passInput").addEventListener("keydown", function (e) { if (e.key === "Enter") tryLogin(); });
    $("#reloadBtn").onclick = function () { load(); toast("最新の状態に更新しました"); };
    $("#resetBtn").onclick = function () {
      if (!confirm("デモデータを初期状態に戻しますか？\nフォームから追加した予約は削除されます。")) return;
      window.HibiStore.resetDemo(); load(); toast("デモデータを初期化しました");
    };
    $("#logoutBtn").onclick = function () { sessionStorage.removeItem("hibi_admin"); location.reload(); };
    $("#search").addEventListener("input", function (e) { state.search = e.target.value.trim(); renderList(); });
    $("#menuFilter").addEventListener("change", function (e) { state.menu = e.target.value; renderList(); });
    Array.prototype.forEach.call(document.querySelectorAll("#statusSeg button"), function (btn) {
      btn.onclick = function () {
        document.querySelectorAll("#statusSeg button").forEach(function (x) { x.classList.toggle("active", x === btn); });
        state.status = btn.dataset.s; renderList();
      };
    });
    if (sessionStorage.getItem("hibi_admin") === "1") start();
    else $("#passInput").focus();
  });
})();
</script>
</body>
</html>
