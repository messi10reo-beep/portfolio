["公開されている情報であれば利用規約に関係なく自由に商用利用できる","robots.txtは検索エンジン専用の仕組みでありスクレイピングでは考慮不要である","対象サイトの利用規約やrobots.txtを確認し、サーバーに過剰な負荷をかけないようにする","取得したデータに個人情報が含まれていても、収集者には管理義務が生じない"],answerIndex:2,explanation:"スクレイピングでは、サイトの利用規約とrobots.txtの確認、アクセス間隔を空けてサーバーに負荷をかけない配慮が基本的なマナーかつリスク回避策である。公開情報でも利用規約や著作権法の制約は受け、過剰なアクセスは業務妨害と見なされるおそれもある。取得データに個人情報が含まれれば個人情報保護法上の義務が生じるため、収集段階からの配慮が必要である。"},{id:"implementation-q05",chapterId:"implementation",question:"「カメラ画像利活用ガイドブック」の説明として、最も適切なものを選べ。",choices:["IoT推進コンソーシアムと総務省・経済産業省が策定した、カメラ画像の事業活用時のプライバシー配慮の指針である","警察庁が策定した、防犯カメラ映像の捜査利用手続きを定めた法的拘束力のある規則である","JDLAが策定した、ディープラーニングの画像認識精度を評価する技術標準である","国際標準化機構(ISO)が定めたカメラの画質に関する国際規格である"],answerIndex:0,explanation:"カメラ画像利活用ガイドブックは、IoT推進コンソーシアムと総務省・経済産業省がまとめた、カメラ画像をマーケティング等の事業に使う際の生活者への告知・配慮事項を示す自主的な指針であり、法的拘束力を持つ規則ではない。策定主体(警察庁・JDLA・ISOではない)と、プライバシー配慮の指針であるという性格の2点が問われやすい。"},{id:"implementation-q06",chapterId:"implementation",question:"データ前処理における正規化と標準化の説明として、最も適切なものを選べ。",choices:["正規化は平均0・分散1への変換、標準化は0〜1の範囲への変換を指す","どちらも欠損値を平均値で補完する処理の別名である","どちらもカテゴリ変数を数値に変換する処理であり違いはない","正規化は値を0〜1などの一定範囲に収め、標準化は平均0・標準偏差1に変換する"],answerIndex:3,explanation:"正規化(min-maxスケーリング)は最小値と最大値を使って値を0〜1などの範囲に収める変換、標準化は平均を引いて標準偏差で割り平均0・標準偏差1にする変換である。両者の定義の入れ替えはひっかけの定番なので注意したい。欠損値の補完やカテゴリ変数の数値化(one-hotエンコーディングなど)は別の前処理である。"},{id:"implementation-q07",chapterId:"implementation",question:"アノテーションの品質管理の取り組みとして、最も適切なものを選べ。",choices:["コストを抑えるため判断基準は作業者ごとの裁量に任せる","判断基準を明文化したガイドラインを整備し、複数作業者間のラベルの一致度を確認する","品質よりも量が重要なので、確認作業を省略してデータ件数を最大化する","アノテーションはモデルの精度に影響しないため品質管理は不要である"],answerIndex:1,explanation:"アノテーションは判断に迷う事例の扱いを統一するためのガイドライン整備と、同じデータを複数人に付与させて一致度を測るなどの品質管理が不可欠である。基準を作業者任せにするとラベルの一貫性が失われ、ラベルノイズの多いデータは量を増やしても精度向上につながりにくい。教師データは「量と質の両方」が重要というのが頻出の論点である。"},{id:"implementation-q08",chapterId:"implementation",question:"学習データの偏り(バイアス)がもたらす問題として、最も適切なものを選べ。",choices:["学習時間が必ず長くなり計算コストだけが増大する","モデルのパラメータ数が自動的に増加する","特定の属性に対して不公平な予測をするモデルができ、社会的な問題につながる","偏りがあるほどモデルの汎化性能は必ず向上する"],answerIndex:2,explanation:"学習データが特定の性別・人種・条件などに偏っていると、モデルはその偏りを学習・増幅し、採用審査や顔認識などで特定の集団に不利益を与える不公平な予測をするおそれがある。実際に採用AIが女性に不利な評価をした事例などが知られる。データの偏りは計算コストやパラメータ数の問題ではなく、公平性と汎化性能を損なう品質の問題である。"},{id:"implementation-q09",chapterId:"implementation",question:"MLOpsの説明として、最も適切なものを選べ。",choices:["機械学習モデルの数学的な最適化アルゴリズムの総称である","学習済みモデルの判断根拠を可視化する技術の総称である","アノテーション作業を外部業者に委託する契約形態である","機械学習モデルの開発から運用までを継続的・自動的に回すための実践や仕組みである"],answerIndex:3,explanation:"MLOpsはDevOpsの考え方を機械学習に拡張した概念で、コードに加えデータとモデルのバージョン管理、CI/CDパイプライン、モデルの監視・再学習までを含む開発・運用の実践を指す。最適化アルゴリズムの総称でも、判断根拠の可視化(それはXAI)でも、委託契約の形態でもない。学習して終わりではなく運用し続ける仕組みづくり、という点が問われやすい。"},{id:"implementation-q10",chapterId:"implementation",question:"運用中のAIモデルの精度が時間の経過とともに低下する主な原因として、最も適切なものを選べ。",choices:["コンセプトドリフトにより入力データの傾向や予測対象の性質が変化するため","モデルのパラメータが時間とともに自然に消失するため","GPUの性能が経年劣化して計算誤差が増えるため","学習済みモデルの著作権保護期間が満了するため"],answerIndex:0,explanation:"運用中のモデル劣化の主因はコンセプトドリフト(およびデータドリフト)で、消費者の嗜好変化や市場環境の変化により、学習時と運用時のデータ分布がずれることで起こる。対策として精度の継続的な監視と定期的・条件付きの再学習が必要になる。モデルのパラメータが自然消失したり、ハードウェアの経年劣化で予測精度が下がったりするわけではない。"},{id:"implementation-q11",chapterId:"implementation",question:"クラウドではなくエッジ(端末側)でAIの推論を行う利点として、最も適切なものを選べ。",choices:["端末の計算資源に制約がないため大規模モデルをそのまま動かせる","モデルの再学習が不要になる","通信遅延が小さく、データを外部に送らないためプライバシー保護に有利である","計算資源を需要に応じて柔軟にスケールさせられる"],answerIndex:2,explanation:"エッジ推論は端末内で処理が完結するため、低遅延が求められる自動運転や、映像などの機微なデータを外部に送信したくない場面に適する。一方で端末の計算資源は限られるため、量子化や蒸留によるモデル軽量化が必要になる。計算資源の柔軟なスケールはクラウドの利点であり、エッジでも運用中のモデル劣化への対応として再学習は必要である。"},{id:"implementation-q12",chapterId:"implementation",question:"ゲーム理論のシャープレイ値に基づいて、予測に対する各特徴量の寄与度を算出するXAIの手法として、最も適切なものを選べ。",choices:["LIME","SHAP","Grad-CAM","ドロップアウト"],answerIndex:1,explanation:"SHAPは協力ゲーム理論のシャープレイ値を応用し、各特徴量が予測値にどれだけ寄与したかを一貫した基準で算出する説明手法である。LIMEは予測の近傍を単純なモデルで近似して局所的な説明を与える手法、Grad-CAMはCNNの注目領域をヒートマップで可視化する手法で、3つの手法の対応関係はXAI分野の頻出ポイント。ドロップアウトは過学習を抑える正則化手法でXAIではない。"},{id:"implementation-q13",chapterId:"implementation",question:"CNNによる画像分類において、モデルが画像のどの領域に注目して判断したかをヒートマップで可視化する手法として、最も適切なものを選べ。",choices:["SHAP","データ拡張","バッチ正規化","Grad-CAM"],answerIndex:3,explanation:"Grad-CAMは出力クラスに対する勾配情報を利用して、CNNが判断の根拠とした画像領域をヒートマップとして可視化する手法で、誤分類の原因分析やモデルの妥当性確認に使われる。SHAPは特徴量の寄与度算出が主目的で表形式データへの適用が代表的である。データ拡張は訓練データの水増し、バッチ正規化は学習の安定化技術であり、可視化手法ではない。"},{id:"implementation-q14",chapterId:"implementation",question:"ディープラーニングの「ブラックボックス問題」の説明として、最も適切なものを選べ。",choices:["モデルの判断根拠が人間には理解しにくく、説明責任を果たしにくい問題","モデルのソースコードが非公開で第三者がライセンス購入できない問題","学習に使うGPUの内部構造が公開されていない問題","データセットの収集元が記録されず出所を追跡できない問題"],answerIndex:0,explanation:"ブラックボックス問題とは、ディープラーニングのモデルが膨大なパラメータの組み合わせで判断するため、なぜその予測に至ったかを人間が解釈しにくいことを指す。融資審査・採用・医療など人の人生に関わる領域では説明責任が求められるため、LIMEやSHAPなどのXAI技術が対策として研究されている。ソースコードの非公開やハードウェア・データ出所の問題とは別物である。"},{id:"implementation-q15",chapterId:"implementation",question:"自社で集められるデータが少ない場合に、大規模データで学習済みのモデルを流用して開発コストを抑えるアプローチとして、最も適切なものを選べ。",choices:["スクラッチからのフルスクラッチ学習","転移学習","ウェブスクレイピングの自動化","モデルの量子化"],answerIndex:1,explanation:"転移学習は、ImageNetなどの大規模データで学習済みのモデルが獲得した汎用的な特徴抽出能力を流用し、少量の自社データで出力層などを学習し直す手法で、データ不足と開発コストの両方に効く実務上の定番である。ゼロからの学習は大量のデータと計算資源を要するため条件に合わない。スクレイピングはデータ収集手段、量子化は推論を軽量化する技術であり目的が異なる。"},{id:"implementation-q16",chapterId:"implementation",question:"経済産業省「AI・データの利用に関する契約ガイドライン」が示すAI開発の進め方として、最も適切なものを選べ。",choices:["開発のすべての工程を最初に一括契約することを推奨している","AI開発では契約書の締結自体が不要であるとしている","アセスメント・PoC・開発・追加学習の段階に分け、段階ごとに契約を結ぶ方式を提示している","成果物の精度保証を必須の契約条項として義務付けている"],answerIndex:2,explanation:"同ガイドラインは、AI開発の不確実性を踏まえ、アセスメント→PoC→開発→追加学習と段階を分けて各段階で契約を締結する「探索的段階型」の開発方式を提示している。性能を事前に保証しにくいAIの特性から一括契約や精度保証の義務付けはなじまず、請負契約より準委任契約が適する場合が多いとされる点もあわせて頻出である。"},{id:"implementation-q17",chapterId:"implementation",question:"AI開発で請負契約よりも準委任契約が選ばれることが多い理由として、最も適切なものを選べ。",choices:["モデルの性能はデータに依存し、仕事の完成(達成精度)を事前に約束することが難しいから","準委任契約ではベンダーが一切の責任を負わなくてよいから","請負契約はAI開発への適用が法律で禁止されているから","準委任契約のほうが必ず開発費用が安くなるから"],answerIndex:0,explanation:"請負契約は仕事の完成義務を負うが、AIの精度は学習データ次第で事前に確約できないため、業務遂行自体を約束する準委任契約のほうが実態に合うことが多い。準委任でもベンダーは善管注意義務を負うため無責任になるわけではない。請負が法律で禁止されている事実はなく、費用の高低も契約形態だけでは決まらない。"},{id:"implementation-q18",chapterId:"implementation",question:"AIプロジェクトにおけるドメイン専門家(現場の業務知識を持つ人材)の役割として、最も適切なものを選べ。",choices:["GPUクラスタの構築と分散学習基盤の運用を担当する","深層学習の最適化アルゴリズムを数学的に改良する","データサイエンティストの作業をすべて代替する","課題設定やデータの意味の解釈、結果の業務上の妥当性確認で協働する"],answerIndex:3,explanation:"ドメイン専門家は、解くべき課題の設定、データ項目の業務上の意味の解釈、モデル出力が現場感覚として妥当かの検証などで不可欠な存在であり、データサイエンティストと補完関係で協働する。基盤構築はエンジニア、アルゴリズム研究は研究者の領域であり、専門家がデータサイエンティストを代替するわけでもない。技術と業務知識の協働がAI社会実装の成功条件として頻出である。"},{id:"implementation-q19",chapterId:"implementation",question:"AIプロジェクトのKPI設定と効果検証について、最も適切なものを選べ。",choices:["モデルの正解率さえ高ければビジネス上の効果検証は不要である","KPIは開発完了後に運用結果を見てから初めて設定するのがよい","課題設定の段階でビジネス成果につながるKPIを定め、運用後も継続的に効果を検証する","KPIは技術指標(精度・再現率)のみで構成し、業務指標を含めてはならない"],answerIndex:2,explanation:"KPIはプロジェクトの初期にビジネス目標から逆算して設定し、運用開始後も継続的に測定して投資対効果を検証すべきである。モデルの正解率が高くてもコスト削減や売上向上などの業務成果に結びつかなければ社会実装としては失敗であり、技術指標と業務指標の両方を見る必要がある。事後にKPIを決めると目標が曖昧なままPoC貧乏に陥りやすい。"},{id:"implementation-q20",chapterId:"implementation",question:"外れ値を含むデータの前処理の考え方として、最も適切なものを選べ。",choices:["外れ値は常にすべて削除しなければモデルは学習できない","外れ値が検出対象そのものである場合もあるため、原因を確認してから対処を判断する","外れ値はデータ量を増やすため多いほど望ましい","外れ値の処理は推論時に自動で行われるため前処理では考慮しない"],answerIndex:1,explanation:"外れ値は入力ミスやセンサ異常なら除去・修正すべきだが、不正検知や故障予知では外れ値こそが見つけたい対象であり、機械的に削除すると目的を損なう。まず発生原因を確認し、業務上の意味を踏まえて対処を決めるのが正しい姿勢である。外れ値を残せばよいわけでも、推論時に自動処理されるわけでもなく、前処理段階での判断が必要である。"},{id:"implementation-q21",chapterId:"implementation",question:"特徴量の選択やモデルの選択、ハイパーパラメータの調整といった機械学習の構築工程を自動化する技術の総称として、最も適切なものを選べ。",choices:["AutoML","MLOps","RPA","BPR"],answerIndex:0,explanation:"選択肢AのAutoMLは、特徴量エンジニアリング・モデル選択・ハイパーパラメータ最適化など、従来は専門家が試行錯誤していた工程を自動化する技術で、機械学習の導入ハードルを下げる。選択肢BのMLOpsは開発から運用までを継続的に回す実践、選択肢CのRPAは定型的な事務作業の自動化、選択肢DのBPRは業務プロセスの抜本的再設計であり、モデル構築の自動化とは目的が異なる。"},{id:"implementation-q22",chapterId:"implementation",question:"既製のクラウドAIサービス(API)を利用してAI機能を導入する場合の特徴として、最も適切なものを選べ。",choices:["自社の独自要件に合わせてモデルを完全に作り込めるため、専門人材が不要でも最高精度を保証できる","短期間・低コストで高度な機能を導入できる一方、細かなカスタマイズの難しさやデータの外部送信の制約に注意が必要である","一度契約すれば通信が一切発生せず、機微なデータも外部に出ない","オンプレミスでの自社開発より常にコストが高くなる"],answerIndex:1,explanation:"選択肢Bのとおり、クラウドAIのAPI利用は学習済みの高度な機能を短期間・低コストで導入できる反面、自社固有の要件への細かなカスタマイズが難しく、入力データを外部へ送信することによる機密性・プライバシーの懸念がある。選択肢Aは既製APIでは独自要件への作り込みに限界がある点で誤り。選択肢CはAPI利用ではデータを外部に送る点で誤り、選択肢Dは一般に自社開発より低コストになりやすいため誤りである。"},{id:"implementation-q23",chapterId:"implementation",question:"RPA(Robotic Process Automation)とAIの違いの説明として、最も適切なものを選べ。",choices:["RPAは画像認識や自然言語理解などの非定型な判断を得意とする","AIは事前に定義した手順どおりの操作しかできない","RPAはルール化された定型作業の自動化が中心で、データから判断を学習するAIとは役割が異なる","RPAとAIは同じ技術であり区別する意味はない"],answerIndex:2,explanation:"選択肢Cのとおり、RPAはあらかじめ定義した手順に従って定型的な事務作業(データ入力・転記など)を自動化する技術で、データから判断基準を学習するAIとは性質が異なる。両者を組み合わせ、AIの判断結果をRPAが処理する連携も行われる。選択肢Aと選択肢Bは役割の説明が逆で、非定型な判断はAI、定型操作はRPAが担う。選択肢Dは両者を同一視しており誤りである。"},{id:"implementation-q24",chapterId:"implementation",question:"新しいモデルや施策の効果を検証するため、利用者を2群に分けて一方に新案、もう一方に旧案を提示し結果を比較する手法として、最も適切なものを選べ。",choices:["交差検証","グリッドサーチ","アンサンブル学習","A/Bテスト"],answerIndex:3,explanation:"選択肢DのA/Bテストは、ユーザーをランダムに2グループに分けてそれぞれ異なる案(例:新旧モデル)を提示し、コンバージョン率などの指標を比較して効果を統計的に検証する手法である。選択肢Aの交差検証はモデルの汎化性能評価、選択肢Bのグリッドサーチはハイパーパラメータ探索、選択肢Cのアンサンブル学習は複数モデルの統合手法であり、実環境での施策比較とは目的が異なる。"},{id:"implementation-q25",chapterId:"implementation",question:"新しいモデルを本番環境に展開する際、まず一部のユーザーにのみ適用して問題がないか確認しながら段階的に対象を広げる手法として、最も適切なものを選べ。",choices:["カナリアリリース","ロールバック","ウォーターフォール開発","フルバックアップ"],answerIndex:0,explanation:"選択肢Aのカナリアリリースは、新バージョンを最初に少数のユーザーへ限定的に提供し、異常がなければ徐々に展開範囲を広げることで不具合の影響を最小化するデプロイ手法である。本番と並行して新モデルに実トラフィックを流し挙動だけ確認するシャドーデプロイとあわせて押さえたい。選択肢Bのロールバックは旧版への切り戻し、選択肢Cは開発プロセス、選択肢Dはデータ保全でありデプロイの段階展開手法ではない。"},{id:"implementation-q26",chapterId:"implementation",question:"運用中の機械学習モデルにおける「データドリフト」と「コンセプトドリフト」の違いの説明として、最も適切なものを選べ。",choices:["どちらも入力データの分布が変わる同じ現象を別名で呼んでいるだけである","データドリフトは入力データの分布の変化、コンセプトドリフトは入力と出力の関係性の変化を指す","データドリフトはハードウェアの故障、コンセプトドリフトは通信障害を指す","コンセプトドリフトは学習時にのみ起こり、運用中には発生しない"],answerIndex:1,explanation:"選択肢Bのとおり、データドリフトは入力データそのものの分布が変化する現象、コンセプトドリフトは入力と予測対象(出力)との関係性が変化する現象を指し、いずれも運用中のモデル精度劣化の原因となる。選択肢Aは両者を同一視しており誤り、選択肢Cはハードウェアや通信の問題と取り違えている。選択肢Dはコンセプトドリフトが運用中に起こる現象である点で誤りである。"},{id:"implementation-q27",chapterId:"implementation",question:"機械学習の学習時と推論時で同じ特徴量を一貫して使えるよう、加工済みの特徴量を一元的に管理・共有する仕組みとして、最も適切なものを選べ。",choices:["モデルレジストリ","データレイク","特徴量ストア(Feature Store)","データカタログ"],answerIndex:2,explanation:"選択肢Cの特徴量ストアは、計算済みの特徴量を保存・管理し、学習時と推論時で同一定義の特徴量を再利用できるようにする仕組みで、学習と本番で特徴量の作り方がずれる問題(トレーニング/サービングスキュー)を防ぐ。選択肢Aのモデルレジストリは学習済みモデルの管理、選択肢Bのデータレイクは生データの蓄積、選択肢Dのデータカタログはデータの所在管理であり、特徴量の一元管理を主目的とはしない。"},{id:"implementation-q28",chapterId:"implementation",question:"各端末や組織が手元のデータを外部に出さずに学習を行い、モデルの更新内容のみを集約して全体のモデルを改善する手法として、最も適切なものを選べ。",choices:["転移学習","アンサンブル学習","蒸留","連合学習(フェデレーテッドラーニング)"],answerIndex:3,explanation:"選択肢Dの連合学習は、データを各端末・拠点に置いたまま局所的に学習し、勾配やモデルパラメータの更新だけを中央に集約することで、生データを共有せずに全体モデルを構築する手法でプライバシー保護に有効である。選択肢Aの転移学習は学習済みモデルの流用、選択肢Bのアンサンブル学習は複数モデルの統合、選択肢Cの蒸留はモデル圧縮であり、分散したデータを共有せずに学習する枠組みとは異なる。"},{id:"implementation-q29",chapterId:"implementation",question:"統計やモデルの出力に意図的にノイズを加えることで、個々の人物のデータが結果に与える影響を抑え、個人を特定されにくくする技術として、最も適切なものを選べ。",choices:["差分プライバシー","k-匿名化","正規化","データ拡張"],answerIndex:0,explanation:"選択肢Aの差分プライバシーは、出力に数学的に制御されたノイズを加え、特定の個人がデータセットに含まれるか否かで結果がほとんど変わらないようにすることで、個人のプライバシーを定量的に保護する技術である。選択肢Bのk-匿名化も匿名化技術だが、ノイズ付与ではなく属性をまるめて同じ属性の人をk人以上にする別手法。選択肢Cの正規化はスケーリング、選択肢Dのデータ拡張は訓練データの水増しでありプライバシー保護を目的としない。"},{id:"implementation-q30",chapterId:"implementation",question:"大規模で高精度なモデルの出力を教師として、より小さなモデルに学習させ、性能を保ちつつ軽量化する手法として、最も適切なものを選べ。",choices:["量子化","蒸留(知識蒸留)","プルーニング(枝刈り)","正規化"],answerIndex:1,explanation:"選択肢Bの蒸留(知識蒸留)は、大きな教師モデルの出力(ソフトターゲット)を小さな生徒モデルに模倣させることで、精度をできるだけ保ったまま軽量なモデルを得る手法で、エッジ推論などで活用される。選択肢Aの量子化は数値の表現精度を下げて軽量化する別手法、選択肢Cのプルーニングは重要度の低い結合を削る手法で、いずれも蒸留とは仕組みが異なる。選択肢Dの正規化は前処理でありモデル圧縮ではない。"},{id:"implementation-q31",chapterId:"implementation",question:"学習済みモデルの想定用途・性能・限界・学習データや評価条件などを文書化し、利用者が適切に使えるよう情報を共有する取り組みとして、最も適切なものを選べ。",choices:["データシート","モデルレジストリ","モデルカード","データカタログ"],answerIndex:2,explanation:"選択肢Cのモデルカードは、モデルの目的・性能・適用範囲・既知の限界やバイアスなどを記載し、利用者が誤用を避けて適切に使えるようにする文書である。選択肢Aのデータシートはモデルではなくデータセットの素性を記述する対の概念、選択肢Bのモデルレジストリはモデルのバージョン管理基盤、選択肢Dのデータカタログはデータの所在管理であり、モデルの説明文書そのものではない。"},{id:"implementation-q32",chapterId:"implementation",question:"データセットの作成目的・収集方法・前処理・含まれる偏りや制約などを文書化し、利用者がデータの素性を理解できるようにする取り組みとして、最も適切なものを選べ。",choices:["モデルカード","特徴量ストア","モデルレジストリ","データシート(Datasheets for Datasets)"],answerIndex:3,explanation:"選択肢Dのデータシートは、データセットがどのような目的で・どう収集され・どんな偏りや利用上の制約を持つかを記述する文書で、データの再利用時の誤用やバイアスの見落としを防ぐ。選択肢Aのモデルカードはモデル側を説明する対の概念、選択肢Bの特徴量ストアは特徴量の管理基盤、選択肢Cのモデルレジストリはモデルの管理基盤であり、データセットの素性を文書化するものではない。"},{id:"implementation-q33",chapterId:"implementation",question:"日本の著作権法において、AIの学習などの情報解析を目的とする場合に、一定の条件下で著作物を著作権者の許諾なく利用できることを定めた規定として、最も適切なものを選べ。",choices:["著作権法第30条の4(情報解析等のための利用)","不正競争防止法の営業秘密規定","個人情報保護法の利用目的規定","製造物責任(PL)法"],answerIndex:0,explanation:"選択肢Aの著作権法第30条の4は、情報解析など著作物に表現された思想・感情の享受を目的としない利用について、一定の条件下で著作権者の許諾なく利用できると定めており、AIの学習用データ利用の根拠としてよく取り上げられる。選択肢Bの不正競争防止法は営業秘密の保護、選択肢Cの個人情報保護法は個人データの取り扱い、選択肢Dは製造物の欠陥責任に関する法律であり、著作物の解析利用を直接定めるものではない。"},{id:"implementation-q34",chapterId:"implementation",question:"ImageNetなどのオープンデータセットやウェブ上の素材を学習に利用する際の留意点として、最も適切なものを選べ。",choices:["公開されているデータはすべて著作権が放棄されており自由に商用利用してよい","データセットやコンテンツにはクリエイティブ・コモンズなどのライセンスが設定されており、商用利用や改変の可否などの条件を確認する必要がある","ライセンス表示があるデータは学習に一切利用できない","オープンデータセットは研究用・商用を問わず利用条件が統一されている"],answerIndex:1,explanation:"選択肢Bのとおり、オープンデータセットやウェブ素材にはクリエイティブ・コモンズ(CC)などのライセンスが付されていることが多く、表示義務・改変の可否・商用利用の可否といった条件が定められているため、利用前の確認が不可欠である。選択肢Aは公開イコール著作権放棄ではない点で誤り、選択肢Cはライセンス条件を満たせば利用できるため誤り、選択肢Dはデータセットごとに条件が異なるため誤りである。"},{id:"implementation-q35",chapterId:"implementation",question:"AIプロジェクトを進める際の投資対効果(ROI)と進め方の考え方として、最も適切なものを選べ。",choices:["効果が読めなくても最初から全社規模で一斉導入するほうがリスクが低い","ROIは技術検証とは無関係なので考慮しなくてよい","小さく始めて効果を検証しながら拡大する「スモールスタート」が、投資対効果を見極めつつリスクを抑える上で有効である","一度導入を決めたら効果検証は不要である"],answerIndex:2,explanation:"選択肢Cのとおり、AI導入では対象を限定して小さく始め、効果(ROI)を確認しながら段階的に拡大するスモールスタートが、不確実性の高い投資のリスクを抑える定石である。選択肢Aの全社一斉導入は失敗時の損失が大きく、選択肢Bは投資判断にROIが不可欠である点で誤り。選択肢Dは導入後も継続的な効果検証が必要であり、判断基準を欠くとPoC貧乏にもつながる。"},{id:"implementation-q36",chapterId:"implementation",question:"MLOpsにおいて、通常のソフトウェア開発のCI/CD(継続的インテグレーション/継続的デリバリー)に加えて重視される、機械学習特有の要素として、最も適切なものを選べ。",choices:["継続的なドキュメント作成(CD:Continuous Documentation)","継続的な暗号化(CE:Continuous Encryption)","継続的なコンパイル(CC:Continuous Compile)","継続的な学習・再学習(CT:Continuous Training)"],answerIndex:3,explanation:"選択肢Dの継続的学習(CT:Continuous Training)は、データドリフトやコンセプトドリフトによる精度劣化に対応するため、新しいデータでモデルを自動的に再学習・再デプロイし続けるMLOps特有の仕組みである。CI/CDにCTを加えて回す点が機械学習システムの運用の特徴である。選択肢A・B・Cはいずれも実在しない造語であり、MLOpsの構成要素ではない。"},{id:"implementation-q37",chapterId:"implementation",question:"学習済みモデルをバージョンごとに登録・管理し、本番への適用や過去バージョンへの切り戻しを統制する仕組みとして、最も適切なものを選べ。",choices:["モデルレジストリ","特徴量ストア","データレイク","データシート"],answerIndex:0,explanation:"選択肢Aのモデルレジストリは、学習済みモデルをバージョン管理し、ステージング・本番などの状態管理やロールバックを可能にする仕組みで、MLOpsにおける再現性と運用統制の要となる。選択肢Bの特徴量ストアは特徴量の管理、選択肢Cのデータレイクは生データの蓄積基盤、選択肢Dのデータシートはデータセットの説明文書であり、いずれもモデルそのもののバージョン管理を主目的とはしない。"},{id:"implementation-q38",chapterId:"implementation",question:"データを暗号化したまま復号せずに計算処理を行うことで、機微なデータの中身を秘匿しつつ分析や学習を可能にする技術として、最も適切なものを選べ。",choices:["差分プライバシー","秘密計算(秘匿計算)","データ拡張","正規化"],answerIndex:1,explanation:"選択肢Bの秘密計算は、準同型暗号や秘密分散などを用いてデータを暗号化・秘匿したまま計算を行う技術で、複数組織がデータの中身を互いに開示せずに共同分析・学習できる。選択肢Aの差分プライバシーは出力にノイズを加えて個人を保護する別アプローチ、選択肢Cのデータ拡張と選択肢Dの正規化はプライバシー保護を目的とした技術ではない。"},{id:"implementation-q39",chapterId:"implementation",question:"AI導入の効果を最大化するために、既存の業務プロセスそのものを抜本的に見直し再設計する取り組みを指す概念として、最も適切なものを選べ。",choices:["PoC","RPA","BPR(ビジネスプロセス・リエンジニアリング)","CRISP-DM"],answerIndex:2,explanation:"選択肢CのBPR(Business Process Re-engineering)は、業務プロセスを根本から見直して再設計する取り組みで、AIを既存業務にそのまま当てはめるのではなく業務の流れごと変えることで効果を最大化する観点として重要である。選択肢AのPoCは技術検証の工程、選択肢BのRPAは定型作業の自動化ツール、選択肢DのCRISP-DMはデータ分析のプロセスモデルであり、業務プロセスの抜本的再設計そのものを指すものではない。"},{id:"implementation-q40",chapterId:"implementation",question:"組織においてデータの品質・セキュリティ・プライバシー・利用ルールなどを横断的に管理し、データを適切かつ安全に活用できる体制を整える取り組みとして、最も適切なものを選べ。",choices:["データ拡張","データマイニング","データクレンジング","データガバナンス"],answerIndex:3,explanation:"選択肢Dのデータガバナンスは、データの品質管理・アクセス権限・プライバシー保護・利用ルールなどを組織横断で定め、データを適切かつ安全に活用できる体制を構築する取り組みである。選択肢Aのデータ拡張は訓練データの水増し、選択肢Bのデータマイニングはデータからの知識抽出、選択肢Cのデータクレンジングはデータの誤り修正であり、いずれも組織的な管理体制そのものを指すものではない。"}],contrasts:[{title:"CRISP-DM と KDD",left:{label:"CRISP-DM",traits:["ビジネス理解で始まる6フェーズ","フェーズ間を反復","データ分析の標準プロセス"]},right:{label:"KDD",traits:["データ選択で始まる流れ","前処理→変換→マイニング→解釈","DBからの知識発見"]},point:"ビジネス理解始まりがCRISP-DM"},{title:"PoC と本開発",left:{label:"PoC(概念実証)",traits:["小規模に実現可能性を検証","Go/No-Go基準が必須","目的不在だとPoC貧乏"]},right:{label:"本開発",traits:["PoC通過後に本格構築","運用・保守まで見据える","相応の予算と体制"]},point:"PoCは検証、判断基準なしで繰り返さない"},{title:"エッジ と クラウド",left:{label:"エッジ(端末側)",traits:["低遅延・通信不要","プライバシー保護に有利","計算資源が限られ軽量化必要"]},right:{label:"クラウド",traits:["計算資源が豊富","需要に応じてスケール","データ外部送信が前提"]},point:"現場で即応はエッジ、大規模処理はクラウド"},{title:"データドリフトとコンセプトドリフト",left:{label:"データドリフト",traits:["入力データの分布が変化","入力側の変化"]},right:{label:"コンセプトドリフト",traits:["入力と出力の関係が変化","予測対象の性質の変化"]},point:"入力だけの変化か、入出力の関係の変化か"},{title:"LIME と SHAP と Grad-CAM",left:{label:"LIME / SHAP",traits:["LIME=近傍を単純モデルで近似","SHAP=シャープレイ値で寄与度","主に表形式データ"]},right:{label:"Grad-CAM",traits:["勾配でCNNの注目領域を可視化","ヒートマップで表示","画像認識向け"]},point:"画像の注目箇所はGrad-CAM"},{title:"連合学習 と 差分プライバシー",left:{label:"連合学習",traits:["生データを共有しない","更新内容のみ集約","分散したデータで学習"]},right:{label:"差分プライバシー",traits:["出力にノイズを付加","個人の影響を抑える","特定を困難にする"]},point:"データを動かさない連合学習、ノイズで守る差分プライバシー"},{title:"正規化 と 標準化",left:{label:"正規化",traits:["0〜1などの範囲に収める","min-maxスケーリング"]},right:{label:"標準化",traits:["平均0・標準偏差1に変換","外れ値の影響を受けにくい"]},point:"範囲に収めるのが正規化、平均0分散1が標準化"},{title:"RPA と AI",left:{label:"RPA",traits:["定義した手順どおりに自動化","定型事務作業が中心","判断は学習しない"]},right:{label:"AI",traits:["データから判断を学習","非定型な判断が得意"]},point:"手順どおりがRPA、学習して判断がAI"}]},sf={id:"law-ethics",number:7,title:"法律・倫理・ガバナンス",subtitle:"個人情報・著作権・AI原則",sections:[{title:"個人情報保護法",points:["個人情報とは、生存する個人に関する情報で、氏名等により特定の個人を識別できるもの、または個人識別符号(マイナンバー・指紋データ等)が含まれるものを指し、死者の情報は原則対象外である。","個人情報データベース等を構成する個人情報を「個人データ」、そのうち事業者が開示・訂正・削除等の権限を持つものを「保有個人データ」と呼び、改正法では保存期間6か月以内の短期保存データも保有個人データに含まれる。","要配慮個人情報(人種、信条、病歴、犯罪の経歴等)は、取得に原則として本人の事前同意が必要で、オプトアウトによる第三者提供はできない。","仮名加工情報は他の情報と照合しない限り個人を識別できないよう加工したもので原則第三者提供できないのに対し、匿名加工情報は復元不可能なまで加工したもので本人同意なく第三者提供できる点が異なる。","個人情報の利用目的はできる限り特定して通知・公表する必要があり、個人データを第三者へ提供するには原則として本人の同意が必要である。","外国にある第三者への個人データの提供(越境移転)には、本人の同意、日本と同等の水準にある国への提供、または基準に適合する体制の整備のいずれかが必要である。"],summary:"個人情報は「生存する個人」を識別できる情報で、死者は原則対象外。個人情報→個人データ→保有個人データの区別と、要配慮個人情報の事前同意必須・オプトアウト不可が頻出。仮名加工(原則第三者提供不可)と匿名加工(同意なく提供可)の対比、越境移転の3要件も押さえる。"},{title:"知的財産権とAI",points:["著作物とは「思想又は感情を創作的に表現したもの」であり、単なるデータや事実そのものは著作物に該当しない。","改正著作権法30条の4により、情報解析など「著作物に表現された思想又は感情の享受を目的としない利用」であれば、機械学習の学習用データとして著作物を原則許諾なく利用でき、営利目的でも認められる。","ただし30条の4には「著作権者の利益を不当に害することとなる場合」は適用されないという但し書きがあり、無制限の利用が認められるわけではない。","AI生成物は人間の創作的寄与がなければ著作物と認められないが、人間が創作意図を持ち創作的寄与を行った場合は著作物となり得る。","著作権侵害の成立には、既存の著作物に接して利用したという「依拠性」と、表現が似ているという「類似性」の両方が必要である。","不正競争防止法上の営業秘密は秘密管理性・有用性・非公知性の3要件を満たす必要があり、特許法上の発明者は自然人に限られるためAIを発明者とする特許出願は認められていない。"],summary:"30条の4により享受目的でない情報解析は営利でも原則許諾不要だが、著作権者の利益を不当に害する場合は除外される但し書きに注意。著作権侵害は依拠性と類似性の両方が必要で、AI生成物は人間の創作的寄与があれば著作物になり得る。営業秘密の3要件(秘密管理性・有用性・非公知性)と、AIは発明者になれない点が頻出。"},{title:"AI開発の契約とデータ利活用",points:["経済産業省の「AI・データの利用に関する契約ガイドライン」は、AI開発を①アセスメント②PoC(概念実証)③開発④追加学習の4段階に分けて契約を結ぶ「探索的段階型」の開発方式を提唱している。","AI開発は性能を事前に保証しにくいため、各段階で小さく契約を区切り、検証結果を見ながら次段階へ進むことで開発側・依頼側双方のリスクを下げる。","学習済みモデルや学習用データセットなどの成果物の権利帰属は法律で一律に決まっておらず、契約で明確に取り決めることが重要とされる。","不正競争防止法の限定提供データは、業として特定の者に提供するために電磁的方法で相当量蓄積・管理されるデータを保護する制度で、営業秘密のような秘密管理性は要件ではない(非公知性に代わり「限定提供性」等で保護)。","データの収集・利用にあたっては利用目的を明示して本人の同意を得るなど、データ倫理に配慮した取り扱いが求められる。"],summary:"経産省ガイドラインの探索的段階型(アセスメント→PoC→開発→追加学習)の4段階の名称と順序を押さえる。学習済みモデル等の権利帰属は法律で一律に決まらず、契約で取り決めるのが鉄則。限定提供データは秘密管理性が要件でない点が営業秘密との違いとして頻出。"},{title:"AI原則とガバナンス",points:["日本の「人間中心のAI社会原則」(2019年)は、人間の尊厳・多様性と包摂・持続可能性の3つの基本理念のもと、人間中心、教育・リテラシー、プライバシー確保、セキュリティ確保、公正競争確保、公平性・説明責任・透明性、イノベーションの7原則を掲げる。","2024年の「AI事業者ガイドライン」は従来の複数のガイドラインを統合し、AI開発者・AI提供者・AI利用者の3主体それぞれの指針を示し、環境変化に応じて柔軟に見直すアジャイル・ガバナンスの考え方を採用している。","EUのAI法(EU AI Act)はリスクベースアプローチを採用し、AIシステムを許容できないリスク(禁止)、ハイリスク、限定リスク(透明性義務)、最小リスクの4段階に分類して規制の強さを変えている。","EUの倫理ガイドラインが示す「信頼できるAI(Trustworthy AI)」は、合法性・倫理性・頑健性を備え、人間の関与と監視、透明性、公平性、説明責任などの要件を満たすAIを指す。","GDPR(EU一般データ保護規則)は忘れられる権利(消去権)やデータポータビリティの権利を定め、EU域外の企業にも適用され得る域外適用と高額な制裁金が特徴である。","ELSI(倫理的・法的・社会的課題)の観点から、技術開発と並行して倫理・法律・社会への影響を検討する体制づくりがAIガバナンスの一環として求められる。"],summary:"人間中心のAI社会原則は3つの基本理念と7原則、AI事業者ガイドライン(2024年)は3主体+アジャイル・ガバナンスがキーワード。EU AI Actはリスクベースアプローチで4段階に分類、GDPRは忘れられる権利・データポータビリティ・域外適用が特徴。EU AI ActとGDPRの混同を狙う問題が頻出。"},{title:"AI倫理とリスク",points:["学習データに含まれる偏りがAIの判断に反映されるアルゴリズムバイアスの代表例として、米国の再犯予測システムCOMPASが黒人被告の再犯リスクを過大評価していたと指摘された事例がある。","プライバシー・バイ・デザインは、システムの企画・設計段階からあらかじめプライバシー保護を組み込むという考え方である。","ディープフェイクは深層学習で本物そっくりの偽動画・偽音声を生成する技術で、フェイクニュースの拡散や詐欺・名誉毀損への悪用が問題視されている。","人間の判断を介さず攻撃目標を選定し得る自律型致死兵器システム(LAWS)は、特定通常兵器使用禁止制限条約(CCW)の枠組みで国際的な規制が議論されている。","自動運転車が事故時に誰を犠牲にするかという判断はトロッコ問題として知られる倫理的ジレンマであり、MITのモラル・マシン実験では判断の傾向が国や文化によって異なることが示された。","入力データに微小なノイズを加えてAIを誤認識させる敵対的攻撃(Adversarial Examples)や、巧妙な指示文で生成AIの制約を回避させるプロンプトインジェクションなど、AI特有のセキュリティリスクへの対策が必要である。"],summary:"COMPASはアルゴリズムバイアス、モラル・マシンはトロッコ問題の代表事例として頻出。プライバシー・バイ・デザインは「企画・設計段階から組み込む」が核心。敵対的攻撃(微小ノイズで誤認識)とプロンプトインジェクション(指示文で制約回避)の手口の区別、LAWSはCCWの枠組みで規制議論中である点を押さえる。"},{title:"個人の権利と事業者の義務(改正法・国際移転)",points:["2022年施行の改正個人情報保護法により、要配慮個人情報の漏えい、財産的被害のおそれがある漏えい、不正目的による漏えい、1,000人を超える漏えい等が発生した場合、事業者は個人情報保護委員会への報告と本人への通知が義務付けられた。","本人は事業者に対し保有個人データの開示を請求でき、改正法では書面に加えて電磁的記録(デジタルデータ)による開示方法も指定できるようになった。","本人は、不正取得や利用目的外の利用があった場合に加え、改正法では権利・利益が害されるおそれがある場合にも、保有個人データの利用停止・消去や第三者提供の停止を請求できる。","十分性認定は、EUが域外の国・地域の個人データ保護水準を十分と認める制度で、日本は2019年に認定を受け、EUと日本の間で追加的な措置なく個人データを相互に移転できる枠組みが成立した。","GDPRの「忘れられる権利(消去権)」は本人が自己の個人データの削除を求められる権利で、EU司法裁判所が検索結果からの削除を認めた2014年のGoogleスペイン判決を契機に広く知られるようになった。"],summary:"改正法では要配慮個人情報・1,000人超等の漏えいで個人情報保護委員会への報告と本人通知が義務化。開示請求は電磁的記録の指定が可能になり、利用停止等は権利・利益が害されるおそれがある場合にも請求できるよう緩和された。十分性認定は「2019年・EUと相互移転」、忘れられる権利はGoogleスペイン判決とセットで覚える。"},{title:"AI関連分野の法規制と国際動向",points:["2023年のG7広島サミットを契機に始まった広島AIプロセスでは、生成AIに関する国際的なルール作りが進められ、AI開発者向けの国際指針および国際行動規範が取りまとめられた。","アシロマAI原則(2017年)は、Future of Life Institute主催の会議で採択されたAIの研究課題・倫理と価値・長期的課題に関する23の原則で、多数のAI研究者が署名した。","改正道路交通法(2023年施行)により、特定の条件下でシステムがすべての運転操作を行うレベル4相当の「特定自動運行」が都道府県公安委員会の許可制で可能になった。","ドローン(無人航空機)は航空法により規制され、100g以上の機体の登録が義務化されたほか、有人地帯における補助者なし目視外飛行(レベル4飛行)には機体認証と操縦ライセンスが必要である。","診断支援AIなどのプログラムは医療機器(プログラム医療機器)として薬機法の承認等の対象となり得るが、AIはあくまで支援であり診断の最終的な責任は医師が負うと整理されている。","生成AIの安全性確保のため、攻撃者の視点で意図的に攻撃や不適切な入力を試みて脆弱性を洗い出すレッドチーミングや、利用者がAIと対話していることを開示する透明性の確保が求められている。"],summary:"広島AIプロセスは「G7・生成AI・国際指針/行動規範」の組み合わせで覚える。自動運転は改正道路交通法の特定自動運行(レベル4相当・公安委員会の許可制)、ドローンは100g以上で登録義務・レベル4飛行は機体認証+操縦ライセンスが頻出。医療AIは薬機法の対象になり得るが、診断の最終責任は医師が負う。"},{title:"著作権の発生と周辺の権利",points:["著作権は創作と同時に発生し、登録や表示などの手続きを一切必要としない(無方式主義)。出願・審査・登録を経て発生する特許権や商標権との重要な違いである。","法人等の発意に基づき、その業務に従事する者が職務上作成し、法人等の名義で公表される著作物は、契約や就業規則に別段の定めがない限り法人等が著作者となる(職務著作)。","データベースは、情報の選択又は体系的な構成に創作性があればデータベースの著作物として保護されるが、収録された個々のデータや事実そのものは著作物ではない。","文化庁の「AIと著作権に関する考え方」(2024年)は、AI開発・学習段階と生成・利用段階を区別し、学習段階は30条の4等により適法となり得る一方、生成・利用段階では依拠性と類似性によって通常どおり著作権侵害が判断されるという整理を示した。","肖像権はみだりに容ぼう等を撮影・公表されない人格的利益、パブリシティ権は著名人の氏名・肖像が持つ顧客吸引力を保護する権利で、いずれも法律の明文ではなく判例により認められてきた。","商標権は特許庁への出願・登録によって発生し、商品・サービスの出所を識別する標識を保護する。AIで生成したロゴであっても他人の登録商標と類似すれば商標権侵害となり得る。"],summary:"著作権は創作と同時に発生する無方式主義で、出願・審査を要する特許権・商標権との対比が最頻出。職務著作は法人等の発意・職務上作成・法人名義公表・別段の定めなしで法人等が著作者となる。文化庁の整理は「学習段階は30条の4、生成・利用段階は依拠性・類似性」の段階区分が核心で、肖像権・パブリシティ権は判例上の権利。"},{title:"AIと社会(公平性・情報環境)",points:["OECDのAI原則(2019年)は初の政府間合意によるAI原則で、人間中心の価値、透明性・説明可能性、頑健性・安全性、説明責任などを掲げ、G20のAI原則にも引き継がれた。","アマゾン社が開発していた採用AIは、過去の採用実績データの偏りを学習して女性応募者を不利に評価する傾向が判明し運用が中止され、採用AIにおけるバイアスの代表事例となった。","信用スコアリングや与信審査へのAI利用では、特定の属性に対する差別的な判断が生じないよう公平性の検証と説明責任が求められる。","顔認識技術はプライバシーや誤認逮捕のリスクから規制の議論が進んでおり、EU AI Actでは公共空間でのリアルタイム遠隔生体識別が原則禁止に分類されるなど、各国で利用制限の動きがある。","フィルターバブルはパーソナライズ(推薦アルゴリズム)により自分好みの情報に囲い込まれる現象、エコーチェンバーは同質な意見ばかりが反響して信念が増幅される現象で、社会の分断を招くと懸念されている。"],summary:"OECDのAI原則は「初の政府間合意」という位置付けが頻出。アマゾン採用AIは学習データの偏りが雇用差別を再生産した代表事例。フィルターバブル(好みの情報への囲い込み)とエコーチェンバー(同質意見の反響・増幅)の区別と、顔認識がEU AI Actで原則禁止に分類される点を押さえる。"},{title:"個人情報の4区分と個人関連情報",points:["個人情報保護法は、識別性のある「個人情報」、それがデータベース化された「個人データ」、事業者に開示・訂正・削除等の権限がある「保有個人データ」と、概念が段階的に絞り込まれる入れ子構造になっている。","個人識別符号には、DNA・顔・指紋・声紋・歩行の態様等の身体的特徴をデータ化したものと、マイナンバー・基礎年金番号・運転免許証番号・旅券番号等の公的な番号の2類型がある。","2022年施行の改正で新設された個人関連情報は、Cookie・閲覧履歴・購買履歴・位置情報など、生存する個人に関する情報のうち個人情報・仮名加工情報・匿名加工情報のいずれにも該当しないものを指す。","個人関連情報は、それ単体では特定の個人を識別できないため、提供する側にとっては個人データに当たらないことが多い。","提供先の第三者が個人関連情報を個人データとして取得することが想定される場合、提供元は提供先が本人同意を得ていることの確認義務と、確認に係る記録の作成・保存義務を負う。","個人データの第三者提供では、提供する側・受け取る側の双方に、提供・受領の年月日や相手方の氏名等を記録し一定期間保存する確認・記録義務が課されている。","利用目的はできる限り具体的に特定する必要があり、特定した利用目的の達成に必要な範囲を超えて個人情報を取り扱うには、原則として改めて本人の同意を得なければならない。"],summary:"個人情報→個人データ→保有個人データの入れ子構造に、第4の区分として個人関連情報(Cookie・閲覧履歴等)が加わる。個人関連情報は提供先が個人データとして取得する場合に提供元へ本人同意の確認義務が生じるのが核心。第三者提供の確認・記録義務と利用目的の特定・目的外利用の同意も押さえる。"},{title:"著作権の保護期間・権利の中身・引用",points:["著作権は著作者人格権(公表権・氏名表示権・同一性保持権)と財産権としての著作権(複製権・公衆送信権・翻案権等)に大別され、著作者人格権は他人に譲渡できない一身専属の権利である。","著作権(財産権)の保護期間は、TPP整備法による改正で原則として著作者の死後70年に延長された(従来は死後50年)。","無名・変名の著作物や法人等の団体名義の著作物、映画の著作物の保護期間は、創作後または公表後70年が基準となる。","著作権法32条の引用は、①公表された著作物であること、②引用する側が主・引用される側が従の主従関係、③かぎ括弧等による明瞭区別性、④公正な慣行と正当な範囲、を満たせば著作権者の許諾なく利用できる。","出典の明示(出所の明示)は適法な引用の前提として求められ、これを欠くと引用として認められないことがある。","私的使用のための複製(30条)や、教育機関での複製、図書館での複製など、著作権には目的に応じた多数の権利制限規定が設けられている。","翻案権は原著作物の表現を変えて二次的著作物を作る権利で、AIが既存著作物に依拠して類似の表現を生成した場合は複製権だけでなく翻案権の侵害も問題となり得る。"],summary:"著作権は譲渡できない著作者人格権(公表権・氏名表示権・同一性保持権)と譲渡可能な財産権に分かれ、財産権の保護期間は原則死後70年。引用が適法となる4要件(公表済み・主従関係・明瞭区別性・公正な慣行/正当な範囲)と出典明示の必要が頻出。私的複製等の権利制限規定や翻案権の存在も押さえる。"},{title:"AI事業者ガイドラインの内部構造",points:["AI事業者ガイドライン(第1.0版・2024年)は、AI開発者・AI提供者・AI利用者という3つの主体を対象に、それぞれが配慮すべき事項を整理している。","全主体に共通する「共通の指針」として、人間中心、安全性、公平性、プライバシー保護、セキュリティ確保、透明性、アカウンタビリティ(説明責任)、教育・リテラシー、公正競争確保、イノベーションの10項目が示されている。","この10項目は、日本の「人間中心のAI社会原則」の7原則を、事業者の実務に落とし込む形で発展・整理したものと位置付けられる。","ガイドラインは法的拘束力を持つ規制ではなく、事業者の自主的な取り組みを促すソフトローであり、技術や社会の変化に応じて継続的に見直すアジャイル・ガバナンスの考え方を採る。","アジャイル・ガバナンスは、固定的な事前規制ではなく、環境分析・ゴール設定・システム設計・運用・評価のサイクルを高速で回し、状況変化に応じて柔軟に統治を更新する考え方である。","従来は総務省の「AI開発ガイドライン」「AI利活用ガイドライン」と経産省の「AI原則実践のためのガバナンス・ガイドライン」が分立していたが、これらを統合したのがAI事業者ガイドラインである。","生成AIの普及を受け、各主体は誤情報の生成リスクや学習データの権利・バイアスへの配慮など、生成AIに固有の留意点にも対応することが求められている。"],summary:"AI事業者ガイドライン(2024年)は開発者・提供者・利用者の3主体を対象に、共通の指針として人間中心・安全性・公平性・プライバシー・セキュリティ・透明性・アカウンタビリティ・教育・公正競争・イノベーションの10項目を示す。法的拘束力のないソフトローでアジャイル・ガバナンスを採用し、従来分立していた複数ガイドラインを統合した点が頻出。"},{title:"説明可能性・透明性とAIの公平性",points:["ディープラーニングは判断の根拠が人間に分かりにくいブラックボックスになりやすく、その判断理由を人間が理解できる形で示す技術や研究分野を説明可能なAI(XAI)と呼ぶ。","LIME(個々の予測を局所的に単純なモデルで近似して説明する)やSHAP(各特徴量の貢献度をゲーム理論のシャープレイ値で求める)は、代表的なモデル説明手法である。","高リスクな意思決定にAIを用いる場合、結果に対して人間が責任を負い説明できる状態を保つアカウンタビリティ(説明責任)の確保が求められる。","AIの公平性は、性別・人種等の属性で結果に不当な差が出ないことを指すが、各個人の予測精度をそろえる基準と、群ごとの正答率・誤答率をそろえる基準は一般に同時には満たせないトレードオフがある。","学習データに社会の偏見が反映されると差別が再生産されるため、データの偏りの是正、公平性指標による検証、影響評価などのバイアス対策が必要となる。","信用スコアリングや与信審査へのAI利用では、特定属性への差別的判断を避けるための公平性検証と、なぜその判定になったのかを説明できる体制が重要となる。","AIと対話していることや出力がAI生成であることを利用者に知らせる透明性の確保は、ディープフェイク対策やAI事業者ガイドラインでも重視されている。"],summary:"説明可能なAI(XAI)はブラックボックス化したAIの判断根拠を示す分野で、代表手法にLIME・SHAPがある。公平性には個人単位と群単位の基準が両立しないトレードオフがあり、信用スコアリング等では公平性検証と説明責任の確保が必須。AI利用や生成物であることを知らせる透明性も頻出論点。"},{title:"GDPRの詳細と国際的なデータ・AIガバナンス",points:["GDPRでは、本人がプロファイリングを含む完全に自動化された処理のみに基づき、法的効果や重大な影響を及ぼす決定の対象とされない権利が定められ、人間の関与を求めることができる。","プロファイリングとは、個人の職務遂行・経済状況・健康・嗜好・行動・位置等を評価するために個人データを自動的に処理することを指す。","GDPR違反には、最大で全世界年間売上高の4%または2,000万ユーロのいずれか高い方という高額の制裁金が科され得る。","GDPRは個人データの処理に正当な根拠(本人同意、契約の履行、正当な利益等)を要求し、必要最小限のデータに限るデータ最小化や目的外利用の禁止などの原則を定める。","AI開発・提供のサプライチェーン全体で、学習データの出所や加工履歴を追跡できるようにするトレーサビリティの確保が、品質・説明責任の観点から重視されている。","米国は包括的なAI規制法より分野別・自主的な対応を重視する傾向があり、AI権利章典の青写真など指針的文書が示されてきた点が、包括規制のEUと対比される。","国際標準化機構はAIマネジメントシステムの国際規格ISO/IEC 42001を整備し、組織がAIを責任ある形で運用するための枠組みづくりが各国・国際機関で進んでいる。"],summary:"GDPRは自動意思決定のみによる重大な決定を拒み人間の関与を求める権利を定め、プロファイリングを規律する。制裁金は全世界売上高4%または2,000万ユーロの高い方が上限。データ最小化・目的外利用禁止やトレーサビリティ確保も押さえ、包括規制のEUと分野別・自主重視の米国の対比が頻出。"}],terms:[{term:"要配慮個人情報",definition:"人種、信条、社会的身分、病歴、犯罪の経歴など不当な差別や偏見が生じ得る個人情報。取得には原則本人の事前同意が必要で、オプトアウトによる第三者提供は認められない。"},{term:"仮名加工情報",definition:"他の情報と照合しない限り特定の個人を識別できないように加工した個人に関する情報。企業内部での分析利用を想定し、原則として第三者提供はできない。"},{term:"匿名加工情報",definition:"特定の個人を識別できず、元の個人情報に復元できないように加工した情報。本人の同意なく第三者提供が可能で、作成時には加工情報の項目の公表等が義務付けられる。"},{term:"オプトアウト",definition:"本人の求めがあれば提供を停止することを条件に、事前同意なしで個人データを第三者提供できる仕組み。個人情報保護委員会への届出が必要で、要配慮個人情報には使えない。"},{term:"GDPR",definition:"2018年に施行されたEU一般データ保護規則。忘れられる権利やデータポータビリティの権利を定め、EU域外の事業者にも適用され得る域外適用と高額制裁金が特徴。"},{term:"著作権法30条の4",definition:"思想・感情の享受を目的としない利用(情報解析等)であれば著作物を原則許諾なく利用できると定めた規定。機械学習の学習用データ利用の根拠となるが、著作権者の利益を不当に害する場合は除かれる。"},{term:"依拠性",definition:"既存の著作物に接し、それを利用して制作したこと。著作権侵害は依拠性と類似性の両方が認められて初めて成立する。"},{term:"営業秘密",definition:"不正競争防止法で保護される、秘密管理性・有用性・非公知性の3要件を満たす技術上・営業上の情報。"},{term:"限定提供データ",definition:"業として特定の者に提供するため、電磁的方法で相当量蓄積・管理されるデータを不正競争防止法で保護する制度。秘密管理性は要件でない点が営業秘密と異なる。"},{term:"人間中心のAI社会原則",definition:"2019年に日本政府が決定したAI社会の基本原則。人間の尊厳など3つの基本理念と、人間中心・公平性・説明責任・透明性など7つの原則からなる。"},{term:"AI事業者ガイドライン",definition:"2024年に総務省・経済産業省が公表した統合ガイドライン。AI開発者・提供者・利用者の3主体ごとの指針を示し、アジャイル・ガバナンスを採用する。"},{term:"EU AI Act",definition:"2024年に成立した世界初の包括的AI規制法。リスクベースアプローチにより、AIを許容できないリスクからハイリスク、限定リスク、最小リスクの4段階に分類して規制する。"},{term:"COMPAS",definition:"米国で使われた再犯リスク予測システム。黒人被告の再犯リスクを過大評価する傾向が指摘され、アルゴリズムバイアスの代表的な事例となった。"},{term:"プライバシー・バイ・デザイン",definition:"システムやサービスの企画・設計段階から、あらかじめプライバシー保護の仕組みを組み込むという考え方。"},{term:"LAWS",definition:"自律型致死兵器システム。人間の判断を介さず攻撃目標の選定・攻撃を行い得る兵器で、CCW(特定通常兵器使用禁止制限条約)の枠組みで国際的な規制が議論されている。"},{term:"ELSI",definition:"倫理的・法的・社会的課題(Ethical, Legal and Social Issues)の略。新技術の研究開発と並行して、社会への影響を多面的に検討する取り組みを指す。"},{term:"ディープフェイク",definition:"深層学習を用いて本物と見分けがつかない偽の動画・音声などを生成する技術。フェイクニュースや詐欺への悪用が社会問題となっている。"},{term:"プロンプトインジェクション",definition:"生成AIに巧妙な指示文を入力し、開発者が設定した制約を回避させて不適切な出力や情報漏えいを引き起こす攻撃手法。"},{term:"十分性認定",definition:"EUが域外の国・地域の個人データ保護水準を十分と認める制度。日本は2019年に認定を受け、EUとの間で追加的措置なく個人データを相互に移転できる。"},{term:"データポータビリティの権利",definition:"本人が自己の個人データを構造化された機械可読形式で受け取り、他の事業者へ移行できる権利。GDPRで明文化された。"},{term:"無方式主義",definition:"著作権が創作と同時に発生し、登録・表示などの手続きを一切要しないとする原則。出願・審査を経て発生する特許権・商標権との重要な違い。"},{term:"職務著作",definition:"法人等の発意に基づき従業者が職務上作成し、法人等の名義で公表される著作物について、別段の定めがない限り法人等を著作者とする制度。"},{term:"広島AIプロセス",definition:"2023年のG7広島サミットを契機に始まった生成AIに関する国際的なルール作り。AI開発者向けの国際指針と国際行動規範が取りまとめられた。"},{term:"アシロマAI原則",definition:"2017年にFuture of Life Institute主催の会議で採択された、AIの研究課題・倫理と価値・長期的課題に関する23の原則。多数のAI研究者が署名した。"},{term:"レッドチーミング",definition:"攻撃者の視点から意図的に攻撃や不適切な入力を試み、AIシステムの脆弱性や不適切な出力のリスクを洗い出す安全性検証の手法。"},{term:"フィルターバブル",definition:"推薦アルゴリズムによるパーソナライズの結果、利用者が自分好みの情報に囲い込まれ、多様な情報に接しにくくなる現象。類似概念に同質な意見が反響するエコーチェンバーがある。"}],questions:[{id:"law-ethics-q01",chapterId:"law-ethics",question:"個人情報保護法における「個人情報」の説明として、最も適切なものを選べ。",choices:["死者に関する情報も含め、個人に関するすべての情報を指す","企業が秘密として管理している顧客情報のみを指す","生存する個人に関する情報で、特定の個人を識別できるもの、または個人識別符号を含むものを指す","データベース化され検索可能な状態にある個人の情報のみを指す"],answerIndex:2,explanation:"個人情報は「生存する個人に関する情報」で特定の個人を識別できるもの(個人識別符号を含む)と定義され、死者の情報は原則対象外である。秘密管理は営業秘密の要件であり個人情報の要件ではない。データベース化された個人情報は「個人データ」と呼ばれる別概念で、個人情報・個人データ・保有個人データの区別は頻出ポイント。"},{id:"law-ethics-q02",chapterId:"law-ethics",question:"個人情報保護法における要配慮個人情報の取り扱いとして、最も適切なものを選べ。",choices:["取得には原則として本人の事前同意が必要で、オプトアウトによる第三者提供はできない","利用目的を公表すれば、本人の同意なく自由に取得できる","匿名加工すれば要配慮個人情報のまま第三者提供できる","氏名や住所などの基本的な連絡先情報が該当する"],answerIndex:0,explanation:"要配慮個人情報(人種、信条、病歴、犯罪の経歴等)は取得に原則本人の事前同意が必要で、オプトアウト方式の第三者提供も禁止されている。氏名や住所は通常の個人情報であり要配慮個人情報ではない。匿名加工を施せばそれはもはや要配慮個人情報ではなく匿名加工情報として扱われる。「オプトアウト不可」は頻出の引っかけポイント。"},{id:"law-ethics-q03",chapterId:"law-ethics",question:"仮名加工情報と匿名加工情報の違いの説明として、最も適切なものを選べ。",choices:["仮名加工情報は本人同意なく第三者提供できるが、匿名加工情報はできない","仮名加工情報は他の情報と照合すれば個人を識別し得るため原則第三者提供できないが、匿名加工情報は復元不可能なため本人同意なく第三者提供できる","両者は加工の程度が同じで、呼び方が法改正で変わっただけである","匿名加工情報は社内利用専用で、仮名加工情報のみ外部提供が認められる"],answerIndex:1,explanation:"仮名加工情報は他の情報と照合しない限り個人を識別できない水準の加工で、社内分析等での利活用を想定し原則第三者提供不可。匿名加工情報は個人を識別できず復元もできない水準まで加工するため、本人同意なく第三者提供が可能となる。加工の程度と提供可否が逆になっている選択肢は典型的な誤答パターンで、両者の対比はG検定頻出。"},{id:"law-ethics-q04",chapterId:"law-ethics",question:"個人データの第三者提供におけるオプトアウト方式の説明として、最も適切なものを選べ。",choices:["本人が事前に同意した場合のみ第三者提供できる方式","匿名加工を施したうえで第三者提供する方式","グループ会社間であれば自由に共有できる方式","本人の求めに応じて提供を停止することを条件に、個人情報保護委員会へ届け出て事前同意なしに第三者提供できる方式"],answerIndex:3,explanation:"オプトアウトは、本人の求めがあれば提供を停止することを条件に、必要事項を本人に通知等し個人情報保護委員会に届け出ることで、事前同意なく第三者提供できる仕組みである。事前同意を得る方式はオプトインと呼ばれる。要配慮個人情報や不正取得された個人データはオプトアウトの対象外である点もあわせて押さえたい。"},{id:"law-ethics-q05",chapterId:"law-ethics",question:"個人データを外国にある第三者へ提供する場合(越境移転)の規律として、最も適切なものを選べ。",choices:["本人の同意を得るか、日本と同等の保護水準にあると認められる国への提供、または基準に適合する体制を整備した事業者への提供であることが必要である","インターネット経由の提供であれば、国内提供と同じ扱いで規制はない","外国への提供は法律で一律に禁止されている","提供先が大企業であれば本人同意は不要である"],answerIndex:0,explanation:"越境移転には、①本人の同意、②日本と同等の水準にあると認められる国(EU・英国等)への提供、③基準適合体制を整備した第三者への提供、のいずれかが必要である。一律禁止ではなく、企業規模も関係ない。改正法では同意取得時に移転先国の制度等の情報提供も求められるようになった点が頻出。"},{id:"law-ethics-q06",chapterId:"law-ethics",question:"GDPR(EU一般データ保護規則)の説明として、最も適切なものを選べ。",choices:["米国の連邦法であり、EU企業には適用されない","罰則のない自主的なガイドラインである","忘れられる権利やデータポータビリティの権利を定め、EU域外の事業者にも適用され得る","AIシステムをリスクの大きさで4段階に分類して規制する法律である"],answerIndex:2,explanation:"GDPRはEUの個人データ保護規則で、消去権(忘れられる権利)やデータポータビリティの権利を定め、EU居住者にサービスを提供する域外企業にも適用される(域外適用)。違反には全世界売上高の4%または2,000万ユーロのいずれか高い方を上限とする制裁金があり、自主ガイドラインではない。リスクの4段階分類はEU AI Actの特徴であり混同に注意。"},{id:"law-ethics-q07",chapterId:"law-ethics",question:"日本の著作権法30条の4に基づく機械学習用データとしての著作物利用の説明として、最も適切なものを選べ。",choices:["学習利用には常に著作権者の許諾が必要である","非営利の研究目的に限り、許諾なく利用できる","学習に利用した時点で生成物の著作権は元の著作権者に帰属する","情報解析など享受を目的としない利用であれば原則許諾なく利用できるが、著作権者の利益を不当に害する場合は除かれる"],answerIndex:3,explanation:"30条の4は「思想又は感情の享受を目的としない利用」を許諾不要とする規定で、機械学習のための情報解析はその代表例であり、営利目的でも認められる。ただし著作権者の利益を不当に害することとなる場合は適用されない但し書きがある。この規定の柔軟さから日本は機械学習に有利な法制と評価されることもあり、「非営利限定」とする選択肢は典型的な誤りである。"},{id:"law-ethics-q08",chapterId:"law-ethics",question:"AI生成物の著作権に関する説明として、最も適切なものを選べ。",choices:["AIが生成したものはすべてAI開発企業の著作物となる","人間の創作的寄与がないAI生成物は著作物と認められないが、人間が創作意図を持ち創作的に寄与した場合は著作物となり得る","AI生成物には自動的にAI自身の著作権が発生する","AI生成物は例外なくパブリックドメインになると法律で明記されている"],answerIndex:1,explanation:"著作物は「思想又は感情を創作的に表現したもの」であり、その主体は人間であることが前提のため、人間の創作的寄与のないAI生成物は著作物と認められない。一方、人間がAIを道具として使い創作意図と創作的寄与が認められる場合は著作物となり得る。AI自体は権利主体になれず、開発企業に自動帰属する規定も存在しない。創作的寄与の有無で判断する枠組みが頻出ポイント。"},{id:"law-ethics-q09",chapterId:"law-ethics",question:"著作権侵害が成立するための要件の組み合わせとして、最も適切なものを選べ。",choices:["既存の著作物に依拠したこと(依拠性)と、表現が類似していること(類似性)","新規性と進歩性","秘密管理性と有用性","独自性と経済的損害の発生"],answerIndex:0,explanation:"著作権侵害は、既存著作物に接してそれを利用した「依拠性」と、創作的表現が共通する「類似性」の両方が必要で、偶然似ただけでは侵害にならない。新規性・進歩性は特許の要件、秘密管理性・有用性は営業秘密の要件であり、他の知的財産制度との混同を狙った誤答である。AI生成物が学習元の著作物に依拠したといえるかは現在も議論がある論点として頻出。"},{id:"law-ethics-q10",chapterId:"law-ethics",question:"不正競争防止法上の営業秘密として保護されるための3要件として、最も適切なものを選べ。",choices:["新規性・進歩性・産業上の利用可能性","依拠性・類似性・創作性","秘密管理性・有用性・非公知性","限定提供性・電磁的管理性・相当量蓄積性"],answerIndex:2,explanation:"営業秘密は、秘密として管理されていること(秘密管理性)、事業に有用であること(有用性)、公然と知られていないこと(非公知性)の3要件を満たす情報である。新規性・進歩性等は特許要件、依拠性・類似性は著作権侵害の要件、限定提供性等は同じ不正競争防止法の限定提供データに関わる概念であり、いずれも別制度の用語である。学習済みモデルやデータを営業秘密として守る選択肢として頻出。"},{id:"law-ethics-q11",chapterId:"law-ethics",question:"不正競争防止法における限定提供データの説明として、最も適切なものを選べ。",choices:["秘密として厳重に管理されることが保護の必須要件となるデータ","業として特定の者に提供するために電磁的方法で相当量蓄積・管理されるデータで、秘密管理性は要件ではない","誰でも無償で自由に利用できるオープンデータの別称","個人情報保護法に基づき匿名加工されたデータ"],answerIndex:1,explanation:"限定提供データは、ID・パスワード管理等のもとで特定の者に業として提供されるデータを保護する制度で、相当量の蓄積と電磁的管理が要件となる。秘密管理性を要件とする営業秘密とは異なり、外部に提供されるデータでも保護できる点が制度の狙いである。データ取引・共有の促進を目的に導入された制度で、営業秘密との要件の違いが頻出ポイント。"},{id:"law-ethics-q12",chapterId:"law-ethics",question:"AIと特許制度の関係についての説明として、最も適切なものを選べ。",choices:["AIが自律的に生み出した発明は、AIを発明者として特許登録できる","AI関連技術はすべて特許の対象外である","特許権は出願や審査を経ずに発明の完成と同時に発生する","特許法上の発明者は自然人に限られると解されており、AIを発明者とする出願は認められていない"],answerIndex:3,explanation:"日本を含む多くの国で、特許法上の発明者は自然人(人間)に限られると解されており、AIを発明者として記載した出願(DABUS事件など)は認められていない。AI関連技術自体は要件を満たせば特許を取得でき、対象外ではない。特許権は出願・審査・登録を経て発生する点も著作権(創作と同時に発生)との重要な違いとして頻出。"},{id:"law-ethics-q13",chapterId:"law-ethics",question:"経済産業省「AI・データの利用に関する契約ガイドライン」が提唱するAI開発の進め方として、最も適切なものを選べ。",choices:["アセスメント→PoC→開発→追加学習の4段階に分け、段階ごとに契約を結ぶ探索的段階型の開発方式","最初に完成品の性能を保証する一括請負契約を結ぶ方式","要件定義から納品まで後戻りせず一方向に進めるウォーターフォール型のみを推奨する方式","契約を結ばずに口頭合意で迅速に開発を進める方式"],answerIndex:0,explanation:"AIの性能は学習してみないと分からない不確実性があるため、同ガイドラインはアセスメント、PoC(概念実証)、開発、追加学習の4段階に分けて段階ごとに契約する探索的段階型を提唱している。性能を事前保証する一括請負やウォーターフォール固定はAI開発の不確実性と相性が悪く、契約を結ばない進め方は権利帰属やトラブル対応の面で不適切である。4段階の名称と順序は頻出。"},{id:"law-ethics-q14",chapterId:"law-ethics",question:"AI開発における学習済みモデル等の成果物の権利帰属についての説明として、最も適切なものを選べ。",choices:["法律により常に開発を依頼した発注者(ユーザー)側に帰属する","法律で一律に定まっていないため、開発契約において当事者間で取り決めることが重要である","法律により常に開発ベンダー側に帰属する","学習済みモデルには権利が一切発生しないため取り決めは不要である"],answerIndex:1,explanation:"学習済みモデル、学習用データセット、ノウハウ等の権利帰属や利用条件は法律で一律に決まっておらず、契約で明確化することが「AI・データの利用に関する契約ガイドライン」でも強調されている。常に発注者またはベンダーに帰属するという規定は存在せず、取り決めがないと紛争の原因になる。寄与度や再利用の必要性を踏まえて利用条件を柔軟に設計する考え方が頻出ポイント。"},{id:"law-ethics-q15",chapterId:"law-ethics",question:"日本の「人間中心のAI社会原則」に関する説明として、最も適切なものを選べ。",choices:["AI開発企業の利益最大化を最優先の理念として掲げている","EUが制定した法的拘束力のある規則である","AIの軍事利用の手続きを定めた国際条約である","人間の尊厳などの基本理念のもと、人間中心、公平性・説明責任・透明性、プライバシー確保などの7つの原則を掲げている"],answerIndex:3,explanation:"人間中心のAI社会原則(2019年)は、人間の尊厳・多様性と包摂・持続可能性の3つの基本理念のもと、人間中心、教育・リテラシー、プライバシー確保、セキュリティ確保、公正競争確保、公平性・説明責任・透明性、イノベーションの7原則を掲げる日本政府の原則である。法的拘束力のある規則ではなく、EUの文書でも国際条約でもない。公平性・説明責任・透明性(FAT)を含む7原則の中身が頻出。"},{id:"law-ethics-q16",chapterId:"law-ethics",question:"EU AI Act(EUのAI法)の特徴として、最も適切なものを選べ。",choices:["すべてのAIシステムを一律に同じ強さで規制する","違反しても罰則のない努力義務のみを定めている","リスクベースアプローチを採用し、許容できないリスクのAIを禁止、ハイリスクAIに厳格な義務を課すなどリスクの大きさに応じて規制する","AIの研究開発自体を全面的に禁止する"],answerIndex:2,explanation:"EU AI Actは世界初の包括的AI規制法で、リスクベースアプローチにより許容できないリスク(ソーシャルスコアリング等は禁止)、ハイリスク、限定リスク(透明性義務)、最小リスクの4段階に分けて規制の強さを変える。一律規制でも研究開発の全面禁止でもなく、違反には高額の制裁金が科され得るため努力義務のみという記述も誤り。「リスクベースアプローチ」というキーワードが最頻出。"},{id:"law-ethics-q17",chapterId:"law-ethics",question:"米国の再犯予測システムCOMPASを巡る問題が示した教訓として、最も適切なものを選べ。",choices:["AIの予測は人間の判断より常に公平であること","学習データや設計に由来する偏りがAIの判断に反映され、特定の属性の人々に不利益を与え得ること","再犯予測には統計的手法を使ってはならないこと","アルゴリズムを完全に公開すればバイアスは必ず解消されること"],answerIndex:1,explanation:"COMPASは黒人被告の再犯リスクを実際より高く見積もる(偽陽性が多い)傾向が報道機関の調査で指摘され、アルゴリズムバイアスの代表事例となった。AIが常に人間より公平とは限らず、データの偏りが差別を再生産し得ることを示した点が教訓である。統計的手法の禁止やアルゴリズム公開だけでの解決を意味するものではなく、公平性の検証と説明責任の重要性が問われる頻出事例である。"},{id:"law-ethics-q18",chapterId:"law-ethics",question:"プライバシー・バイ・デザインの説明として、最も適切なものを選べ。",choices:["システムの企画・設計段階からあらかじめプライバシー保護の仕組みを組み込むという考え方","プライバシー侵害が発生した後に事後対応として保護策を追加する考え方","個人データの利用をデザイン業界に限って認める制度","プライバシーポリシーのデザインを見やすくするためのガイドライン"],answerIndex:0,explanation:"プライバシー・バイ・デザインは、開発の最終段階や問題発生後ではなく、企画・設計の段階から事前にプライバシー保護を組み込むべきだという考え方で、カナダのアン・カブキアンが提唱した。事後的・追加的な対応はこの考え方の対極にある。GDPRにもデータ保護バイ・デザインとして同様の思想が取り入れられており、「事前に・設計段階から」がキーワードとして頻出。"},{id:"law-ethics-q19",chapterId:"law-ethics",question:"自律型致死兵器システム(LAWS)に関する説明として、最も適切なものを選べ。",choices:["人間の操縦が常に必要な遠隔操作ドローンの総称である","すでに国際条約で全面禁止され、開発する国は存在しない","サイバー攻撃を自動で防御するセキュリティソフトウェアを指す","人間の判断を介さずに攻撃目標の選定・攻撃を行い得る兵器システムで、CCWの枠組みなどで国際的な規制が議論されている"],answerIndex:3,explanation:"LAWSは人間の関与なしに目標選定と攻撃を行い得る自律型の致死兵器を指し、人間が常時操縦する遠隔操作兵器とは区別される。包括的に禁止する国際条約はまだ成立しておらず、特定通常兵器使用禁止制限条約(CCW)の枠組みで規制の議論が続いている。研究者からも開発反対の声明が出されるなど、AI倫理の論点として頻出のテーマである。"},{id:"law-ethics-q20",chapterId:"law-ethics",question:"AIシステムへの攻撃手法に関する説明として、最も適切なものを選べ。",choices:["敵対的攻撃とは、サーバーに大量のアクセスを集中させてサービスを停止させる攻撃である","プロンプトインジェクションとは、データベースに不正なSQL文を注入する攻撃である","敵対的攻撃は入力に人間には知覚しにくい微小なノイズを加えてAIに誤認識させる攻撃で、プロンプトインジェクションは指示文によって生成AIの制約を回避させる攻撃である","これらの攻撃は理論上の存在であり、実際のAIシステムには影響しない"],answerIndex:2,explanation:"敵対的攻撃(Adversarial Examples)は画像などに微小な摂動を加え、人間には変化が分からないままAIの分類を誤らせる攻撃である。プロンプトインジェクションは生成AIへの入力文を細工して開発者の設定した制約を回避させる攻撃で、SQLインジェクション(データベース攻撃)とは別物である。いずれも実際に再現されている現実的脅威であり、大量アクセスによる攻撃はDoS攻撃と呼ばれる。各攻撃名と手口の対応が頻出。"},{id:"law-ethics-q21",chapterId:"law-ethics",question:"個人データの漏えい等が発生した場合の事業者の義務に関する説明として、最も適切なものを選べ。",choices:["漏えいの規模や内容にかかわらず、外部への報告や本人への通知の義務は一切ない","要配慮個人情報の漏えいや1,000人を超える漏えい等の場合、個人情報保護委員会への報告と本人への通知が義務付けられている","報告先は警察であり、個人情報保護委員会への報告は不要である","社内で対応記録を残せば、外部への報告・通知は常に免除される"],answerIndex:1,explanation:"2022年施行の改正個人情報保護法により、要配慮個人情報の漏えい、財産的被害のおそれがある漏えい、不正目的によるおそれがある漏えい、1,000人を超える漏えい等では、個人情報保護委員会への報告と本人への通知が法的義務となった。選択肢Aや選択肢Dのように義務がない・免除されるという理解は改正前の努力義務時代のもので誤りである。選択肢Cの報告先は警察ではなく個人情報保護委員会であり、「委員会報告と本人通知がセットで義務化」が頻出ポイント。"},{id:"law-ethics-q22",chapterId:"law-ethics",question:"保有個人データの開示請求に関する説明として、最も適切なものを選べ。",choices:["本人は事業者に対し保有個人データの開示を請求でき、改正法では電磁的記録(デジタルデータ)による開示方法も指定できるようになった","開示請求ができるのは、その事業者の株主や取引先に限られる","開示は書面の交付に限られ、デジタルデータでの開示は法律上認められていない","保存期間が6か月以内の短期保存データは保有個人データに含まれず、開示請求の対象外である"],answerIndex:0,explanation:"本人は事業者に保有個人データの開示を請求する権利を持ち、2022年施行の改正法により書面に加えて電磁的記録による開示方法の指定も可能になった(選択肢A)。選択肢Cは改正前の書面交付原則のイメージによる誤りである。また改正法では6か月以内に消去される短期保存データも保有個人データに含まれ開示等の対象となるため選択肢Dも誤りで、選択肢Bのような請求者を株主等に限る規定は存在しない。"},{id:"law-ethics-q23",chapterId:"law-ethics",question:"保有個人データの利用停止・消去等の請求に関する説明として、最も適切なものを選べ。",choices:["利用停止等の請求は、理由を問わずいかなる場合でも無条件に認められる","利用停止等の請求ができるのは、漏えい事故が実際に発生した場合のみである","不正取得や目的外利用の場合に加え、改正法では本人の権利・正当な利益が害されるおそれがある場合にも利用停止等を請求できるようになった","利用停止等を請求するには、あらかじめ裁判所の許可を得る必要がある"],answerIndex:2,explanation:"従来は不正取得や利用目的外の利用など法違反の場合に限られていたが、2022年施行の改正法により、本人の権利又は正当な利益が害されるおそれがある場合にも利用停止・消去や第三者提供の停止を請求できるよう要件が緩和された(選択肢C)。選択肢Aのような無条件の請求権ではなく、選択肢Bのように漏えい発生時に限られるわけでもない。選択肢Dの裁判所の許可も不要で、本人が事業者に直接請求できる。請求要件の拡大が改正のポイントとして頻出。"},{id:"law-ethics-q24",chapterId:"law-ethics",question:"EUの十分性認定に関する説明として、最も適切なものを選べ。",choices:["日本企業がEUの製品安全規格への適合を証明する認証制度である","国連が各国のAI規制の水準を審査して認定する制度である","認定を受けた後も、EUから日本への個人データ移転には常に本人の個別同意が必要である","EUが域外の国・地域の個人データ保護水準を十分と認める制度で、日本は2019年に認定を受け、追加的措置なくEUとの間で個人データを相互に移転できる"],answerIndex:3,explanation:"十分性認定はGDPRに基づきEUが域外の国・地域のデータ保護水準を十分と認める制度で、日本は2019年に認定を受け、EUと日本の間で標準契約条項などの追加的措置や個別同意なしに個人データを移転できる枠組みが成立した(選択肢D)。認定の効果は移転の自由化であり、選択肢Cのように常に個別同意が必要というのは認定がない場合の話である。選択肢Aの製品認証や選択肢BのAI規制審査とは無関係で、「2019年・相互移転」が頻出キーワード。"},{id:"law-ethics-q25",chapterId:"law-ethics",question:"GDPRにおける「忘れられる権利」に関する説明として、最も適切なものを選べ。",choices:["本人が自己の個人データの削除を求められる権利(消去権)で、検索結果からの削除を認めた2014年のEU司法裁判所のGoogleスペイン判決を契機に広く知られるようになった","AIが学習済みのパラメータを完全に消去することを開発者に義務付ける日本の法律上の権利である","過去の犯罪歴が国家のデータベースから一定期間後に自動消去されることを定めた国際条約上の権利である","自己のデータを機械可読形式で受け取り、他の事業者へ移行できる権利である"],answerIndex:0,explanation:"忘れられる権利(消去権)はGDPR17条に定められた、本人が自己の個人データの削除を求められる権利で、EU司法裁判所が検索結果からの削除を認めた2014年のGoogleスペイン判決を契機に広く知られた(選択肢A)。選択肢Dは同じGDPRのデータポータビリティの権利の説明であり、混同を狙った典型的な誤答である。選択肢Bのような日本法上の明文の権利や、選択肢Cのような国際条約は存在しない。判決名とセットで覚えるのが頻出対策。"},{id:"law-ethics-q26",chapterId:"law-ethics",question:"GDPRにおけるデータポータビリティの権利の説明として、最も適切なものを選べ。",choices:["事業者が個人データをEU域外のサーバーに保存することを禁止する原則である","本人が自己の個人データの削除を事業者に求められる権利である","本人が自己の個人データを構造化された機械可読形式で受け取り、他の事業者へ移行できる権利である","事業者同士が本人の同意なく個人データを自由に売買できる権利である"],answerIndex:2,explanation:"データポータビリティの権利は、本人が自己の個人データを構造化され一般的に利用される機械可読形式で受け取り、妨げられることなく他の管理者へ移行できるGDPR上の権利で、サービスの乗り換えを容易にし事業者へのロックインを防ぐ狙いがある(選択肢C)。選択肢Bは忘れられる権利(消去権)の説明であり混同に注意。選択肢Aのような保存場所の禁止原則や、選択肢Dのような本人の関与なしのデータ売買を認める権利ではない。"},{id:"law-ethics-q27",chapterId:"law-ethics",question:"著作権の発生に関する説明として、最も適切なものを選べ。",choices:["著作権は文化庁に登録して初めて発生する","著作権は著作物を創作した時点で自動的に発生し、登録などの手続きを必要としない(無方式主義)","著作権は©マークを表示しなければ発生しない","著作権は特許権と同様に、出願と審査を経て発生する"],answerIndex:1,explanation:"著作権は創作と同時に自動的に発生し、登録・出願・表示などの方式を一切要しない無方式主義が採用されている(選択肢B)。選択肢Aの登録や選択肢Cの©マーク表示は権利発生の要件ではなく、選択肢Dの出願・審査を経て発生するのは特許権や商標権である。権利の発生に手続きが必要な産業財産権との対比はG検定で頻出の知識である。"},{id:"law-ethics-q28",chapterId:"law-ethics",question:"著作権法上の職務著作に関する説明として、最も適切なものを選べ。",choices:["従業者が職務上作成した著作物の著作者は、いかなる場合も作成した従業者個人となる","職務著作が成立するためには、従業者へ著作権の対価を支払う契約が必須である","職務著作の制度は映画の著作物に対してのみ適用される","法人等の発意に基づき従業者が職務上作成し、法人等の名義で公表される著作物は、契約等に別段の定めがない限り法人等が著作者となる"],answerIndex:3,explanation:"職務著作(法人著作)は、①法人等の発意、②業務従事者が職務上作成、③法人等の名義での公表、④別段の定めがないこと、を満たすと法人等自身が著作者となる制度である(選択肢D)。選択肢Aのように常に従業者個人が著作者となるわけではなく、選択肢Bの対価支払い契約も成立要件ではない。選択肢Cのように対象が映画に限られることもない。企業がAIシステムや学習用プログラムを開発する場面で権利の帰属に関わる頻出論点である。"},{id:"law-ethics-q29",chapterId:"law-ethics",question:"データベースの著作物に関する説明として、最も適切なものを選べ。",choices:["情報の選択又は体系的な構成に創作性があるデータベースは、著作物として保護される","データベースに収録された個々のデータや事実も、収録された時点で自動的に著作物となる","データベースは収録データの量が多ければ、創作性がなくても著作物として保護される","日本の著作権法にはデータベースを保護する規定が存在しない"],answerIndex:0,explanation:"著作権法はデータベースのうち「情報の選択又は体系的な構成」に創作性があるものをデータベースの著作物として保護している(選択肢A)。保護されるのは選択・構成の創作性であり、選択肢Bのように収録された個々のデータや事実そのものが著作物になるわけではない。選択肢Cのように量だけで保護されることもなく、創作性のないデータ集合の保護には不正競争防止法の限定提供データ等が使われる。選択肢Dの規定が存在しないという記述は明確に誤り。"},{id:"law-ethics-q30",chapterId:"law-ethics",question:"文化庁の「AIと著作権に関する考え方」(2024年)が示した整理として、最も適切なものを選べ。",choices:["AIによる学習も生成も、すべて一律に著作権侵害になるとした","AI生成物の利用は、いかなる場合も著作権侵害にならないと断定した","AI開発・学習段階と生成・利用段階を区別し、学習段階は30条の4等により適法となり得る一方、生成・利用段階では依拠性と類似性により通常どおり侵害が判断されるとした","AIの学習に利用したすべての著作物について、著作権者への報酬支払いを法的に義務付けた"],answerIndex:2,explanation:"同考え方は、AI開発・学習段階と生成・利用段階を分けて論点を整理し、学習段階は30条の4等の権利制限規定で適法となり得るが但し書きの適用があり得ること、生成・利用段階では人間による利用と同様に依拠性・類似性で侵害が判断されることを示した(選択肢C)。選択肢Aの一律侵害や選択肢Bの一律非侵害のような極端な結論は採っていない。選択肢Dのような報酬支払いの法的義務化も行われておらず、「段階を分けて判断する」枠組みが最頻出ポイント。"},{id:"law-ethics-q31",chapterId:"law-ethics",question:"肖像権とパブリシティ権に関する説明として、最も適切なものを選べ。",choices:["どちらも著作権法に明文で規定された権利である","肖像権はみだりに容ぼう等を撮影・公表されない人格的利益であり、パブリシティ権は著名人の氏名・肖像が持つ顧客吸引力を保護する権利で、いずれも判例により認められてきた","パブリシティ権は一般人にのみ認められ、著名人には認められない","AIで実在の人物の顔を生成・利用する場合、肖像権やパブリシティ権を考慮する必要はない"],answerIndex:1,explanation:"肖像権は人格的利益として、パブリシティ権は著名人の氏名・肖像の顧客吸引力という経済的利益として、いずれも法律の明文ではなく判例の積み重ねで認められてきた権利である(選択肢B)。選択肢Aのように著作権法に明文規定はなく、選択肢Cは逆で、顧客吸引力を前提とするパブリシティ権は主に著名人に認められる。ディープフェイクなどAIで実在人物の容姿を生成する場合はこれらの権利の侵害が問題となり得るため、選択肢Dも誤りである。"},{id:"law-ethics-q32",chapterId:"law-ethics",question:"商標権に関する説明として、最も適切なものを選べ。",choices:["商標権は商品のデザインを保護する権利で、創作と同時に自動的に発生する","商標権は一度登録すると更新できず、10年で必ず消滅する","AIが生成したロゴであれば、他人の登録商標と類似していても侵害にはならない","商標権は特許庁への出願・登録により発生し、商品・サービスの出所を識別する標識を保護する。AI生成のロゴでも他人の登録商標と類似すれば侵害となり得る"],answerIndex:3,explanation:"商標権は特許庁への出願・登録によって発生し、商品・役務の出所を識別するマークやネーミングを保護する産業財産権である(選択肢D)。選択肢Aのように創作と同時に発生するのは著作権(無方式主義)であり、商標権の存続期間は10年だが更新により半永久的に維持できるため選択肢Bも誤り。侵害の判断は標識の類否と商品・役務の類否で行われ、AIが生成したか否かは関係ないため選択肢Cも誤りである。生成AI利用時の知財リスクとして頻出。"},{id:"law-ethics-q33",chapterId:"law-ethics",question:"広島AIプロセスに関する説明として、最も適切なものを選べ。",choices:["2023年のG7広島サミットを契機に始まった生成AIに関する国際的なルール作りで、AI開発者向けの国際指針と国際行動規範が取りまとめられた","EUが単独で進めたAI規制法の立法手続きの名称である","自動運転車の国際標準規格を策定する民間団体の活動である","国連安全保障理事会が採択したAI兵器の全面禁止決議である"],answerIndex:0,explanation:"広島AIプロセスは2023年のG7広島サミットを契機に日本が主導した、生成AIの国際的なガバナンスの枠組み作りで、全AI関係者向けの国際指針とAI開発者向けの国際行動規範が成果文書として取りまとめられた(選択肢A)。選択肢BのEU単独の立法はEU AI Actであり、G7の枠組みとは別物である。選択肢Cの自動運転の標準化や選択肢Dの国連決議とは無関係で、「G7・生成AI・国際指針/行動規範」の組み合わせが頻出キーワード。"},{id:"law-ethics-q34",chapterId:"law-ethics",question:"OECDのAI原則に関する説明として、最も適切なものを選べ。",choices:["法的拘束力を持つ国際条約であり、違反した加盟国には罰則が科される","民間企業のみが署名した自主規制であり、各国政府は関与していない","2019年に採択された初の政府間合意によるAI原則で、人間中心の価値や透明性・説明責任などを掲げ、G20のAI原則にも引き継がれた","AIの軍事利用を全面的に容認することを宣言した文書である"],answerIndex:2,explanation:"OECDのAI原則(2019年)は、包摂的な成長、人間中心の価値と公平性、透明性・説明可能性、頑健性・安全性、説明責任の5原則等を掲げた初の政府間合意によるAI原則で、同年のG20 AI原則にも引き継がれた(選択肢C)。法的拘束力のない原則であるため選択肢Aは誤りで、政府間(加盟国政府)の合意である点で選択肢Bの民間自主規制とも異なる。選択肢Dのような軍事利用容認の宣言ではない。「初の政府間AI原則」という位置付けが頻出。"},{id:"law-ethics-q35",chapterId:"law-ethics",question:"生成AIの安全性検証におけるレッドチーミングの説明として、最も適切なものを選べ。",choices:["開発チームを赤組と青組に分けて開発スピードを競わせるマネジメント手法","攻撃者の視点から意図的に攻撃や不適切な入力を試み、AIシステムの脆弱性や不適切な出力のリスクを洗い出す手法","学習データを特定の色調の画像に統一してバイアスを除去する前処理手法","障害発生時にシステムを直前の安定バージョンへ戻す運用手法"],answerIndex:1,explanation:"レッドチーミングは、攻撃者(レッドチーム)の視点でプロンプトインジェクションや有害出力の誘発などを意図的に試み、リリース前後のAIシステムの脆弱性を洗い出す安全性検証の手法である(選択肢B)。広島AIプロセスの国際行動規範でも開発者が講じるべき措置として挙げられている。選択肢Aの開発競争、選択肢Cのデータ前処理、選択肢Dのロールバック運用はいずれもレッドチーミングとは別の概念である。"},{id:"law-ethics-q36",chapterId:"law-ethics",question:"日本における自動運転の法整備に関する説明として、最も適切なものを選べ。",choices:["日本ではレベルを問わず、自動運転車の公道走行は全面的に禁止されている","レベル4の自動運転でも、ドライバーが常時運転席で監視することが法律上義務付けられている","自動運転に関する許可制度は道路交通法ではなく薬機法に定められている","2023年施行の改正道路交通法により、特定の条件下でシステムがすべての運転操作を行うレベル4相当の「特定自動運行」が都道府県公安委員会の許可制で可能になった"],answerIndex:3,explanation:"2023年施行の改正道路交通法は、限定された条件下でシステムが全運転操作を担い運転者を必要としないレベル4相当の運行を「特定自動運行」と定義し、都道府県公安委員会の許可制で認めた(選択肢D)。レベル4ではドライバーの常時監視を前提としないため選択肢Bは誤りで、全面禁止とする選択肢Aも実態に反する。選択肢Cの薬機法は医薬品・医療機器の法律であり自動運転とは無関係。「特定自動運行・許可制」が頻出キーワード。"},{id:"law-ethics-q37",chapterId:"law-ethics",question:"日本におけるドローン(無人航空機)の規制に関する説明として、最も適切なものを選べ。",choices:["ドローンは航空法により規制され、100g以上の機体は登録が義務付けられ、有人地帯における補助者なし目視外飛行(レベル4飛行)には機体認証と操縦ライセンスが必要である","ドローンの規制は電波法のみであり、航空法は適用されない","機体の登録義務は25kg以上の大型機に限られている","レベル4飛行は機体認証さえあれば、操縦ライセンスがなくても実施できる"],answerIndex:0,explanation:"ドローンは航空法上の無人航空機として規制され、改正により100g以上の機体の登録が義務化された。さらに有人地帯での補助者なし目視外飛行(レベル4飛行)には、機体認証と操縦者の技能証明(ライセンス)の両方が必要である(選択肢A)。選択肢Bのように電波法だけで規律されるわけではなく、選択肢Cの登録義務の基準は25kgではなく100g以上である。選択肢Dのように機体認証のみでは足りず、認証とライセンスのセットが要件となる点が頻出。"},{id:"law-ethics-q38",chapterId:"law-ethics",question:"医療分野におけるAIの利用と規制に関する説明として、最も適切なものを選べ。",choices:["診断支援AIは医療機器に該当しないため、薬機法の規制を一切受けない","AIが診断を支援した場合、誤診の最終的な責任はAI開発企業が負うと法律で明記されている","診断支援AIなどのプログラムはプログラム医療機器として薬機法の承認等の対象となり得るが、AIはあくまで支援であり診断の最終的な責任は医師が負うと整理されている","医療AIの承認審査は厚生労働省ではなく総務省が所管している"],answerIndex:2,explanation:"疾病の診断等に用いられるプログラムはプログラム医療機器(SaMD)として薬機法の承認・認証の対象となり得る一方、AIによる診断支援はあくまで支援であり、最終的な診断の責任は医師が負うと整理されている(選択肢C)。選択肢Aのように規制対象外とするのは誤りで、選択肢Bのような開発企業が診断責任を負う旨の法律の明文規定も存在しない。選択肢Dの所管は総務省ではなく厚生労働省(審査はPMDA)である。「薬機法+医師の最終責任」の組み合わせが頻出。"},{id:"law-ethics-q39",chapterId:"law-ethics",question:"採用選考へのAI利用に関する事例と教訓の説明として、最も適切なものを選べ。",choices:["AIによる採用選考は人間の面接官より常に公平であり、差別が生じることはない","アマゾン社の採用AIが過去の採用実績データの偏りを学習し、女性応募者を不利に評価する傾向が判明して運用が中止されたように、学習データの偏りが雇用差別につながり得る","採用AIの問題はすべて開発者の意図的なプログラミングによるもので、学習データの偏りとは無関係である","日本では採用選考へのAI利用そのものが法律で全面的に禁止されている"],answerIndex:1,explanation:"アマゾン社が開発していた採用AIは、男性が多数を占める過去の採用実績データを学習した結果、女性に関連する語を含む履歴書を低く評価する傾向が判明し、運用が中止された。差別的なルールを意図的に書かなくてもデータの偏りから差別が再生産されるという教訓であり、選択肢Aの「常に公平」や選択肢Cの「意図的なプログラミングのみが原因」は誤りである。選択肢Dのような全面禁止の法律は日本になく、公平性の検証と説明責任が実務上の要請となる。"},{id:"law-ethics-q40",chapterId:"law-ethics",question:"フィルターバブルとエコーチェンバーの説明として、最も適切なものを選べ。",choices:["フィルターバブルとは、迷惑メールを自動的に振り分けて除去する技術のことである","エコーチェンバーとは、音声認識AIの誤認識が連鎖的に増幅される現象のことである","どちらも個人情報の漏えいを防止するためのセキュリティ技術の名称である","フィルターバブルはパーソナライズにより自分好みの情報に囲い込まれる現象、エコーチェンバーは同質な意見ばかりが反響して信念が増幅される現象で、社会の分断を招くと懸念されている"],answerIndex:3,explanation:"フィルターバブルは推薦アルゴリズムによるパーソナライズの結果、利用者が泡(バブル)に包まれるように自分好みの情報だけに囲い込まれる現象、エコーチェンバーはSNS等で同質な意見が反響室のように繰り返され信念が強化される現象である(選択肢D)。いずれも多様な意見との接触を減らし社会の分断・分極化を招くと懸念されている。選択肢Aの迷惑メールフィルタ、選択肢Bの音声認識、選択肢Cのセキュリティ技術はいずれも無関係な分野の説明である。"}],contrasts:[{title:"加工情報の2種類",left:{label:"仮名加工情報",traits:["他情報と照合すれば復元可","社内分析での利用が前提","第三者提供は原則不可"]},right:{label:"匿名加工情報",traits:["復元不可能に加工","本人同意なく第三者提供可","作成時に項目の公表義務"]},point:"「社内の仮名、外に出せる匿名」"},{title:"個人情報の3層構造",left:{label:"個人情報",traits:["生存する個人を識別できる","個人識別符号を含む","死者の情報は対象外"]},right:{label:"個人データ/保有個人データ",traits:["データベース等を構成すると個人データ","事業者に開示等の権限があれば保有個人データ","短期保存データも保有個人データに含む"]},point:"「DB化で個人データ、開示権限つきで保有個人データ」"},{title:"権利の発生方法",left:{label:"著作権",traits:["創作と同時に発生","無方式主義","登録・表示は不要"]},right:{label:"特許権・商標権",traits:["出願・審査・登録で発生","特許の発明者は自然人のみ","商標は更新で半永久維持"]},point:"「作った瞬間の著作権、審査を通す特許・商標」"},{title:"データ保護の2制度",left:{label:"営業秘密",traits:["秘密管理性・有用性・非公知性","社内で秘密として管理"]},right:{label:"限定提供データ",traits:["特定の者へ業として提供","電磁的に相当量蓄積・管理","秘密管理性は不要"]},point:"「隠して守る営業秘密、提供して活かす限定提供データ」"},{title:"第三者提供の同意方式",left:{label:"オプトイン",traits:["事前に本人の同意を取得","第三者提供の原則形"]},right:{label:"オプトアウト",traits:["本人の求めで提供を停止","個人情報保護委員会へ届出","要配慮個人情報には使えない"]},point:"「事前同意がイン、事後停止がアウト。要配慮はアウト不可」"},{title:"著作権30条の4の適用範囲",left:{label:"AI開発・学習段階",traits:["情報解析は原則許諾不要","営利目的でも認められる","不当に害する場合は除外"]},right:{label:"生成・利用段階",traits:["通常どおり侵害を判断","依拠性+類似性が基準","30条の4は適用されない"]},point:"「学習は30条の4、生成は依拠性・類似性で判断」"}]},af={id:"math-stats",number:8,title:"数理・統計",subtitle:"確率・統計・線形代数・微分の基礎",sections:[{title:"確率の基礎とベイズの定理",points:["同時確率P(A∩B)は事象AとBが両方起こる確率であり、条件付き確率P(B|A)はAが起きたという条件のもとでBが起こる確率で、P(B|A)=P(A∩B)/P(A)で計算する。","事象AとBが独立であるとは、一方の発生が他方の確率に影響しないことで、P(A∩B)=P(A)P(B)が成り立つ。","ベイズの定理は、原因に関する事前確率を、結果(データ)の観測後の事後確率へ更新する公式で、P(A|B)=P(B|A)P(A)/P(B)と表される。","ベイズの定理において、P(A)を事前確率、P(A|B)を事後確率、P(B|A)を尤度と呼び、データを観測するたびに確率を更新できる点が機械学習でも活用される。","最尤推定は、観測されたデータが得られる確率(尤度)を最大にするようにパラメータを決める推定法で、多くの機械学習モデルの学習の基礎になっている。"],summary:"条件付き確率はP(B|A)=P(A∩B)/P(A)、独立ならP(A∩B)=P(A)P(B)が成り立つ。ベイズの定理はP(A)が事前確率・P(A|B)が事後確率・P(B|A)が尤度で、データ観測により確率を更新する枠組み。最尤推定は尤度を最大化するパラメータ推定として頻出。"},{title:"記述統計(代表値とばらつき・相関)",points:["期待値は確率変数の平均的な値であり、取り得る値にその確率を掛けて足し合わせたものとして定義される。","分散はデータの期待値(平均)からの偏差の2乗の平均でばらつきの大きさを表し、その正の平方根が標準偏差で、元のデータと同じ単位で解釈できる。","共分散は2変数が連動して変化する傾向を表し、それを両者の標準偏差の積で割って-1から1の範囲に標準化したものが相関係数である。","相関係数は直線的な関係の強さを測る指標であり、相関係数が0でも曲線的な関係が存在することはあり得る。","相関があっても因果があるとは限らず、第3の変数(交絡因子)が両方に影響して見かけ上の相関が生じることを疑似相関と呼ぶ。","標準化は平均0・分散1になるよう変換する操作、正規化(Min-Max正規化)は最小0・最大1の範囲に収める操作で、尺度の異なる特徴量を揃える前処理として使われる。"],summary:"期待値は確率の重み付き平均、分散は偏差2乗の平均でその正の平方根が標準偏差。相関係数は-1〜1で直線的な関係の強さのみを表し、相関があっても因果があるとは限らない(交絡因子による疑似相関)。標準化は平均0・分散1、正規化は0〜1に揃える前処理として区別する。"},{title:"確率分布と推測統計",points:["正規分布は平均を中心とした左右対称の釣鐘型の分布で、平均±1標準偏差に約68%、±2標準偏差に約95%のデータが含まれる。","ベルヌーイ分布は成功か失敗かの1回の試行を表す分布、二項分布はその試行をn回繰り返したときの成功回数の分布、一様分布はすべての値が等しい確率で生じる分布である。","中心極限定理により、元の母集団の分布の形によらず、標本平均の分布は標本サイズが大きくなると正規分布に近づく。","大数の法則により、試行回数を増やすほど標本平均は母集団の期待値(真の値)に近づく。","母集団から一部を取り出した標本をもとに母集団の性質を推測するのが推測統計で、1つの値で推定する点推定と、信頼区間で幅を持たせて推定する区間推定がある。","仮説検定では、否定したい仮説を帰無仮説として立て、観測データがそのもとで得られる確率(p値)が有意水準(例:5%)を下回れば帰無仮説を棄却する。"],summary:"正規分布は±1σに約68%・±2σに約95%の数値が頻出。標本平均の「分布」が正規に近づくのが中心極限定理、標本平均の「値」が母平均に近づくのが大数の法則で、両者の混同が最も狙われる。仮説検定はp値が有意水準を下回れば帰無仮説を棄却する流れを押さえる。"},{title:"線形代数の基礎",points:["ベクトルの内積は対応する成分の積の総和で、2つのベクトルの向きの近さを反映し、直交するベクトル同士の内積は0になる。","行列積A×Bは、Aの列数とBの行数が一致するときに定義され、m×n行列とn×p行列の積はm×p行列になる。","単位行列は対角成分が1で他が0の行列で、どの行列に掛けても相手を変えない(数の1に相当する)役割を持つ。","逆行列は元の行列に掛けると単位行列になる行列で、正方行列であっても行列式が0の場合には存在しない。","固有ベクトルは行列を掛けても向きが変わらないベクトル、固有値はそのとき長さが何倍になるかを表すスカラーで、主成分分析(PCA)などの次元削減で重要な役割を果たす。","スカラーは0階、ベクトルは1階、行列は2階のテンソルとみなせ、テンソルはこれらを任意の階数へ一般化した多次元配列としてディープラーニングのデータ表現に使われる。"],summary:"直交ベクトルの内積は0、行列積は(m×n)(n×p)=(m×p)のサイズ計算が基本。逆行列は行列式が0だと存在しない。固有ベクトルは行列を掛けても向きが変わらないベクトル・固有値はその倍率で、PCAに直結する。スカラー・ベクトル・行列を任意の階数に一般化したものがテンソル。"},{title:"微分と最適化・情報理論",points:["導関数は関数の接線の傾き(瞬間の変化率)を表し、微分して傾きが0になる点は極値(最大・最小)の候補になる。","偏微分は多変数関数を1つの変数についてだけ微分する操作で、各変数の偏微分を並べたベクトルが勾配であり、勾配は関数が最も急に増加する方向を指す。","連鎖律(チェインルール)は合成関数の微分を各部分の微分の積で計算する規則で、ニューラルネットワークの誤差逆伝播法は連鎖律を使って各層の勾配を出力側から順に計算している。","対数は積を和に変換できる(log(ab)=log a + log b)性質を持ち、多数の確率の積で表される尤度を対数尤度の和に変換して計算を安定させるために使われる。","自己情報量は珍しい事象ほど大きくなる情報の量(-log p)で、その期待値がエントロピーであり、確率分布の不確実性の大きさを表す。","交差エントロピーは予測分布と正解分布のずれを測り分類タスクの損失関数に使われ、KLダイバージェンスは2つの確率分布の差異を測る非対称な指標である。","ユークリッド距離は2点間の直線距離、コサイン類似度はベクトル間の角度の近さを測る指標で、コサイン類似度はベクトルの大きさに影響されないため文書の類似度計算によく使われる。"],summary:"勾配は最も急に増加する方向を指すベクトルで、連鎖律が誤差逆伝播法の数学的基礎。対数は積を和に変換し、対数尤度として計算を安定させる。交差エントロピーは分類の損失関数、KLダイバージェンスは非対称な分布間の差異の指標。コサイン類似度は大きさに影響されず文書類似度に使う点が頻出。"},{title:"確率分布と推定の発展",points:["全確率の定理は、互いに排反な場合分け(原因)ごとの確率を重み付きで足し合わせて事象全体の確率を求める定理で、ベイズの定理の分母P(B)の計算にも使われる。","順列nPrは順序を区別した並べ方の数、組合せnCrは順序を区別しない選び方の数で、nCr=nPr/r!の関係がある。","連続型確率変数では特定の一点の値を取る確率は0であり、確率は確率密度関数を区間で積分して求める。累積分布関数はその値以下となる確率を表す単調非減少の関数である。","ポアソン分布は単位時間あたり平均λ回起こるまれな事象の発生回数を表す離散分布で、問い合わせ件数や事故件数のモデル化に使われる。","標準化z=(x−μ)/σにより任意の正規分布は平均0・標準偏差1の標準正規分布に変換でき、z値は平均から標準偏差何個分離れているかを表す。","標本から母分散を推定する際、偏差平方和をnで割る標本分散は母分散を過小評価する傾向があるため、n−1(自由度)で割った不偏分散が使われる。","95%信頼区間は「同じ方法で標本抽出と区間計算を繰り返したとき、約95%の区間が真の母数を含む」という意味であり、母数が確率的に変動するという解釈は誤りである。"],summary:"全確率の定理は排反な場合分けの重み付き和で、ベイズの定理の分母計算にも使う。連続型は一点の確率が0で確率は区間積分、標準化はz=(x−μ)/σ。母分散の推定はn−1で割る不偏分散で過小評価を補正。95%信頼区間は「繰り返せば約95%の区間が真の母数を含む」が正しい解釈。"},{title:"機械学習を支える数理(ノルム・最適化・決定木)",points:["L1ノルムは成分の絶対値の和、L2ノルムは成分の2乗和の平方根で、L1正則化(Lasso)は一部の重みを0にしやすくスパースな解を作り、L2正則化(Ridge)は重みを全体的に小さくする。","アダマール積は同じサイズの行列同士の成分ごとの積、転置行列は行と列を入れ替えた行列で、積の転置は(AB)ᵀ=BᵀAᵀと順序が入れ替わる。","凸関数では局所最適解が大域最適解と一致するため最適化が容易だが、ディープラーニングの損失関数は一般に非凸である。","鞍点は勾配が0でありながら、ある方向では極大、別の方向では極小となる点で、高次元の損失関数に多数存在し学習停滞の一因となる。","シグモイド関数の微分はσ'(x)=σ(x)(1−σ(x))と自身の出力で書け、最大値はx=0での0.25にとどまるため、層を重ねると勾配消失の一因となる。","ソフトマックス関数は各要素を指数関数で変換し総和で割ることで出力を確率分布(すべて正で総和1)に変換し、交差エントロピー損失と組み合わせると勾配計算が簡潔になる。","MAP推定は尤度に事前確率を掛けた事後確率を最大化する点推定で、事前分布が一様なら最尤推定と一致し、L2正則化はガウス事前分布を仮定したMAP推定と対応する。","決定木は分割によるエントロピーの減少量である情報利得や、ノード内のクラスの混ざり具合を表すジニ不純度が改善するように分割を選ぶ。"],summary:"L1正則化(Lasso)はスパース化、L2正則化(Ridge)は重みを全体的に縮小。凸関数は局所解=大域解だがDLの損失は非凸で、鞍点が学習停滞の一因。シグモイドの微分は最大0.25で勾配消失の原因となる。MAP推定は尤度×事前確率の最大化で一様事前なら最尤推定と一致、決定木は情報利得・ジニ不純度で分割を選ぶ。"},{title:"確率の計算法則(加法・余事象・排反と独立)",points:["加法定理は、和事象の確率をP(A∪B)=P(A)+P(B)−P(A∩B)で求める法則で、重複して数えた同時確率P(A∩B)を引くのがポイントである。","互いに排反(同時に起こらない)な事象ではP(A∩B)=0となるため、加法定理は単純な和P(A∪B)=P(A)+P(B)に簡略化される。","排反は「同時に起こらない」、独立は「一方が他方の確率に影響しない」という別概念で、独立な事象はP(A∩B)=P(A)P(B)>0となり一般に排反ではない。","余事象の確率はP(Aᶜ)=1−P(A)で求められ、「少なくとも1回起こる」確率は「1回も起こらない」確率を1から引くと計算しやすい。","乗法定理はP(A∩B)=P(A)P(B|A)で、複数の事象が続けて起こる確率を条件付き確率の積で表す。","確率の和の規則と積の規則を組み合わせることで、複雑な事象の確率を場合分けして計算できる。","サイコロを2回振って少なくとも1回6が出る確率は、余事象(2回とも6以外)を使い1−(5/6)²=11/36のように求めると簡潔である。"],summary:"加法定理P(A∪B)=P(A)+P(B)−P(A∩B)は重複分の同時確率を引くのが核心で、排反ならP(A∩B)=0で単純な和になる。排反(同時に起こらない)と独立(影響しない)は別概念。「少なくとも1回」は余事象1−P(Aᶜ)で計算するのが定石で、乗法定理P(A∩B)=P(A)P(B|A)と組み合わせて使う。"},{title:"代表値・四分位数・分布の形",points:["代表値には平均値(総和÷個数)、中央値(順位の中央の値)、最頻値(最も頻度の高い値)があり、目的やデータの分布に応じて使い分ける。","外れ値が混ざると平均値は大きく引っ張られるが、中央値や最頻値は順位や頻度に基づくため影響を受けにくい(ロバスト)。","四分位数はデータを小さい順に並べ4等分する境界値で、第1四分位数(25%)、第2四分位数(中央値・50%)、第3四分位数(75%)からなる。","四分位範囲(IQR)は第3四分位数から第1四分位数を引いた値で、中央50%のデータの散らばりを表し、外れ値の影響を受けにくいばらつきの指標である。","箱ひげ図は最小値・四分位数・最大値や外れ値の候補を箱とひげで可視化し、平均や分散ではなく分布の位置と広がり・偏りを直感的に示す。","左右非対称で片側に長い裾を持つ分布を歪んだ分布と呼び、右に裾が伸びる分布(年収など)では一般に平均値が中央値より大きくなる。","外れ値の検出には、第1四分位数−1.5×IQRより小さい、または第3四分位数+1.5×IQRより大きい値を候補とする方法がよく使われる。"],summary:"代表値は平均・中央値・最頻値で、平均は外れ値に弱く中央値・最頻値はロバスト。四分位数は25/50/75%地点、IQR(=第3−第1四分位数)は中央50%の散らばりを表す。箱ひげ図は分布の位置・広がり・偏りを示すが平均・分散は直接読めない。右に裾が長い分布では平均>中央値となる点も押さえる。"},{title:"確率分布のつながりと特性値",points:["ベルヌーイ分布の期待値はp、二項分布(成功確率p・試行n回)の期待値はnp、分散はnp(1−p)で、二項分布は独立なベルヌーイ試行をn回重ねたものである。","二項分布は試行回数nが大きく成功確率pが小さいとき、平均λ=npのポアソン分布で近似でき、nが大きいときは正規分布でも近似できる。","ポアソン分布は期待値と分散がともにλと等しいという特徴を持つ離散分布である。","指数分布はポアソン過程で次の事象が起こるまでの待ち時間を表す連続分布で、過去の経過時間に依存しない無記憶性を持つ。","一様分布は区間内のどの値も等しい確率(密度)で生じる分布で、連続一様分布の期待値は区間の中点になる。","正規分布は平均μと分散σ²の2つのパラメータで形が定まり、平均±1σに約68%・±2σに約95%・±3σに約99.7%が含まれる。","標準正規分布は平均0・分散1の正規分布で、任意の正規分布はz=(x−μ)/σの標準化によって標準正規分布に変換できる。"],summary:"二項分布は独立なベルヌーイ試行のn回反復で期待値np・分散np(1−p)、n大p小ではλ=npのポアソン分布で近似できる。ポアソン分布は期待値=分散=λ、指数分布は待ち時間を表し無記憶性を持つ。正規分布はμとσ²で定まり±1σ約68%・±2σ約95%、標準化z=(x−μ)/σで標準正規分布に変換できる。"},{title:"仮説検定の手順と検定の種類",points:["仮説検定では、否定したい主張を帰無仮説(H₀:差がない・効果がない)、示したい主張を対立仮説(H₁)として立て、帰無仮説のもとでのデータの生じにくさを評価する。","あらかじめ有意水準α(慣例で5%や1%)を定め、p値がαを下回れば帰無仮説を棄却し対立仮説を採択、上回れば帰無仮説は棄却できないと判断する。","「帰無仮説を棄却できない」ことは帰無仮説が正しいと証明されたことを意味せず、効果がないと積極的に結論づけることはできない。","両側検定は差の向きを問わない検定、片側検定は一方向の差のみを問題にする検定で、目的に応じて棄却域の取り方が変わる。","第一種の過誤(αエラー・偽陽性)は正しい帰無仮説を棄却する誤り、第二種の過誤(βエラー・偽陰性)は誤った帰無仮説を棄却できない誤りで、検出力は1−βで表される。","2群の平均の差の検定にはt検定、3群以上の平均の比較には分散分析(ANOVA)を用いる。","カイ二乗検定は度数(カウントデータ)を扱う検定で、観測度数が理論分布に合うかをみる適合度検定と、2つのカテゴリ変数が関連するかをみる独立性の検定に使われる。"],summary:"仮説検定は帰無仮説(差がない)を立て、p値が有意水準αを下回れば棄却する流れ。棄却できなくても帰無仮説が正しいとは言えない。第一種の過誤(偽陽性)・第二種の過誤(偽陰性)と検出力1−βを区別する。平均差の比較はt検定(2群)・ANOVA(3群以上)、度数の検定はカイ二乗検定(適合度・独立性)を使う。"},{title:"行列の発展とPCA・特異値分解",points:["対称行列は転置しても変わらない(Aᵀ=A)正方行列で、分散共分散行列は対称行列であり、その固有値はすべて実数になる。","直交行列は各列が互いに直交する単位ベクトルからなる行列で、転置が逆行列に等しく(QᵀQ=I)、掛けてもベクトルの長さを変えない回転・鏡映を表す。","行列のランク(階数)は線形独立な行(列)の最大数で、列がすべて独立な正方行列はフルランクとなり逆行列を持つ(行列式が0でない)。","主成分分析(PCA)は、データの分散共分散行列の固有ベクトルを主成分の軸、対応する固有値をその軸方向の分散として、分散が最大になる方向から順に次元を圧縮する手法である。","各主成分の固有値を全固有値の和で割った寄与率は、その主成分が元データの分散をどれだけ説明するかを表し、累積寄与率で削減後の次元数を決める。","特異値分解(SVD)は任意の行列をA=UΣVᵀ(U・Vは直交行列、Σは特異値を並べた対角行列)に分解する手法で、分散共分散行列を介さずデータ行列から直接PCAを行う方法としても使われる。","二次形式xᵀAxの符号が常に正となる行列を正定値行列と呼び、最適化における凸性や共分散行列の性質と関わる。"],summary:"対称行列(Aᵀ=A)の固有値は実数で分散共分散行列が代表例、直交行列は転置=逆行列で長さを保つ回転を表す。PCAは分散共分散行列の固有ベクトルを軸・固有値を分散とし、寄与率・累積寄与率で削減次元を決める。特異値分解A=UΣVᵀはデータ行列から直接PCAを行う手法としても使われる点が頻出。"},{title:"情報理論と各種の距離・類似度",points:["自己情報量−log pは珍しい(確率の低い)事象ほど大きく、その確率による期待値が平均情報量(エントロピー)で、分布が一様なほど(不確実なほど)エントロピーは大きくなる。","結合エントロピーは2変数を同時に観測したときの不確実性、条件付きエントロピーは一方を知った後に残る他方の不確実性を表す。","相互情報量は、一方の変数を知ることで他方の不確実性がどれだけ減るかを表す指標で、2変数が独立なら0になり、特徴選択にも使われる。","交差エントロピーは正解分布に対する予測分布のずれを測り、エントロピーとKLダイバージェンスの和に分解でき、分類タスクの損失関数として使われる。","KLダイバージェンスは2分布の差異を測るが、PとQを入れ替えると値が変わる非対称性を持つため、厳密な距離(対称性・三角不等式)の公理は満たさない。","ユークリッド距離(L2)は各成分の差の2乗和の平方根、マンハッタン距離(L1)は差の絶対値の和で、それぞれL2ノルム・L1ノルムに対応する。","コサイン類似度はベクトルの角度に基づき大きさに影響されないため文書類似度に向き、カテゴリ集合の重なりを測るジャッカード係数や、相関を距離化したマハラノビス距離なども用途に応じて使い分ける。"],summary:"自己情報量−log pの期待値がエントロピーで、一様分布ほど大きい。相互情報量は一方を知って減る他方の不確実性で独立なら0。交差エントロピー=エントロピー+KLダイバージェンスで、KLは非対称ゆえ距離の公理を満たさない。ユークリッド距離=L2・マンハッタン距離=L1、向きで測るコサイン類似度との使い分けが頻出。"}],terms:[{term:"条件付き確率",definition:"事象Aが起きたという条件のもとで事象Bが起こる確率。P(B|A)=P(A∩B)/P(A)で計算される。"},{term:"ベイズの定理",definition:"事前確率と尤度から事後確率を求める公式。P(A|B)=P(B|A)P(A)/P(B)で、データの観測により確率(信念)を更新する枠組みを与える。"},{term:"期待値",definition:"確率変数が平均的に取る値。取り得る各値にその確率を掛けて足し合わせたもの。"},{term:"標準偏差",definition:"分散の正の平方根。データのばらつきを元のデータと同じ単位で表す指標。"},{term:"相関係数",definition:"2変数の直線的な関係の強さを-1から1の値で表す指標。共分散を両変数の標準偏差の積で割って求める。"},{term:"疑似相関",definition:"因果関係がないのに、第3の変数(交絡因子)の影響で2変数の間に見かけ上の相関が現れる現象。相関と因果を区別する重要な例。"},{term:"正規分布",definition:"平均を中心に左右対称な釣鐘型の確率分布。平均±1標準偏差に約68%、±2標準偏差に約95%のデータが含まれる。"},{term:"中心極限定理",definition:"母集団の分布の形によらず、標本サイズを大きくすると標本平均の分布が正規分布に近づくという定理。"},{term:"大数の法則",definition:"試行回数(標本サイズ)を増やすほど、標本平均が母集団の期待値に近づくという法則。"},{term:"p値",definition:"帰無仮説が正しいと仮定したとき、観測された結果以上に極端な結果が得られる確率。有意水準より小さければ帰無仮説を棄却する。"},{term:"第一種の過誤",definition:"帰無仮説が正しいのに誤って棄却してしまう過誤(偽陽性)。逆に、誤った帰無仮説を棄却できない過誤を第二種の過誤(偽陰性)と呼ぶ。"},{term:"逆行列",definition:"元の行列に掛けると単位行列になる行列。行列式が0の正方行列には存在しない。"},{term:"固有値・固有ベクトル",definition:"行列を掛けても向きが変わらないベクトルが固有ベクトル、そのときの倍率が固有値。主成分分析などの次元削減で利用される。"},{term:"テンソル",definition:"スカラー(0階)、ベクトル(1階)、行列(2階)を任意の階数に一般化した多次元配列。ディープラーニングにおけるデータ表現の基本単位。"},{term:"連鎖律",definition:"合成関数の微分を、各構成要素の微分の積として計算する規則。誤差逆伝播法で各層の勾配を計算する数学的基礎となる。"},{term:"最尤推定",definition:"観測データが得られる確率(尤度)を最大にするようにパラメータを決める推定法。計算上は対数尤度の最大化として扱われることが多い。"},{term:"交差エントロピー",definition:"予測した確率分布と正解の分布とのずれを測る指標。分類タスクの損失関数として広く使われる。"},{term:"KLダイバージェンス",definition:"2つの確率分布の差異を測る指標。距離のように使われるが、入れ替えると値が変わる非対称性を持つ。"},{term:"不偏分散",definition:"偏差平方和をn−1(自由度)で割った分散の推定量。nで割る標本分散が母分散を過小評価する傾向を補正する。"},{term:"ポアソン分布",definition:"単位時間あたり平均λ回起こるまれな事象の発生回数を表す離散確率分布。問い合わせ件数や事故件数のモデル化に使われる。"},{term:"L1ノルム・L2ノルム",definition:"L1ノルムはベクトル成分の絶対値の和、L2ノルムは成分の2乗和の平方根。それぞれL1正則化(Lasso)・L2正則化(Ridge)の罰則項に使われる。"},{term:"行列式",definition:"正方行列に対して定まるスカラー値。2×2行列ではad−bcで計算され、行列式が0の行列(特異行列)には逆行列が存在しない。"},{term:"鞍点",definition:"勾配が0でありながら、ある方向では極大、別の方向では極小となる点。高次元の損失関数に多数存在し、学習の停滞要因となる。"},{term:"MAP推定",definition:"尤度に事前確率を掛けた事後確率を最大化するようにパラメータを決める点推定。事前分布が一様な場合は最尤推定と一致する。"},{term:"ジニ不純度",definition:"ノード内のクラスの混ざり具合を表す指標。ランダムに選んだサンプルを誤分類する確率に基づき、決定木(CART)の分割基準に使われる。"},{term:"ソフトマックス関数",definition:"各要素を指数関数で変換して総和で割り、すべて正で総和1の確率分布に変換する関数。多クラス分類の出力層で交差エントロピー損失と組み合わせて使われる。"}],questions:[{id:"math-stats-q01",chapterId:"math-stats",question:"P(A)=0.5、P(A∩B)=0.2のとき、条件付き確率P(B|A)の値として、最も適切なものを選べ。",choices:["0.1","0.4","0.7","2.5"],answerIndex:1,explanation:"条件付き確率はP(B|A)=P(A∩B)/P(A)=0.2/0.5=0.4となる。0.1はP(A)とP(A∩B)を掛けた誤り、2.5は分子と分母を逆にした誤りで、確率は1を超えないことからも除外できる。「Aが起きた世界の中でBが起こる割合」と捉えるのがポイントで、分母に条件側の確率が来ることを押さえれば確実に得点できる頻出計算である。"},{id:"math-stats-q02",chapterId:"math-stats",question:"2つの事象AとBが独立であるときに成り立つ関係として、最も適切なものを選べ。",choices:["P(A∩B)=P(A)+P(B)","P(A∩B)=0","P(A|B)=P(B|A)","P(A∩B)=P(A)P(B)"],answerIndex:3,explanation:"独立とは一方の発生が他方の確率に影響しないことで、同時確率が積の形P(A∩B)=P(A)P(B)に分解できる。このときP(A|B)=P(A)も成り立つ。和の形は排反事象の加法定理との混同、P(A∩B)=0は「排反(同時に起こらない)」であって独立とは別概念である点が頻出の引っかけ。独立と排反の違いはG検定で繰り返し問われる。"},{id:"math-stats-q03",chapterId:"math-stats",question:"ベイズの定理 P(A|B)=P(B|A)P(A)/P(B) における各項の名称の組み合わせとして、最も適切なものを選べ。",choices:["P(A)が事前確率、P(A|B)が事後確率、P(B|A)が尤度","P(A)が事後確率、P(A|B)が事前確率、P(B|A)が尤度","P(A)が尤度、P(A|B)が事前確率、P(B|A)が事後確率","P(A)が事前確率、P(A|B)が尤度、P(B|A)が事後確率"],answerIndex:0,explanation:"データBを観測する前の原因Aの確率P(A)が事前確率、観測後に更新された確率P(A|B)が事後確率、原因Aのもとでデータが得られる確率P(B|A)が尤度である。観測の前後どちらの確率かで事前・事後を判断すればよい。ベイズの定理は「データで信念を更新する」枠組みとしてベイズ推定や迷惑メールフィルタの基礎であり、用語の対応はG検定最頻出レベル。"},{id:"math-stats-q04",chapterId:"math-stats",question:"袋Aには赤玉3個と白玉1個、袋Bには赤玉1個と白玉3個が入っている。どちらかの袋を等しい確率で選び玉を1個引いたところ赤玉だった。選んだ袋がAであった確率として、最も適切なものを選べ。",choices:["0.25","0.5","0.75","0.9"],answerIndex:2,explanation:"ベイズの定理より、P(A|赤)=P(赤|A)P(A)/P(赤)=(0.75×0.5)/(0.75×0.5+0.25×0.5)=0.375/0.5=0.75となる。0.5は赤玉という証拠を無視した事前確率のまま、0.75を選ばず0.25とするのは袋Bの確率との取り違えである。赤玉が出たという観測により袋Aの確率が0.5から0.75へ更新される、事前確率から事後確率への更新の典型問題である。"},{id:"math-stats-q05",chapterId:"math-stats",question:"公正な6面サイコロを1回振ったときの出目の期待値として、最も適切なものを選べ。",choices:["3","6","21","3.5"],answerIndex:3,explanation:"期待値は各値に確率を掛けた総和なので、(1+2+3+4+5+6)×(1/6)=21/6=3.5となる。21は確率を掛け忘れた単純合計、3は中央値付近の値と取り違えた誤り、6は最大値である。期待値は実際に出得る値(整数)と一致するとは限らない点が理解の確認ポイントで、「確率の重み付き平均」という定義を押さえることが重要。"},{id:"math-stats-q06",chapterId:"math-stats",question:"分散と標準偏差に関する説明として、最も適切なものを選べ。",choices:["分散はデータの中央の値を表す代表値である","分散は平均からの偏差の2乗の平均であり、その正の平方根が標準偏差である","標準偏差は負の値を取ることがある","分散が大きいほどデータは平均の近くに集中している"],answerIndex:1,explanation:"分散は偏差(平均との差)の2乗を平均したばらつきの指標で、その正の平方根が標準偏差である。標準偏差は2乗を開いて元のデータと同じ単位に戻すため解釈しやすく、定義上負にはならない。分散が大きいほどデータは平均から散らばっており、中央の値を表すのは中央値などの代表値である。分散と標準偏差の関係(平方根)は計算問題でも頻出。"},{id:"math-stats-q07",chapterId:"math-stats",question:"相関係数に関する説明として、最も適切なものを選べ。",choices:["相関係数は0から100の値を取る","相関係数が1に近ければ、2変数の間に必ず因果関係がある","相関係数は-1から1の値を取り、直線的な関係の強さを表すが、因果関係の存在までは意味しない","相関係数が0であれば、2変数の間にはいかなる関係も存在しない"],answerIndex:2,explanation:"相関係数は共分散を両変数の標準偏差の積で割った値で、-1から1の範囲を取り、直線的(線形)な関係の強さを表す。強い相関があっても因果関係があるとは限らず、交絡因子による疑似相関の可能性がある。また相関係数0は線形関係がないことを意味するだけで、U字型などの非線形な関係は存在し得る。「相関≠因果」はG検定で最も頻出の統計リテラシーである。"},{id:"math-stats-q08",chapterId:"math-stats",question:"「アイスクリームの売上が増えると水難事故も増える」という相関が観測された場合の解釈として、最も適切なものを選べ。",choices:["気温という第3の変数が両方に影響している疑似相関の可能性を疑うべきである","アイスクリームが水難事故の原因であると結論づけてよい","相関があるのだからアイスクリームの販売を規制すべきである","水難事故がアイスクリームの売上を増やしていると結論づけてよい"],answerIndex:0,explanation:"この例では「気温の上昇」という交絡因子がアイスクリームの売上と水泳機会(水難事故)の両方を増やしており、両者の間に直接の因果はない疑似相関の典型例である。相関の観測だけからいずれかの方向の因果を断定したり、それに基づく施策を打ったりするのは誤りである。因果を確かめるにはランダム化比較試験などの介入的な検証が必要という点もあわせて覚えておきたい。"},{id:"math-stats-q09",chapterId:"math-stats",question:"正規分布の性質に関する説明として、最も適切なものを選べ。",choices:["すべての値が等しい確率で生じる分布である","成功か失敗かの2値の試行を表す分布である","左右非対称で長い裾を片側にだけ持つ分布である","平均を中心とした左右対称の釣鐘型で、平均±1標準偏差の範囲に約68%のデータが含まれる"],answerIndex:3,explanation:"正規分布は平均を中心に左右対称な釣鐘型の分布で、平均±1σに約68%、±2σに約95%、±3σに約99.7%が含まれる。すべての値が等確率なのは一様分布、2値の1回試行はベルヌーイ分布の説明であり、正規分布は左右対称なので非対称という記述も誤り。68%・95%という数値は具体的な数字で問われることが多い頻出ポイント。"},{id:"math-stats-q10",chapterId:"math-stats",question:"中心極限定理の説明として、最も適切なものを選べ。",choices:["試行回数を増やすと標本平均が母平均に一致するという定理","母集団の分布の形によらず、標本サイズが大きいとき標本平均の分布が正規分布に近づくという定理","どんなデータも正規分布に従うという定理","標本サイズを増やすと分散が必ず大きくなるという定理"],answerIndex:1,explanation:"中心極限定理は、母集団がどんな分布でも、そこから取った標本の「平均」の分布が標本サイズの増加とともに正規分布へ近づくことを述べる。標本平均が母平均へ近づくのは大数の法則であり、両者の混同が最も狙われやすい。元データ自体が正規分布に従うようになるわけではない点にも注意。統計的推測で正規分布を仮定できる理論的根拠として頻出。"},{id:"math-stats-q11",chapterId:"math-stats",question:"仮説検定における第一種の過誤の説明として、最も適切なものを選べ。",choices:["帰無仮説が正しいのに、誤って棄却してしまう過誤","帰無仮説が誤っているのに、棄却できない過誤","標本の抽出方法を誤ってデータが偏る過誤","有意水準を高く設定しすぎて検定ができなくなる過誤"],answerIndex:0,explanation:"第一種の過誤(αエラー)は正しい帰無仮説を誤って棄却すること(偽陽性)で、その確率の上限が有意水準αである。逆に誤った帰無仮説を棄却し損ねるのが第二種の過誤(βエラー、偽陰性)で、両者の取り違えが最頻出の引っかけとなる。抽出の偏りはサンプリングバイアスの問題であり過誤の分類とは別である。「第一種=偽陽性、第二種=偽陰性」の対応で覚えるとよい。"},{id:"math-stats-q12",chapterId:"math-stats",question:"仮説検定におけるp値の説明として、最も適切なものを選べ。",choices:["対立仮説が正しい確率そのもの","標本の平均値","帰無仮説が正しいと仮定したとき、観測結果以上に極端な結果が得られる確率","母集団に含まれるデータの個数"],answerIndex:2,explanation:"p値は「帰無仮説が正しい」という仮定のもとで、観測された結果かそれ以上に極端な結果が偶然得られる確率であり、有意水準(例:5%)を下回れば帰無仮説を棄却する。p値は仮説そのものが正しい確率ではないという点が最も誤解されやすく、選択肢Aのような解釈は誤りである。帰無仮説・対立仮説・有意水準とセットで手順ごと理解しておくことが頻出対策になる。"},{id:"math-stats-q13",chapterId:"math-stats",question:"2×3行列Aと3×4行列Bの積ABについての説明として、最も適切なものを選べ。",choices:["積ABは定義でき、結果は2×4行列になる","積ABは定義できない","積ABは定義でき、結果は3×3行列になる","積ABと積BAはどちらも定義でき、常に等しい"],answerIndex:0,explanation:"行列積ABはAの列数(3)とBの行数(3)が一致するため定義でき、サイズは外側の2×4になる。一方BAはBの列数(4)とAの行数(2)が一致しないため定義できず、一般に行列積は交換法則AB=BAが成り立たない。「(m×n)(n×p)=(m×p)」という形のサイズ計算は、ニューラルネットワークの重み行列の次元を考える際にも使う基本知識として頻出。"},{id:"math-stats-q14",chapterId:"math-stats",question:"単位行列と逆行列に関する説明として、最も適切なものを選べ。",choices:["単位行列はすべての成分が1の行列である","逆行列はすべての正方行列に対して必ず存在する","単位行列を掛けると行列のすべての成分が0になる","逆行列は元の行列に掛けると単位行列になる行列で、行列式が0の場合には存在しない"],answerIndex:3,explanation:"逆行列A⁻¹はAA⁻¹=A⁻¹A=I(単位行列)を満たす行列で、正方行列でも行列式が0(特異行列)の場合は存在しない。単位行列は対角成分のみが1で他は0の行列であり、全成分が1の行列とは異なるうえ、掛けても相手の行列を変えない(数の1に相当)。「正方行列なら必ず逆行列がある」とする選択肢は典型的な誤りで、行列式0との関係が頻出ポイント。"},{id:"math-stats-q15",chapterId:"math-stats",question:"固有値と固有ベクトルの説明として、最も適切なものを選べ。",choices:["固有ベクトルは行列を掛けると必ず零ベクトルになるベクトルである","固有値は行列の成分の合計値である","固有ベクトルは行列を掛けても向きが変わらないベクトルで、固有値はそのときの倍率を表す","固有値・固有ベクトルは正方行列以外の行列に対して定義される"],answerIndex:2,explanation:"Av=λvを満たす零ベクトルでないvが固有ベクトル、λが固有値で、「行列を掛けても向きが変わらず、長さがλ倍になる」と解釈できる。固有値・固有ベクトルは正方行列に対して定義され、行列成分の合計でも零ベクトルになるベクトルでもない。主成分分析(PCA)では分散共分散行列の固有ベクトルが主成分の方向、固有値がその分散を表すという応用がG検定で頻出。"},{id:"math-stats-q16",chapterId:"math-stats",question:"ディープラーニングで扱うテンソルの説明として、最も適切なものを選べ。",choices:["テンソルとは2次元の表形式データのみを指す用語である","スカラーを0階、ベクトルを1階、行列を2階とし、それらを任意の階数に一般化した多次元配列である","テンソルは画像データには使用できない","テンソルとは確率分布の一種である"],answerIndex:1,explanation:"テンソルはスカラー(0階)・ベクトル(1階)・行列(2階)を任意の階数へ一般化した多次元配列で、ディープラーニングの入出力やパラメータの基本表現である。例えばカラー画像は縦×横×チャンネルの3階テンソル、そのミニバッチは4階テンソルとして扱われ、2次元データ専用でも確率分布でもない。TensorFlowの名前の由来にもなっている基礎概念として頻出。"},{id:"math-stats-q17",chapterId:"math-stats",question:"偏微分と勾配に関する説明として、最も適切なものを選べ。",choices:["偏微分は多変数関数を特定の1変数についてだけ微分する操作で、各偏微分を並べたベクトルが勾配である","偏微分はすべての変数について同時に積分する操作である","勾配は関数の値が最も急に減少する方向を指すスカラー値である","1変数関数には微分という操作を適用できない"],answerIndex:0,explanation:"偏微分は他の変数を定数とみなして1つの変数で微分する操作で、全変数の偏微分を並べたベクトルが勾配(gradient)である。勾配はスカラーではなくベクトルであり、関数が最も急に増加する方向を指すため、損失を減らしたい勾配降下法では勾配の逆方向にパラメータを更新する。積分との混同や増加・減少方向の取り違えが典型的な誤答で、勾配降下法との結び付きが頻出。"},{id:"math-stats-q18",chapterId:"math-stats",question:"連鎖律(チェインルール)と誤差逆伝播法の関係として、最も適切なものを選べ。",choices:["連鎖律は行列の積を計算するための規則で、学習とは無関係である","誤差逆伝播法は連鎖律を使わず、乱数で勾配を推定する手法である","連鎖律は確率の更新を行うための定理で、ベイズの定理の別名である","誤差逆伝播法は連鎖律を用いて、損失関数の勾配を出力層から入力層へ向かって順に計算する手法である"],answerIndex:3,explanation:"ニューラルネットワークは多数の関数の合成とみなせるため、合成関数の微分規則である連鎖律を使えば、損失の各パラメータに対する勾配を出力側から入力側へ効率よく伝播計算できる。これが誤差逆伝播法(バックプロパゲーション)の数学的本質である。乱数による推定でもベイズの定理でもなく、「連鎖律=逆伝播の基礎」という対応はG検定の数理分野で最頻出の知識である。"},{id:"math-stats-q19",chapterId:"math-stats",question:"交差エントロピーとKLダイバージェンスに関する説明として、最も適切なものを選べ。",choices:["交差エントロピーは2点間の直線距離を表す指標である","KLダイバージェンスは2つの分布を入れ替えても値が変わらない対称な指標である","交差エントロピーは予測分布と正解分布のずれを測り分類の損失関数に使われ、KLダイバージェンスは2つの確率分布の差異を測る非対称な指標である","どちらも回帰タスク専用の評価指標であり、分類には使えない"],answerIndex:2,explanation:"交差エントロピーは正解分布に対する予測分布のずれを測り、分類タスクの損失関数として標準的に使われる。KLダイバージェンスは2つの確率分布の差異を測るが、分布を入れ替えると値が変わる非対称性を持つため厳密には距離ではない。2点間の直線距離はユークリッド距離の説明である。交差エントロピー=エントロピー+KLダイバージェンスという関係も補足として押さえておくとよい。"},{id:"math-stats-q20",chapterId:"math-stats",question:"コサイン類似度の説明として、最も適切なものを選べ。",choices:["2点間の座標の差を2乗して足し合わせ、平方根を取った距離指標である","2つのベクトルのなす角度に基づく類似度で、ベクトルの大きさに影響されず、文書の類似度計算などに使われる","2つの確率分布の差異を測る非対称な指標である","値が小さいほど2つのベクトルが類似していることを表す指標である"],answerIndex:1,explanation:"コサイン類似度はベクトル間の角度の余弦(内積をノルムの積で割った値)で、向きが近いほど1に近づき、大きさ(長さ)には影響されないため文書ベクトルや埋め込み表現の類似度計算に広く使われる。座標差の2乗和の平方根はユークリッド距離、確率分布の非対称な差異はKLダイバージェンスの説明である。類似度は値が大きいほど似ていることを表し、距離(小さいほど近い)とは向きが逆である点も頻出の確認ポイント。"},{id:"math-stats-q21",chapterId:"math-stats",question:"ある製品は工場Aで全体の60%、工場Bで40%が生産され、不良率はそれぞれ2%、5%である。全体から1個取り出したとき、それが不良品である確率として、最も適切なものを選べ。",choices:["0.07","0.035","0.032","0.012"],answerIndex:2,explanation:"全確率の定理より、P(不良)=0.6×0.02+0.4×0.05=0.012+0.020=0.032となる(選択肢C)。選択肢Aの0.07は2つの不良率を単純に足した誤り、選択肢Bの0.035は生産比率を無視して不良率を平均した誤り、選択肢Dの0.012は工場Aの寄与分だけを計算したものである。排反な場合分けごとに確率を重み付きで足し合わせる全確率の定理は、ベイズの定理の分母の計算にも使われる頻出パターン。"},{id:"math-stats-q22",chapterId:"math-stats",question:"5人のメンバーから役割の区別なく2人の代表を選ぶ場合の選び方の総数として、最も適切なものを選べ。",choices:["10通り","20通り","25通り","7通り"],answerIndex:0,explanation:"順序を区別しない選び方なので組合せ5C2=(5×4)/(2×1)=10通りである(選択肢A)。選択肢Bの20通りは順序を区別する順列5P2の値で、役割の区別がない場合は並び順の重複分2!で割る必要がある。選択肢Cは5×5、選択肢Dは5+2という無関係な計算である。「順序を区別するなら順列、しないなら組合せ」という使い分けと、nCr=nPr/r!の関係が頻出ポイント。"},{id:"math-stats-q23",chapterId:"math-stats",question:"連続型確率変数の確率密度関数と累積分布関数に関する説明として、最も適切なものを選べ。",choices:["確率密度関数の値はそのまま確率を表すため、1を超えることはない","連続型確率変数がある一点の値を取る確率は0であり、確率は確率密度関数を区間で積分して求める。累積分布関数は単調非減少で0から1に向かう","累積分布関数は変数の値が大きくなるにつれて減少していく関数である","確率密度関数は離散型確率変数に対してのみ定義される"],answerIndex:1,explanation:"連続型確率変数では一点の確率は0で、確率は密度関数の区間積分(曲線の下の面積)として求める。累積分布関数F(x)は「x以下となる確率」を表すため減少することはなく、0から1へ単調非減少で向かう(選択肢B)。密度関数の値は確率そのものではなく密度なので1を超えることもあり得るため選択肢Aは誤り。選択肢Cは増減が逆で、選択肢Dは逆に密度関数が連続型に対する概念である(離散型は確率質量関数)。「密度≠確率」が頻出の引っかけ。"},{id:"math-stats-q24",chapterId:"math-stats",question:"ポアソン分布の説明として、最も適切なものを選べ。",choices:["成功か失敗かの1回の試行の結果を表す分布である","平均を中心とした左右対称の釣鐘型の連続分布である","区間内のすべての値が等しい確率で生じる分布である","単位時間あたり平均λ回起こるまれな事象の発生回数を表す離散分布で、1時間あたりの問い合わせ件数のモデル化などに使われる"],answerIndex:3,explanation:"ポアソン分布は、単位時間・単位面積あたりに平均λ回起こるまれな事象の発生回数(0, 1, 2, …回)が従う離散分布で、コールセンターの着信数や事故件数のモデル化に使われる(選択肢D)。選択肢Aはベルヌーイ分布、選択肢Bは正規分布、選択肢Cは一様分布の説明である。二項分布で試行回数nが大きく成功確率pが小さい場合の近似として導かれるという関係も、分布同士のつながりとして頻出。"},{id:"math-stats-q25",chapterId:"math-stats",question:"平均60点、標準偏差10点の試験で80点を取った受験者のz値(標準化得点)として、最も適切なものを選べ。",choices:["20","2","0.2","8"],answerIndex:1,explanation:"標準化はz=(x−μ)/σで計算するため、z=(80−60)/10=2となる(選択肢B)。z=2は平均より標準偏差2個分上に位置することを意味し、標準正規分布の性質から上位約2.3%に相当する。選択肢Aの20は平均との差をそのまま使った誤り、選択肢Cは差を100で割った誤り、選択肢Dは得点を標準偏差で割っただけの誤りである。標準化により異なる尺度の得点を比較できる点と、偏差値=50+10zの関係が頻出。"},{id:"math-stats-q26",chapterId:"math-stats",question:"95%信頼区間の解釈として、最も適切なものを選べ。",choices:["母平均が確率的に変動し、95%の確率でこの区間内に出現するという意味である","標本データの95%がこの区間に含まれるという意味である","同じ方法で標本抽出と区間の計算を繰り返したとき、得られる区間のうち約95%が真の母平均を含むという意味である","区間の幅が広いほど推定の精度が高いことを意味する"],answerIndex:2,explanation:"信頼区間の正しい解釈は「同じ手続きを何度も繰り返せば、作られる区間の約95%が真の母平均を含む」というものである(選択肢C)。母平均は未知だが固定された定数であり、選択肢Aのように母数自体が確率的に変動すると解釈するのは(頻度論の枠組みでは)誤りである。選択肢Bのように個々のデータの95%を含む範囲でもなく、選択肢Dは逆で区間が狭いほど推定の精度が高い。信頼区間の誤解釈はG検定でも狙われやすい論点。"},{id:"math-stats-q27",chapterId:"math-stats",question:"標本から母分散を推定する際に、偏差平方和をnではなくn−1で割った不偏分散を使う理由として、最も適切なものを選べ。",choices:["標本平均を使って計算した偏差平方和をnで割ると母分散を過小評価する傾向があるため、自由度n−1で割って補正する","n−1で割れば標本分散が母分散と常に完全に一致するため","外れ値の影響を取り除くため","単なる計算上の慣習であり、nで割ってもn−1で割っても推定量の性質は変わらないため"],answerIndex:0,explanation:"偏差は未知の母平均ではなく標本平均からの差で計算するため、偏差平方和は小さめになり、nで割った標本分散は母分散を平均的に過小評価する。そこで自由度n−1で割ることで期待値が母分散に一致する不偏推定量となる(選択肢A)。不偏性は「平均的に一致する」性質であり、選択肢Bのように個々の標本で常に一致するわけではない。選択肢Cの外れ値対策は中央値などロバスト統計の話で、選択肢Dのように性質が変わらないわけでもない。nとn−1の使い分けが頻出。"},{id:"math-stats-q28",chapterId:"math-stats",question:"ベクトルのノルムと正則化の関係に関する説明として、最も適切なものを選べ。",choices:["L1ノルムはベクトルの成分の2乗和の平方根である","L2正則化(Lasso)は多くの重みをちょうど0にしてスパースな解を作る","ノルムはベクトルの向きを表す指標であり、大きさとは無関係である","L1ノルムは成分の絶対値の和、L2ノルムは成分の2乗和の平方根であり、L1正則化(Lasso)は一部の重みを0にしやすく、L2正則化(Ridge)は重みを全体的に小さくする"],answerIndex:3,explanation:"L1ノルムは絶対値の和、L2ノルムは2乗和の平方根で、これらを罰則項に使うのがL1正則化(Lasso)とL2正則化(Ridge)である。L1は解がスパース(一部の重みが0)になりやすく特徴選択の効果を持ち、L2は重みを全体的に滑らかに縮小する(選択肢D)。選択肢AはL2ノルムの説明をL1としており誤り、選択肢BはLassoとRidgeの名前の対応が逆である。ノルムはベクトルの大きさを測る量なので選択肢Cも誤り。L1=スパース化の対応が最頻出。"},{id:"math-stats-q29",chapterId:"math-stats",question:"1行目が(2, 1)、2行目が(3, 4)である2×2行列の行列式の値として、最も適切なものを選べ。",choices:["5","11","-5","8"],answerIndex:0,explanation:"2×2行列の行列式はad−bcで計算され、2×4−1×3=8−3=5となる(選択肢A)。選択肢Bの11は2×4+1×3と符号を足し算にした誤り、選択肢Cの−5は引く順序を逆にしたbc−ad、選択肢Dの8は対角成分の積2×4だけを計算したものである。行列式が0でないことは逆行列が存在する条件であり、「行列式=0なら逆行列なし」とセットで問われる頻出計算である。"},{id:"math-stats-q30",chapterId:"math-stats",question:"転置行列に関する説明として、最も適切なものを選べ。",choices:["転置行列は元の行列の各成分の符号を反転させた行列である","積の転置については(AB)ᵀ=AᵀBᵀが常に成り立つ","転置行列は行と列を入れ替えた行列であり、積の転置は(AB)ᵀ=BᵀAᵀのように順序が入れ替わる","転置は正方行列に対してしか定義できない"],answerIndex:2,explanation:"転置行列Aᵀは行と列を入れ替えた行列で、m×n行列の転置はn×m行列になるため正方行列以外にも定義できる(選択肢C)。積の転置は(AB)ᵀ=BᵀAᵀと順序が入れ替わるのが重要な性質で、選択肢Bのように順序を保ったままでは一般に成り立たない。選択肢Aの符号反転は−Aの説明であり転置とは無関係、選択肢Dも誤りである。ニューラルネットワークの逆伝播の式にも転置が現れるため、行と列の入れ替えと積の順序反転が頻出ポイント。"},{id:"math-stats-q31",chapterId:"math-stats",question:"行列のアダマール積の説明として、最も適切なものを選べ。",choices:["行ベクトルと列ベクトルの内積を取って計算する、通常の行列積の別名である","同じサイズの行列同士で対応する成分ごとに掛け合わせる演算で、要素ごとの積とも呼ばれる","2つのベクトルのなす角度の余弦を求める演算である","サイズの異なる行列同士でも常に定義できる演算である"],answerIndex:1,explanation:"アダマール積は同じサイズの行列同士で対応する位置の成分をそのまま掛け合わせる演算(要素ごとの積)である(選択肢B)。行と列の内積で計算する通常の行列積とは別の演算なので選択肢Aは誤りで、両者の区別が最大のポイントである。選択肢Cはコサイン類似度の説明である。同じ形の行列同士でなければ定義できないため選択肢Dも誤り。LSTMのゲート機構など、ディープラーニングの計算で要素ごとの積として頻繁に登場する。"},{id:"math-stats-q32",chapterId:"math-stats",question:"凸関数と最適化の関係に関する説明として、最も適切なものを選べ。",choices:["凸関数には極値が存在しないため、最適化を行うことはできない","ニューラルネットワークの損失関数は常に凸関数である","凸関数の最適化では、初期値によって全く異なる局所最適解に陥る問題が常に深刻となる","凸関数では局所最適解が大域最適解と一致するため最適化が容易だが、ディープラーニングの損失関数は一般に非凸である"],answerIndex:3,explanation:"凸関数はどの2点を結ぶ線分も関数の上側にある形状で、局所最適解がそのまま大域最適解になるため勾配法で確実に最適化できる(選択肢D)。この性質ゆえに選択肢Cのような初期値依存の問題は凸関数では生じにくく、それが深刻になるのはむしろ非凸関数である。多層ニューラルネットワークの損失関数は一般に非凸なので選択肢Bは誤りで、選択肢Aのように極値が存在しないわけでもない。「凸なら局所解=大域解」が頻出キーワード。"},{id:"math-stats-q33",chapterId:"math-stats",question:"損失関数の停留点のうち鞍点の説明として、最も適切なものを選べ。",choices:["勾配が0でありながら、ある方向では極大、別の方向では極小となる点で、高次元の損失関数に多数存在し学習停滞の一因となる","損失関数が最も小さくなる大域最適解のことである","勾配が無限大に発散してしまう点のことである","学習率を自動的に調整する最適化アルゴリズムの名称である"],answerIndex:0,explanation:"鞍点は勾配が0になる停留点のうち、馬の鞍のようにある方向では極大・別の方向では極小となる点で、極値ではない(選択肢A)。高次元のパラメータ空間では局所最適解よりも鞍点の方が圧倒的に多く、勾配が0に近づくため学習が停滞する原因となり、モーメンタムなどの最適化手法が脱出に有効とされる。選択肢Bの大域最適解や選択肢Cの発散点とは別物で、選択肢Dのような最適化アルゴリズムの名前でもない。「勾配0=最適解とは限らない」が頻出の論点。"},{id:"math-stats-q34",chapterId:"math-stats",question:"シグモイド関数σ(x)の微分の性質に関する説明として、最も適切なものを選べ。",choices:["シグモイド関数の微分は入力によらず常に1である","シグモイド関数の微分は入力の絶対値が大きいほど大きな値を取る","シグモイド関数の微分はσ(x)(1−σ(x))と自身の出力で表せ、その最大値はx=0のときの0.25である","シグモイド関数は微分不可能なため、誤差逆伝播法では使用できない"],answerIndex:2,explanation:"シグモイド関数の微分はσ'(x)=σ(x)(1−σ(x))と自身の出力だけで計算でき、最大値はσ(x)=0.5となるx=0での0.25である(選択肢C)。微分の値が常に0.25以下と小さいため、層を重ねて連鎖律で掛け合わせると勾配が指数的に縮み、勾配消失問題の一因となる。これがReLUが好まれる理由として頻出。入力の絶対値が大きいほど微分は0に近づくため選択肢Bは逆であり、選択肢Aの常に1や選択肢Dの微分不可能という記述も誤りである。"},{id:"math-stats-q35",chapterId:"math-stats",question:"ソフトマックス関数の説明として、最も適切なものを選べ。",choices:["出力のうち最大の要素だけを1にし、それ以外をすべて0にする関数である","各要素を指数関数で変換して総和で割ることで、すべての出力が0より大きく総和が1となる確率分布に変換する関数で、多クラス分類の出力層に使われる","出力を−1から1の範囲に変換する関数で、主に回帰問題の出力層に使われる","入力が負なら0を、正ならそのまま入力値を出力する関数である"],answerIndex:1,explanation:"ソフトマックス関数は各要素をexpで変換し総和で割ることで、出力をすべて正・総和1の確率分布として解釈できる形に変換し、多クラス分類の出力層で標準的に使われる(選択肢B)。最大要素だけを1にする選択肢Aのような硬い変換(argmaxのone-hot化)を滑らかにしたものという位置付けである。選択肢Cは−1から1に変換するtanh、選択肢DはReLUの説明である。交差エントロピー損失と組み合わせると勾配が「予測確率−正解」と簡潔になる点も頻出。"},{id:"math-stats-q36",chapterId:"math-stats",question:"最尤推定で尤度の代わりに対数尤度を最大化することが多い理由として、最も適切なものを選べ。",choices:["対数は積を和に変換でき、対数関数は単調増加なので最大化の解が変わらず、多数の確率の積によるアンダーフロー(桁あふれ)も避けられるため","対数を取ると最大化の解が別の値に変わり、より良いパラメータが得られるため","対数尤度は常に正の値を取り、計算結果の解釈が容易になるため","対数は和を積に変換する性質を持ち、計算量が大幅に増えるため"],answerIndex:0,explanation:"尤度は各データの確率の積で表されるが、対数を取るとlog(ab)=log a+log bの性質により和に変換でき、微分計算が簡単になりアンダーフローも防げる。対数関数は単調増加なので、対数尤度を最大化するパラメータは元の尤度を最大化するパラメータと一致する(選択肢A)。選択肢Bのように解が変わるなら使えないし、確率は1以下なので対数尤度は通常0以下となり選択肢Cも誤り。選択肢Dは積と和の方向が逆で計算量も増えない。「単調変換だから解が同じ」が核心の頻出ポイント。"},{id:"math-stats-q37",chapterId:"math-stats",question:"MAP推定(最大事後確率推定)の説明として、最も適切なものを選べ。",choices:["事前分布を一切使わず、尤度のみを最大化する推定法である","事後分布の全体を分布のまま求めるため、点推定ではない","事前分布の有無や形によらず、常に最尤推定と同じ推定値を与える","尤度に事前確率を掛けた事後確率を最大化する点推定であり、事前分布が一様な場合には最尤推定と一致する"],answerIndex:3,explanation:"MAP推定はベイズの定理に基づき、尤度×事前確率に比例する事後確率が最大となる1点をパラメータの推定値とする方法である(選択肢D)。事前分布が一様(どの値も同等)なら尤度の最大化と同じになり最尤推定と一致するが、一般には事前分布の影響で推定値が変わるため選択肢Cは誤り。尤度のみを使うのは最尤推定なので選択肢Aも誤りで、事後分布全体を扱う選択肢Bはベイズ推定の説明である。L2正則化がガウス事前分布のMAP推定と対応する点も頻出。"},{id:"math-stats-q38",chapterId:"math-stats",question:"決定木の分割基準に関する説明として、最も適切なものを選べ。",choices:["情報利得とは、分割によってエントロピーが増加した量のことである","ジニ不純度は値が大きいほどノードが単一クラスで純粋であることを表す","情報利得は分割によるエントロピーの減少量、ジニ不純度はノード内のクラスの混ざり具合を表す指標であり、決定木はこれらが改善するように分割を選ぶ","決定木の分割基準の計算には勾配降下法が必須である"],answerIndex:2,explanation:"決定木は、分割前後のエントロピーの差である情報利得が大きくなるように(ID3・C4.5系)、あるいはジニ不純度が小さくなるように(CART系)分割する特徴量としきい値を選ぶ(選択肢C)。情報利得はエントロピーの「減少量」なので選択肢Aは増減が逆であり、ジニ不純度は0に近いほど純粋なので選択肢Bも逆である。分割は候補を評価して選ぶ貪欲な探索で行われ、選択肢Dの勾配降下法は必須ではない。エントロピー・情報利得と決定木の結び付きが頻出。"},{id:"math-stats-q39",chapterId:"math-stats",question:"点(1, 2)と点(4, 6)の間のマンハッタン距離として、最も適切なものを選べ。",choices:["5","7","12","25"],answerIndex:1,explanation:"マンハッタン距離は各座標の差の絶対値の和で、|4−1|+|6−2|=3+4=7となる(選択肢B)。選択肢Aの5は2乗和の平方根√(9+16)で計算するユークリッド距離の値であり、両者の取り違えを狙った誤答である。選択肢Cは3×4、選択肢Dは2乗和25をそのまま答えたものである。マンハッタン距離はL1ノルム、ユークリッド距離はL2ノルムに対応し、L1/L2正則化との対応関係も含めて頻出ポイント。"},{id:"math-stats-q40",chapterId:"math-stats",question:"外れ値を含むデータの要約に関する説明として、最も適切なものを選べ。",choices:["平均値は中央値よりも外れ値の影響を受けにくい代表値である","第3四分位数とは、データを小さい順に並べたときの25%地点の値である","箱ひげ図からはデータの平均値と分散を直接読み取ることができる","中央値や四分位数は外れ値の影響を受けにくく、箱ひげ図は中央値・四分位範囲・外れ値の候補などデータの分布の様子を可視化できる"],answerIndex:3,explanation:"中央値はデータの真ん中の順位の値、四分位数は25%・50%・75%地点の値であり、極端な外れ値が混ざっても順位に基づくため値がほとんど動かない頑健(ロバスト)な統計量である。箱ひげ図はこれらと外れ値の候補を一目で可視化できる(選択肢D)。平均値は外れ値に大きく引っ張られるため選択肢Aは逆であり、25%地点は第1四分位数なので選択肢Bも誤り。箱ひげ図が直接示すのは中央値や四分位範囲であって平均・分散ではないため選択肢Cも誤りである。"}],contrasts:[{title:"特徴量スケーリングの2手法",left:{label:"標準化",traits:["平均0・分散1に変換","z=(x−μ)/σで計算","範囲は固定されない"]},right:{label:"正規化(Min-Max)",traits:["最小0・最大1に収める","範囲が0〜1に固定される"]},point:"「平均基準でならす標準化、最小最大で押し込む正規化」"},{title:"標本平均にまつわる2大定理",left:{label:"大数の法則",traits:["標本平均が母平均に近づく","試行回数を増やすと成立","「値」の収束の話"]},right:{label:"中心極限定理",traits:["標本平均の分布が正規に近づく","母集団の分布の形は不問","「分布の形」の話"]},point:"「値が近づく大数、分布が正規に近づく中心極限」"},{title:"仮説検定の2つの過誤",left:{label:"第一種の過誤",traits:["正しい帰無仮説を棄却","偽陽性(αエラー)","上限が有意水準α"]},right:{label:"第二種の過誤",traits:["誤った帰無仮説を棄却できない","偽陰性(βエラー)"]},point:"「あわてて棄却が第一種、ぼんやり見逃しが第二種」"},{title:"分散の2つの計算",left:{label:"標本分散",traits:["偏差平方和をnで割る","母分散を過小評価しがち"]},right:{label:"不偏分散",traits:["n−1(自由度)で割る","期待値が母分散に一致","母分散の推定に使う"]},point:"「母分散を推定するならn−1で割る不偏分散」"},{title:"パラメータの2つの点推定",left:{label:"最尤推定",traits:["尤度のみを最大化","事前分布を使わない"]},right:{label:"MAP推定",traits:["事後確率(尤度×事前)を最大化","一様事前なら最尤と一致","L2正則化と対応"]},point:"「事前知識を足せばMAP、事前が一様なら最尤に戻る」"},{title:"ベクトルの近さの2つ
