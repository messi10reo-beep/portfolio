on Jd(){if(Uu)return Rr;Uu=1;var d=Zd();return Rr.createRoot=d.createRoot,Rr.hydrateRoot=d.hydrateRoot,Rr}var bd=Jd();const ef={id:"ai-basics",number:1,title:"人工知能の基礎",subtitle:"AIの定義・歴史・3度のブーム",sections:[{title:"人工知能の定義と分類",points:["人工知能(AI)には研究者の間で確立した統一的な定義がなく、「知的な機械を作る科学と技術」など研究者ごとに解釈が異なる。1956年のダートマス会議でジョン・マッカーシーが「Artificial Intelligence」という言葉を初めて使った。","AI効果:AIによって実現できたことが社会に浸透して当たり前になると、それは「単なる自動化」とみなされAIとは呼ばれなくなる心理的現象。AIの定義が定まらない一因でもある。","エージェントとは、周囲の環境をセンサーで知覚し、その情報をもとに行動を選択して環境に働きかけるプログラムやシステムの総称。AI研究では「合理的に行動するエージェント」の実現が一つの目標とされる。","AIはレベル別に分類できる。レベル1は単純な制御プログラム(エアコンの温度制御など)、レベル2は対応パターンが多彩な古典的AI(将棋プログラムや診断システム)、レベル3は機械学習を取り入れたAI、レベル4は深層学習により特徴量を自ら獲得するAI。","特化型AI(弱いAI的な位置づけ)は画像認識や囲碁など特定タスクに限定して能力を発揮する。一方、汎用AI(AGI)は人間のように領域をまたいで多様な課題を処理できるAIを指すが、現時点では実現していない。"],summary:"AIに統一的な定義はなく、1956年のダートマス会議でマッカーシーが「人工知能」という言葉を初めて使った点が頻出。レベル分類はレベル3(機械学習)とレベル4(深層学習で特徴量を自ら獲得)の違いが問われる。特化型AIと未実現の汎用AI(AGI)の区別、AI効果もセットで押さえる。"},{title:"AIの歴史と3度のブーム",points:["第1次AIブーム(1950年代後半〜1960年代)は「探索・推論」の時代。迷路やパズルのように形式化された問題は解けたが、現実の複雑な問題には歯が立たず、ブームは終息した。","解ける問題が迷路やパズルなどの「トイプロブレム(おもちゃの問題)」に限られたことが第1次ブーム終焉の主因であり、最初の「冬の時代」を迎えた。","第2次AIブーム(1980年代)は「知識表現」の時代。専門家の知識をルールとしてコンピュータに与えるエキスパートシステムが企業で多数導入され、日本でも第五世代コンピュータプロジェクトが推進された。","第2次ブームは、知識を人手で記述・管理することの限界(知識獲得のボトルネック)が明らかになり再び冬の時代へ入った。","第3次AIブーム(2000年代後半〜現在)は「機械学習・深層学習」の時代。ビッグデータの蓄積と計算機性能の向上を背景に、2012年のILSVRCでの深層学習の圧勝などが火付け役となった。","各ブームの技術は断絶しているわけではなく、探索・推論や知識表現の研究成果は現在のAIにも引き継がれている点を押さえておく。"],summary:"第1次=探索・推論、第2次=知識表現(エキスパートシステム)、第3次=機械学習・深層学習という対応が最頻出。終焉理由は第1次がトイプロブレムの限界、第2次が知識獲得のボトルネックと区別する。第3次の火付け役は2012年ILSVRCでの深層学習の圧勝。"},{title:"探索・推論の技術",points:["探索とは、場合分けを木構造(探索木)で表し、ゴールに至る道筋を順に調べる手法。調べ方には、同じ深さのノードを順に調べる幅優先探索と、行けるところまで深く進む深さ優先探索がある。","幅優先探索は最短経路を必ず見つけられるが探索途中の状態を全て記憶するためメモリ消費が大きい。深さ優先探索はメモリ効率が良いが、最初に見つかる解が最短とは限らない。","ハノイの塔は探索で解ける代表的なパズル。円盤の状態を場合分けして探索木を構築すれば機械的に解けるため、第1次ブームの探索研究の例題として頻出する。","ミニマックス法は、ゲームで自分の手番ではスコアが最大、相手の手番では最小になる手を選ぶと仮定して先読みする手法。αβ法(アルファ・ベータ枝刈り)は、評価に影響しない枝の探索を打ち切り(αカット・βカット)、ミニマックス法を効率化する。","モンテカルロ法は、ある局面からランダムにゲームをプレイアウト(シミュレーション)し、勝率で局面の良し悪しを数値化する手法。評価関数を人手で設計しなくてよい点が特徴で、囲碁AIで成果を上げた。","ボードゲームAIの歴史では、1997年にIBMのディープブルーがチェス王者カスパロフに勝利し、2016年にDeepMindのAlphaGoが囲碁のトップ棋士イ・セドルに勝利したことが画期とされる。"],summary:"「最短保証だがメモリ大の幅優先、省メモリだが最短保証なしの深さ優先」の対比が頻出。ゲームAIはミニマックス法とその効率化のαβ法、評価関数の設計が不要なモンテカルロ法を区別する。1997年ディープブルー(チェス)、2016年AlphaGo(囲碁)の年号と対応も必須。"},{title:"知識表現とエキスパートシステム",points:["Eliza(イライザ)は1960年代にジョセフ・ワイゼンバウムが開発した対話プログラム。相手の発言のパターンに応じて返答するだけだが、人間と話していると錯覚する人が現れた(イライザ効果)。人工無脳(チャットボット)の起源とされる。","エキスパートシステムは、専門家の知識を「もし〜ならば〜」というルール群として蓄え、推論エンジンで結論を導くシステム。第2次ブームの中核技術である。","MYCIN(マイシン)は1970年代にスタンフォード大学で開発された、血液中のバクテリア(感染症)の診断を支援するエキスパートシステム。約500のルールで専門医に迫る精度を示した。","DENDRAL(デンドラル)はエドワード・ファイゲンバウムらが開発した、未知の有機化合物の分子構造を質量分析データから推定するシステム。世界初期のエキスパートシステムとして知られる。","知識獲得のボトルネック:専門家の暗黙的な知識を聞き出してルール化する作業が極めて困難で、知識の数が増えると一貫性の維持・保守も難しくなる問題。エキスパートシステムの限界を象徴する。","意味ネットワークは概念をノード、概念間の関係を矢印で表す知識表現。「is-a(〜である:継承関係)」と「part-of(〜の一部である:属性)」の関係が代表的。オントロジーは概念や関係の仕様を体系的に記述する取り組みで、Cycプロジェクトは一般常識を全て記述しようとする1984年開始の長期プロジェクトである。"],summary:"MYCIN=感染症診断、DENDRAL=分子構造推定というエキスパートシステムの対応が頻出。その限界を示すのが知識獲得のボトルネック。意味ネットワークはis-a(継承)とpart-of(部分)の使い分け、対話プログラムの起源Elizaとイライザ効果も押さえる。"},{title:"AIをめぐる課題と論争",points:["フレーム問題:ある課題を遂行する際に「関係のある事柄」だけを選び出すことが機械には本質的に難しいという問題。ダニエル・デネットの爆弾とロボットの思考実験で有名で、AIの根源的な難問とされる。","シンボルグラウンディング問題:記号(シンボル)とその意味する実世界の対象がどう結び付くかという問題。スティーブン・ハルナッドが提起し、「シマウマ=縞のある馬」を記号操作だけで本当に理解できるのかが問われる。","チューリングテストはアラン・チューリングが提案した、機械が知的かどうかを判定するテスト。判定者が文字での対話相手を人間か機械か見分けられなければ、機械は知的とみなす。これを競うローブナーコンテストが1991年から開催されている。","中国語の部屋はジョン・サールの思考実験。中国語を理解しない人でもマニュアルに従えば適切な返答ができることから、記号操作ができることと意味を理解することは別であり、チューリングテストに合格しても「理解」したとは言えないと論じた。","サールはAIを「強いAI(適切にプログラムされた計算機は精神を持ちうる)」と「弱いAI(計算機は知能を研究する有用な道具にすぎない)」に区別し、強いAIを否定する立場をとった。","シンギュラリティ(技術的特異点)はレイ・カーツワイルが提唱した、AIが自分より賢いAIを作れるようになり知能が爆発的に向上する転換点。カーツワイルは2029年に人間並みのAI、2045年にシンギュラリティが到来すると予測した。"],summary:"フレーム問題は「考慮すべき範囲の選択」、シンボルグラウンディング問題は「記号と実世界の結び付き」と区別するのが鉄則。チューリングテストを批判したのがサールの中国語の部屋で、強いAI・弱いAIの区別とセット。カーツワイルの予測は2029年(人間並みAI)と2045年(シンギュラリティ)の2つの年号が頻出。"},{title:"プランニングと探索の発展",points:["プランニングとは、初期状態から目標状態に至るまでの行動の系列を、探索を利用して立案する技術。ロボットの行動計画の研究として第1次ブーム期から取り組まれてきた。","STRIPSは「前提条件」「行動」「結果」の3つの組み合わせで行動計画を記述する手法。ファイクスとニルソンによって開発され、プランニング研究の代表的な成果とされる。","SHRDLUはテリー・ウィノグラードが開発した、コンピュータ上の「積み木の世界」を英語の指示で操作できる対話システム。限定された世界でなら言語理解と行動計画が可能なことを示し、その成果は後のCycプロジェクトにも引き継がれた。","ヒューリスティックな知識とは、正しさが保証されているわけではないが、経験的に探索を効率化できる知識(経験則)のこと。ボードゲームAIの評価関数の設計などに利用されてきた。","組合せ爆発とは、探索すべき状態の数が指数関数的に増大し、現実的な時間では計算しきれなくなる現象。将棋や囲碁をしらみつぶしに探索できないのはこのためで、αβ法やモンテカルロ木探索などの効率化が必要になった。","身体性(身体知)とは「知能が成立するためには身体が不可欠である」という考え方。身体を通じた外界とのインタラクションで概念を獲得することが、シンボルグラウンディング問題の解決につながると期待されている。"],summary:"プランニングの記述手法STRIPS(前提条件・行動・結果)と、積み木の世界を操作するSHRDLUの対応を押さえる。総当たり探索を不可能にするのが組合せ爆発で、効率化に使う経験則がヒューリスティックな知識。身体性はシンボルグラウンディング問題の解決につながる考え方として頻出。"},{title:"知識の活用と現実のAIシステム",points:["オントロジーの構築には2つの立場がある。ヘビーウェイトオントロジー(重量級)は哲学的考察を重視して人手で厳密に記述する立場でCycプロジェクトが代表。ライトウェイトオントロジー(軽量級)は完全に正しくなくても使えればよいという立場で、ウェブマイニングなどにより半自動的に構築される。","セマンティックWebは、ウェブページの記述内容に意味(メタデータ)を付与し、コンピュータが情報の意味を扱えるようにすることを目指す取り組み。ティム・バーナーズ=リーが提唱した。","IBMのワトソン(Watson)は2011年にクイズ番組「Jeopardy!」で人間のチャンピオンに勝利した質問応答(Question-Answering)システム。ウィキペディアなどから構築したライトウェイトオントロジーの知識を活用し、質問に関連性の高い解答を高速に検索する。質問の意味を理解しているわけではない点が重要。","東ロボくんは国立情報学研究所が中心となり2011年に開始した「ロボットは東大に入れるか」プロジェクト。模試で私立大学に合格できる水準の偏差値を記録したが、文章の意味を理解する読解力に限界があり、東大合格の目標は断念された。","第五世代コンピュータプロジェクトは、第2次AIブーム期の1982年に日本の通商産業省(当時)が主導した国家プロジェクト。推論を高速に実行する並列計算機の開発を目指し、約570億円が投じられた。","ノーフリーランチ定理は「あらゆる問題に対して常に他より優れた万能のアルゴリズムは存在しない」という定理。関連して、醜いアヒルの子の定理は「何らかの仮定(特徴の重み付け)なしには分類は原理的に不可能」という定理で、セットで押さえておく。"],summary:"オントロジーは人手で厳密に作るヘビーウェイトと、半自動で構築するライトウェイトの2つの立場を区別する。ワトソンも東ロボくんも「意味を理解しているわけではない」点が頻出。ノーフリーランチ定理(万能アルゴリズムの不在)と醜いアヒルの子の定理(仮定なしの分類は不可能)はセットで覚える。"},{title:"探索アルゴリズムの深掘り",points:["探索は「コストを考えない探索」と「コスト付き探索」に大別できる。幅優先探索と深さ優先探索はコストを無視して構造だけをたどるが、現実の経路探索では辺ごとの距離や時間といったコストを考慮する必要がある。","均一コスト探索(ダイクストラ法)は、出発点からの累積コストが最小のノードを優先して展開する手法。コストに偏りがあっても最小コストの経路を必ず見つけられるが、ゴールの方向を考慮しないため探索範囲が広がりやすい。","ヒューリスティック関数とは、あるノードからゴールまでのコストを安く見積もる「推定値」のこと。正しさは保証されないが探索の進む方向を絞り込めるため、組合せ爆発を抑える鍵となる。","最良優先探索(ベストファースト探索)は、ヒューリスティック関数の値(ゴールへの近さの推定)だけを頼りにゴールに近そうなノードから展開する手法。速いが、これまでにかかったコストを無視するため最短経路を見落とすことがある。","A*(エースター)アルゴリズムは「出発点からの実コスト」と「ゴールまでの推定コスト(ヒューリスティック)」の和が最小のノードを展開する手法。推定が実際のコストを超えない(許容的である)限り、最短経路を必ず見つけられる点で均一コスト探索と最良優先探索の長所を併せ持つ。","山登り法(ヒルクライミング)は、現在地より評価が良くなる方向へ進むことを繰り返す局所探索。実装は単純だが、頂上より低い「局所最適解」に捕まると抜け出せず、全体最適である「大域最適解」に到達できないという根本的限界を持つ。","局所最適解の問題を緩和するため、確率的に悪い方向へも移動を許す焼きなまし法(シミュレーテッドアニーリング)や、生物の進化を模して複数解を交叉・突然変異させる遺伝的アルゴリズムなど、確率を取り入れた最適化手法が用いられる。"],summary:"コストを無視する幅優先・深さ優先に対し、コスト付き探索の代表が均一コスト探索(ダイクストラ法)とA*。A*は実コストとヒューリスティック推定の和で評価し最短を保証する点が核心。山登り法は局所最適解に捕まる限界を持ち、焼きなまし法や遺伝的アルゴリズムで緩和する。"},{title:"ゲームAIの歴史と手法の発展",points:["ゲームAIの研究は第1次ブーム期から続き、アーサー・サミュエルが1950年代に開発したチェッカー(西洋将棋)のプログラムが、自己対戦を通じて強くなる初期の機械学習の例として知られる。","1997年、IBMのディープブルーがチェス世界王者カスパロフに勝利した。これはミニマックス法とαβ法による高速・大量の先読み(力任せの探索)と人手で設計した評価関数による勝利であり、機械学習は用いていない。","将棋AIでは、2005年頃に登場したボナンザが、プロの棋譜から評価関数のパラメータを自動調整する「機械学習による評価関数の獲得(ボナンザメソッド)」を導入し、人手設計に頼らない方向へ転換させた。","囲碁は盤面が広く局面評価が難しいため長く攻略困難とされたが、モンテカルロ木探索(ランダムなプレイアウトの勝率で局面を評価する探索)の導入で大きく前進した。","2016年のAlphaGoは、深層学習による2つのネットワーク(次の手を予測するポリシーネットワークと、局面の有利さを評価するバリューネットワーク)とモンテカルロ木探索を組み合わせ、人間の棋譜による教師あり学習を出発点として、トップ棋士イ・セドルに勝利した。","AlphaGo Zeroは、人間の棋譜を一切使わず自己対戦のみ(自己対局による強化学習)で学習し、従来のAlphaGoを上回った。人間の知識を前提としない点が画期的である。","AlphaZeroは、AlphaGo Zeroの仕組みを一般化し、囲碁・将棋・チェスのいずれにも同じアルゴリズムで対応できることを示した。ゲーム固有の知識を最小化し、汎用的な自己対戦学習で複数ゲームを制した到達点とされる。"],summary:"チェッカー(サミュエル)→ディープブルー(探索と人手評価関数でチェス制覇・1997年)→ボナンザ(将棋で評価関数を機械学習)→AlphaGo(深層学習+モンテカルロ木探索で囲碁制覇・2016年)→AlphaGo Zero(自己対戦のみ)→AlphaZero(囲碁・将棋・チェスを汎用化)という発展の流れが頻出。各段階で「探索中心」から「学習中心」「自己対戦」へ移行した点を押さえる。"},{title:"知識表現の手法を掘り下げる",points:["知識表現とは、人間の知識をコンピュータが扱える形式に記述する技術の総称。意味ネットワーク・フレーム・プロダクションルール・オントロジーなど複数の方式があり、第2次ブームの中核テーマだった。","意味ネットワークでは、is-a(継承:下位概念が上位概念の性質を引き継ぐ)とpart-of(部分:全体と構成要素の関係)の2種類の関係が代表的で、この2つの使い分けが頻出する。「ペンギンは鳥」はis-a、「翼は鳥の一部」はpart-of。","フレームはマービン・ミンスキーが提唱した知識表現で、ある対象に関する知識を「スロット(属性)」と「値」の組として一つの枠(フレーム)にまとめて記述する。デフォルト値を持てるため、例外のない一般的な性質を効率よく表せる。","プロダクションルールは「もし〜ならば〜する(IF-THEN)」形式で知識を表す方式で、エキスパートシステムの知識ベースの記述に広く使われた。ルールの集まりと、それを適用する推論エンジンが分離している点が特徴。","推論には2方向がある。前向き推論(データ駆動)は分かっている事実からルールを次々適用して結論へ進む方式、後ろ向き推論(ゴール駆動)は仮説となる結論からそれを支える条件を逆にたどって検証する方式。診断システムでは後ろ向き推論が使われやすい。","オントロジーは概念・関係・属性を体系的・形式的に記述する取り組みで、構築方法の違いから、哲学的考察を重視し人手で厳密に作るヘビーウェイトオントロジー(Cycが代表)と、多少不正確でも実用本位で半自動構築するライトウェイトオントロジーに分かれる。","セマンティックWebは、ウェブ上の情報に意味(メタデータ)を機械可読な形で付与する取り組みで、ティム・バーナーズ=リーが提唱した。RDFやOWLといった記述言語を用い、コンピュータがページの意味を解釈・連携できる世界を目指す。"],summary:"知識表現は意味ネットワーク(is-a/part-of)・フレーム(ミンスキー、スロットと値)・プロダクションルール(IF-THEN)・オントロジーの4方式を区別する。推論は事実から進む前向き推論と結論から逆算する後ろ向き推論の対比が要点。オントロジーはヘビーウェイト(Cyc)とライトウェイト、セマンティックWeb(バーナーズ=リー)まで体系的に押さえる。"},{title:"哲学的論点と知能をめぐる議論",points:["チューリングテストは、判定者が文字対話だけで相手が人間か機械かを当てられなければ機械は知的とみなす行動主義的な基準。「知能とは何か」を内部構造ではなく外から観察できる振る舞いで定義しようとした点に特徴がある。","ローブナーコンテストは1991年から開催された、チューリングテストの合格を競う大会。実際に人間と見分けがつかないと判定される対話プログラムを目指して競われたが、真に知的な対話の実現は容易でないことも示した。","中国語の部屋はジョン・サールの思考実験で、記号操作(構文)ができても意味理解(意味論)を伴わないことを示し、「適切にプログラムされた計算機は精神を持つ」とする強いAIを否定した。チューリングテスト合格は理解の証明にならないという批判である。","サールは、計算機が精神を持ちうるとする強いAIと、計算機は知能研究の有用な道具にすぎないとする弱いAIを区別した。現在実用化されているAIはすべて弱いAIの立場に立つものといえる。","知能の定義そのものに合意はなく、AI効果(実現された技術はAIと見なされなくなる現象)が示すように、何を「知的」とみなすかは時代とともに変化する。これがAIに統一的定義がない一因でもある。","シンギュラリティ(技術的特異点)はレイ・カーツワイルが提唱した、AIが自身より賢いAIを作れるようになり知能が爆発的・再帰的に向上する転換点。カーツワイルは2029年に人間並みのAI、2045年にシンギュラリティが到来すると予測した。","シンギュラリティには賛否がある。スティーブン・ホーキングやイーロン・マスクらは制御不能なリスクを警告した一方、現状のAIは特定タスクに特化した弱いAIにとどまり汎用人工知能(AGI)は未実現であることから、到来時期や実現可能性には懐疑的な見方も根強い。"],summary:"チューリングテスト(振る舞いで知能を判定)とそれを競うローブナーコンテスト(1991年〜)、それを批判するサールの中国語の部屋(構文と意味論は別)、強いAI・弱いAIの区別をひとつながりで押さえる。シンギュラリティはカーツワイルの提唱で2029年(人間並みAI)と2045年(特異点)の2つの年号、そして賛否両論があることが頻出。"},{title:"AI発展を支えた人物と転換点",points:["ジョン・マッカーシーは1956年のダートマス会議で「人工知能(Artificial Intelligence)」という言葉を初めて使った人物で、AIという研究分野の名付け親とされる。","アレン・ニューウェルとハーバート・サイモンは、数学の定理を自動証明する世界初のAIプログラム「ロジック・セオリスト」を開発し、ダートマス会議でデモした。第1次ブームの探索・推論研究を象徴する成果である。","マービン・ミンスキーは知識を構造化して表現するフレーム理論を提唱し、AI研究の黎明期を主導した。一方で1969年にパーセプトロンが単層では線形分離不可能な問題(XORなど)を解けないことを指摘した著作が、ニューラルネットワーク研究の停滞(冬の時代)の一因にもなった。","アラン・チューリングは計算理論の基礎を築き、機械の知能を判定するチューリングテストを提案した。コンピュータ科学とAIの双方の源流に位置づけられる人物である。","ジェフリー・ヒントンは、誤差逆伝播法の普及や2006年頃のディープラーニング研究の再興を主導し、第3次ブームの立役者となった。2012年のILSVRCで彼のチームの深層学習モデル(AlexNet)が圧勝したことが、第3次ブームの直接の火付け役とされる。","AIの歴史は3度のブームと2度の冬の時代を繰り返してきた。第1次ブーム(探索・推論)の後にトイプロブレムの限界で第1の冬、第2次ブーム(知識表現・エキスパートシステム)の後に知識獲得のボトルネックで第2の冬、そして2000年代後半からビッグデータと計算資源を背景に第3次ブーム(機械学習・深層学習)が到来した。","第3次ブームを支えた外的要因として、インターネット普及による大量データ(ビッグデータ)の蓄積、GPUによる並列計算性能の向上、そして深層学習アルゴリズムの進展という3つが相互に作用した点が重要である。"],summary:"マッカーシー(AIの名付け親)、ニューウェル&サイモン(ロジック・セオリスト)、ミンスキー(フレーム理論・パーセプトロン批判)、チューリング(チューリングテスト)、ヒントン(深層学習の再興・2012年ILSVRC)という主要人物と功績の対応が頻出。3度のブームと2度の冬の時代、第3次ブームを支えたビッグデータ・GPU・アルゴリズムの3要因を時系列で押さえる。"},{title:"エキスパートシステムの仕組みと限界",points:["エキスパートシステムは、専門家の知識を「もし〜ならば〜」のプロダクションルールとして蓄える知識ベースと、それを使って結論を導く推論エンジンの2つに機能が分離している。知識と推論の仕組みが独立しているため、ルールの追加・修正が比較的容易である。","DENDRAL(デンドラル)は1960年代にエドワード・ファイゲンバウムらが開発した、質量分析データから有機化合物の分子構造を推定する世界初期のエキスパートシステムで、特定領域の専門知識を活用する有用性を示した。","MYCIN(マイシン)は1970年代にスタンフォード大学で開発された血液感染症の診断支援システムで、約500のルールを持ち専門医に迫る精度を示した。診断のように結論(病名)から条件を逆にたどる場面では後ろ向き推論が用いられる。","MYCINは診断結果に「確信度(certainty factor)」という数値を付与し、不確実な知識のもとでも結論の確からしさを扱えるようにした点も特徴的である。","前向き推論(データ駆動型)は分かっている事実からルールを次々に適用して結論へ到達する方式で、観測データから何が言えるかを導く場面に向く。後ろ向き推論(ゴール駆動型)は仮説的な結論を立て、それを支持する条件を逆にたどって検証する方式である。","知識獲得のボトルネックとは、専門家が持つ暗黙知をヒアリングしてルールへ変換する作業が極めて困難で、ルール数が増えると一貫性の維持・保守も難しくなる問題。エキスパートシステム最大の壁であり、第2次AIブーム終焉の主因となった。","エキスパートシステムは記述された知識の範囲内でしか機能せず、想定外の入力には対応できない(常識や例外への弱さ)。この限界が、データから自動で規則性を学ぶ機械学習へとAI研究の重心を移す契機にもなった。"],summary:"エキスパートシステムは知識ベース(IF-THENルール)と推論エンジンの分離が構造上の核心。DENDRAL(分子構造推定)とMYCIN(感染症診断・確信度)の対応、前向き推論(データ駆動)と後ろ向き推論(ゴール駆動)の使い分けを押さえる。最大の限界が知識獲得のボトルネックで、第2次ブーム終焉と機械学習への移行の原因となった。"}],terms:[{term:"ダートマス会議",definition:"1956年開催。ジョン・マッカーシーが主催し「人工知能」という言葉が初めて使われた会議。ニューウェルとサイモンが世界初のAIプログラム「ロジック・セオリスト」をデモした。"},{term:"AI効果",definition:"AIで実現できたことが当たり前になると「単なる自動化」とみなされ、AIと呼ばれなくなる心理的現象。"},{term:"エージェント",definition:"環境を知覚し、目的に向けて自律的に行動を選択するプログラムやシステムの総称。"},{term:"汎用AI(AGI)",definition:"特定タスクに限定されず、人間のように幅広い課題を処理できるAI。特化型AIと対比され、現時点では未実現。"},{term:"トイプロブレム",definition:"迷路やパズルなど、ルールが明確に定義された「おもちゃの問題」。第1次AIブームのAIはこれしか解けず、ブーム終焉の一因となった。"},{term:"ミニマックス法",definition:"ゲーム木探索で、自分の手番はスコア最大、相手の手番はスコア最小の手を選ぶと仮定して先読みする手法。"},{term:"αβ枝刈り",definition:"ミニマックス法で評価に影響しない枝の探索を打ち切る効率化手法。αカットとβカットがある。"},{term:"モンテカルロ法",definition:"局面からランダムにプレイアウトを繰り返し、勝率で局面を評価する手法。評価関数の人手設計が不要で囲碁AIに貢献した。"},{term:"Eliza",definition:"1960年代にワイゼンバウムが開発した対話プログラム。パターン応答だけで人間らしく見え、イライザ効果という言葉を生んだ。"},{term:"エキスパートシステム",definition:"専門家の知識をルールとして蓄積し、推論によって専門家のように回答するシステム。第2次AIブームの中核技術。"},{term:"MYCIN",definition:"1970年代にスタンフォード大学で開発された、血液感染症の診断支援を行うエキスパートシステム。約500のルールを持つ。"},{term:"DENDRAL",definition:"ファイゲンバウムらが開発した、質量分析データから有機化合物の分子構造を推定する初期のエキスパートシステム。"},{term:"知識獲得のボトルネック",definition:"専門家の暗黙知をルールとして抽出・記述・保守することが極めて困難であるという、エキスパートシステムの限界を示す問題。"},{term:"Cycプロジェクト",definition:"1984年にダグラス・レナートが開始した、人間の一般常識を全てコンピュータに記述しようとする長期プロジェクト。現在も継続中。"},{term:"意味ネットワーク",definition:"概念をノード、関係を矢印で表す知識表現。is-a(継承)とpart-of(部分)の関係が代表的。"},{term:"フレーム問題",definition:"課題遂行に関係のある事柄だけを選び出すことが機械には難しいという、AIの根源的な難問。デネットの爆弾とロボットの思考実験で知られる。"},{term:"シンボルグラウンディング問題",definition:"記号とそれが意味する実世界の対象を結び付けられるかという問題。ハルナッドが提起した。"},{term:"シンギュラリティ",definition:"AIが自身より賢いAIを作り知能が爆発的に向上する技術的特異点。カーツワイルは2045年の到来を予測した。"},{term:"ディープブルー",definition:"IBMが開発したチェス専用コンピュータ。1997年に世界王者ガルリ・カスパロフに勝利した。"},{term:"AlphaGo",definition:"DeepMindが開発した囲碁AI。深層学習とモンテカルロ木探索を組み合わせ、2016年にトップ棋士イ・セドルに勝利した。"},{term:"IBMワトソン",definition:"2011年にクイズ番組『Jeopardy!』で人間のチャンピオンに勝利した質問応答システム。ライトウェイトオントロジーの知識を活用するが、質問の意味を理解しているわけではない。"},{term:"東ロボくん",definition:"国立情報学研究所が2011年に開始した「ロボットは東大に入れるか」プロジェクト。読解力の限界から東大合格は断念された。"},{term:"STRIPS",definition:"「前提条件・行動・結果」の3要素で行動計画を記述するプランニング手法。ファイクスとニルソンが開発した。"},{term:"SHRDLU",definition:"テリー・ウィノグラードが開発した、積み木の世界を英語の指示で操作できる対話システム。限定世界での言語理解と行動計画を示した。"},{term:"第五世代コンピュータ",definition:"第2次AIブーム期の1982年に日本の通商産業省が主導した、推論を高速実行する並列計算機の開発を目指した国家プロジェクト。"},{term:"ノーフリーランチ定理",definition:"あらゆる問題で常に他より優れた万能のアルゴリズムは存在しないという定理。万能の最適化手法はないことを示す。"}],questions:[{id:"ai-basics-q01",chapterId:"ai-basics",question:"「人工知能(Artificial Intelligence)」という言葉が初めて使われた会議として、最も適切なものを選べ。",choices:["ダートマス会議","ソルベー会議","ウィーン会議","マクシー会議"],answerIndex:0,explanation:"1956年にジョン・マッカーシーらが開催したダートマス会議で「人工知能」という言葉が初めて使われた。ソルベー会議は物理学、ウィーン会議は19世紀の国際政治の会議でありAIとは無関係。この会議でニューウェルとサイモンが世界初のAIプログラム「ロジック・セオリスト」をデモした点も頻出。"},{id:"ai-basics-q02",chapterId:"ai-basics",question:"AIで実現された技術が社会に浸透すると「単なる自動化であってAIではない」とみなされるようになる現象を指す用語として、最も適切なものを選べ。",choices:["フレーム問題","イライザ効果","AI効果","シンボルグラウンディング問題"],answerIndex:2,explanation:"実現済みの技術が当たり前になるとAIと呼ばれなくなる心理的現象をAI効果という。AIの定義が定まらない一因でもある。イライザ効果は単純なプログラムを人間らしいと錯覚する現象、フレーム問題とシンボルグラウンディング問題はAIの能力に関する技術的難問であり、いずれも社会の認識の変化を指す用語ではない。"},{id:"ai-basics-q03",chapterId:"ai-basics",question:"AIのレベル別分類において、「機械学習を取り入れ、データからルールや知識を自ら学習する」段階に該当するものとして、最も適切なものを選べ。",choices:["レベル1","レベル3","レベル2","レベル4"],answerIndex:1,explanation:"機械学習を取り入れたAIはレベル3に分類される。レベル1はエアコンの温度制御のような単純な制御プログラム、レベル2は探索や知識ベースで振る舞う古典的AI、レベル4は深層学習によって特徴量自体を自ら獲得するAIである。レベル3と4の違いが「特徴量を人が設計するか機械が獲得するか」である点が頻出。"},{id:"ai-basics-q04",chapterId:"ai-basics",question:"汎用AI(AGI)の説明として、最も適切なものを選べ。",choices:["囲碁や画像認識など特定の課題に限定して高い性能を発揮するAI","あらかじめ定められたルールどおりに動作する制御プログラム","人間の脳の神経回路を完全に再現したハードウェア","特定の領域に限定されず、人間のように多様な課題を処理できるAI"],answerIndex:3,explanation:"汎用AI(AGI)は領域をまたいで幅広い知的課題に対応できるAIを指し、現時点では実現していない。特定課題に限定されるのは特化型AIで、現在実用化されているAIはほぼ全てこちらに該当する。ルールどおりの制御プログラムはレベル1相当であり、脳の物理的再現は汎用AIの定義そのものではない。"},{id:"ai-basics-q05",chapterId:"ai-basics",question:"第1次AIブームの中心となった技術として、最も適切なものを選べ。",choices:["知識表現","探索・推論","深層学習","遺伝的アルゴリズム"],answerIndex:1,explanation:"第1次AIブーム(1950年代後半〜1960年代)は探索・推論の時代であり、迷路やパズルを木構造の探索で解く研究が中心だった。知識表現は第2次ブーム、機械学習・深層学習は第3次ブームの中心技術である。各ブームと中心技術の対応はG検定で最頻出の知識の一つ。"},{id:"ai-basics-q06",chapterId:"ai-basics",question:"第1次AIブームが終焉した理由として、最も適切なものを選べ。",choices:["迷路やパズルのようなトイプロブレムしか解けず、現実の複雑な問題に対応できなかったため","専門家の知識をルールとして記述する作業が困難だったため","学習に必要なデータと計算資源が不足していたため","AIの軍事利用に対する国際的な規制が強化されたため"],answerIndex:0,explanation:"第1次ブームの探索・推論は、ルールが明確なトイプロブレム(おもちゃの問題)には有効だったが、現実世界の複雑な問題には対応できず冬の時代を迎えた。知識記述の困難(知識獲得のボトルネック)は第2次ブーム終焉の理由であり、混同しやすいので区別して覚える。データ・計算資源の不足は第3次ブーム以前の制約ではあるが、第1次ブーム終焉の直接の理由として問われるのはトイプロブレムである。"},{id:"ai-basics-q07",chapterId:"ai-basics",question:"幅優先探索と深さ優先探索の比較に関する記述として、最も適切なものを選べ。",choices:["幅優先探索はメモリ消費が少なく、深さ優先探索は必ず最短経路を見つけられる","どちらの探索方法も、最初に見つけた解が必ず最短経路になる","幅優先探索は必ず最短経路を見つけられるがメモリ消費が大きく、深さ優先探索はメモリ効率が良いが最初の解が最短とは限らない","深さ優先探索は同じ深さのノードを順に調べ、幅優先探索は行けるところまで深く進む"],answerIndex:2,explanation:"幅優先探索は出発点に近いノードから順に調べるため最短経路を保証するが、途中の状態を全て記憶するのでメモリ消費が大きい。深さ優先探索は一本道を深く進むためメモリ効率は良いが、最初に見つかる解が最短である保証はない。選択肢Aは両者の特徴が逆であり、選択肢Dは探索方法の説明自体が入れ替わっている。"},{id:"ai-basics-q08",chapterId:"ai-basics",question:"ミニマックス法による探索を効率化するために、評価結果に影響を与えない枝の探索を途中で打ち切る手法として、最も適切なものを選べ。",choices:["プルーニング再帰法","モンテカルロ木探索","幅優先探索","αβ法(アルファ・ベータ枝刈り)"],answerIndex:3,explanation:"αβ法は、ミニマックス法の探索において最終的な評価に影響しない枝を打ち切る(枝刈りする)ことで計算量を削減する手法で、打ち切りにはαカットとβカットがある。モンテカルロ木探索はランダムなプレイアウトの勝率で局面を評価する別系統の手法であり、ミニマックス法の枝刈りではない。幅優先探索は枝刈りを行わない基本的な探索法である。"},{id:"ai-basics-q09",chapterId:"ai-basics",question:"ゲームAIにおけるモンテカルロ法の説明として、最も適切なものを選べ。",choices:["専門家が設計した評価関数を用いて局面の良し悪しを厳密に計算する手法","ある局面からランダムにゲームを最後までプレイするシミュレーションを繰り返し、勝率によって局面を評価する手法","全ての局面をしらみつぶしに探索して必勝手順を求める手法","過去の棋譜データベースと完全に一致する局面を検索して次の一手を決める手法"],answerIndex:1,explanation:"モンテカルロ法は、局面からランダムなプレイアウトを多数実行し、その勝率で局面の価値を数値化する。評価関数を人手で設計する必要がない点が従来手法との大きな違いで、局面評価が難しい囲碁で特に成果を上げた。全局面の総当たりは組合せ爆発のため囲碁では不可能であり、棋譜の完全一致検索はモンテカルロ法とは無関係。"},{id:"ai-basics-q10",chapterId:"ai-basics",question:"1960年代にジョセフ・ワイゼンバウムが開発し、単純なパターン応答にもかかわらず利用者が人間と対話していると錯覚することもあった対話プログラムとして、最も適切なものを選べ。",choices:["Eliza","MYCIN","Cyc","DENDRAL"],answerIndex:0,explanation:"Eliza(イライザ)はワイゼンバウムが開発した対話プログラムで、セラピストを模したパターン応答だけで人間らしく感じられた。この錯覚はイライザ効果と呼ばれ、人工無脳(チャットボット)の起源とされる。MYCINは感染症診断、DENDRALは分子構造推定のエキスパートシステム、Cycは常識をコンピュータに記述するプロジェクトであり、いずれも対話プログラムではない。"},{id:"ai-basics-q11",chapterId:"ai-basics",question:"1970年代にスタンフォード大学で開発された、血液中のバクテリアを診断し抗生物質の処方を支援するエキスパートシステムとして、最も適切なものを選べ。",choices:["DENDRAL","Eliza","MYCIN","Watson"],answerIndex:2,explanation:"MYCIN(マイシン)は血液感染症の診断支援を行うエキスパートシステムで、約500のルールにより専門医に迫る精度を示した。DENDRALは有機化合物の分子構造を推定するシステムで、医療診断ではない。Watsonは2011年にクイズ番組ジェパディで優勝したIBMの質問応答システムで、第2次ブームのエキスパートシステムとは時代が異なる。"},{id:"ai-basics-q12",chapterId:"ai-basics",question:"エドワード・ファイゲンバウムらが開発した、質量分析のデータから未知の有機化合物の分子構造を推定する初期のエキスパートシステムとして、最も適切なものを選べ。",choices:["MYCIN","AlphaFold","ロジック・セオリスト","DENDRAL"],answerIndex:3,explanation:"DENDRAL(デンドラル)は1960年代から開発された、有機化合物の分子構造を推定する世界初期のエキスパートシステムである。MYCINは同じスタンフォード大学発だが対象は感染症診断。ロジック・セオリストは数学の定理を証明した世界初のAIプログラム、AlphaFoldはタンパク質の立体構造を予測する近年の深層学習モデルであり、エキスパートシステムではない。"},{id:"ai-basics-q13",chapterId:"ai-basics",question:"エキスパートシステムの限界として指摘された「知識獲得のボトルネック」の説明として、最も適切なものを選べ。",choices:["コンピュータのメモリ容量が不足し、知識を保存できなくなる問題","専門家の持つ暗黙的な知識を聞き出してルールとして記述する作業が極めて困難であるという問題","学習データが少なすぎてニューラルネットワークの精度が上がらない問題","推論エンジンの計算速度が遅く、リアルタイムの応答ができない問題"],answerIndex:1,explanation:"知識獲得のボトルネックとは、専門家へのヒアリングを通じて暗黙知を形式的なルールへ変換する作業が困難で、さらに知識が増えると一貫性の維持・保守も難しくなる問題を指す。これが第2次AIブーム終焉の主因となった。ハードウェアの容量や速度の問題ではなく、またニューラルネットワークの学習データ不足とも別の話である点に注意。"},{id:"ai-basics-q14",chapterId:"ai-basics",question:"1984年に開始され、人間が持つ一般常識を全てコンピュータに記述しようとしている長期プロジェクトとして、最も適切なものを選べ。",choices:["Cycプロジェクト","第五世代コンピュータプロジェクト","ヒトゲノムプロジェクト","アポロ計画"],answerIndex:0,explanation:"Cyc(サイク)プロジェクトはダグラス・レナートが1984年に開始した、一般常識を網羅的に記述する試みで、現在も完了していないことで知られる。第五世代コンピュータプロジェクトは日本が推進した推論マシン開発の国家プロジェクトで、常識の記述が目的ではない。ヒトゲノムプロジェクトとアポロ計画はAIとは分野が異なる。"},{id:"ai-basics-q15",chapterId:"ai-basics",question:"意味ネットワークにおいて、「ペンギンは鳥である」のような継承関係を表す関係として、最も適切なものを選べ。",choices:["part-of","has-a","is-a","instance-of属性のみで表現され関係名は存在しない"],answerIndex:2,explanation:"「〜である」という継承関係はis-aで表し、下位概念は上位概念の属性を引き継ぐ。一方「目は頭部の一部である」のような全体と部分の関係はpart-ofで表す。is-aとpart-ofの使い分けは意味ネットワーク・オントロジー分野の最頻出ポイント。has-aはオブジェクト指向設計などで使われる表現で、意味ネットワークの代表関係として問われるのはis-aとpart-ofである。"},{id:"ai-basics-q16",chapterId:"ai-basics",question:"「課題の遂行に関係のある事柄だけを選び出して考慮することが、機械には本質的に難しい」というAIの難問として、最も適切なものを選べ。",choices:["シンボルグラウンディング問題","知識獲得のボトルネック","次元の呪い","フレーム問題"],answerIndex:3,explanation:"フレーム問題は、行動に関係する事柄と無関係な事柄を区別して考慮する範囲(フレーム)を適切に定めることが機械には難しいという根源的難問で、デネットの爆弾とロボットの思考実験で説明される。シンボルグラウンディング問題は記号と実世界の対象の結び付きの問題、知識獲得のボトルネックは知識の記述の困難さの問題であり、考慮範囲の選択の問題ではない。"},{id:"ai-basics-q17",chapterId:"ai-basics",question:"シンボルグラウンディング問題の説明として、最も適切なものを選べ。",choices:["AIが自分自身より賢いAIを作り出すことで知能が爆発的に向上する問題","記号(シンボル)と、それが意味する実世界の対象とを結び付けることができるかという問題","ロボットが行動する際に考慮すべき事柄の範囲を決められないという問題","学習済みモデルの判断根拠を人間が解釈できないという問題"],answerIndex:1,explanation:"シンボルグラウンディング問題はハルナッドが提起したもので、「シマウマ=縞のある馬」と記号的に教わっても、実物のシマウマと記号が結び付かなければ本当に理解したとは言えない、という問題である。選択肢Aはシンギュラリティ、選択肢Cはフレーム問題、選択肢Dはブラックボックス問題(説明可能性)の説明であり、いずれも別の概念。"},{id:"ai-basics-q18",chapterId:"ai-basics",question:"アラン・チューリングが提案した、機械に知能があるかを判定する方法の説明として、最も適切なものを選べ。",choices:["判定者が文字による対話を行い、相手が機械か人間かを見分けられなければ、その機械は知的であるとみなす","機械が囲碁やチェスで人間のチャンピオンに勝利できれば、知的であるとみなす","機械が自然言語の文章を文法的に正しく生成できれば、知的であるとみなす","機械の内部構造が人間の脳の神経回路と一致していれば、知的であるとみなす"],answerIndex:0,explanation:"チューリングテストは、判定者がディスプレイ越しの対話で相手を人間か機械か識別できなければ機械に知能があるとみなす行動主義的なテストである。このテストを競う大会としてローブナーコンテストが1991年から開催されている点もセットで頻出。ゲームでの勝利や内部構造の類似は判定基準ではなく、サールは中国語の部屋によってこのテストの妥当性を批判した。"},{id:"ai-basics-q19",chapterId:"ai-basics",question:"ジョン・サールが「中国語の部屋」の思考実験によって主張した内容として、最も適切なものを選べ。",choices:["十分な計算能力があれば機械は人間と同等の精神を持つことができる","中国語のような複雑な言語は機械翻訳が原理的に不可能である","記号を規則に従って操作できることと、その意味を理解していることは別である","機械が知的かどうかは対話によってのみ判定できる"],answerIndex:2,explanation:"中国語の部屋では、中国語を理解しない人がマニュアルに従って適切な返答を作れることから、記号操作(構文)の遂行は意味理解(意味論)を伴わないとサールは論じた。これは「適切にプログラムされた計算機は精神を持つ」という強いAIへの批判であり、チューリングテスト合格が理解の証明にならないことを示す議論である。機械翻訳の不可能性を主張したものではない。"},{id:"ai-basics-q20",chapterId:"ai-basics",question:"レイ・カーツワイルのシンギュラリティ(技術的特異点)に関する記述として、最も適切なものを選べ。",choices:["2025年にAIが人類の全ての職業を代替すると予測した","AIの研究開発を国際条約によって停止すべき時点を指す","コンピュータの記憶容量が人間の脳を超える時点を指し、1997年に到来したとされる","AIが自分自身より賢いAIを作れるようになり知能が爆発的に向上する転換点で、2045年に到来すると予測した"],answerIndex:3,explanation:"カーツワイルは、AIが自己改善を繰り返して知能が爆発的に向上する技術的特異点(シンギュラリティ)が2045年に到来し、それに先立ち2029年には人間並みのAIが実現すると予測した。2029年と2045年という2つの年号の組み合わせが頻出。研究停止の条約や記憶容量の比較といった定義は誤りで、職業代替の予測はオズボーンらの雇用に関する研究と混同しやすいので注意。"},{id:"ai-basics-q21",chapterId:"ai-basics",question:"1997年にチェスの世界王者ガルリ・カスパロフに勝利した、IBMが開発したコンピュータとして、最も適切なものを選べ。",choices:["AlphaGo","ディープブルー","ワトソン","東ロボくん"],answerIndex:1,explanation:"ディープブルーはIBMが開発したチェス専用コンピュータで、1997年に当時の世界王者カスパロフに勝利した。選択肢AのAlphaGoは2016年に囲碁でイ・セドルを破ったDeepMindのAIであり対象ゲームと時代が異なる。選択肢Cのワトソンはクイズ番組の質問応答システム、選択肢Dの東ロボくんは大学入試に挑むプロジェクトであり、いずれもチェスAIではない。"},{id:"ai-basics-q22",chapterId:"ai-basics",question:"深層学習とモンテカルロ木探索を組み合わせ、2016年に囲碁のトップ棋士イ・セドルに勝利したAIとして、最も適切なものを選べ。",choices:["ディープブルー","ワトソン","AlphaGo","ELIZA"],answerIndex:2,explanation:"AlphaGoはDeepMindが開発した囲碁AIで、深層学習による局面評価とモンテカルロ木探索を組み合わせ、2016年にイ・セドルに勝利した。選択肢Aのディープブルーはチェスでカスパロフに勝ったが探索ベースで深層学習は用いていない。選択肢Bのワトソンは質問応答、選択肢DのELIZAは対話プログラムであり、いずれも囲碁AIではない。"},{id:"ai-basics-q23",chapterId:"ai-basics",question:"2011年にクイズ番組『Jeopardy!』で人間のチャンピオンに勝利したIBMの質問応答システムとして、最も適切なものを選べ。",choices:["DENDRAL","MYCIN","ディープブルー","ワトソン"],answerIndex:3,explanation:"ワトソン(Watson)は、ウィキペディアなどから構築したライトウェイトオントロジーを活用し、質問に関連性の高い解答を高速に検索する質問応答システムで、2011年にJeopardy!で勝利した。質問の意味を本当に理解しているわけではない点が重要。選択肢AのDENDRALと選択肢BのMYCINは第2次ブームのエキスパートシステム、選択肢CのディープブルーはチェスAIであり、クイズの質問応答システムではない。"},{id:"ai-basics-q24",chapterId:"ai-basics",question:"国立情報学研究所が中心となって進めた「ロボットは東大に入れるか」プロジェクト(東ロボくん)に関する記述として、最も適切なものを選べ。",choices:["文章の意味を理解する読解力に限界があり、東大合格の目標は断念された","東京大学の入学試験に合格し、実際に学籍を取得した","囲碁と将棋でプロ棋士に勝利することを目的としていた","人間の感情を認識する対話ロボットの開発を目的としていた"],answerIndex:0,explanation:"東ロボくんは模試で私立大学に合格できる偏差値水準を記録したが、文章の意味を理解する読解力に本質的な限界があり、東大合格の目標は断念された。選択肢Bのように合格・学籍取得をした事実はない。選択肢Cのボードゲームでの勝利や選択肢Dの感情認識ロボットはプロジェクトの目的ではなく、現在のAIの「意味理解」の難しさを示す事例として頻出する。"},{id:"ai-basics-q25",chapterId:"ai-basics",question:"「前提条件」「行動」「結果」の3つの組み合わせで行動計画を記述する、プランニング研究の代表的な手法として、最も適切なものを選べ。",choices:["Cyc","STRIPS","SHRDLU","MYCIN"],answerIndex:1,explanation:"STRIPSはファイクスとニルソンが開発した、前提条件・行動・結果の3要素で行動を記述してプランニングを行う手法である。選択肢CのSHRDLUは積み木の世界を操作する対話システム、選択肢AのCycは一般常識を記述するプロジェクト、選択肢DのMYCINは感染症診断のエキスパートシステムであり、行動計画の記述手法ではない。"},{id:"ai-basics-q26",chapterId:"ai-basics",question:"テリー・ウィノグラードが開発した、コンピュータ上の「積み木の世界」を英語の指示で操作できる対話システムとして、最も適切なものを選べ。",choices:["STRIPS","ELIZA","SHRDLU","ロジック・セオリスト"],answerIndex:2,explanation:"SHRDLUはウィノグラードが開発したシステムで、限定された積み木の世界であれば英語による指示の理解と行動計画が可能なことを示した。選択肢AのSTRIPSは行動計画の記述手法であり対話システムではない。選択肢BのELIZAはパターン応答の対話プログラムで積み木操作はできず、選択肢Dのロジック・セオリストは定理証明プログラムである。"},{id:"ai-basics-q27",chapterId:"ai-basics",question:"ロボットの行動計画のように、初期状態から目標状態に至るまでの行動の系列を探索によって立案する技術として、最も適切なものを選べ。",choices:["クラスタリング","アノテーション","オントロジー","プランニング"],answerIndex:3,explanation:"プランニングは、初期状態から目標状態に到達するための行動の系列を探索を用いて立案する技術で、STRIPSがその代表的な記述手法である。選択肢Aのクラスタリングはデータのグループ分け、選択肢Bのアノテーションはデータへのラベル付け、選択肢Cのオントロジーは概念や関係の体系的記述であり、いずれも行動系列を立案する技術ではない。"},{id:"ai-basics-q28",chapterId:"ai-basics",question:"正しさは保証されないが、経験的に探索を効率化できる経験則を指す用語として、最も適切なものを選べ。",choices:["ヒューリスティックな知識","メタ知識","形式知","宣言的知識"],answerIndex:0,explanation:"ヒューリスティックな知識とは、最適性が保証されているわけではないが経験的に探索を効率化できる経験則のことで、ボードゲームAIの評価関数の設計などに使われてきた。選択肢Bのメタ知識は知識についての知識、選択肢Cの形式知は言語化された知識、選択肢Dの宣言的知識は事実を表す知識であり、いずれも「経験的な探索効率化の知識」を直接指す用語ではない。"},{id:"ai-basics-q29",chapterId:"ai-basics",question:"将棋や囲碁を全ての手についてしらみつぶしに探索できない主な理由として、最も適切なものを選べ。",choices:["評価関数を数値で表現できないため","探索すべき状態の数が指数関数的に増大し、現実的な時間で計算しきれなくなるため(組合せ爆発)","盤面の状態を木構造で表現できないため","幅優先探索が原理的に適用できないため"],answerIndex:1,explanation:"手を進めるごとに分岐が掛け合わされ、探索すべき状態数が指数関数的に増大して現実的な時間では計算しきれなくなる現象を組合せ爆発という。これが総当たり探索を不可能にし、αβ法やモンテカルロ木探索などの効率化が必要になる理由である。選択肢Aや選択肢Cのように評価関数や木構造で表現できないわけではなく、選択肢Dのように幅優先探索が適用不能なわけでもない。"},{id:"ai-basics-q30",chapterId:"ai-basics",question:"「知能が成立するためには身体が不可欠であり、身体を通じた外界との相互作用が概念獲得に重要である」とする考え方として、最も適切なものを選べ。",choices:["フレーム問題","AI効果","身体性(身体知)","シンギュラリティ"],answerIndex:2,explanation:"身体性(身体知)とは、知能の成立に身体が不可欠であり、身体を通じた外界とのインタラクションによって概念を獲得するという考え方で、シンボルグラウンディング問題の解決につながると期待されている。選択肢Aのフレーム問題は考慮範囲の選択の難問、選択肢BのAI効果は社会の認識変化、選択肢Dのシンギュラリティは知能爆発の転換点であり、いずれも身体の役割を論じる概念ではない。"},{id:"ai-basics-q31",chapterId:"ai-basics",question:"1982年に日本の通商産業省(当時)が主導し、推論を高速に実行する並列計算機の開発を目指した国家プロジェクトとして、最も適切なものを選べ。",choices:["Cycプロジェクト","ダートマス会議","ローブナーコンテスト","第五世代コンピュータプロジェクト"],answerIndex:3,explanation:"第五世代コンピュータプロジェクトは、第2次AIブーム期の1982年に日本の通商産業省が主導し、約570億円を投じて推論を高速実行する並列計算機の開発を目指した国家プロジェクトである。選択肢AのCycは米国の常識記述プロジェクト、選択肢Bのダートマス会議は1956年の研究会議、選択肢Cのローブナーコンテストはチューリングテストを競う大会であり、日本の国家プロジェクトではない。"},{id:"ai-basics-q32",chapterId:"ai-basics",question:"「あらゆる問題に対して常に他より優れた万能のアルゴリズムは存在しない」ことを示す定理として、最も適切なものを選べ。",choices:["ノーフリーランチ定理","ベイズの定理","中心極限定理","ベルマン方程式"],answerIndex:0,explanation:"ノーフリーランチ定理は、すべての問題で一様に最良となる万能のアルゴリズムは存在せず、ある問題で優れた手法は別の問題では劣りうることを示す定理である。選択肢Bのベイズの定理は条件付き確率の計算法、選択肢Cの中心極限定理は標本平均の分布に関する定理、選択肢Dのベルマン方程式は強化学習の価値計算の式であり、万能アルゴリズムの不在を述べるものではない。"},{id:"ai-basics-q33",chapterId:"ai-basics",question:"「何らかの仮定(特徴の重み付け)を置かなければ、対象を分類することは原理的に不可能である」ことを示す定理として、最も適切なものを選べ。",choices:["ノーフリーランチ定理","醜いアヒルの子の定理","バーニーおじさんのルール","モラベックのパラドックス"],answerIndex:1,explanation:"醜いアヒルの子の定理は、特徴に何らかの重み付けや前提を置かなければ全ての対象は互いに同程度に似ており、分類は原理的に不可能であることを示す。選択肢Aのノーフリーランチ定理は万能アルゴリズムの不在を述べる別の定理で、両者は対で問われやすい。選択肢Cのバーニーおじさんのルールは必要データ量の経験則、選択肢Dのモラベックのパラドックスは人間に易しい作業がAIには難しいという指摘である。"},{id:"ai-basics-q34",chapterId:"ai-basics",question:"ティム・バーナーズ=リーが提唱した、ウェブページの内容に意味(メタデータ)を付与し、コンピュータが情報の意味を扱えるようにする取り組みとして、最も適切なものを選べ。",choices:["セマンティックHTML","ダークウェブ","セマンティックWeb","ディープラーニング"],answerIndex:2,explanation:"セマンティックWebは、ウェブ上の情報に意味を表すメタデータを付与し、コンピュータが内容の意味を解釈・処理できるようにすることを目指す取り組みで、ティム・バーナーズ=リーが提唱した。選択肢AのセマンティックHTMLは文書構造を意味付けするマークアップの書き方であり、ウェブ全体の意味処理を目指す枠組みではない。選択肢Bのダークウェブや選択肢Dのディープラーニングは無関係の概念である。"},{id:"ai-basics-q35",chapterId:"ai-basics",question:"オントロジー構築における「ヘビーウェイトオントロジー」と「ライトウェイトオントロジー」の説明として、最も適切なものを選べ。",choices:["ヘビーウェイトは半自動で構築され、ライトウェイトは人手で厳密に構築される","ヘビーウェイトは画像認識用、ライトウェイトは音声認識用に使い分けられる","両者に違いはなく、規模の大小を表す呼称にすぎない","ヘビーウェイトは哲学的考察を重視し人手で厳密に記述する立場、ライトウェイトは完全に正しくなくても使えればよいとして半自動で構築する立場である"],answerIndex:3,explanation:"ヘビーウェイトオントロジーは哲学的考察を重視して人手で厳密に記述する立場でCycが代表例、ライトウェイトオントロジーは完全な正しさより実用性を優先しウェブマイニングなどで半自動構築する立場である。選択肢Aは両者の構築方法が逆になっており、選択肢Bの用途による区別や選択肢Cの「違いはない」は誤りである。"},{id:"ai-basics-q36",chapterId:"ai-basics",question:"ジョン・サールによる「強いAI」と「弱いAI」の区別の説明として、最も適切なものを選べ。",choices:["強いAIは適切にプログラムされた計算機が精神を持ちうるとする立場、弱いAIは計算機は知能を研究する有用な道具にすぎないとする立場である","強いAIは計算能力の高いハードウェア、弱いAIは計算能力の低いハードウェアを指す","強いAIは特化型AI、弱いAIは汎用AIの別名である","強いAIは教師あり学習、弱いAIは教師なし学習を用いるAIを指す"],answerIndex:0,explanation:"サールは、適切にプログラムされた計算機は精神(理解)を持ちうるとする立場を強いAI、計算機は知能研究の有用な道具にすぎないとする立場を弱いAIと区別し、中国語の部屋によって強いAIを否定した。選択肢Bのハードウェア性能や選択肢Dの学習方式による区別ではない。選択肢Cの特化型・汎用AIの区別はAGIをめぐる別の分類であり、強いAI・弱いAIとは混同しやすいので注意。"},{id:"ai-basics-q37",chapterId:"ai-basics",question:"ニューウェルとサイモンが開発し、ダートマス会議でデモされた世界初のAIプログラムとされるものとして、最も適切なものを選べ。",choices:["ロジック・セオリスト","パーセプトロン","DENDRAL","SHRDLU"],answerIndex:0,explanation:"ロジック・セオリストはニューウェルとサイモンが開発し、数学の定理を自動で証明してみせた世界初のAIプログラムとされ、ダートマス会議でデモされた。選択肢Bのパーセプトロンはローゼンブラットが考案した学習機械、選択肢CのDENDRALは分子構造推定のエキスパートシステム、選択肢DのSHRDLUは積み木世界の対話システムであり、いずれも「世界初のAIプログラム」として問われる対象ではない。"},{id:"ai-basics-q38",chapterId:"ai-basics",question:"チューリングテストの合格を競う大会として1991年から開催されているものとして、最も適切なものを選べ。",choices:["ILSVRC","ローブナーコンテスト","ダートマス会議","ICPC"],answerIndex:1,explanation:"ローブナーコンテストは、チューリングテストに基づき、対話によって人間と機械を見分けられるかを競う大会で1991年から開催されている。選択肢AのILSVRCは画像認識の精度を競うコンテストでチューリングテストとは無関係、選択肢Cのダートマス会議は研究会議であって競技会ではなく、選択肢DのICPCはプログラミングコンテストである。"},{id:"ai-basics-q39",chapterId:"ai-basics",question:"エキスパートシステムの基本構成に関する記述として、最も適切なものを選べ。",choices:["大量の画像データから特徴量を自動で抽出する層が中核となる","報酬を最大化する方策を試行錯誤で学習する仕組みが中核となる","知識をルールとして蓄える知識ベースと、それを用いて結論を導く推論エンジンが分離されている","正解ラベル付きデータから境界を学習する分類器が中核となる"],answerIndex:2,explanation:"エキスパートシステムは、専門家の知識を「もし〜ならば〜」のルールとして蓄える知識ベースと、それを使って結論を導く推論エンジンが分離している点が特徴で、知識の追加・修正を推論の仕組みと独立に行える。選択肢Aの特徴量の自動抽出は深層学習、選択肢Bの方策学習は強化学習、選択肢Dの境界学習は教師あり学習の分類器の説明であり、エキスパートシステムの構成ではない。"},{id:"ai-basics-q40",chapterId:"ai-basics",question:"フレーム理論を提唱し、AI研究の黎明期を支えた人物として知られ、ダートマス会議の発起人の一人でもある研究者として、最も適切なものを選べ。",choices:["アラン・チューリング","ジョセフ・ワイゼンバウム","レイ・カーツワイル","マービン・ミンスキー"],answerIndex:3,explanation:"マービン・ミンスキーは知識を構造化して表現するフレーム理論を提唱し、AI研究の黎明期を主導した人物で、ダートマス会議の発起人の一人でもある。選択肢Aのチューリングはチューリングテストの提案者、選択肢BのワイゼンバウムはELIZAの開発者、選択肢Cのカーツワイルはシンギュラリティの提唱者であり、フレーム理論の提唱者ではない。"}],contrasts:[{title:"探索の基本戦略",left:{label:"幅優先探索",traits:["近い順に全部調べる","最短経路を保証","メモリ消費が大きい"]},right:{label:"深さ優先探索",traits:["一本道を深く進む","メモリ効率が良い","最短の保証なし"]},point:"「確実さの幅優先、省メモリの深さ優先」とセットで覚える"},{title:"サールによるAIの区別",left:{label:"強いAI",traits:["計算機は精神を持ちうる","中国語の部屋で否定された"]},right:{label:"弱いAI",traits:["計算機は知能研究の道具","サールが支持した立場"]},point:"精神の有無をめぐる哲学的立場の区別で、特化型・汎用AIの分類とは別物"},{title:"AIの2大難問",left:{label:"フレーム問題",traits:["考慮範囲を選べない","デネットの爆弾とロボット"]},right:{label:"シンボルグラウンディング問題",traits:["記号と実世界が結び付かない","ハルナッドが提起","シマウマ=縞のある馬の例"]},point:"「範囲の選択」ならフレーム、「記号と意味の結び付き」ならグラウンディング"},{title:"ブーム終焉の理由",left:{label:"第1次ブームの終焉",traits:["トイプロブレムしか解けず","現実の複雑な問題に無力"]},right:{label:"第2次ブームの終焉",traits:["知識獲得のボトルネック","人手のルール記述に限界"]},point:"探索の限界が第1次、知識記述の限界が第2次と原因を対応させる"},{title:"ゲームAIの局面評価",left:{label:"ミニマックス法",traits:["最大・最小を仮定し先読み","評価関数を人手で設計","αβ法で枝刈りできる"]},right:{label:"モンテカルロ法",traits:["ランダムにプレイアウト","勝率で局面を評価","評価関数の設計が不要"]},point:"評価関数を人が作るか、ランダム試行の勝率に任せるかで見分ける"},{title:"機械学習の限界を示す2定理",left:{label:"ノーフリーランチ定理",traits:["万能アルゴリズムは不在","問題ごとに得意不得意"]},right:{label:"醜いアヒルの子の定理",traits:["仮定なしの分類は不可能","特徴の重み付けが必須"]},point:"「アルゴリズム」の話がノーフリーランチ、「分類・特徴」の話がアヒルの子"}]},tf={id:"ml",number:2,title:"機械学習",subtitle:"学習の種類・代表手法・モデル評価",sections:[{title:"機械学習の3つの種類",points:["教師あり学習は、入力データと正解ラベルのペアを与えて、入力から出力を予測する関数を学習する。出力が連続値なら回帰(売上予測など)、カテゴリなら分類(スパム判定など)と呼ぶ。","教師なし学習は正解ラベルを与えず、データそのものが持つ構造やパターンを発見する。代表タスクはデータをグループに分けるクラスタリングと、情報をなるべく保ったまま変数の数を減らす次元削減。","強化学習は、エージェントが環境の中で行動し、得られる報酬が最大になる行動方針(方策)を試行錯誤で学習する枠組み。正解を直接教わるのではなく、行動の結果としての報酬から学ぶ点が教師あり学習と異なる。","強化学習では状態・行動・報酬の3要素が基本となり、目先の報酬ではなく将来にわたる報酬の合計(収益)を最大化する。新しい行動を試す「探索」と現在の知識で良い行動を選ぶ「活用」のバランスが重要となる。","同じ「データから学ぶ」でも、教師あり学習は予測、教師なし学習は構造発見、強化学習は行動の最適化と、目的が異なる。問題文がどれに該当するか見分けられるようにしておく。"],summary:"教師あり=ラベルからの予測、教師なし=構造発見、強化学習=報酬最大化の行動学習という目的の違いで見分ける。教師ありは出力が連続値なら回帰、カテゴリなら分類。強化学習は状態・行動・報酬の3要素と、探索と活用のバランスが頻出。"},{title:"教師あり学習の代表手法",points:["線形回帰は、入力変数の重み付き和で連続値を予測する最も基本的な回帰手法。予測値と実測値の誤差の二乗和を最小にするようにパラメータを求める方法を最小二乗法と呼ぶ。","ロジスティック回帰は「回帰」という名前だが分類に使う手法。線形回帰の出力をシグモイド関数(ロジスティック関数)に通して0〜1の確率に変換し、閾値で2クラスに分類する。多クラスへの拡張にはソフトマックス関数を使う。","k近傍法(k-NN)は、予測したいデータに距離が近いk個の訓練データの多数決でクラスを決める手法。学習時にモデルを作らない怠惰学習であり、kの値によって結果が変わる。","サポートベクターマシン(SVM)は、クラス間の境界と最も近いデータ点(サポートベクトル)との距離(マージン)を最大化する境界を求める手法。誤分類をある程度許容する仕組みをスラック変数による緩和という。","カーネル法(カーネルトリック)は、線形分離できないデータを高次元空間に写像して線形分離可能にするSVMの拡張。写像後の内積をカーネル関数で直接計算するため、高次元化による計算量の爆発を回避できる。","決定木は、不純度(ジニ係数やエントロピー)が最も下がる条件でデータを順に分割していく木構造のモデル。条件分岐をたどるだけなので結果の解釈がしやすく、特徴量の標準化が不要という利点がある。"],summary:"ロジスティック回帰は名前に反して分類手法、という定番のひっかけに注意。SVMはマージン最大化が核で、線形分離できないデータにはカーネル法(カーネルトリック)で対応する。学習時にモデルを作らない怠惰学習のk-NN、不純度で分割し解釈しやすい決定木も頻出。"},{title:"アンサンブル学習",points:["アンサンブル学習は、複数のモデル(弱学習器)を組み合わせて単体より高い精度を得る考え方。組み合わせ方の代表がバギングとブースティングである。","バギングは、訓練データからの復元抽出(ブートストラップサンプリング)で複数のデータセットを作り、それぞれでモデルを並列に学習して多数決や平均で予測する。学習器同士が独立なので並列計算でき、バリアンス(予測のばらつき)を下げる効果がある。","ランダムフォレストは、バギングに加えて各決定木の分割時に使う特徴量もランダムに選ぶことで、木同士の相関を下げた手法。過学習しにくく、特徴量の重要度も算出できる。","ブースティングは、前のモデルが間違えたデータを重視しながらモデルを逐次的に追加していく手法。直列に学習するため並列化しにくいが、一般にバギングより高い精度が期待できる。","AdaBoostは誤分類したデータの重みを増やして次の弱学習器を学習させるブースティングの代表手法。勾配ブースティングは誤差(残差)を新しいモデルで予測して修正を重ねる手法で、実装としてXGBoostやLightGBMが広く使われる。","バギングは「並列・バリアンス低減」、ブースティングは「逐次・バイアス低減」と対で整理すると覚えやすい。"],summary:"バギング=並列・バリアンス低減、ブースティング=逐次・バイアス低減の対で整理するのが鉄則。ランダムフォレストはバギングに特徴量のランダム選択を加えた手法。誤分類の重みを増やすAdaBoostと、残差を修正する勾配ブースティング(XGBoost・LightGBM)が代表。"},{title:"教師なし学習の手法",points:["k-means法は、あらかじめ指定したk個のクラスタ中心をランダムに置き、「各点を最も近い中心に割り当てる→中心を割り当てられた点の重心に更新する」を収束まで繰り返す非階層的クラスタリング。クラスタ数kを人間が事前に決める必要がある。","階層的クラスタリングは、最も近いクラスタ同士を順に併合していき、その過程を樹形図(デンドログラム)で表す手法。デンドログラムを途中の高さで切ることで任意のクラスタ数を後から選べる。クラスタ間距離の測り方にはウォード法や最短距離法などがある。","主成分分析(PCA)は、データの分散が最大になる方向(主成分)を順に見つけて少数の変数に要約する線形の次元削減手法。各主成分が元の分散をどれだけ説明するかは寄与率で表す。","t-SNEは高次元データを2〜3次元に圧縮して可視化するための非線形の次元削減手法。局所的な近さの関係を保つことが得意で、PCAでは捉えられない非線形構造の可視化に向く。","協調フィルタリングは、「あなたと購買履歴が似ているユーザーが買った商品」を推薦するように、ユーザー間やアイテム間の類似度を利用する推薦手法。利用履歴のない新規ユーザーや新商品には推薦できないコールドスタート問題があり、商品の内容(属性)に基づくコンテンツベースフィルタリングと対比される。"],summary:"k-meansはクラスタ数kを事前指定、階層的クラスタリングはデンドログラムで後からクラスタ数を選べる点が対照的。次元削減は線形のPCA(分散最大の方向・寄与率)と可視化向け非線形のt-SNEを区別する。協調フィルタリングのコールドスタート問題と、コンテンツベースフィルタリングとの対比が頻出。"},{title:"モデルの評価と汎化",points:["過学習(オーバーフィッティング)は訓練データに適合しすぎて未知データへの性能(汎化性能)が落ちる状態。逆に訓練データにすら適合できていない状態を未学習(アンダーフィッティング)という。","正則化は、損失関数にパラメータの大きさに応じたペナルティ項を加えて過学習を抑える手法。L1正則化(回帰ではラッソ回帰)は一部の係数をちょうど0にするため特徴量選択の効果があり、L2正則化(リッジ回帰)は係数全体を滑らかに小さくする。","汎化性能の評価では、データを訓練データとテストデータに一度だけ分けるホールドアウト法と、データをk個に分割してテスト役を交代しながらk回評価するk-分割交差検証がある。さらにハイパーパラメータ調整用に検証データを分けるのが一般的で、テストデータは最終評価まで使わない。","分類結果は混同行列(TP・FP・FN・TN)で整理する。正解率は全体のうち正しく予測できた割合、適合率は陽性と予測した中の正解の割合、再現率は実際の陽性のうち見つけられた割合、F値は適合率と再現率の調和平均である。適合率と再現率はトレードオフの関係にあり、病気の見逃しを防ぎたい場合は再現率を重視する。","ROC曲線は分類の閾値を変えながら偽陽性率を横軸、真陽性率を縦軸にプロットした曲線で、その下側の面積AUCが1に近いほど良いモデル、0.5でランダム予測と同等とされる。クラスが不均衡なデータでは正解率だけでの評価は不適切。","その他の重要概念として、テストデータの情報が学習時に紛れ込み評価が不当に良くなるデータリーケージ、特徴量(次元)が増えるほど必要なデータ量が爆発的に増える次元の呪い、生データから予測に有効な特徴量を設計する特徴量エンジニアリングを押さえておく。"],summary:"L1(ラッソ)=係数を0にして特徴量選択、L2(リッジ)=滑らかに小さくする、の対応が最頻出。評価指標は見逃し防止なら再現率、誤検出防止なら適合率で、両者はトレードオフ(調和平均がF値)。AUCは1に近いほど良く0.5でランダム同等、不均衡データでは正解率だけの評価は不適切。"},{title:"回帰分析を掘り下げる",points:["回帰は説明変数の数で呼び分ける。説明変数が1つなら単回帰、2つ以上なら重回帰という。直線では表せない関係を捉えるため説明変数を2乗・3乗の項に拡張したものが多項式回帰で、次数を上げすぎると過学習しやすい。","線形回帰のパラメータは、予測値と実測値の差(残差)の二乗和を最小化する最小二乗法で求める。誤差が正規分布に従うと仮定すれば、最小二乗法は最尤推定と一致する。","重回帰では多重共線性に注意が必要。説明変数同士の相関が強いと回帰係数の推定が不安定になり、係数の符号や大きさの解釈が困難になる。相関の高い変数を削除するか正則化で対処する。","リッジ回帰はL2正則化を加えた回帰で、係数全体を滑らかに小さく抑えて過学習と多重共線性を緩和するが、係数はちょうど0にはなりにくい。","ラッソ回帰はL1正則化を加えた回帰で、一部の係数をちょうど0にするため不要な特徴量を自動的に除外でき、特徴量選択の効果がある(スパースなモデル)。","Elastic Net(エラスティックネット)はL1正則化とL2正則化を組み合わせた回帰で、ラッソの特徴量選択とリッジの安定性の両方の利点を得ようとする手法。相関の強い変数群がある場合に有効とされる。","回帰の評価指標には、誤差を二乗して平均し平方根をとるRMSE(外れ値の影響を受けやすい)、誤差の絶対値の平均であるMAE(外れ値に比較的頑健)、モデルが目的変数の分散をどれだけ説明できるかを0〜1で表す決定係数R²(1に近いほど良い)がある。"],summary:"説明変数1つの単回帰、複数の重回帰、非線形を捉える多項式回帰を区別する。パラメータ推定は最小二乗法、過学習・多重共線性対策が正則化回帰で、Ridge(L2・滑らかに縮小)、Lasso(L1・係数を0にして特徴量選択)、Elastic Net(両者の融合)を押さえる。評価指標は外れ値に弱いRMSE、頑健なMAE、説明力のR²。"},{title:"分類の評価を掘り下げる",points:["混同行列は予測と実際の組み合わせを4区分で整理する。真陽性TP(陽性を正しく陽性と予測)、偽陽性FP(陰性を誤って陽性と予測=誤検出)、偽陰性FN(陽性を誤って陰性と予測=見逃し)、真陰性TN(陰性を正しく陰性と予測)。","正解率(Accuracy)=(TP+TN)/全体は、全予測のうち正しかった割合。直感的だが、陽性が極端に少ない不均衡データでは「全て陰性」と予測しても高くなり、性能を正しく表さない。","適合率(Precision)=TP/(TP+FP)は、陽性と予測した中で実際に陽性だった割合。誤検出(偽陽性)を減らしたいとき、例えば重要メールをスパムと誤判定したくない場合に重視する。","再現率(Recall)=TP/(TP+FN)は、実際の陽性のうち正しく拾えた割合。見逃し(偽陰性)を減らしたいとき、例えば病気のスクリーニングで患者を見逃したくない場合に重視する。","適合率と再現率はトレードオフの関係にある(閾値を上げれば適合率が上がり再現率が下がる)。両者のバランスを見る指標がF値(F1スコア)で、適合率と再現率の調和平均として定義される。","ROC曲線は分類の閾値を変えながら偽陽性率(横軸)と真陽性率(縦軸)の軌跡を描いた曲線で、その下側の面積であるAUCが1に近いほど良く、0.5でランダム予測と同等。閾値に依存しない総合評価ができ、不均衡データでも有効とされる。","多クラス分類の指標の平均化には2方式がある。マクロ平均はクラスごとに指標を計算してから単純平均するため各クラスを対等に扱い少数クラスを反映しやすい。マイクロ平均は全サンプルをまとめて集計するためサンプル数の多いクラスの影響が大きい。不均衡データではSMOTE(少数派を補間して合成するオーバーサンプリング)などで対処する。"],summary:"混同行列のTP/FP/FN/TNの4区分が出発点。正解率は不均衡データで当てにならず、誤検出を抑えるなら適合率、見逃しを抑えるなら再現率、両者の調和平均がF値。ROC曲線のAUCは1に近いほど良く0.5でランダム同等。多クラスはマクロ平均(対等)とマイクロ平均(サンプル数依存)を区別し、不均衡はSMOTEで対処する。"},{title:"次元削減を掘り下げる",points:["次元削減は、情報をできるだけ保ったまま特徴量(変数)の数を減らす技術。可視化のしやすさ、計算量の削減、そして特徴量が増えるほど必要データ量が爆発する「次元の呪い」の緩和を目的とする。","主成分分析(PCA)は、データの分散が最大になる方向を第1主成分とし、それに直交する中で次に分散が大きい方向を第2主成分…と順に求める線形手法。少数の主成分でデータを要約する。","各主成分が元データの分散のうちどれだけを説明するかを寄与率といい、上位の主成分の寄与率を足し合わせた累積寄与率が一定割合(例えば80%)に達するまでの主成分を残す、といった使い方をする。","特異値分解(SVD)は任意の行列を3つの行列の積に分解する手法で、大きな特異値だけを残すことで低ランク近似・次元削減ができる。PCAは共分散行列に対する固有値分解(=SVD)として理解でき、レコメンデーションの行列分解にも応用される。","t-SNEは高次元データ間の「近さ」の関係を確率的に表し、それを低次元でも保つように配置する非線形手法で、主に2〜3次元への可視化に使う。PCAでは捉えにくい非線形なクラスタ構造を見やすくできる。","線形判別分析(LDA)は、クラス間の分散を最大化しクラス内の分散を最小化する軸を求める教師ありの手法。ラベルを使わず全体の分散最大方向を探すPCA(教師なし)と異なり、クラスの分離に有利な方向へ次元を削減する。","PCAとLDAはともに線形の次元削減だが、PCAは「データ全体のばらつきを残す(教師なし)」、LDAは「クラスを分けやすくする(教師あり)」と目的が異なる点が対比として頻出する。"],summary:"次元削減は次元の呪いの緩和・可視化・計算量削減が目的。線形のPCAは分散最大の主成分を順に取り、寄与率・累積寄与率で残す数を決める。特異値分解SVDは行列を3分解して低ランク近似、t-SNEは非線形で2〜3次元の可視化向き。LDAは教師ありでクラス間分散最大・クラス内分散最小、教師なしのPCAと目的が対照的。"},{title:"アンサンブルとブースティングの発展",points:["アンサンブル学習は複数の弱学習器を組み合わせて単体より高精度を狙う考え方で、組み合わせ方の3系統がバギング・ブースティング・スタッキング。","バギングは訓練データから復元抽出(ブートストラップサンプリング)した複数データセットでモデルを並列に学習し、多数決や平均で予測する。学習器が独立なので予測のばらつき(バリアンス)を下げる効果がある。","ランダムフォレストはバギングに「各分割で使う特徴量もランダムに選ぶ」工夫を加え、木同士の相関を下げたもの。過学習に強く、特徴量の重要度も算出できる。","ブースティングは前の学習器の誤りを重視しながら弱学習器を逐次追加していく方式で、直列に学習するため並列化しにくいが、バイアス(系統的な誤り)を下げ高精度になりやすい。","AdaBoostは誤分類したデータの重みを増やして次の弱学習器を学習させるブースティングの代表手法。勾配ブースティング(Gradient Boosting)は前のモデルの誤差(残差)を新しいモデルで予測して修正を重ねる手法で、考え方が異なる。","XGBoostとLightGBMはいずれも勾配ブースティングを高速・高精度に実装したライブラリで、表形式データのコンペティションで広く使われる。LightGBMは特に大規模データでの学習が速いことで知られる。","スタッキングは、複数の異なるモデル(ベースモデル)の予測値を新たな特徴量として、さらに別のモデル(メタモデル)に最終予測をさせる手法。異質なモデルの長所を統合できる。"],summary:"アンサンブルはバギング(並列・バリアンス低減)、ブースティング(逐次・バイアス低減)、スタッキング(メタモデルで統合)の3系統。バギングの発展がランダムフォレスト(特徴量もランダム選択)。ブースティングは誤分類の重みを上げるAdaBoostと残差を修正する勾配ブースティング(実装がXGBoost・LightGBM)を区別する。"},{title:"モデル評価と汎化性能",points:["汎化性能(未知データへの性能)の評価では、データを訓練用とテスト用に一度だけ分けるホールドアウト法が最も単純。手早いが、分け方次第で評価が偏り、データが少ないと不安定になる。","k-分割交差検証は、データをk個に分けてテスト役を交代しながらk回学習・評価し平均する方法。データを無駄なく使え、分割の偶然に左右されにくい安定した評価が得られる。データ件数と同じだけ分割するleave-one-out(一個抜き交差検証)は極端な形で、件数が少ないときに使う。","ハイパーパラメータ(学習前に人が決める設定値)の探索には、候補値の全組み合わせを試すグリッドサーチ、範囲からランダムに試すランダムサーチ、過去の試行結果から次に試す有望な点を確率的に選ぶベイズ最適化があり、後者ほど少ない試行で良い値を見つけやすい。","データリーケージは、本来予測時に使えないはずの情報(テストデータやターゲットに由来する情報)が学習に紛れ込み、評価が不当に良くなる現象。前処理をテストデータも含めて行うなどの不注意で起こりやすく、本番で精度が出ない原因になる。","次元の呪いは、特徴量(次元)が増えるほどデータが空間内でまばらになり、十分な学習に必要なデータ量が指数的に増える現象。次元削減や特徴量選択で緩和する。","バイアス・バリアンス分解では、予測誤差をモデルの表現力不足による系統的誤差のバイアスと、訓練データの違いによる予測のばらつきのバリアンスに分けて考える。","バイアスが高いと未学習(アンダーフィッティング)、バリアンスが高いと過学習(オーバーフィッティング)になりやすく、両者は一般にトレードオフの関係にある。モデルを複雑にするほどバイアスは下がるがバリアンスは上がる。"],summary:"汎化性能の評価はホールドアウト法(一度分割・手早いが不安定)とk-分割交差検証(安定・leave-one-outは極端形)を区別する。ハイパーパラメータ探索はグリッド・ランダム・ベイズ最適化の順に効率的。評価を歪めるデータリーケージ、次元増加で必要データが爆発する次元の呪い、バイアス(高いと未学習)とバリアンス(高いと過学習)のトレードオフが要点。"},{title:"その他の学習法と推薦",points:["半教師あり学習は、少量のラベル付きデータと大量のラベルなしデータを併用する枠組み。ラベル付けのコストが高い現場で、ラベルなしデータの分布情報を活かして精度を高める。","自己教師あり学習は、人手のラベルを使わず、データの一部を隠して残りから予測させるなどデータ自身から擬似的な教師信号を作り出して学習する枠組み。大規模言語モデルの事前学習で広く使われる。","オンライン学習は、データが届くたびにモデルを逐次更新する方式。全データをまとめて学習するバッチ学習と対照的で、時々刻々と変化する環境や、全データをメモリに載せられない大規模データに向く。","ナイーブベイズは、ベイズの定理に基づき各特徴量がクラスのもとで条件付き独立であると単純に仮定して確率を計算する分類手法。仮定は単純だが、スパムフィルタなどテキスト分類で高い実績がある。","協調フィルタリングは、ユーザーやアイテム間の行動履歴の類似度に基づいて推薦する方式(「あなたと似た人が買った商品」)。履歴のない新規ユーザー・新商品には類似度が計算できず推薦できないコールドスタート問題を抱える。","コンテンツベースフィルタリングは、商品の属性(ジャンルやタグなど)の類似度で推薦する方式。属性さえあれば新商品でも推薦でき、協調フィルタリングのコールドスタート問題を補える点で対比される。","バンディットアルゴリズムは、報酬が未知の複数の選択肢から、未知を試す「探索」と現状で良い選択をする「活用」のバランスをとって累積報酬を最大化する枠組み。ε-greedyやUCBが代表で、Web広告やABテストの最適化に応用される。"],summary:"ラベルの使い方で半教師あり学習(少量ラベル+大量ラベルなし)と自己教師あり学習(データ自身から擬似ラベル)を区別する。更新タイミングはオンライン学習(逐次)とバッチ学習(一括)が対照的。条件付き独立を仮定するナイーブベイズ、推薦は履歴ベースの協調フィルタリング(コールドスタート問題)と属性ベースのコンテンツベースの対比、探索と活用のバンディットアルゴリズムを押さえる。"}],terms:[{term:"教師あり学習",definition:"入力と正解ラベルのペアから入出力関係を学習する枠組み。出力が連続値なら回帰、カテゴリなら分類。"},{term:"教師なし学習",definition:"正解ラベルなしでデータの構造を発見する枠組み。クラスタリングや次元削減が代表タスク。"},{term:"強化学習",definition:"エージェントが環境との相互作用で得る報酬を最大化する行動方針を試行錯誤で学習する枠組み。"},{term:"線形回帰",definition:"入力変数の重み付き和で連続値を予測する基本的な回帰手法。最小二乗法でパラメータを求める。"},{term:"ロジスティック回帰",definition:"線形モデルの出力をシグモイド関数で0〜1の確率に変換して分類を行う手法。名前に反して分類に使う。"},{term:"k近傍法",definition:"予測対象に近いk個の訓練データの多数決でクラスを決める手法。学習時にモデルを構築しない怠惰学習。"},{term:"サポートベクターマシン",definition:"境界に最も近いデータ点とのマージンを最大化する決定境界を求める手法。SVMと略される。"},{term:"カーネル法",definition:"データを高次元空間に写像して線形分離を可能にする手法。カーネルトリックにより計算量の爆発を回避する。"},{term:"決定木",definition:"ジニ係数などの不純度が下がるようにデータを条件分岐で分割していく木構造のモデル。解釈性が高い。"},{term:"ランダムフォレスト",definition:"バギングと特徴量のランダム選択を組み合わせ、多数の決定木の多数決・平均で予測するアンサンブル手法。"},{term:"ブースティング",definition:"前のモデルの誤りを重視しながら弱学習器を逐次追加するアンサンブル手法。AdaBoostや勾配ブースティングが代表。"},{term:"k-means法",definition:"k個のクラスタ中心への割り当てと中心の更新を繰り返す非階層的クラスタリング。kは事前に指定する。"},{term:"主成分分析",definition:"分散が最大となる方向を順に見つけてデータを少数の変数に要約する線形の次元削減手法。PCAと略される。"},{term:"t-SNE",definition:"高次元データの局所的な構造を保ちながら2〜3次元に圧縮する非線形の次元削減・可視化手法。"},{term:"協調フィルタリング",definition:"ユーザーやアイテム間の類似度を利用する推薦手法。新規ユーザーに推薦できないコールドスタート問題を持つ。"},{term:"正則化",definition:"損失関数にペナルティ項を加えて過学習を抑える手法。L1(ラッソ)は係数を0にし、L2(リッジ)は係数を滑らかに小さくする。"},{term:"交差検証",definition:"データをk分割し、テスト役を交代しながらk回学習・評価して汎化性能を安定して見積もる方法。"},{term:"ROC曲線",definition:"閾値を変えながら偽陽性率と真陽性率をプロットした曲線。下側面積AUCが1に近いほど良い分類器。"},{term:"ナイーブベイズ",definition:"ベイズの定理に基づき、各特徴量が条件付き独立であると仮定して確率を計算する分類手法。スパム判定などに使われる。"},{term:"多重共線性",definition:"回帰分析で説明変数同士の相関が強いと、回帰係数が不安定になり解釈が困難になる現象。"},{term:"線形判別分析(LDA)",definition:"クラス間の分散を最大化しクラス内の分散を最小化する軸を求める、教師ありの分類・次元削減手法。"},{term:"バンディットアルゴリズム",definition:"限られた試行で報酬を最大化するため、探索と活用のバランスをとって選択肢を選ぶ手法。ε-greedyやUCBが代表。"},{term:"半教師あり学習",definition:"少量のラベル付きデータと大量のラベルなしデータを併用して学習する枠組み。ラベル付けコストの削減に有効。"},{term:"自己教師あり学習",definition:"データの一部を隠して他の部分から予測させるなど、データ自身から擬似的な教師信号を作って学習する枠組み。"},{term:"スタッキング",definition:"複数のモデルの予測を入力として、さらに別のモデル(メタモデル)で最終予測を行うアンサンブル手法。"},{term:"決定係数(R²)",definition:"回帰モデルがデータの分散をどれだけ説明できるかを表す指標。1に近いほど当てはまりが良い。"}],questions:[{id:"ml-q01",chapterId:"ml",question:"教師あり学習と教師なし学習の違いに関する記述として、最も適切なものを選べ。",choices:["教師あり学習は報酬を最大化する行動を学び、教師なし学習は正解ラベルから予測を学ぶ","教師あり学習は正解ラベル付きデータから入出力関係を学び、教師なし学習はラベルなしデータから構造やパターンを発見する","教師あり学習は人間が逐一操作する必要があり、教師なし学習は完全に自動で動作する","教師あり学習はクラスタリングに、教師なし学習は分類に用いられる"],answerIndex:1,explanation:"教師あり学習は入力と正解ラベルのペアから予測関数を学習し、教師なし学習はラベルなしでクラスタリングや次元削減によりデータの構造を発見する。報酬の最大化は強化学習の説明である。また分類は教師あり、クラスタリングは教師なしのタスクなので選択肢Dは対応が逆。「人間が操作するかどうか」の違いではない点にも注意。"},{id:"ml-q02",chapterId:"ml",question:"教師あり学習における「回帰」と「分類」の違いとして、最も適切なものを選べ。",choices:["回帰は連続値を予測し、分類はカテゴリ(離散的なクラス)を予測する","回帰はカテゴリを予測し、分類は連続値を予測する","回帰は教師なし学習に、分類は教師あり学習に属する","回帰は画像データ専用、分類はテキストデータ専用の手法である"],answerIndex:0,explanation:"出力が売上額や気温のような連続値なら回帰、スパムか否かのようなカテゴリなら分類であり、どちらも教師あり学習に属する。データの種類(画像・テキスト)で区別されるものではない。ロジスティック回帰は名前に「回帰」と付くが分類手法である、というひっかけと併せて押さえておくとよい。"},{id:"ml-q03",chapterId:"ml",question:"強化学習の説明として、最も適切なものを選べ。",choices:["大量の正解ラベル付きデータを使って入力と出力の対応関係を学習する","データをいくつかのグループに自動的に分割して構造を発見する","エージェントが環境の中で行動し、得られる報酬を最大化する行動方針を試行錯誤で学習する","あらかじめ専門家が記述したルールに従って推論を行う"],answerIndex:2,explanation:"強化学習は状態・行動・報酬を基本要素とし、将来にわたる報酬の合計を最大化する方策を試行錯誤で獲得する枠組みで、囲碁AIやロボット制御に応用される。正解ラベルからの学習は教師あり学習、グループ分割は教師なし学習(クラスタリング)、専門家のルールによる推論はエキスパートシステムの説明であり、いずれも強化学習ではない。"},{id:"ml-q04",chapterId:"ml",question:"線形回帰のパラメータを求める際に用いられる、予測値と実測値の誤差の二乗和を最小化する方法として、最も適切なものを選べ。",choices:["最尤推定法のみが用いられ、誤差は考慮しない","マージン最大化","ブートストラップ法","最小二乗法"],answerIndex:3,explanation:"線形回帰では、各データ点での予測誤差(残差)の二乗和を最小にするようパラメータを決める最小二乗法が用いられる。マージン最大化はSVMの考え方、ブートストラップ法はバギングで使う復元抽出によるサンプリング手法であり、回帰係数の推定法ではない。なお誤差が正規分布に従うと仮定すると最小二乗法は最尤推定と一致するが、「誤差を考慮しない」という記述は誤り。"},{id:"ml-q05",chapterId:"ml",question:"ロジスティック回帰に関する記述として、最も適切なものを選べ。",choices:["出力が連続値であるため、住宅価格の予測などの回帰問題に用いられる","シグモイド関数で出力を0から1の確率に変換し、分類問題に用いられる","決定木を多数組み合わせたアンサンブル学習の一種である","正解ラベルを必要としない教師なし学習の手法である"],answerIndex:1,explanation:"ロジスティック回帰は「回帰」という名前だが、線形モデルの出力をシグモイド関数(ロジスティック関数)に通して0〜1の確率とし、閾値で判定する分類手法である。この名前と用途のギャップはG検定定番のひっかけ。多クラス分類への拡張にはソフトマックス関数を用いる。教師あり学習であり、アンサンブル学習でもない。"},{id:"ml-q06",chapterId:"ml",question:"k近傍法(k-NN)の説明として、最も適切なものを選べ。",choices:["予測したいデータから距離が近いk個の訓練データを参照し、その多数決でクラスを決定する","データをk個のクラスタに分割し、各クラスタの重心を繰り返し更新する","k個の決定木を学習させ、その平均によって予測する","データをk個のグループに分割し、テスト役を交代しながらk回評価する"],answerIndex:0,explanation:"k近傍法は、近傍k個の訓練データの多数決(回帰なら平均)で予測する教師あり学習で、学習時にモデルを作らない怠惰学習と呼ばれる。kの値で結果が変わる点も特徴。選択肢Bは教師なし学習のk-means法、選択肢Dはk-分割交差検証の説明であり、「k」が付く用語同士の混同を狙った典型的なひっかけ。選択肢Cはランダムフォレストに近い説明である。"},{id:"ml-q07",chapterId:"ml",question:"サポートベクターマシン(SVM)が決定境界を求める際の基本的な考え方として、最も適切なものを選べ。",choices:["全データ点から境界までの距離の合計を最小化する","誤分類されたデータ点の重みを増やしながら境界を逐次更新する","境界に最も近いデータ点(サポートベクトル)と境界との距離(マージン)を最大化する","境界の両側のデータ数が等しくなるように境界を引く"],answerIndex:2,explanation:"SVMは、決定境界と最も近い訓練データ(サポートベクトル)との距離であるマージンを最大化することで、汎化性能の高い境界を得る。境界の位置を決めるのはサポートベクトルだけで、全データ点との距離の合計ではない。誤分類データの重みを増やす逐次更新はAdaBoost(ブースティング)の考え方である。なお現実のデータ向けに誤分類を許容するスラック変数による緩和も併せて問われやすい。"},{id:"ml-q08",chapterId:"ml",question:"線形分離できないデータに対してSVMを適用するために、データを高次元空間に写像して分離を可能にする手法として、最も適切なものを選べ。",choices:["主成分分析","正則化","バギング","カーネル法(カーネルトリック)"],answerIndex:3,explanation:"カーネル法は、データを高次元の特徴空間へ写像することで元の空間では線形分離できないデータを分離可能にする手法で、写像後の内積をカーネル関数で直接計算するため計算量の爆発を避けられる(カーネルトリック)。主成分分析は逆に次元を削減する手法、正則化は過学習を抑える手法、バギングはアンサンブル学習の手法であり、いずれも高次元への写像とは無関係。"},{id:"ml-q09",chapterId:"ml",question:"決定木に関する記述として、最も適切なものを選べ。",choices:["ジニ係数などの不純度が下がるように条件分岐でデータを分割していき、分岐をたどる形で予測するため解釈しやすい","データを高次元空間に写像してマージンが最大になる境界を求める","予測の根拠を人間が解釈することが原理的に不可能なブラックボックスモデルである","出力が確率となるため、回帰問題には一切使用できない"],answerIndex:0,explanation:"決定木はジニ係数やエントロピーといった不純度の減少が最大になる条件で分割を繰り返す手法で、if-then の分岐をたどるだけなので解釈性が高く、特徴量の標準化も不要という利点がある。高次元への写像とマージン最大化はSVMの説明。むしろ解釈しやすさが決定木の長所であり、また回帰木として回帰問題にも使えるため選択肢CとDは誤り。"},{id:"ml-q10",chapterId:"ml",question:"ランダムフォレストの説明として、最も適切なものを選べ。",choices:["1本の深い決定木を剪定しながら精度を高める手法","前の決定木が誤分類したデータの重みを増やして次の木を逐次学習させる手法","ブートストラップサンプリングで複数の決定木を並列に学習し、さらに分割に使う特徴量もランダムに選んで多数決で予測する手法","決定木の各ノードをニューラルネットワークに置き換えた深層学習モデル"],answerIndex:2,explanation:"ランダムフォレストはバギング(復元抽出した複数データセットでの並列学習と多数決)に加え、各分割で使う特徴量もランダムに制限して木同士の相関を下げたアンサンブル手法で、過学習に強く特徴量重要度も得られる。誤分類データの重みを増やす逐次学習はAdaBoost(ブースティング)の説明であり、並列のバギング系か逐次のブースティング系かの区別が頻出ポイント。"},{id:"ml-q11",chapterId:"ml",question:"バギングとブースティングの違いに関する記述として、最も適切なものを選べ。",choices:["バギングはモデルを逐次的に追加し、ブースティングは並列に学習する","バギングは複数モデルを並列に学習して多数決や平均をとり、ブースティングは前のモデルの誤りを重視しながら逐次的にモデルを追加する","バギングは教師なし学習、ブースティングは教師あり学習で用いられる","両者は名称が異なるだけで、学習の仕組みは同一である"],answerIndex:1,explanation:"バギングはブートストラップサンプリングした複数データで独立にモデルを学習する並列方式で、予測のばらつき(バリアンス)を下げる。ブースティングは前の学習器が間違えたデータを重視して次の学習器を作る逐次方式で、AdaBoostや勾配ブースティング(XGBoost、LightGBMなど)が代表。選択肢Aは両者の説明が逆である。どちらも主に教師あり学習で使うアンサンブル手法であり、仕組みは明確に異なる。"},{id:"ml-q12",chapterId:"ml",question:"k-means法の手順に関する記述として、最も適切なものを選べ。",choices:["最も近いクラスタ同士を順に併合していき、樹形図を作成する","正解ラベル付きデータを使って各クラスタの境界を学習する","クラスタ数はアルゴリズムが自動的に最適な値を決定するため、人間が指定する必要はない","k個のクラスタ中心を置き、各データ点を最も近い中心に割り当て、中心を重心に更新する処理を収束まで繰り返す"],answerIndex:3,explanation:"k-means法は「割り当て」と「中心(重心)の更新」を交互に繰り返す非階層的クラスタリングで、クラスタ数kは人間が事前に指定する必要がある。これがk-meansの代表的な弱点として頻出。クラスタを順に併合して樹形図(デンドログラム)を作るのは階層的クラスタリングの説明であり、教師なし学習なので正解ラベルも使わない。"},{id:"ml-q13",chapterId:"ml",question:"階層的クラスタリングの結果を表現し、クラスタが併合されていく過程を視覚的に確認できる樹形図として、最も適切なものを選べ。",choices:["デンドログラム","ヒストグラム","散布図","混同行列"],answerIndex:0,explanation:"階層的クラスタリングでは、近いクラスタ同士を順に併合する過程をデンドログラム(樹形図)で表し、任意の高さで切ることで好きなクラスタ数を後から選べる。この「kを後から決められる」点がk-means法との対比で頻出。ヒストグラムは度数分布、散布図は2変数の関係、混同行列は分類結果の集計表であり、クラスタの併合過程は表せない。"},{id:"ml-q14",chapterId:"ml",question:"主成分分析(PCA)の説明として、最も適切なものを選べ。",choices:["データをk個のグループに分割する教師なし学習の手法である","データの分散が最大となる方向を順に見つけ、少数の変数でデータを要約する次元削減手法である","正解ラベルとの誤差が最小になるように特徴量を選択する教師あり学習の手法である","データを必ず2次元に圧縮して可視化することだけを目的とした非線形手法である"],answerIndex:1,explanation:"PCAは分散が最大になる軸(第1主成分)から順に直交する軸を求め、情報の損失を抑えながら次元を削減する線形手法で、各主成分の説明力は寄与率で評価する。グループ分割はクラスタリングの説明。教師なし学習なので正解ラベルは使わない。「非線形で2〜3次元の可視化に特化」という説明はt-SNEに該当し、PCAとの対比で頻出する。"},{id:"ml-q15",chapterId:"ml",question:"高次元データを2〜3次元に圧縮して可視化する用途で使われ、局所的な構造の保存に優れた非線形の次元削減手法として、最も適切なものを選べ。",choices:["線形回帰","k-means法","t-SNE","AdaBoost"],answerIndex:2,explanation:"t-SNEは高次元空間でのデータ間の近さの関係を確率的に表し、それを低次元でも保つように配置する非線形の次元削減手法で、主に2〜3次元への可視化に用いられる。線形手法のPCAでは捉えにくい構造を可視化できる点が特徴。線形回帰は回帰、k-meansはクラスタリング、AdaBoostはブースティングの手法であり、次元削減ではない。"},{id:"ml-q16",chapterId:"ml",question:"協調フィルタリングによる推薦システムの課題として知られる「コールドスタート問題」の説明として、最も適切なものを選べ。",choices:["推薦の計算に時間がかかりすぎて、リアルタイムに応答できない問題","同じ商品ばかりが推薦され、ユーザーの興味の幅が狭まる問題","ユーザー数が増えるとサーバーの起動に時間がかかる問題","利用履歴のない新規ユーザーや新商品に対して、類似度が計算できず推薦が行えない問題"],answerIndex:3,explanation:"協調フィルタリングはユーザーやアイテム間の行動履歴の類似度に基づくため、履歴のない新規ユーザー・新商品には類似度を計算できず推薦できない。これがコールドスタート問題である。対策として、商品の属性情報を使うコンテンツベースフィルタリングとの併用が挙げられる点もセットで頻出。計算速度やサーバー起動の問題ではなく、興味の幅が狭まる現象はフィルターバブルと呼ばれる別の問題である。"},{id:"ml-q17",chapterId:"ml",question:"L1正則化とL2正則化に関する記述として、最も適切なものを選べ。",choices:["L1正則化を線形回帰に適用したものをリッジ回帰、L2正則化を適用したものをラッソ回帰と呼ぶ","L1正則化は一部のパラメータをちょうど0にするため特徴量選択の効果があり、線形回帰に適用したものはラッソ回帰と呼ばれる","正則化は訓練データへの適合度を高めるための手法であり、過学習を促進する","L2正則化は多くのパラメータを完全に0にすることで、モデルをスパースにする"],answerIndex:1,explanation:"L1正則化(ラッソ回帰)はペナルティの性質上、一部の係数をちょうど0にするためスパースなモデルとなり特徴量選択として機能する。L2正則化(リッジ回帰)は係数全体を滑らかに小さくするが0にはなりにくい。L1=ラッソ、L2=リッジという対応の入れ替えは定番のひっかけ。正則化の目的は過学習の抑制であり、適合度を高めて過学習を促進するという説明は逆である。"},{id:"ml-q18",chapterId:"ml",question:"k-分割交差検証の説明として、最も適切なものを選べ。",choices:["データをk個に分割し、1つをテスト用、残りを訓練用としてテスト役を交代しながらk回学習と評価を繰り返し、結果を平均する方法","データを訓練用とテスト用に一度だけ分割して評価する方法","予測対象に近いk個のデータの多数決でクラスを決定する方法","テストデータも含めた全データで学習し、同じデータで評価する方法"],answerIndex:0,explanation:"k-分割交差検証はテスト役のブロックを交代しながらk回の学習・評価を行い平均することで、データ分割の偶然に左右されにくい汎化性能の見積もりを得る方法である。一度だけ分割するのはホールドアウト法で、データが少ない場合は交差検証が有利。k個の多数決はk近傍法の説明。テストデータで学習する選択肢Dはデータリーケージに相当し、評価として不適切な行為である。"},{id:"ml-q19",chapterId:"ml",question:"病気のスクリーニング検査のように「実際に陽性であるものを見逃さないこと」を最も重視する場合に注目すべき評価指標として、最も適切なものを選べ。",choices:["適合率(Precision)","正解率(Accuracy)","再現率(Recall)","寄与率"],answerIndex:2,explanation:"再現率は実際の陽性のうち正しく陽性と予測できた割合(TP/(TP+FN))で、見逃し(偽陰性)を減らしたい場合に重視する。適合率は陽性と予測した中の正解の割合で、誤検出を減らしたい場合に重視し、両者はトレードオフの関係にある(両立を見るにはF値)。正解率は陽性が少ない不均衡データでは全て陰性と予測しても高くなるため不適切。寄与率は主成分分析の用語で評価指標ではない。"},{id:"ml-q20",chapterId:"ml",question:"ROC曲線とAUCに関する記述として、最も適切なものを選べ。",choices:["ROC曲線は適合率と再現率をプロットした曲線で、AUCは0に近いほど良いモデルである","AUCが0.5のモデルは完璧な分類性能を持つことを意味する","ROC曲線は訓練データへの当てはまりの良さだけを表し、汎化性能とは無関係である","ROC曲線は分類の閾値を変えながら偽陽性率と真陽性率をプロットした曲線で、その下側の面積AUCが1に近いほど良いモデルである"],answerIndex:3,explanation:"ROC曲線は閾値を動かしたときの偽陽性率(横軸)と真陽性率(縦軸)の軌跡で、下側面積のAUCが1に近いほど分類性能が高く、0.5はランダムな予測と同等を意味する。したがって「0に近いほど良い」「0.5が完璧」はいずれも誤り。適合率と再現率をプロットするのはPR曲線という別の曲線である。AUCは閾値に依存しない総合的な指標として、特に不均衡データの評価で有用とされる。"},{id:"ml-q21",chapterId:"ml",question:"ベイズの定理に基づき、各特徴量が互いに条件付き独立であるという単純化した仮定を置いて分類を行う手法として、最も適切なものを選べ。",choices:["ナイーブベイズ","サポートベクターマシン","k近傍法","ランダムフォレスト"],answerIndex:0,explanation:"ナイーブベイズは、ベイズの定理を用い、各特徴量がクラスのもとで条件付き独立であると単純(ナイーブ)に仮定して確率を計算する分類手法で、スパムフィルタなどで実績がある。選択肢Bのサポートベクターマシンはマージン最大化、選択肢Cのk近傍法は近傍の多数決、選択肢Dのランダムフォレストは決定木のアンサンブルで分類を行う別系統の手法であり、いずれも条件付き独立の仮定を中核とはしない。"},{id:"ml-q22",chapterId:"ml",question:"回帰分析において、説明変数同士の相関が強いために回帰係数の推定が不安定になり解釈が困難になる現象として、最も適切なものを選べ。",choices:["過学習","多重共線性","データリーケージ","次元の呪い"],answerIndex:1,explanation:"多重共線性(マルチコ)は、説明変数同士に強い相関があると回帰係数の推定が不安定になり、係数の符号や大きさの解釈が難しくなる現象で、相関の高い変数の削除や正則化で対処する。選択肢Aの過学習は訓練データへの過剰適合、選択肢Cのデータリーケージはテスト情報の混入、選択肢Dの次元の呪いは次元増加に伴う必要データ量の爆発であり、いずれも説明変数間の相関による係数の不安定化とは異なる現象である。"},{id:"ml-q23",chapterId:"ml",question:"クラス間の分散を最大化し、クラス内の分散を最小化する方向を求めることで分類や次元削減を行う教師あり手法として、最も適切なものを選べ。",choices:["主成分分析(PCA)","t-SNE","線形判別分析(LDA)","k-means法"],answerIndex:2,explanation:"線形判別分析(LDA)は、クラス間の分散を大きく、クラス内の分散を小さくする軸を求める教師あり手法で、分類や次元削減に用いられる。選択肢Aの主成分分析はラベルを使わずデータ全体の分散が最大の方向を探す教師なしの次元削減である点が対照的。選択肢Bのt-SNEは可視化向けの非線形次元削減、選択肢Dのk-meansはクラスタリングであり、クラスラベルを使う判別手法ではない。"},{id:"ml-q24",chapterId:"ml",question:"行列を3つの行列の積に分解して低ランク近似や次元削減に利用でき、レコメンデーションの行列分解などにも応用される手法として、最も適切なものを選べ。",choices:["勾配ブースティング","ブートストラップ法","サポートベクターマシン","特異値分解(SVD)"],answerIndex:3,explanation:"特異値分解(SVD)は任意の行列を3つの行列の積に分解する手法で、大きな特異値だけを残すことで低ランク近似・次元削減ができ、レコメンデーションの行列分解にも応用される。選択肢Aの勾配ブースティングはアンサンブル学習、選択肢Bのブートストラップ法は復元抽出によるサンプリング、選択肢Cのサポートベクターマシンは分類・回帰の手法であり、行列分解を目的とする手法ではない。"},{id:"ml-q25",chapterId:"ml",question:"「商品の内容や属性の類似度に基づいて、ユーザーが過去に好んだ商品と似た商品を推薦する」方式として、最も適切なものを選べ。",choices:["コンテンツベースフィルタリング","協調フィルタリング","アソシエーション分析","強化学習"],answerIndex:0,explanation:"コンテンツベースフィルタリングは、商品の属性(ジャンルやタグなど)の類似度を使い、ユーザーが好んだ商品と似た商品を推薦する方式で、新商品でも属性があれば推薦できる利点がある。選択肢Bの協調フィルタリングはユーザーやアイテムの行動履歴の類似度に基づく方式で、履歴のない対象に弱いコールドスタート問題を持つ点が対照的。選択肢Cのアソシエーション分析は併売パターンの抽出、選択肢Dの強化学習は報酬最大化の枠組みであり、内容類似による推薦方式ではない。"},{id:"ml-q26",chapterId:"ml",question:"複数の選択肢から得られる報酬が未知の状況で、限られた試行のもとで報酬を最大化するために探索と活用のバランスをとるアルゴリズムとして、最も適切なものを選べ。",choices:["最小二乗法","バンディットアルゴリズム","主成分分析","ホールドアウト法"],answerIndex:1,explanation:"バンディットアルゴリズムは、報酬の期待値が未知の複数の選択肢(腕)から、まだ試していない腕を試す「探索」と、現時点で良い腕を選ぶ「活用」のバランスをとって累積報酬を最大化する枠組みで、ε-greedyやUCBが代表例である。Web広告やABテストの最適化に応用される。選択肢Aの最小二乗法は回帰係数の推定、選択肢Cの主成分分析は次元削減、選択肢Dのホールドアウト法は評価のためのデータ分割であり、探索と活用の最適化を行う手法ではない。"},{id:"ml-q27",chapterId:"ml",question:"新しいデータが届くたびに、その都度モデルのパラメータを逐次的に更新していく学習方式として、最も適切なものを選べ。",choices:["バッチ学習","転移学習","オンライン学習","アンサンブル学習"],answerIndex:2,explanation:"オンライン学習は、データを1件ずつ(あるいは小さな単位で)受け取るたびにモデルを逐次更新する方式で、データが時々刻々と変化する環境やメモリに全データを載せられない場面に向く。選択肢Aのバッチ学習は全データをまとめて一度に学習する方式で対照的。選択肢Bの転移学習は学習済みモデルを別タスクに活用する手法、選択肢Dのアンサンブル学習は複数モデルの統合であり、逐次更新の枠組みを指す用語ではない。"},{id:"ml-q28",chapterId:"ml",question:"正例が極端に少ない不均衡データに対して、少数派クラスの事例を人工的に合成して増やす代表的な手法として、最も適切なものを選べ。",choices:["ドロップアウト","アーリーストッピング","バッチ正規化","SMOTE"],answerIndex:3,explanation:"SMOTEは、不均衡データの少数派クラスについて、近傍の事例の間を補間して新しい合成サンプルを生成するオーバーサンプリング手法で、単純な複製より過学習を抑えやすい。多数派を減らすアンダーサンプリングと対比される。選択肢Aのドロップアウト、選択肢Bのアーリーストッピング、選択肢Cのバッチ正規化はいずれもニューラルネットワークの学習・正則化に関する技法であり、不均衡データのサンプリング手法ではない。"},{id:"ml-q29",chapterId:"ml",question:"回帰モデルの評価指標であるRMSE(二乗平均平方根誤差)とMAE(平均絶対誤差)の違いに関する記述として、最も適切なものを選べ。",choices:["RMSEは誤差を二乗してから平均し平方根をとるため、MAEに比べて大きな誤差(外れ値)の影響を受けやすい","RMSEとMAEはどちらも値が大きいほどモデルの当てはまりが良いことを示す","MAEは0から1の範囲をとり、1に近いほど精度が高い","RMSEは分類問題、MAEは回帰問題に用いる評価指標である"],answerIndex:0,explanation:"RMSEは誤差を二乗してから平均し平方根をとるため、大きな誤差ほど強く効き、外れ値の影響を受けやすい。一方MAEは絶対値の平均なので外れ値に比較的頑健である。どちらも誤差の指標であり値が小さいほど良いので選択肢Bは誤り。MAEは0〜1に正規化された指標ではなく、また両者とも回帰の評価指標であって選択肢Cと選択肢Dの記述は誤りである。"},{id:"ml-q30",chapterId:"ml",question:"回帰モデルが目的変数の分散をどれだけ説明できているかを0〜1の範囲で表し、1に近いほど当てはまりが良いとされる指標として、最も適切なものを選べ。",choices:["適合率","決定係数(R²)","AUC","シルエット係数"],answerIndex:1,explanation:"決定係数(R²)は、回帰モデルが目的変数の分散のうちどれだけを説明できるかを表す指標で、1に近いほど当てはまりが良い。選択肢Aの適合率と選択肢CのAUCは分類の評価指標であり回帰には用いない。選択肢Dのシルエット係数はクラスタリングの良さを測る指標であり、回帰モデルの説明力の評価には使わない。"},{id:"ml-q31",chapterId:"ml",question:"多クラス分類の評価で、各クラスごとに指標を計算してから単純平均する「マクロ平均」の特徴として、最も適切なものを選べ。",choices:["サンプル数の多いクラスの影響が支配的になり、少数クラスの性能はほとんど反映されない","クラスごとのサンプル数で重み付けして平均するため、必ずマイクロ平均と一致する","各クラスを対等に扱うため、サンプル数の少ないクラスの性能低下も平均に等しく反映される","クラス数に関係なく、常に正解率と同じ値になる"],answerIndex:2,explanation:"マクロ平均はクラスごとに指標を計算してから単純平均するため、各クラスを対等に扱い、少数クラスの性能低下も平均に等しく反映される。これに対しマイクロ平均は全サンプルをまとめて集計するためサンプル数の多いクラスの影響が支配的になり、両者は不均衡データで差が出る。選択肢Aはマイクロ平均寄りの説明、選択肢Bと選択肢Dの「必ず一致」「常に正解率と同じ」という記述は誤りである。"},{id:"ml-q32",chapterId:"ml",question:"複数のモデルの予測結果を入力として、さらに別のモデル(メタモデル)に最終的な予測を行わせるアンサンブル手法として、最も適切なものを選べ。",choices:["バギング","ブースティング","ドロップアウト","スタッキング"],answerIndex:3,explanation:"スタッキングは、複数の異なるモデル(ベースモデル)の予測値を新たな特徴量とし、それを入力とするメタモデルで最終予測を行うアンサンブル手法である。選択肢Aのバギングは並列学習した複数モデルの多数決・平均、選択肢Bのブースティングは弱学習器の逐次追加であり、いずれも別モデルで予測を統合する仕組みではない。選択肢Cのドロップアウトはニューラルネットワークの正則化技法でアンサンブルの手法名ではない。"},{id:"ml-q33",chapterId:"ml",question:"少量のラベル付きデータと大量のラベルなしデータを併用してモデルを学習する枠組みとして、最も適切なものを選べ。",choices:["半教師あり学習","強化学習","転移学習","バッチ学習"],answerIndex:0,explanation:"半教師あり学習は、ラベル付けのコストが高い状況で、少量のラベル付きデータと大量のラベルなしデータを組み合わせて学習する枠組みで、ラベルなしデータの分布情報を活用して精度向上を狙う。選択肢Bの強化学習は報酬から方策を学ぶ枠組み、選択肢Cの転移学習は別タスクで学習済みの知識を活用する手法、選択肢Dのバッチ学習は全データを一括で学習する方式であり、ラベルの有無を併用する枠組みを指す用語ではない。"},{id:"ml-q34",chapterId:"ml",question:"データの一部を隠して残りの部分から予測させるなど、データ自身から擬似的な正解(教師信号)を作り出して学習する枠組みとして、最も適切なものを選べ。",choices:["教師あり学習","自己教師あり学習","協調フィルタリング","k-分割交差検証"],answerIndex:1,explanation:"自己教師あり学習は、人手のラベルを使わず、データの一部をマスクして残りから予測させるなどの方法でデータ自身から擬似的な教師信号を生成して学習する枠組みで、大規模言語モデルなどの事前学習で広く使われる。選択肢Aの教師あり学習は人手のラベルを必要とする点が異なる。選択肢Cの協調フィルタリングは推薦手法、選択肢Dのk-分割交差検証は評価手法であり、擬似教師信号を作る学習枠組みではない。"},{id:"ml-q35",chapterId:"ml",question:"サポートベクターマシンの考え方を回帰問題に応用し、一定の許容幅(ε)の中に収まる誤差は無視して回帰式を求める手法として、最も適切なものを選べ。",choices:["ロジスティック回帰","リッジ回帰","サポートベクター回帰(SVR)","ステップワイズ回帰"],answerIndex:2,explanation:"サポートベクター回帰(SVR)は、SVMのマージンの考え方を回帰に応用し、許容幅ε(イプシロン)の管の中に収まる誤差はペナルティを課さず、外れた点だけを使って回帰式を求める手法である。選択肢Aのロジスティック回帰は分類手法、選択肢Bのリッジ回帰はL2正則化を加えた線形回帰、選択肢Dのステップワイズ回帰は変数選択の手法であり、いずれもマージンと許容幅の考え方を用いる回帰ではない。"},{id:"ml-q36",chapterId:"ml",question:"k-means法において適切なクラスタ数kを決める際に、kを増やしながらクラスタ内誤差の減り方が緩やかになる「曲がり角」を探す方法として、最も適切なものを選べ。",choices:["グリッドサーチ","ブートストラップ法","交差検証","エルボー法"],answerIndex:3,explanation:"エルボー法は、クラスタ数kを変えながらクラスタ内誤差平方和(SSE)をプロットし、減少が緩やかになる「肘(エルボー)」のような曲がり角を適切なkの目安とする方法である。選択肢Aのグリッドサーチはハイパーパラメータの総当たり探索、選択肢Bのブートストラップ法は復元抽出、選択肢Cの交差検証は汎化性能の評価法であり、いずれもクラスタ数決定の専用手法ではない。"},{id:"ml-q37",chapterId:"ml",question:"クラスタリングの良さを、各点が「自分のクラスタにどれだけ近く、隣のクラスタからどれだけ離れているか」で評価する指標として、最も適切なものを選べ。",choices:["シルエット係数(シルエット分析)","決定係数","F値","AUC"],answerIndex:0,explanation:"シルエット分析は、各データ点について同じクラスタ内の点との近さと最も近い別クラスタとの距離を比べ、クラスタのまとまりと分離の良さを-1〜1で評価する手法で、エルボー法とともにクラスタ数の妥当性の判断に使われる。選択肢Bの決定係数は回帰、選択肢CのF値と選択肢DのAUCは分類の評価指標であり、クラスタリングの良さを直接評価する指標ではない。"},{id:"ml-q38",chapterId:"ml",question:"階層的クラスタリングにおけるクラスタ間距離の測り方のうち、2つのクラスタを併合したときにクラスタ内の分散の増加が最小になるように併合する方法として、最も適切なものを選べ。",choices:["最短距離法","ウォード法","最長距離法","群平均法"],answerIndex:1,explanation:"ウォード法は、クラスタを併合したときに生じるクラスタ内の分散(平方和)の増加が最小になる組を選んで併合する方法で、バランスのよいクラスタが得られやすく実務でよく使われる。選択肢Aの最短距離法は最も近い点同士、選択肢Cの最長距離法は最も遠い点同士、選択肢Dの群平均法は全点対の平均距離でクラスタ間距離を定義する別の方法であり、分散増加の最小化を基準とはしない。"},{id:"ml-q39",chapterId:"ml",question:"決定木が訓練データに過剰に適合(過学習)するのを防ぐために、枝を切り落としたり木の成長を制限したりする手法として、最も適切なものを選べ。",choices:["ブートストラップ","ワンホットエンコーディング","剪定(枝刈り)","標準化"],answerIndex:2,explanation:"決定木は深く成長させると訓練データに過剰適合しやすいため、不要な枝を切り落とす剪定(枝刈り)や、木の深さ・葉のサンプル数に上限を設けることで過学習を抑える。選択肢Aのブートストラップは復元抽出によるサンプリング、選択肢Bのワンホットエンコーディングはカテゴリ変数の数値化、選択肢Dの標準化は特徴量のスケール調整であり、いずれも過学習を防ぐための木の単純化手法ではない。"},{id:"ml-q40",chapterId:"ml",question:"モデルの予測誤差を分解して考えるバイアスとバリアンスのトレードオフに関する記述として、最も適切なものを選べ。",choices:["バイアスもバリアンスも、モデルを複雑にすれば常に同時に小さくできる","バイアスが高い状態は過学習、バリアンスが高い状態は未学習に対応する","バリアンスはデータの測定誤差そのものを指し、モデルの複雑さとは無関係である","バイアスが高いと未学習、バリアンスが高いと過学習になりやすく、両者はトレードオフの関係にある"],answerIndex:3,explanation:"バイアスはモデルの表現力不足による系統的な誤りで、高いと未学習(アンダーフィッティング)に、バリアンスは訓練データの違いによる予測のばらつきで、高いと過学習(オーバーフィッティング)になりやすく、一般に両者はトレードオフの関係にある。したがって両方を同時に常に下げられるとする選択肢Aは誤り。選択肢Bは過学習と未学習の対応が逆で、選択肢Cのバリアンスを測定誤差とする説明も誤りである。"}],contrasts:[{title:"学習の枠組み",left:{label:"教師あり学習",traits:["正解ラベル付きデータ","入出力関係を学習","回帰と分類が代表"]},right:{label:"教師なし学習",traits:["ラベルなしデータ","構造やパターンを発見","クラスタリングと次元削減"]},point:"問題文に「正解ラベル」があれば教師あり、なければ教師なし"},{title:"教師あり学習の2タスク",left:{label:"回帰",traits:["連続値を予測","売上・気温など","線形回帰が代表"]},right:{label:"分類",traits:["カテゴリを予測","スパム判定など","ロジスティック回帰が代表"]},point:"出力が数値なら回帰、ラベルなら分類。「ロジスティック回帰は分類」に注意"},{title:"アンサンブルの2方式",left:{label:"バギング",traits:["復元抽出して並列学習","多数決・平均で予測","バリアンスを低減"]},right:{label:"ブースティング",traits:["誤りを重視して逐次学習","並列化しにくい","バイアスを低減"]},point:"「並列・バリアンスのバギング、逐次・バイアスのブースティング」と対で覚える"},{title:"正則化の2種類",left:{label:"L1正則化(ラッソ回帰)",traits:["一部の係数をちょうど0に","特徴量選択の効果","スパースなモデル"]},right:{label:"L2正則化(リッジ回帰)",traits:["係数全体を滑らかに縮小","0にはなりにくい"]},point:"「ゼロにするL1=ラッソ、滑らかなL2=リッジ」。対応の入れ替えが定番のひっかけ"},{title:"分類の評価指標",left:{label:"適合率(Precision)",traits:["陽性予測の中の正解率","誤検出を減らしたい時"]},right:{label:"再現率(Recall)",traits:["実際の陽性の検出率","見逃しを防ぎたい時","病気のスクリーニング向き"]},point:"「見逃し防止の再現率、誤検出防止の適合率」。両者はトレードオフでF値が調和平均"},{title:"紛らわしい「k」の手法",left:{label:"k近傍法(k-NN)",traits:["教師あり学習","近いk個の多数決で分類","モデルを作らない怠惰学習"]},right:{label:"k-means法",traits:["教師なし学習","k個のクラスタに分割","中心の更新を繰り返す"]},point:"分類するk-NNは教師あり、クラスタリングするk-meansは教師なし"}]},nf={id:"dl-overview",number:3,title:"ディープラーニングの概要",subtitle:"ニューラルネットワークの仕組みと学習",sections:[{title:"パーセプトロンとニューラルネットワークの構造",points:["単純パーセプトロンは1958年にローゼンブラットが提案した、入力層と出力層のみからなる最も基本的なニューラルネットワークである。","単純パーセプトロンは線形分離可能な問題しか解けず、XOR(排他的論理和)のような線形分離不可能な問題を扱えないことをミンスキーとパパートが指摘した。","多層パーセプトロンは入力層と出力層の間に隠れ層(中間層)を追加したもので、非線形な活性化関数と組み合わせることでXOR問題も解けるようになる。","ニューラルネットワークでは、各ニューロン間の結合の強さを重みで表し、発火のしやすさをバイアスで調整して、学習によってこれらのパラメータを更新する。","隠れ層を深く(多層に)したニューラルネットワークがディープラーニングであり、層を重ねるほど複雑な特徴表現を学習できる一方、学習が難しくなる。","ディープラーニングは特徴量を人手で設計するのではなく、データから自動的に特徴量を獲得できる点が従来の機械学習との大きな違いである。"],summary:"単純パーセプトロン(ローゼンブラット)は線形分離可能な問題しか解けず、XORが解けない限界をミンスキーが指摘。隠れ層と非線形活性化関数を持つ多層パーセプトロンがXORを解決する。深層化したものがディープラーニングで、特徴量を自動獲得できる点が従来手法との違いと押さえる。"},{title:"活性化関数と誤差関数",points:["活性化関数はニューロンの出力を決める非線形関数で、非線形性を導入することで多層化の表現力が活きる。","シグモイド関数は出力を0から1の範囲に変換するが、微分の最大値が0.25と小さいため、層を深くすると勾配消失問題を起こしやすい。","tanh(ハイパボリックタンジェント)関数は出力が-1から1の範囲で、微分の最大値が1とシグモイドより大きいため勾配消失が起こりにくいが、完全には解消しない。","ReLU関数は入力が0以下なら0、0より大きければ入力をそのまま出力する関数で、正の領域では微分が常に1のため勾配消失が起こりにくく、現在の主流である。","Leaky ReLUは入力が0以下の領域にもわずかな傾きを持たせたReLUの改良版で、負の入力でも勾配が0にならない。","ソフトマックス関数は出力層で用いられ、複数の出力の合計が1になるよう変換するため、多クラス分類の確率として解釈できる。","誤差関数(損失関数)は予測と正解のずれを測る関数で、回帰では二乗誤差、分類では交差エントロピーが代表的に用いられる。"],summary:"シグモイドは0〜1・微分最大0.25で勾配消失しやすく、tanhは-1〜1・微分最大1でやや改善、ReLUは正領域で微分1のため主流。出力層は多クラス分類でソフトマックスを使う。誤差関数は回帰=二乗誤差、分類=交差エントロピーの対応が頻出。"},{title:"勾配降下法と誤差逆伝播法",points:["勾配降下法は誤差関数の勾配(微分)を計算し、勾配を下る方向にパラメータを少しずつ更新して誤差を最小化する手法である。","1回の更新でどれだけパラメータを動かすかを決めるのが学習率で、大きすぎると発散し、小さすぎると収束が遅くなる。","バッチ学習は全データで勾配を計算し、確率的勾配降下法(SGD)はランダムに選んだ1サンプルごとに更新し、ミニバッチ学習はその中間として少数のサンプル単位で更新する。","誤差逆伝播法(バックプロパゲーション)は出力層の誤差を微分の連鎖律を使って入力層側へ逆向きに伝え、各層の重みの勾配を効率的に計算するアルゴリズムである。","勾配消失問題は誤差を逆伝播する際に勾配が層を遡るごとに小さくなり、入力に近い層の学習が進まなくなる問題で、シグモイド関数の微分値の小ささが主な原因とされた。","勾配降下法は誤差関数の形状によっては、全体の最小値である大域最適解ではなく、局所最適解や勾配がほぼ0になる鞍点に陥ることがある。"],summary:"勾配降下法は勾配を下る方向にパラメータを更新し、学習率は大きすぎると発散・小さすぎると収束が遅い。バッチ・SGD・ミニバッチの更新単位の違いを押さえる。誤差逆伝播法は連鎖律で出力層の誤差を入力側へ逆伝播させ勾配を効率計算する。鞍点や局所最適解への停滞も頻出。"},{title:"最適化手法と学習テクニック",points:["モメンタムはSGDに慣性項を加え、過去の更新方向を考慮することで振動を抑えて収束を速める手法である。","AdaGradはパラメータごとに学習率を自動調整する手法だが、学習が進むと学習率が小さくなりすぎて更新が止まる欠点がある。","RMSpropはAdaGradの欠点を改良し、過去の勾配の影響を指数移動平均で減衰させることで学習率の極端な低下を防ぐ。","AdamはモメンタムとRMSpropの考え方を組み合わせた手法で、実務で広く使われる代表的な最適化手法である。","バッチ正規化は各層の入力を正規化する手法で、学習を安定・高速化し、内部共変量シフトを抑え、過学習の抑制効果もある。","重みの初期値はシグモイドやtanhにはXavierの初期値、ReLUにはHeの初期値が適しているとされる。"],summary:"最適化手法の系譜はSGD→モメンタム/AdaGrad→RMSprop→Adamで、AdamはモメンタムとRMSpropの組合せとして頻出。AdaGradは学習率が下がりすぎる欠点をRMSpropが改良。バッチ正規化は内部共変量シフトを抑え学習を安定化。初期値はシグモイド/tanh→Xavier、ReLU→Heの対応を押さえる。"},{title:"過学習対策とハイパーパラメータ",points:["過学習は訓練データに過剰に適合し、未知のデータへの汎化性能が下がる現象で、ディープラーニングではパラメータが多いため特に起こりやすい。","ドロップアウトは学習時にニューロンをランダムに無効化する手法で、毎回異なるネットワークを学習することからアンサンブル学習に近い効果を持つ。","早期終了(early stopping)は検証データの誤差が悪化し始めた時点で学習を打ち切るシンプルな過学習対策である。","正則化は重みが大きくなりすぎないよう誤差関数にペナルティ項を加える手法で、L1正則化(ラッソ)は不要な重みを0にし、L2正則化(リッジ)は重みを全体的に小さくする。","データ拡張(data augmentation)は画像の反転や回転などで訓練データを擬似的に増やし、過学習を抑える手法である。","学習率や層の数など人間が事前に決めるパラメータをハイパーパラメータと呼び、その探索には全組み合わせを試すグリッドサーチや、ランダムに試すランダムサーチが用いられる。"],summary:"過学習はパラメータの多いDLで起きやすく、対策はドロップアウト(アンサンブル効果)・早期終了・正則化・データ拡張。L1は重みを0にしスパース化、L2は重みを全体的に縮小。学習率や層数はハイパーパラメータで、探索はグリッドサーチ/ランダムサーチを用いる。"},{title:"事前学習と計算資源",points:["オートエンコーダは入力と同じものを出力するよう学習するネットワークで、隠れ層を入力より小さくすることで次元圧縮された特徴表現を獲得できる。","オートエンコーダは入力層から隠れ層への変換をエンコーダ、隠れ層から出力層への変換をデコーダと呼ぶ。","積層オートエンコーダはオートエンコーダを1層ずつ順番に学習して積み重ねる事前学習の手法で、ヒントンらが勾配消失問題への対策として提案した。","事前学習の後にネットワーク全体を教師あり学習で調整する仕上げの工程をファインチューニングと呼ぶ。","深層信念ネットワークはヒントンが提案した、制限付きボルツマンマシンを用いた事前学習の手法である。","ディープラーニングの発展は計算資源に支えられており、並列演算が得意なGPUや、Googleがテンソル計算用に開発したTPUが学習に活用される。","半導体の集積率が約2年で2倍になるというムーアの法則が計算能力の向上を支え、「モデルのパラメータ数の10倍のデータが必要」という経験則はバーニーおじさんのルールと呼ばれる。"],summary:"オートエンコーダは入力と同じ出力を学習し隠れ層で次元圧縮した特徴を獲得(エンコーダ・デコーダ)。積層オートエンコーダや深層信念ネットワーク(RBM)はヒントンが勾配消失対策に提案した事前学習で、後段でファインチューニングする。GPU/TPU、ムーアの法則、バーニーおじさんのルールも頻出。"},{title:"ニューロンの計算と順伝播の数理",points:["1つのニューロンは、各入力xに重みwを掛けて足し合わせ、バイアスbを加えた重み付き和(w1x1+w2x2+…+b)を求め、それを活性化関数に通して出力する。","重みは入力の重要度(結合の強さ)を、バイアスは発火のしやすさ(出力をどちらにずらすか)を表し、学習で更新されるのはこの重みとバイアスである。","順伝播(フォワードプロパゲーション)は、入力層から出力層へ向かって各層の重み付き和と活性化関数の計算を繰り返し、最終的な予測値を求める処理である。","活性化関数に非線形関数を使う理由は、線形関数だけを何層重ねても全体が1つの線形変換に等しくなり、層を深くする意味がなくなるためである。","形式ニューロン(マカロック・ピッツ)は出力が0か1のステップ関数だったが、ステップ関数は微分が0または不定で勾配を計算できないため、勾配学習では使えない。","単純パーセプトロンがXORを解けないのは、1本の直線(線形境界)では(0,0)(1,1)と(0,1)(1,0)を分離できないためで、隠れ層を1つ加えると非線形な境界を作れる。","出力層のニューロン数はタスクで決まり、2値分類は1個(シグモイド)、Kクラス分類はK個(ソフトマックス)、回帰は予測する値の数に対応する。"],summary:"ニューロンは入力の重み付き和+バイアスを活性化関数に通して出力し、学習で更新するのは重みとバイアス。順伝播は入力層から出力層へ計算を進める処理。活性化関数を非線形にしないと多層化が無意味になる点、ステップ関数が微分できず勾配学習に使えない点が要点。"},{title:"誤差逆伝播法と計算グラフの詳細",points:["誤差逆伝播法は、合成関数の微分公式である連鎖律(チェインルール)を用い、出力側で求めた勾配に各層の局所的な微分を順に掛けて入力側へ伝えることで、全パラメータの勾配を効率的に求める。","計算グラフは計算を「ノード(演算)」と「エッジ(値の流れ)」で表したもので、順伝播で値を前へ流し、逆伝播で勾配を後ろへ流すという見通しを与える。","勾配消失が起きる本質的な理由は、逆伝播で各層の微分(1未満の値)が次々に掛け合わされ、層が深いほど勾配が指数的に0へ近づくためである。","逆に各層の微分が1より大きい値だと、掛け合わされるうちに勾配が指数的に増大する勾配爆発が起き、学習が発散・不安定になる。","勾配爆発の対策には、勾配の大きさ(ノルム)が一定のしきい値を超えたら縮小する勾配クリッピングが用いられる。","ReLUが勾配消失に強いのは、正の領域で微分が常に1のため、何層掛け合わせても勾配が小さくならないからである。","信用割当問題(どの重みが誤差にどれだけ寄与したか)は、誤差逆伝播法が連鎖律で各重みの勾配を割り当てることによって解決される。","スキップ結合(残差接続)は入力を数層先へそのまま足すことで勾配が直接流れる経路を作り、深いネットワークでの勾配消失を緩和する(ResNetで採用)。"],summary:"誤差逆伝播法は連鎖律で出力側の勾配に各層の局所微分を掛けて入力側へ伝える。計算グラフは順伝播=値・逆伝播=勾配の流れで理解する。1未満の微分が掛け合わされると勾配消失、1超だと勾配爆発(対策は勾配クリッピング)。ReLUやスキップ結合は勾配を流しやすくする工夫。"},{title:"活性化関数の詳細比較",points:["ステップ関数はしきい値で0/1を返す最初期の活性化関数だが、微分が0または不定で勾配が伝わらないため、現在の勾配学習では用いられない。","シグモイド関数(出力0〜1)は微分の最大値が0.25と小さく、深いネットワークで勾配消失を起こしやすいが、2値分類の出力層では確率として今も使われる。","tanh関数(出力-1〜1)は出力が0中心(原点対称)で微分の最大値が1のため、シグモイドより勾配消失しにくく学習が進みやすいが、両端では飽和して勾配が小さくなる。","ReLUは正で微分1・負で0という単純な関数で計算が軽く勾配消失に強いが、入力が常に負だと出力も勾配も0のまま更新されない「死んだReLU」問題がある。","Leaky ReLUは負の領域にもわずかな傾き(例:0.01)を持たせ、死んだReLU問題を緩和した改良版である。","GELUやSwishはReLUを滑らかにした活性化関数で、負の入力を完全に切らず緩やかに通すため学習が安定しやすく、Transformerなど近年のモデルで広く使われる。","ソフトマックス関数は複数の出力を「合計1の確率分布」に変換する出力層用の関数で、隠れ層用のReLUなどとは役割が異なる。","活性化関数選びの基本方針は、隠れ層はReLU系を第一候補とし、出力層はタスクに応じて回帰=恒等関数、2値分類=シグモイド、多クラス分類=ソフトマックスを使い分けることである。"],summary:"ステップ関数は微分できず不可、シグモイド(0〜1・微分最大0.25)とtanh(-1〜1・微分最大1)は飽和で勾配消失。ReLUは正で微分1だが死んだReLU問題があり、Leaky ReLU・GELU・Swishが改良。隠れ層はReLU系、出力層は回帰=恒等・2値=シグモイド・多クラス=ソフトマックスの使い分けが要点。"},{title:"正則化と過学習対策の深掘り",points:["過学習(過剰適合)は訓練誤差は下がるのに検証・テスト誤差が下がらない状態で、これを汎化誤差をバイアス・バリアンス・ノイズに分解したときのバリアンスが高い状態と捉えられる。","逆にモデルが単純すぎて訓練データの傾向すら捉えられない未学習(過小適合)はバイアスが高い状態で、バイアスとバリアンスはトレードオフの関係にある。","L2正則化(重み減衰)は重みの二乗和をペナルティに加えて重み全体を小さく抑え、L1正則化は絶対値の和を加えて一部の重みを0にしスパース化(特徴選択)する。","ドロップアウトは学習のたびに一部のニューロンを無効化することで、毎回異なるサブネットワークを学習・統合する形になり、多数のモデルを平均するアンサンブルに近い効果を生む。","バッチ正規化は各層の入力をミニバッチ単位で平均0・分散1に正規化し、学習中に前層の更新で入力分布が変動する内部共変量シフトを抑えて学習を安定・高速化する。","早期終了は検証誤差が悪化に転じた時点で学習を打ち切る手法で、過剰に学習が進む前に止めることで過学習を防ぐ。","データ拡張は反転・回転・切り抜きなどで訓練データを擬似的に増やし、データの多様性を高めて過学習を抑える、特に画像で有効な手法である。","データを訓練・検証・テストに分け、重み更新は訓練、ハイパーパラメータ調整やモデル選択は検証、最終性能評価はテストで行うことで、評価の甘さ(リーク)を防ぐ。"],summary:"過学習=バリアンス高・未学習=バイアス高でトレードオフ。L2(重み減衰)は重みを縮小、L1はスパース化。ドロップアウトはアンサンブル効果、バッチ正規化は内部共変量シフトを抑制、早期終了とデータ拡張も主要対策。訓練=更新・検証=調整・テスト=最終評価のデータ分割も頻出。"},{title:"学習を安定させる工夫とハイパーパラメータ探索",points:["重みを全て同じ値(0など)で初期化すると全ニューロンが同一の更新を受けて区別がつかなくなる(対称性が崩れない)ため、初期値は乱数で与える必要がある。","Xavier(グロロット)の初期値はシグモイドやtanhなど原点対称に近い活性化関数向けで、各層の出力の分散を保つよう設計されている。","Heの初期値はReLU向けで、負側が0になる分を補うようXavierより分散を大きめ(約2倍)に取る。","学習率スケジューリングは、序盤は大きな学習率で素早く進み、終盤は小さくして最適解付近の振動を抑え安定収束させる、学習率を動的に変える手法である。","ハイパーパラメータは学習で自動的に決まらず人間が事前に設定する値(学習率・層数・バッチサイズなど)で、学習で更新される重み・バイアスとは区別される。","ハイパーパラメータ探索には、候補の全組み合わせを試すグリッドサーチ、範囲からランダムに選ぶランダムサーチ、過去の試行結果から有望な点を確率的に予測して効率探索するベイズ最適化がある。","近年は、モデルを複雑にするとテスト誤差が一度悪化した後さらに複雑にすると再び改善する二重降下(double descent)が観察され、古典的なバイアス・バリアンスのU字曲線では説明できない挙動として注目される。"],summary:"重みを全て同値で初期化すると対称性が崩れず学習できないため乱数初期化が必要で、シグモイド/tanh→Xavier、ReLU→Heを使い分ける。学習率スケジューリングは序盤大・終盤小で安定収束。ハイパーパラメータ探索はグリッド/ランダム/ベイズ最適化。過剰パラメータ領域の二重降下も押さえる。"},{title:"計算資源と大規模学習",points:["GPUは多数の演算を同時に行う並列計算が得意で、行列演算が中心のニューラルネットワークの学習を大幅に高速化し、ディープラーニング実用化の原動力となった。","TPUはGoogleが深層学習のテンソル計算に特化して開発した専用プロセッサで、GPUよりさらに効率的に行列演算を処理できる。","ムーアの法則(半導体の集積率が約2年で2倍)が計算能力の指数的向上を支えてきたが、近年は微細化の物理的限界からその維持が難しくなっている。","分散学習のデータ並列は、同じモデルを各デバイスに複製してデータを分割し並行計算した勾配を集約する方式で、データが大量にある場合に有効である。","分散学習のモデル並列は、1つの巨大なモデルを複数のデバイスに分割配置して計算する方式で、1台に載りきらない大規模モデルの学習に有効である。","混合精度学習は計算の多くを16ビットなどの低精度で行い、必要な箇所のみ32ビットを併用することで、計算を高速化しメモリ使用量を削減する手法である。","バーニーおじさんのルールは「モデルのパラメータ数の約10倍の訓練データが必要」とする経験則で、大規模モデルほど大量データを要することを示す。"],summary:"GPUは並列計算でDLを高速化、TPUはGoogleのテンソル計算特化チップ。ムーアの法則が計算能力向上を支えたが限界も近い。分散学習はデータ並列(モデル複製・データ分割)とモデル並列(巨大モデルを分割)、混合精度学習は低精度併用で高速化・省メモリ。バーニーおじさんのルールはデータ量の経験則。"}],terms:[{term:"単純パーセプトロン",definition:"ローゼンブラットが提案した入力層と出力層のみのニューラルネットワーク。線形分離可能な問題しか解けない。"},{term:"XOR問題",definition:"排他的論理和は線形分離不可能なため単純パーセプトロンでは解けないという問題。ミンスキーらの指摘で第1次AIブーム終焉の一因となった。"},{term:"多層パーセプトロン",definition:"入力層と出力層の間に隠れ層を持つニューラルネットワーク。非線形分離可能な問題も扱える。"},{term:"活性化関数",definition:"ニューロンの出力を決定する非線形関数。シグモイド、tanh、ReLU、ソフトマックスなどがある。"},{term:"ReLU",definition:"入力が0以下なら0、正ならそのまま出力する活性化関数。勾配消失が起こりにくく現在の主流。"},{term:"ソフトマックス関数",definition:"出力の合計が1になるよう変換する関数。多クラス分類の出力層で確率として用いられる。"},{term:"交差エントロピー",definition:"分類問題で用いられる誤差関数。予測確率分布と正解分布のずれを測る。"},{term:"勾配降下法",definition:"誤差関数の勾配を下る方向にパラメータを更新し、誤差を最小化する最適化手法。"},{term:"誤差逆伝播法",definition:"出力層の誤差を連鎖律で入力側へ逆向きに伝え、各層の勾配を効率的に計算するアルゴリズム。"},{term:"勾配消失問題",definition:"誤差を逆伝播する際に勾配が層を遡るほど小さくなり、深い層の学習が進まなくなる問題。"},{term:"学習率",definition:"1回の更新でパラメータをどれだけ動かすかを決めるハイパーパラメータ。大きすぎると発散、小さすぎると収束が遅い。"},{term:"Adam",definition:"モメンタムとRMSpropを組み合わせた最適化手法。実務で広く使われる。"},{term:"鞍点",definition:"ある方向では極小、別の方向では極大になる点。勾配がほぼ0になるため学習が停滞しやすい。"},{term:"ドロップアウト",definition:"学習時にニューロンをランダムに無効化する過学習対策。アンサンブル学習に近い効果を持つ。"},{term:"バッチ正規化",definition:"各層の入力を正規化して学習を安定・高速化する手法。過学習の抑制効果もある。"},{term:"オートエンコーダ",definition:"入力と同じものを出力するよう学習し、隠れ層で次元圧縮された特徴表現を得るネットワーク。"},{term:"ファインチューニング",definition:"事前学習済みのネットワーク全体を、目的のタスクに合わせて教師あり学習で再調整する工程。"},{term:"バーニーおじさんのルール",definition:"モデルのパラメータ数の10倍の訓練データが必要だとする経験則。"},{term:"形式ニューロン",definition:"マカロック(マカロー)とピッツが1943年に提案した、入力の重み付き和をしきい値と比較して0か1を出力する人工ニューロンの数理モデル。"},{term:"ヘブ則",definition:"同時に発火するニューロン間の結合が強まるという学習則。「ともに発火する細胞は結びつく」と表現される、神経生理学に基づく学習の原理。"},{term:"信用割当問題",definition:"出力の誤差に対して、どの重みやニューロンがどれだけ寄与したかを特定する問題。誤差逆伝播法によって解決される。"},{term:"制限付きボルツマンマシン",definition:"可視層と隠れ層からなり、同一層内に結合を持たないボルツマンマシン。深層信念ネットワークの事前学習に用いられる。"},{term:"深層信念ネットワーク",definition:"制限付きボルツマンマシンを積み重ねて事前学習する生成モデル。2006年にヒントンが提案し、ディープラーニング研究の転機となった。"},{term:"エポック",definition:"訓練データ全体を1回学習に使い切る単位。1エポックは複数のイテレーション(ミニバッチごとの更新)から構成される。"},{term:"プラトー",definition:"勾配がほぼ0の平坦な領域に入り、学習がなかなか進まなくなる停滞状態。鞍点付近で起こりやすい。"},{term:"ノーフリーランチ定理",definition:"あらゆる問題に対して万能に最も優れたアルゴリズムは存在しないという定理。問題ごとに適した手法を選ぶ必要があることを示す。"}],questions:[{id:"dl-overview-q01",chapterId:"dl-overview",question:"単純パーセプトロンに関する説明として、最も適切なものを選べ。",choices:["隠れ層を複数持つため、非線形分離可能な問題を解ける","誤差逆伝播法によって学習することを前提に設計された","線形分離可能な問題しか解けず、XOR問題を扱えない","ヒントンによって1958年に提案された"],answerIndex:2,explanation:"単純パーセプトロンは入力層と出力層のみからなり、線形分離可能な問題しか解けません。XOR(排他的論理和)が解けないことはミンスキーとパパートが指摘し、第1次AIブーム終焉の一因となりました。提案者はローゼンブラット(1958年)であり、ヒントンではない点も頻出です。"},{id:"dl-overview-q02",chapterId:"dl-overview",question:"多層パーセプトロンがXOR問題を解ける理由として、最も適切なものを選べ。",choices:["隠れ層と非線形な活性化関数により、非線形な境界を表現できるため","入力層のニューロン数を増やすことで線形分離可能になるため","出力層にソフトマックス関数を使うことで確率的に分類できるため","重みをすべて正の値に制限することで安定して学習できるため"],answerIndex:0,explanation:"多層パーセプトロンは入力層と出力層の間に隠れ層を追加し、非線形な活性化関数と組み合わせることで非線形な決定境界を表現でき、XOR問題を解決できます。入力層を増やすだけでは線形分離不可能な構造は変わらず、ソフトマックスや重みの符号制限は本質ではありません。「隠れ層+非線形性」がキーワードです。"},{id:"dl-overview-q03",chapterId:"dl-overview",question:"活性化関数ReLUの説明として、最も適切なものを選べ。",choices:["出力が0から1の範囲に収まるため、確率として解釈できる","入力が0以下なら0、正なら入力をそのまま出力し、勾配消失が起こりにくい","出力が-1から1の範囲となり、シグモイド関数より勾配消失しにくい","複数の出力の合計が1になるよう変換する関数である"],answerIndex:1,explanation:"ReLUは入力が0以下なら0、正ならそのまま出力する関数で、正の領域で微分が常に1のため勾配消失が起こりにくく、現在の主流の活性化関数です。0〜1に収めるのはシグモイド、-1〜1はtanh、合計を1にするのはソフトマックスの説明で、それぞれの特徴の対応関係は頻出ポイントです。"},{id:"dl-overview-q04",chapterId:"dl-overview",question:"多クラス分類を行うニューラルネットワークの出力層で用いられる活性化関数として、最も適切なものを選べ。",choices:["ステップ関数","tanh関数","Leaky ReLU","ソフトマックス関数"],answerIndex:3,explanation:"ソフトマックス関数は複数の出力値を合計が1になるよう変換するため、各クラスに属する確率として解釈でき、多クラス分類の出力層に用いられます。なお2値分類の出力層にはシグモイド関数が使われます。tanhやLeaky ReLUは主に隠れ層で使われる関数であり、出力層との使い分けが頻出です。"},{id:"dl-overview-q05",chapterId:"dl-overview",question:"シグモイド関数を活性化関数に用いた深いネットワークで勾配消失問題が起こりやすい理由として、最も適切なものを選べ。",choices:["シグモイド関数の微分の最大値が0.25と小さく、逆伝播で掛け合わされるうちに勾配が小さくなるため","シグモイド関数の出力が負の値を取るため、勾配の符号が層ごとに反転するため","シグモイド関数は微分不可能な点を持つため、勾配が計算できなくなるため","シグモイド関数の出力が発散しやすく、勾配が無限大になるため"],answerIndex:0,explanation:"シグモイド関数の微分の最大値は0.25であり、誤差逆伝播では各層の微分が掛け合わされるため、層が深いほど勾配が指数的に小さくなります。シグモイドの出力は0〜1で負にならず、全域で微分可能、発散もしません。この対策としてReLUの採用や事前学習が登場した流れも押さえておきましょう。"},{id:"dl-overview-q06",chapterId:"dl-overview",question:"回帰問題と分類問題で代表的に用いられる誤差関数の組み合わせとして、最も適切なものを選べ。",choices:["回帰:交差エントロピー、分類:二乗誤差","回帰:ヒンジ損失、分類:二乗誤差","回帰:二乗誤差、分類:交差エントロピー","回帰:KLダイバージェンス、分類:ヒンジ損失"],answerIndex:2,explanation:"連続値を予測する回帰では予測と正解の差を二乗した二乗誤差が、確率を出力する分類では分布のずれを測る交差エントロピーが代表的に用いられます。逆の組み合わせは誤りです。ヒンジ損失はSVMで使われる損失関数であり、ニューラルネットワークの標準的な誤差関数ではありません。"},{id:"dl-overview-q07",chapterId:"dl-overview",question:"確率的勾配降下法(SGD)の説明として、最も適切なものを選べ。",choices:["全訓練データの勾配を計算してから1回だけパラメータを更新する","ランダムに選んだサンプルごとに勾配を計算してパラメータを更新する","パラメータごとに学習率を自動調整しながら更新する","過去の更新方向を慣性として加味してパラメータを更新する"],answerIndex:1,explanation:"SGDはランダムに選んだサンプル単位で勾配を計算・更新する手法で、計算が軽く局所最適解から抜け出しやすい利点があります。全データで一括更新するのはバッチ学習、学習率の自動調整はAdaGrad、慣性の利用はモメンタムの説明です。実務では両者の中間であるミニバッチ学習が一般的な点も頻出です。"},{id:"dl-overview-q08",chapterId:"dl-overview",question:"誤差逆伝播法(バックプロパゲーション)の説明として、最も適切なものを選べ。",choices:["入力データを層ごとに順方向に伝播させて予測値を求める手法","ニューロンをランダムに無効化して過学習を防ぐ手法","勾配を使わずにランダム探索でパラメータを最適化する手法","出力層の誤差を微分の連鎖律で入力側へ逆向きに伝え、各層の勾配を効率的に求める手法"],answerIndex:3,explanation:"誤差逆伝播法は、出力層で計算した誤差を連鎖律(チェインルール)を用いて入力層方向へ伝播させ、すべての重みの勾配を効率的に計算するアルゴリズムです。順方向の計算は順伝播、ランダムな無効化はドロップアウトの説明です。勾配を用いる点でランダム探索とも異なります。「連鎖律」「逆向き」がキーワードです。"},{id:"dl-overview-q09",chapterId:"dl-overview",question:"学習率に関する説明として、最も適切なものを選べ。",choices:["大きすぎると誤差が発散し、小さすぎると収束までに時間がかかる","学習データから自動的に決まるパラメータであり、人間が設定する必要はない","大きいほど必ず早く最適解に収束する","誤差逆伝播法を使う場合には設定する必要がない"],answerIndex:0,explanation:"学習率は1回の更新量を決めるハイパーパラメータで、大きすぎると最適解を飛び越えて発散し、小さすぎると収束が極端に遅くなります。学習で自動的に決まるパラメータ(重み・バイアス)とは異なり、人間が事前に設定します。大きいほど速いとは限らず、誤差逆伝播法でも更新量の調整に必須です。"},{id:"dl-overview-q10",chapterId:"dl-overview",question:"モメンタムとRMSpropの両方の考え方を組み合わせた最適化手法として、最も適切なものを選べ。",choices:["AdaGrad","Adam","ニュートン法","SGD"],answerIndex:1,explanation:"Adamはモメンタムの「過去の勾配方向の慣性」とRMSpropの「パラメータごとの学習率調整」を組み合わせた手法で、実務で最も広く使われる最適化手法の一つです。AdaGradはRMSpropの前身で学習率が下がりすぎる欠点があり、SGDは基本の確率的勾配降下法です。手法の系譜(SGD→モメンタム/AdaGrad→RMSprop→Adam)は頻出です。"},{id:"dl-overview-q11",chapterId:"dl-overview",question:"AdaGradの欠点と、それを改良した手法の組み合わせとして、最も適切なものを選べ。",choices:["勾配が発散しやすい欠点があり、モメンタムで改良された","局所最適解に陥りやすい欠点があり、ドロップアウトで改良された","計算量が大きすぎる欠点があり、SGDで改良された","学習が進むと学習率が小さくなりすぎる欠点があり、RMSpropで改良された"],answerIndex:3,explanation:"AdaGradは過去の勾配の二乗和を蓄積し続けるため、学習が進むと学習率が極端に小さくなり更新が止まる欠点があります。RMSpropは指数移動平均で古い勾配の影響を減衰させ、この問題を解決しました。ドロップアウトは過学習対策、モメンタムは振動抑制の手法であり、最適化手法の改良の系譜とは役割が異なります。"},{id:"dl-overview-q12",chapterId:"dl-overview",question:"ある方向から見ると極小、別の方向から見ると極大となり、勾配がほぼ0になるため学習が停滞しやすい点を表す用語として、最も適切なものを選べ。",choices:["大域最適解","局所最適解","鞍点","停留点におけるプラトーの解消点"],answerIndex:2,explanation:"鞍点(あんてん)は馬の鞍のような形状の点で、方向によって極小にも極大にも見え、勾配がほぼ0になるため学習が停滞します。高次元のディープラーニングでは局所最適解よりも鞍点が問題になりやすいとされます。大域最適解は誤差が全体で最小の解、局所最適解は周囲では最小だが全体では最小でない解です。鞍点付近で学習が進まない状態をプラトーと呼びます。"},{id:"dl-overview-q13",chapterId:"dl-overview",question:"ドロップアウトの説明として、最も適切なものを選べ。",choices:["学習時にニューロンをランダムに無効化することで過学習を抑える手法","検証誤差が悪化し始めた時点で学習を打ち切る手法","誤差関数に重みの大きさに応じたペナルティ項を加える手法","各層の入力を平均0・分散1に正規化する手法"],answerIndex:0,explanation:"ドロップアウトは学習のたびにニューロンをランダムに無効化する過学習対策で、毎回異なる構造のネットワークを学習するためアンサンブル学習に近い効果が得られます。学習の打ち切りは早期終了、ペナルティ項の追加は正則化、入力の正規化はバッチ正規化の説明です。各対策手法の区別はG検定頻出です。"},{id:"dl-overview-q14",chapterId:"dl-overview",question:"L1正則化とL2正則化の違いに関する説明として、最も適切なものを選べ。",choices:["L1正則化は重みを全体的に小さくし、L2正則化は重みを0にしやすい","L1正則化は一部の重みを0にしてスパースにし、L2正則化は重みを全体的に小さく抑える","L1正則化は分類専用、L2正則化は回帰専用の手法である","両者に違いはなく、計算方法のみが異なる"],answerIndex:1,explanation:"L1正則化(ラッソ回帰で使用)は重みの絶対値の和をペナルティとし、不要な重みを0にするスパース化の効果があり、特徴選択にも使えます。L2正則化(リッジ回帰で使用)は重みの二乗和をペナルティとし、重みを全体的に小さく抑えます。選択肢Aは両者が逆です。どちらも回帰・分類を問わず使え、効果は明確に異なります。"},{id:"dl-overview-q15",chapterId:"dl-overview",question:"バッチ正規化の効果として、最も適切なものを選べ。",choices:["訓練データの量を擬似的に増やすことができる","ネットワークのパラメータ数を削減できる","学習を打ち切るタイミングを自動的に決定できる","各層の入力分布を整えることで学習を安定・高速化し、過学習の抑制効果もある"],answerIndex:3,explanation:"バッチ正規化は各層への入力をミニバッチ単位で正規化する手法で、内部共変量シフトを抑えて学習を安定・高速化し、過学習を抑制する効果も知られています。データを増やすのはデータ拡張、学習の打ち切りは早期終了の説明であり、パラメータ削減の手法でもありません。「層の間に挟んで分布を整える」というイメージが重要です。"},{id:"dl-overview-q16",chapterId:"dl-overview",question:"活性化関数にReLUを用いる場合に適しているとされる重みの初期化手法として、最も適切なものを選べ。",choices:["Xavierの初期値","すべて0で初期化","Heの初期値","すべて1で初期化"],answerIndex:2,explanation:"Heの初期値はReLUに適した初期化手法で、各層の出力の分散を保つように設計されています。Xavierの初期値はシグモイドやtanhなど原点対称に近い関数に適しています。すべて0や1で初期化すると全ニューロンが同じ更新を受けて対称性が崩れず、学習が進みません。「シグモイド/tanh→Xavier、ReLU→He」の対応は頻出です。"},{id:"dl-overview-q17",chapterId:"dl-overview",question:"ハイパーパラメータの探索手法であるグリッドサーチの説明として、最も適切なものを選べ。",choices:["候補となる値の組み合わせをすべて試して最良の設定を探す手法","ランダムに選んだ組み合わせを一定回数試す手法","勾配降下法によりハイパーパラメータを直接最適化する手法","学習データから自動的にハイパーパラメータを推定する手法"],answerIndex:0,explanation:"グリッドサーチは各ハイパーパラメータの候補値を格子状に組み合わせ、すべての組み合わせを試す網羅的な探索手法です。組み合わせが増えると計算コストが爆発するため、ランダムに試行するランダムサーチが効率的な場合もあります。ハイパーパラメータは学習で自動的に決まらず、勾配降下法の直接の対象でもない点が重みとの違いです。"},{id:"dl-overview-q18",chapterId:"dl-overview",question:"オートエンコーダの説明として、最も適切なものを選べ。",choices:["入力データのクラスラベルを予測するよう学習する教師あり学習のネットワーク","出力が入力と同じになるよう学習し、隠れ層で圧縮された特徴表現を獲得するネットワーク","2つのネットワークを競わせてデータを生成するネットワーク","時系列データを扱うために再帰的な結合を持つネットワーク"],answerIndex:1,explanation:"オートエンコーダは入力と同じデータを出力するよう学習するネットワークで、入力より小さい隠れ層を通すことで次元圧縮された特徴表現を獲得します。正解ラベルを使わないため教師なし学習に分類されます。2つのネットワークを競わせるのはGAN、再帰的結合を持つのはRNNの説明です。エンコーダとデコーダという用語も併せて押さえましょう。"},{id:"dl-overview-q19",chapterId:"dl-overview",question:"積層オートエンコーダを用いた事前学習が考案された目的として、最も適切なものを選べ。",choices:["学習に必要なメモリ使用量を削減するため","訓練データのラベル付けコストを削減するため","推論速度を高速化するため","深いネットワークの勾配消失問題を回避し、層ごとに適切な初期値を得るため"],answerIndex:3,explanation:"積層オートエンコーダは、オートエンコーダを1層ずつ順番に教師なし学習して積み重ねることで、深いネットワークでも各層が良い初期値を持てるようにする事前学習の手法で、勾配消失問題への対策としてヒントンらが提案しました。事前学習の後にファインチューニングで全体を調整します。メモリ削減や推論高速化が目的ではありません。なお現在はReLUやバッチ正規化の普及により、この種の事前学習はあまり使われなくなっています。"},{id:"dl-overview-q20",chapterId:"dl-overview",question:"「モデルのパラメータ数に対して、その10倍の訓練データが必要である」とする経験則の名称として、最も適切なものを選べ。",choices:["ムーアの法則","ノーフリーランチ定理","バーニーおじさんのルール","醜いアヒルの子の定理"],answerIndex:2,explanation:"バーニーおじさんのルールは、モデルのパラメータ数の10倍の訓練データが必要だとする経験則です。ムーアの法則は半導体の集積率が約2年で2倍になるという法則で、計算資源の進歩を支えました。ノーフリーランチ定理はあらゆる問題に万能なアルゴリズムは存在しないという定理、醜いアヒルの子の定理は前提なしには普遍的な分類はできないという定理で、いずれもG検定頻出の用語です。"},{id:"dl-overview-q21",chapterId:"dl-overview",question:"1943年にマカロックとピッツが提案した形式ニューロンの説明として、最も適切なものを選べ。",choices:["入力の重み付き和をしきい値と比較し、0または1を出力する人工ニューロンの数理モデル","誤差逆伝播法によって重みを自動的に学習する多層構造のモデル","入力を確率分布として表現し、生成を行うモデル","視覚野のS細胞・C細胞を模した階層型の画像認識モデル"],answerIndex:0,explanation:"形式ニューロン(マカロック・ピッツのモデル)は、複数の入力に重みを掛けて足し合わせ、その和をしきい値と比較して0か1を出力する、人工ニューロンの最初期の数理モデルです。誤差逆伝播法による学習はずっと後の概念で、選択肢Bは誤りです。選択肢Cはボルツマンマシンなどの生成モデル、選択肢Dはネオコグニトロンの説明であり、いずれも形式ニューロンとは異なります。"},{id:"dl-overview-q22",chapterId:"dl-overview",question:"「同時に発火するニューロン間の結合が強まる」という、学習の原理を表す法則として、最も適切なものを選べ。",choices:["ムーアの法則","ヘブ則","ベイズの定理","ノーフリーランチ定理"],answerIndex:1,explanation:"ヘブ則は、同時に活動するニューロン同士の結合が強化されるという神経生理学に基づく学習原理で、「ともに発火する細胞は結びつく」と表現され、ニューラルネットワークの学習の基礎となる考え方です。選択肢Aのムーアの法則は半導体の集積率、選択肢Cのベイズの定理は確率の更新、選択肢Dのノーフリーランチ定理はアルゴリズムの万能性に関するもので、いずれも学習則ではありません。"},{id:"dl-overview-q23",chapterId:"dl-overview",question:"ニューラルネットワークにおける信用割当問題(credit assignment problem)の説明として、最も適切なものを選べ。",choices:["限られた計算資源をどの層に割り当てるかを決める問題","学習に必要なデータをどの程度集めればよいかを見積もる問題","出力の誤差に対して、どの重みやニューロンがどれだけ寄与したかを特定する問題","複数のモデルの予測をどの重みで統合するかを決める問題"],answerIndex:2,explanation:"信用割当問題は、最終的な出力の誤差(または成果)に対して、内部の各重みやニューロンがどれだけ責任を負うかを割り当てる問題で、誤差逆伝播法はこれを連鎖律によって効率的に解決します。選択肢Aの計算資源配分や選択肢Bのデータ量見積もり、選択肢Dのアンサンブルの重み付けとは異なる概念です。深い層ほどこの割り当てが難しくなる点が学習の難所です。"},{id:"dl-overview-q24",chapterId:"dl-overview",question:"制限付きボルツマンマシン(RBM)の説明として、最も適切なものを選べ。",choices:["畳み込みとプーリングを交互に行う画像認識モデル","出力層にソフトマックスを持つ多クラス分類モデル","隠れ層の出力を次の時刻に戻す再帰型のモデル","可視層と隠れ層からなり、同一層内に結合を持たないボルツマンマシン"],answerIndex:3,explanation:"制限付きボルツマンマシンは可視層と隠れ層の2層からなり、同じ層の中のユニット同士は結合を持たない(制限がある)ことで学習を扱いやすくしたモデルで、深層信念ネットワークの事前学習に用いられました。選択肢Aは畳み込みニューラルネットワーク、選択肢Cはリカレントニューラルネットワークの説明であり、RBMとは構造が異なります。「制限」が層内結合をなくす意味である点が頻出です。"},{id:"dl-overview-q25",chapterId:"dl-overview",question:"2006年にヒントンが提案し、ディープラーニング研究の転機となった、制限付きボルツマンマシンを積み重ねて事前学習するモデルとして、最も適切なものを選べ。",choices:["深層信念ネットワーク(DBN)","敵対的生成ネットワーク(GAN)","サポートベクターマシン(SVM)","畳み込みニューラルネットワーク(CNN)"],answerIndex:0,explanation:"深層信念ネットワーク(DBN)は、制限付きボルツマンマシンを1層ずつ積み重ねて事前学習する生成モデルで、ヒントンが2006年に提案し、勾配消失で頓挫していた深層ネットワークの学習を可能にしてディープラーニング研究を再燃させました。選択肢BのGANは生成器と識別器を競わせるモデル、選択肢CのSVMは機械学習の分類手法であり、いずれもRBMの積層とは
