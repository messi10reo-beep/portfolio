異なります。"},{id:"dl-overview-q26",chapterId:"dl-overview",question:"学習におけるエポックとイテレーションの関係として、最も適切なものを選べ。",choices:["エポックはミニバッチ1個分の更新、イテレーションは全データを使い切る単位である","エポックは訓練データ全体を1回使い切る単位、イテレーションはミニバッチごとの1回の更新である","エポックとイテレーションは同じ意味で、呼び方が異なるだけである","エポックはハイパーパラメータの探索回数、イテレーションは層の数を表す"],answerIndex:1,explanation:"1エポックは訓練データ全体を1回学習に使い切る単位で、ミニバッチ学習ではその中でミニバッチごとに1回ずつパラメータを更新し、その各更新をイテレーションと呼びます。したがって「データ件数÷バッチサイズ」が1エポックあたりのイテレーション数になります。選択肢Aは両者の説明が逆で、両者は明確に異なる単位である点が頻出です。"},{id:"dl-overview-q27",chapterId:"dl-overview",question:"勾配がほぼ0の平坦な領域に入り、学習がなかなか進まなくなる停滞状態を表す用語として、最も適切なものを選べ。",choices:["オーバーフィッティング","アンダーサンプリング","プラトー","アンサンブル"],answerIndex:2,explanation:"プラトーは誤差曲面の平坦な領域で勾配がほぼ0になり、パラメータの更新がほとんど進まなくなる停滞状態を指し、鞍点付近で起こりやすいことが知られています。選択肢Aのオーバーフィッティングは過学習、選択肢Bのアンダーサンプリングは不均衡データの調整手法、選択肢Dのアンサンブルは複数モデルの統合であり、学習停滞の現象とは異なります。"},{id:"dl-overview-q28",chapterId:"dl-overview",question:"学習率スケジューリング(学習率を学習の進行に応じて変化させる手法)を用いる主な目的として、最も適切なものを選べ。",choices:["訓練データを擬似的に増やして過学習を抑えるため","ニューロンをランダムに無効化してアンサンブル効果を得るため","各層の入力分布を正規化して内部共変量シフトを抑えるため","学習初期は大きな学習率で素早く進め、後半は小さくして最適解付近で安定させるため"],answerIndex:3,explanation:"学習率スケジューリングは、学習の進行に応じて学習率を変化させる手法で、序盤は大きめの学習率で速く進み、終盤は小さくして最適解付近での振動を抑え安定的に収束させる狙いがあります。選択肢Aはデータ拡張、選択肢Bはドロップアウト、選択肢Cはバッチ正規化の目的であり、いずれも学習率の調整とは別の手法です。"},{id:"dl-overview-q29",chapterId:"dl-overview",question:"重み減衰(weight decay)に関する説明として、最も適切なものを選べ。",choices:["重みの大きさにペナルティを課して過大化を防ぐ手法で、L2正則化と本質的に同じである","学習時にニューロンをランダムに削除する過学習対策である","古い勾配の影響を指数移動平均で減衰させる最適化手法である","学習率を更新のたびに一定割合で減衰させる手法である"],answerIndex:0,explanation:"重み減衰は、更新のたびに重みをわずかに0へ近づける(減衰させる)ことで重みの過大化を防ぐ手法で、誤差関数に重みの二乗和を加えるL2正則化と本質的に等価です。選択肢Bはドロップアウト、選択肢CはRMSpropなどの勾配の減衰、選択肢Dは学習率スケジューリングの説明であり、「重み」を減衰させる重み減衰とは対象が異なります。"},{id:"dl-overview-q30",chapterId:"dl-overview",question:"汎化誤差をバイアスとバリアンスに分解して考えるとき、モデルが単純すぎて訓練データの傾向を捉えきれない状態に対応するものとして、最も適切なものを選べ。",choices:["バリアンスが高い状態(過学習)","バイアスが高い状態(未学習)","ノイズが高い状態","学習率が高い状態"],answerIndex:1,explanation:"汎化誤差はバイアス・バリアンス・ノイズに分解でき、モデルが単純すぎてデータの傾向を捉えられない状態はバイアスが高い(未学習・過小適合)状態です。逆にモデルが複雑すぎて訓練データに過剰適合し、データの揺らぎに敏感になる状態は選択肢Aのバリアンスが高い(過学習)状態です。両者はトレードオフの関係にあり、バランスを取ることが汎化性能の鍵となります。"},{id:"dl-overview-q31",chapterId:"dl-overview",question:"近年のディープラーニングで観察される二重降下(double descent)現象の説明として、最も適切なものを選べ。",choices:["学習率を2回下げると誤差も2段階で下がる現象","勾配が逆伝播のたびに2乗で小さくなる現象","モデルの複雑さを増やすとテスト誤差が一度悪化した後、さらに複雑にすると再び改善する現象","訓練誤差と検証誤差が交互に振動し続ける現象"],answerIndex:2,explanation:"二重降下現象は、モデルの複雑さ(パラメータ数)を増やすとテスト誤差がいったん下がって悪化し、訓練データを完全に当てはめる境界(補間しきい値)を超えてさらに大きくすると再びテスト誤差が下がるという、古典的なバイアス・バリアンスのU字曲線では説明できない現象です。選択肢Aの学習率や選択肢Bの勾配消失、選択肢Dの振動とは異なる、過剰パラメータ領域の挙動を指します。"},{id:"dl-overview-q32",chapterId:"dl-overview",question:"「あらゆる問題に対して常に最も優れた万能の学習アルゴリズムは存在しない」ことを示す定理として、最も適切なものを選べ。",choices:["中心極限定理","ベイズの定理","大数の法則","ノーフリーランチ定理"],answerIndex:3,explanation:"ノーフリーランチ定理は、すべての問題で他に勝るような万能アルゴリズムは存在せず、ある問題で優れた手法は別の問題では劣りうることを示します。したがって問題に応じて適切な手法を選ぶ必要があります。選択肢Aの中心極限定理や選択肢Cの大数の法則は標本分布に関する定理、選択肢Bのベイズの定理は確率更新の定理であり、アルゴリズムの優劣を論じるものではありません。"},{id:"dl-overview-q33",chapterId:"dl-overview",question:"活性化関数としてのtanh関数がシグモイド関数より勾配消失を起こしにくいとされる理由として、最も適切なものを選べ。",choices:["出力が-1〜1で原点対称となり、微分の最大値が1とシグモイドの0.25より大きいため","出力が0〜1の確率として解釈でき、合計が1になるため","負の入力に対して常に一定の小さな傾きを持つため","入力が正の領域で微分が常に1になるため"],answerIndex:0,explanation:"tanh関数は出力が-1〜1の範囲で原点対称(0中心)になり、微分の最大値が1とシグモイドの0.25より大きいため、逆伝播で勾配が小さくなりにくく、シグモイドより勾配消失を起こしにくいとされます。ただし完全には解消しません。選択肢Bはソフトマックス、選択肢CはLeaky ReLU、選択肢Dは正領域でのReLUの性質であり、tanhの特徴とは異なります。"},{id:"dl-overview-q34",chapterId:"dl-overview",question:"バッチ正規化が抑えるとされる「内部共変量シフト」の説明として、最も適切なものを選べ。",choices:["訓練データとテストデータで入力分布が異なってしまう現象","学習が進むにつれて各層への入力の分布が変動し、後続の層の学習が不安定になる現象","ニューロンの重みがすべて同じ値に収束してしまう現象","勾配が層を遡るほど指数的に小さくなる現象"],answerIndex:1,explanation:"内部共変量シフトとは、学習中に前の層のパラメータが更新されることで各層への入力分布が刻々と変動し、後続の層の学習が不安定・低速になる現象です。バッチ正規化は各層の入力を正規化してこれを抑えます。選択肢Aは(外部の)共変量シフト、選択肢Cは重みの対称性の問題、選択肢Dは勾配消失問題の説明であり、内部共変量シフトとは異なります。"},{id:"dl-overview-q35",chapterId:"dl-overview",question:"ドロップアウトがアンサンブル学習に近い効果を持つとされる理由として、最も適切なものを選べ。",choices:["複数の異なるデータセットで同じモデルを学習させるため","学習率を複数の値に分けて並行して試すため","学習のたびに一部のニューロンを無効化し、毎回構造の異なる多数のサブネットワークを学習・統合する形になるため","複数の異なる最適化手法を組み合わせて使うため"],answerIndex:2,explanation:"ドロップアウトは学習のたびにニューロンをランダムに無効化するため、実質的に毎回構造の異なる多数のサブネットワークを学習し、推論時にそれらを平均的に使うことになります。これが多数のモデルの予測を統合するアンサンブル学習に近い効果を生みます。選択肢Aのデータ分割や選択肢Dの最適化手法の組合せはアンサンブルの一形態ですが、ドロップアウトの仕組みそのものではありません。"},{id:"dl-overview-q36",chapterId:"dl-overview",question:"データを訓練・検証・テストに分けるとき、検証(validation)データの主な役割として、最も適切なものを選べ。",choices:["モデルの重みやバイアスを直接更新するために使う","学習が完了したモデルの最終的な性能を一度だけ評価するために使う","訓練データが不足したときに水増しするために使う","学習率や層数などのハイパーパラメータの調整やモデル選択のために使う"],answerIndex:3,explanation:"検証データは、学習中にハイパーパラメータの調整やモデルの選択、早期終了の判断などに用いるデータで、これにより未知データへの汎化性能を見ながら設定を決められます。選択肢Aの重み更新は訓練データの役割、選択肢Bの最終性能評価はテストデータの役割であり、テストデータを調整に使うと評価が甘くなる点が頻出の注意点です。"},{id:"dl-overview-q37",chapterId:"dl-overview",question:"ハイパーパラメータ探索の手法であるベイズ最適化の説明として、最も適切なものを選べ。",choices:["過去の試行結果から有望そうな設定を確率的に予測し、効率よく次に試す点を選ぶ手法","候補値の全組み合わせを格子状にすべて試す手法","候補の範囲からランダムに値を選んで試す手法","勾配降下法で重みを直接最適化する手法"],answerIndex:0,explanation:"ベイズ最適化は、これまでの試行結果(設定とその性能)から目的関数の振る舞いを確率モデルで推定し、次に試すと有望そうな設定を選んで効率的に探索する手法です。選択肢Bは全組み合わせを試すグリッドサーチ、選択肢Cはランダムサーチの説明で、これらが過去の結果を使わないのに対し、ベイズ最適化は履歴を活用する点が特徴です。選択肢Dの勾配降下法は重みの最適化手法です。"},{id:"dl-overview-q38",chapterId:"dl-overview",question:"大規模な学習を複数の計算機(デバイス)で行う分散学習のうち、データ並列の説明として、最も適切なものを選べ。",choices:["1つのモデルを複数のデバイスに分割して配置し、層ごとに分担して計算する方式","同じモデルを各デバイスに複製し、データを分割して並行に処理して勾配を集約する方式","学習率を複数のデバイスで別々に設定して比較する方式","1台のデバイスで複数のモデルを順番に学習する方式"],answerIndex:1,explanation:"データ並列は、同一のモデルを各デバイスに複製し、訓練データを分割してそれぞれで並行に計算し、得られた勾配を集約してパラメータを更新する方式です。一方、選択肢Aのようにモデル自体を分割して各デバイスに配置するのはモデル並列で、巨大すぎて1台に載らないモデルに有効です。両者の使い分けはG検定で問われやすいポイントです。"},{id:"dl-overview-q39",chapterId:"dl-overview",question:"ディープラーニングの学習で用いられる混合精度(mixed precision)学習の主な利点として、最も適切なものを選べ。",choices:["すべての計算を64ビットで行うことで数値誤差を完全になくせる","重みを整数のみで表現することで学習を不要にできる","16ビットなどの低精度と32ビットを使い分けることで、計算を高速化しメモリ使用量を削減できる","学習データのラベル誤りを自動的に修正できる"],answerIndex:2,explanation:"混合精度学習は、計算の多くを16ビット(半精度)などの低精度で行いつつ、精度が必要な箇所は32ビットを併用することで、計算を高速化しメモリ使用量を削減する手法で、GPUの専用機構により効果が大きくなります。選択肢Aの64ビット化はむしろ重く、選択肢Bの整数化は量子化(推論向け)に近い別概念、選択肢Dのラベル修正は混合精度とは無関係です。"},{id:"dl-overview-q40",chapterId:"dl-overview",question:"「半導体の集積率(トランジスタ数)が約2年で2倍になる」という、計算能力の向上を支えてきた経験則として、最も適切なものを選べ。",choices:["バーニーおじさんのルール","ノーフリーランチ定理","ヘブ則","ムーアの法則"],answerIndex:3,explanation:"ムーアの法則は、半導体に集積されるトランジスタ数が約2年で2倍になるという経験則で、計算能力の指数的な向上を支え、ディープラーニングの発展の前提となりました。近年は微細化の物理的限界が指摘され、その維持が難しくなっています。選択肢Aはデータ量の経験則、選択肢Cは学習則、選択肢Bはアルゴリズムの万能性の定理であり、計算能力の向上を表すものではありません。"}],contrasts:[{title:"シグモイドとReLU",left:{label:"シグモイド関数",traits:["出力は0〜1","微分の最大値は0.25","勾配消失を起こしやすい"]},right:{label:"ReLU関数",traits:["0以下は0、正はそのまま","正領域の微分は常に1","勾配消失しにくく主流"]},point:"微分が小さく消えるシグモイド、微分1で消えにくいReLUで覚える"},{title:"SGDとAdam",left:{label:"SGD(確率的勾配降下法)",traits:["1サンプルごとに更新","学習率は固定","最も基本的な手法"]},right:{label:"Adam",traits:["モメンタム+RMSprop","パラメータごとに学習率調整","実務で広く使われる"]},point:"素朴なSGD、慣性と学習率調整を兼ねた万能型Adam"},{title:"勾配消失と勾配爆発",left:{label:"勾配消失",traits:["勾配が遡るほど小さく","深い層が学習されない","シグモイドが主因"]},right:{label:"勾配爆発",traits:["勾配が遡るほど大きく","学習が発散・不安定","勾配クリッピングで対処"]},point:"消えるか爆発するか、勾配が小さくなる/大きくなるで区別"},{title:"ドロップアウトとバッチ正規化",left:{label:"ドロップアウト",traits:["ニューロンをランダム無効化","アンサンブル効果","過学習対策が主目的"]},right:{label:"バッチ正規化",traits:["層の入力を正規化","内部共変量シフトを抑制","学習を安定・高速化"]},point:"間引くドロップアウト、整えるバッチ正規化"},{title:"L1正則化とL2正則化",left:{label:"L1正則化(ラッソ)",traits:["絶対値の和をペナルティ","重みが0になりやすい","特徴選択に使える"]},right:{label:"L2正則化(リッジ)",traits:["二乗和をペナルティ","重みを全体的に縮小","重み減衰と等価"]},point:"「削るL1、縮めるL2」で覚える"},{title:"Xavier初期化とHe初期化",left:{label:"Xavierの初期値",traits:["シグモイド/tanh向け","原点対称な関数に適合","前後の分散を保つ"]},right:{label:"Heの初期値",traits:["ReLU向け","正領域のみ活きる前提","分散を2倍に取る"]},point:"原点対称ならXavier、ReLUならHeの対応で覚える"},{title:"エポックとイテレーション",left:{label:"エポック",traits:["全データを1回使い切る","学習回数の大きな単位","複数の更新を含む"]},right:{label:"イテレーション",traits:["ミニバッチ1回分の更新","小さな単位","件数÷バッチ数だけ繰り返す"]},point:"1エポック=複数イテレーション、含む側がエポック"}]},rf={id:"dl-tech",number:4,title:"ディープラーニングの要素技術",subtitle:"CNN・RNN・Attention・Transformer",sections:[{title:"CNNの基本構造",points:["CNN(畳み込みニューラルネットワーク)は主に画像認識に用いられ、畳み込み層・プーリング層・全結合層から構成される。","畳み込み層はフィルタ(カーネル)を画像上でスライドさせながら積和演算を行い、エッジなどの局所的な特徴を抽出した特徴マップを出力する。","フィルタを動かす幅をストライドと呼び、画像の端の情報を失わないよう周囲を0などで埋める処理をパディングと呼ぶ。","プーリング層は特徴マップを縮小する処理で、最大値を取る最大プーリングが代表的であり、位置の微小なずれに頑健になる効果がある。","CNNはニューロンが画像の一部の領域とだけ結合する局所結合と、同じフィルタを画像全体で使い回す重み共有により、全結合層に比べてパラメータ数を大幅に削減している。","CNNの原型は福島邦彦が提案したネオコグニトロンであり、単純型細胞(S細胞)と複雑型細胞(C細胞)という視覚野の知見に基づいている。"],summary:"CNNは畳み込み層(フィルタで局所特徴を抽出)とプーリング層(縮小し位置ずれに頑健)からなる。ストライドは移動幅、パディングは端を0で埋める処理。局所結合と重み共有でパラメータを大幅削減する。原型は福島邦彦のネオコグニトロン(S細胞・C細胞)と押さえる。"},{title:"代表的なCNNモデルとILSVRC",points:["LeNetはヤン・ルカンが1998年に提案した手書き文字認識のためのCNNで、畳み込み層とプーリング(サブサンプリング)層を交互に重ねた初期の実用的CNNである。","2012年のILSVRC(画像認識コンペティション)でヒントンらのチームのAlexNetが従来手法に大差をつけて優勝し、ディープラーニングブームの火付け役となった。","VGGは3x3の小さなフィルタを重ねて16〜19層まで深くしたモデルで、シンプルな構造ながら高い性能を示した。","GoogLeNetは複数のサイズのフィルタによる畳み込みを並列に行うインセプションモジュールを導入し、2014年のILSVRCで優勝した。","ResNetはスキップ結合(残差学習)により層をまたいで入力を伝える構造で勾配消失を抑え、100層を超える超深層ネットワークを実現して2015年のILSVRCで優勝した。","EfficientNetはネットワークの深さ・幅・入力解像度の3要素をバランスよく複合的にスケーリングすることで、少ないパラメータで高精度を達成したモデルである。"],summary:"ILSVRC優勝モデルの年代順はAlexNet(2012)→GoogLeNet(2014)→ResNet(2015)が頻出。VGGは3×3フィルタを重ねて深層化、GoogLeNetはインセプションモジュール、ResNetはスキップ結合(残差学習)で超深層化。モデルと工夫の対応を押さえる。"},{title:"RNNと時系列データ",points:["RNN(リカレントニューラルネットワーク)は隠れ層の出力を次の時刻の入力に戻す再帰構造を持ち、テキストや音声などの時系列データを扱える。","RNNの学習には誤差を時間方向に遡って伝播させるBPTT(通時的誤差逆伝播法)が用いられるが、系列が長いと勾配消失・勾配爆発が起こりやすい。","LSTMはCEC(セル)と入力ゲート・出力ゲート・忘却ゲートからなるゲート機構により、長期の依存関係を学習できるようにしたRNNの改良版である。","GRUはLSTMを簡略化したモデルで、リセットゲートと更新ゲートの2つのゲートによりパラメータ数を減らしつつ同様の効果を狙う。","双方向RNN(Bidirectional RNN)は過去から未来への方向と未来から過去への方向の2つのRNNを組み合わせ、文脈を両方向から捉える。","seq2seq(エンコーダ・デコーダモデル)は入力系列をエンコーダで固定長ベクトルに変換し、デコーダで出力系列を生成するモデルで、機械翻訳などの系列変換に用いられる。"],summary:"RNNは再帰構造で時系列を扱い、学習はBPTTだが長い系列で勾配消失・爆発が起きやすい。LSTMはCECと3ゲートで長期依存を学習、GRUは2ゲートに簡略化。seq2seqはエンコーダ・デコーダで系列変換を行い、固定長ベクトルの情報損失がAttention導入の動機となった点を押さえる。"},{title:"AttentionとTransformer",points:["Attention機構は入力系列のどの部分に注目すべきかを重みとして学習する仕組みで、seq2seqが長い系列で情報を失う問題を緩和した。","Transformerは2017年に提案された、再帰構造や畳み込みを使わずSelf-Attention(自己注意機構)のみで系列を処理するモデルである。","Self-Attentionは同じ系列内の単語同士の関連度を計算する仕組みで、離れた単語間の依存関係も直接捉えられる。","Transformerは語順の情報を失わないよう、単語の位置を表す位置エンコーディングを入力に加える。","RNNと異なりTransformerは系列を逐次処理せず並列計算できるため、大規模データでの学習が高速化し、大規模言語モデルの基盤となった。","BERTはTransformerのエンコーダを用いた双方向の言語モデルで、文中の単語をマスクして予測するマスク言語モデル(MLM)と次文予測(NSP)で事前学習される。","GPTはTransformerのデコーダを用いた自己回帰型言語モデルで、直前までの単語列から次の単語を予測するタスクで事前学習される。"],summary:"Transformer(2017)は再帰や畳み込みを使わずSelf-Attentionのみで系列を処理し、逐次処理が不要で並列計算でき大規模言語モデルの基盤となった。語順を補う位置エンコーディングが必須。BERTはエンコーダ利用の双方向(MLM・NSP)、GPTはデコーダ利用の自己回帰の対比が最頻出。"},{title:"転移学習とモデル圧縮",points:["事前学習は大規模データでモデルに汎用的な表現をあらかじめ学習させる工程で、その後に目的タスクへ適応させて利用する。","転移学習は事前学習済みモデルの重みを固定し、出力層など追加した部分のみを学習させる方法を指すことが多い。","ファインチューニングは事前学習済みモデル全体(または大部分)の重みを目的タスクのデータで再調整する方法で、転移学習より多くのデータと計算を要する。","蒸留(知識蒸留)は大きな教師モデルの出力を教師データとして小さな生徒モデルを学習させるモデル圧縮の手法である。","プルーニング(枝刈り)は重要度の低い重みやニューロンを削除する圧縮手法、量子化はパラメータを少ないビット数で表現する圧縮手法である。","NAS(ニューラルアーキテクチャサーチ)はネットワーク構造自体を自動探索する技術で、EfficientNetの基本構造の設計にも用いられた。","MobileNetはスマートフォンなどの限られた計算資源でも動くよう、畳み込みを空間方向とチャネル方向に分解する工夫(Depthwise Separable Convolution)で軽量化したモデルである。"],summary:"転移学習は事前学習済みの重みを固定し追加層のみ学習、ファインチューニングはモデル全体を再調整する違いを押さえる。モデル圧縮は蒸留(教師→生徒)・プルーニング(重み削除)・量子化(低ビット化)の3手法。NASは構造の自動探索、MobileNetはDepthwise Separable Convolutionで軽量化。"},{title:"畳み込み演算の詳細と各種畳み込み",points:["畳み込みは、フィルタ(カーネル)を入力上でスライドさせ、重なった画素とフィルタの値を掛けて足す積和演算を繰り返し、特徴マップを作る処理である。","ストライドはフィルタを動かす歩幅で、大きくすると特徴マップが小さくなり計算量も減る。パディングは画像の周囲を0などで埋め、端の情報損失や特徴マップの縮小を防ぐ。","受容野は、ある出力ユニットが反応する入力側の領域で、層を深く重ねるほど受容野が広がり、より大域的・抽象的な特徴を捉えられる。","プーリングには領域内の最大値を取る最大プーリングと平均を取る平均プーリングがあり、特徴マップを縮小して位置の微小なずれに頑健にする。プーリング層には学習パラメータがない。","Global Average Pooling(GAP)は各特徴マップ全体の平均を1つの値に集約する処理で、CNN末尾の全結合層を置き換えてパラメータ数を大幅に削減し過学習を抑える。","1×1畳み込み(ポイントワイズ畳み込み)は空間ではなくチャネル方向にのみ重み付き和を取り、チャネル数の削減・結合により計算量を抑える(GoogLeNetやResNetのボトルネックで活用)。","Dilated(Atrous)畳み込みはフィルタの参照位置に間隔を空けることで、パラメータを増やさず受容野を広げる手法で、広い文脈が要るセグメンテーションで使われる。","局所結合(各ニューロンが入力の一部とだけ結合)と重み共有(同じフィルタを全体で使い回す)により、CNNは全結合層よりパラメータ数を劇的に削減している。"],summary:"畳み込みはフィルタの積和演算で特徴マップを作り、ストライドは歩幅・パディングは端の保護。受容野は層を深めるほど拡大。プーリングは縮小し位置ずれに頑健(学習パラメータなし)。GAPは全結合層を置換し省パラメータ、1×1畳み込みはチャネル調整、Dilated畳み込みは受容野拡大。局所結合と重み共有がパラメータ削減の核。"},{title:"代表的CNNの系譜と工夫",points:["ネオコグニトロン(福島邦彦)はCNNの原型で、視覚野のS細胞(特徴抽出)・C細胞(位置ずれ吸収)の知見に基づく階層型ネットワークである。","LeNet(ヤン・ルカン、1998年)は畳み込みとサブサンプリング(プーリング)を交互に重ねた初期の実用的CNNで、手書き数字認識に使われた。","AlexNet(2012年ILSVRC優勝)はReLUやドロップアウト、GPU学習を活用してエラー率を大きく下げ、ディープラーニングブームの火付け役となった。","VGGは3×3の小さなフィルタを多数重ねて16〜19層まで深くしたシンプルな構造、GoogLeNet(2014年優勝)は複数サイズの畳み込みを並列実行するインセプションモジュールが特徴である。","ResNet(2015年優勝)はスキップ結合で入力を数層先へ足し、層には差分(残差)だけを学習させることで勾配消失を抑え、100層超の超深層化を実現した。","DenseNetは各層の出力を後続の全層へ連結(concat)して特徴を再利用する構造で、ResNetが「足し合わせ」なのに対し「連結」する点が違いである。","SENetは各チャネルの重要度を学習してチャネルごとに特徴マップを重み付けする、チャネル方向のAttention的な機構を導入した。","EfficientNetは深さ・幅・入力解像度の3要素をバランスよく複合スケーリングして少パラメータで高精度を達成し、MobileNetはDepthwise Separable Convolutionでモバイル向けに軽量化した。"],summary:"原型ネオコグニトロン(福島・S/C細胞)→LeNet(ルカン)→AlexNet(2012、ReLU/ドロップアウト/GPU)→GoogLeNet(2014、インセプション)→ResNet(2015、スキップ結合・残差)の流れが頻出。DenseNetは連結、SENetはチャネル重み付け、EfficientNetは複合スケーリング、MobileNetは分解で軽量化と整理する。"},{title:"RNNとゲート機構の詳細",points:["RNNは隠れ層の状態(出力)を次の時刻の入力に戻す再帰構造を持ち、過去の文脈を引き継ぎながらテキスト・音声・時系列を処理する。","RNNの学習は、時間方向に展開してから誤差を遡って伝えるBPTT(通時的誤差逆伝播法)で行われ、系列が長いほど勾配消失・勾配爆発が起きやすい。","勾配爆発には勾配の大きさをしきい値で抑える勾配クリッピングが、勾配消失にはLSTMやGRUなどのゲート機構が対策として用いられる。","LSTMはCEC(セル)に情報を保持し、忘却ゲート(何を消すか)・入力ゲート(何を書き込むか)・出力ゲート(何を出すか)の3ゲートで情報の流れを制御して長期依存を学習する。","GRUはLSTMを簡略化し、リセットゲートと更新ゲートの2ゲートでCECを持たずにパラメータ数を減らしつつ、長期依存の学習効果を狙う。","双方向RNNは前から読む方向と後ろから読む方向の2つのRNNを組み合わせ、各時点で前後両方の文脈を使うため、文全体が揃う固有表現抽出や文書分類に適する。","seq2seq(エンコーダ・デコーダ)は入力系列を固定長ベクトルに圧縮してから出力系列を生成するが、長い系列では情報を詰め込みきれず、これがAttention導入の動機となった。","教師強制(teacher forcing)は系列生成の学習時にデコーダへ正解単語を入力して学習を安定化する手法だが、推論時は自分の予測を使うため学習時とのずれ(露出バイアス)が生じる。"],summary:"RNNは再帰構造で文脈を保持し学習はBPTT、長い系列で勾配消失・爆発が起きる(対策は勾配クリッピングとゲート機構)。LSTMはCEC+3ゲート、GRUは2ゲートに簡略化。双方向RNNは前後文脈、seq2seqは固定長ベクトルの情報損失がAttentionの動機、教師強制は学習安定化(露出バイアスに注意)。"},{title:"Attention機構とTransformerの内部",points:["Attentionは、Query(問い合わせ)と各Key(鍵)の類似度から重みを求め、その重みでValue(値)を加重平均して出力する仕組みで、「QとKで重みを決めVを重み付き和」が要点である。","Self-Attention(自己注意)は同一系列内からQ・K・Vを作り、各単語が系列内の全単語との関連度を計算するため、離れた単語間の依存も直接1ステップで捉えられる。","Cross-Attentionはデコーダ側のQueryとエンコーダ側のKey・Valueのように異なる系列間で注意を計算し、翻訳でデコーダが入力文を参照する際に使われる。","Multi-Head Attentionは入力を複数の部分空間に射影してAttentionを並列に複数(ヘッド)計算し、構文的・意味的など異なる観点の関連を同時に捉えてから結合する。","Self-Attentionは語順情報を持たないため、Transformerは単語の位置を表す位置エンコーディングを埋め込みに加えて語順を補う。","Transformerは再帰も畳み込みも使わずAttentionのみで構成されるため、系列を逐次処理せず全位置を同時に計算でき、並列化で大規模学習を高速化できる。","ただしSelf-Attentionは全要素ペアの関連度を計算するため、計算量・メモリが系列長の2乗に比例する点が弱点で、RNNは計算量こそ系列長に比例するが逐次処理が必要で並列化しにくい。","Transformerは2017年の論文「Attention Is All You Need」で提案され、BERTやGPTなど大規模言語モデルの共通基盤となった。"],summary:"AttentionはQとKの類似度で重みを決めVを加重平均。Self-Attentionは同一系列内、Cross-Attentionは異系列間、Multi-Headは複数観点を並列に捕捉。語順は位置エンコーディングで補う。Transformerは並列計算で高速だが計算量は系列長の2乗、RNNは逐次処理で並列化しにくい点を対比して押さえる。"},{title:"事前学習済み言語モデルとトークン化",points:["事前学習済み言語モデルは、大規模テキストで汎用的な言語表現を先に学習し、その後ファインチューニングで各タスクに適応させることで、少ない教師データでも高性能を出せる。","BERTはTransformerのエンコーダを用いた双方向モデルで、文中の単語を隠して前後の文脈から当てるマスク言語モデル(MLM)と、2文が連続するか判定する次文予測(NSP)で事前学習される。","GPTはTransformerのデコーダを用いた自己回帰型モデルで、直前までの単語列から次の単語を一方向に予測するタスクで事前学習される。","「エンコーダ・双方向・MLM」のBERTと「デコーダ・自己回帰(一方向)・次単語予測」のGPTという対比は最頻出で、ELMoはTransformer以前の双方向LSTMベースの文脈依存表現として位置づけられる。","T5(Text-to-Text Transfer Transformer)は、翻訳・要約・分類などあらゆるタスクを「テキスト入力→テキスト出力」に統一して扱うモデルである。","トークンはテキストをモデルが扱う単位に区切った要素(単語・サブワード・文字など)で、大規模言語モデルの入力長や課金はトークン数を基準にすることが多い。","サブワード分割(BPE・SentencePieceなど)は頻出語を1単位・まれな語を小さな部分単位に分け、語彙サイズを抑えつつ未知語(OOV)を既知サブワードの組合せで表現できるようにする。","ALBERT(パラメータ共有・埋め込み分解)やDistilBERT(知識蒸留)はBERTを軽量化・効率化しつつ性能をできるだけ保つ派生モデルである。"],summary:"事前学習+ファインチューニングで少データでも高性能。BERTはエンコーダ・双方向(MLM/NSP)、GPTはデコーダ・自己回帰(次単語予測)の対比が最頻出。T5は全タスクをテキスト変換に統一。トークンは処理単位でサブワード分割(BPE等)が未知語に強い。ALBERT/DistilBERTはBERTの軽量化版。"},{title:"Vision Transformerとモデル軽量化・転移",points:["ViT(Vision Transformer)は画像を固定サイズの小さなパッチ(例:16×16画素)に分割し、各パッチをトークンとみなして系列に並べ、自然言語と同様にSelf-Attentionで画像を処理する。","ViTはパッチの位置情報も位置エンコーディングで与え、十分大量のデータで学習すればCNNに匹敵・凌駕する精度を出せる一方、データが少ないとCNNに劣りやすい。","知識蒸留は大きく高精度な教師モデルの出力を目標に小さな生徒モデルを学習させる圧縮手法で、生徒単体で学ぶより高精度になりやすい。","プルーニング(枝刈り)は重要度の低い重みやニューロンを削除して軽量化し、量子化はパラメータを8ビット整数など少ないビット数で表現して軽量化する。","NAS(ニューラルアーキテクチャサーチ)はネットワーク構造自体を自動探索する技術で、EfficientNetの基本構造の設計にも用いられた。","エッジ環境(スマートフォン・IoT機器)では計算資源・メモリ・電力が限られるため、量子化・プルーニング・蒸留や軽量モデル(MobileNet等)を組み合わせて小さく速くする。","ドメイン適応は、学習元(ソース)と利用先(ターゲット)で入力分布が異なる場合に違いを埋めてモデルを適応させる転移学習の一種で、昼の画像で学習したモデルを夜の画像へ適応させる例が典型である。"],summary:"ViTは画像をパッチ分割しトークン化してTransformerで処理し、位置エンコーディングを付与、大量データで強い。圧縮は蒸留(教師→生徒)・プルーニング(削除)・量子化(低ビット)、構造探索はNAS。エッジ環境ではこれらと軽量モデルを併用。ドメイン適応は分布差を埋める転移学習の一種。"}],terms:[{term:"畳み込み層",definition:"フィルタ(カーネル)をスライドさせて積和演算を行い、局所的な特徴を抽出する層。出力は特徴マップと呼ばれる。"},{term:"ストライド",definition:"畳み込みでフィルタを動かす幅。大きいほど出力の特徴マップは小さくなる。"},{term:"パディング",definition:"画像の周囲を0などで埋める処理。端の情報の損失や特徴マップの縮小を防ぐ。"},{term:"プーリング層",definition:"特徴マップを縮小する層。最大プーリングが代表的で、位置ずれへの頑健性が得られる。"},{term:"重み共有",definition:"同じフィルタを画像全体で使い回すCNNの仕組み。パラメータ数を大幅に削減できる。"},{term:"ネオコグニトロン",definition:"福島邦彦が提案したCNNの原型。視覚野のS細胞・C細胞の知見に基づく階層型ネットワーク。"},{term:"AlexNet",definition:"2012年のILSVRCで圧勝したヒントンらのCNN。ディープラーニングブームの契機となった。"},{term:"ResNet",definition:"スキップ結合(残差学習)で勾配消失を抑え、100層超の深層化を実現したモデル。2015年ILSVRC優勝。"},{term:"BPTT",definition:"RNNの学習法。誤差を時間方向に遡って伝播させる通時的誤差逆伝播法。"},{term:"LSTM",definition:"CECと3つのゲート(入力・出力・忘却)で長期依存を学習できるようにしたRNNの改良版。"},{term:"GRU",definition:"LSTMを簡略化したモデル。リセットゲートと更新ゲートの2つでパラメータ数を削減。"},{term:"seq2seq",definition:"エンコーダで入力系列をベクトルに変換し、デコーダで出力系列を生成するモデル。機械翻訳などに使われる。"},{term:"Self-Attention",definition:"同じ系列内の要素同士の関連度を計算する仕組み。Transformerの中核技術。"},{term:"位置エンコーディング",definition:"Transformerで語順の情報を表すために入力に加えられる位置情報。"},{term:"BERT",definition:"Transformerのエンコーダを使った双方向言語モデル。マスク言語モデルと次文予測で事前学習される。"},{term:"GPT",definition:"Transformerのデコーダを使った自己回帰型言語モデル。次の単語の予測で事前学習される。"},{term:"蒸留",definition:"大きな教師モデルの出力を使って小さな生徒モデルを学習させるモデル圧縮手法。"},{term:"NAS",definition:"ニューラルネットワークの構造自体を自動探索する技術。EfficientNetの設計にも使われた。"},{term:"受容野",definition:"ある出力ユニットの値に影響を与える入力側の領域。層を深くするほど受容野は広くなり、より大域的な特徴を捉えられる。"},{term:"Global Average Pooling",definition:"各特徴マップ全体の平均値を1つの値に集約する処理。全結合層を置き換えてパラメータ数を削減できる。"},{term:"1×1畳み込み",definition:"1×1サイズのフィルタによる畳み込み。チャネル方向の次元削減や結合に用いられ、計算量の削減に役立つ。"},{term:"勾配クリッピング",definition:"勾配の大きさが一定のしきい値を超えたら抑える処理。主にRNNの勾配爆発を防ぐために用いられる。"},{term:"教師強制",definition:"系列生成モデルの学習時に、デコーダの入力として直前の正解(教師)を与える手法。学習を安定・高速化する。"},{term:"Multi-Head Attention",definition:"複数のAttention(ヘッド)を並列に計算し、異なる観点の関連性を同時に捉えるTransformerの仕組み。"},{term:"ViT",definition:"Vision Transformer。画像を小さなパッチに分割してトークン列として扱い、Transformerで画像認識を行うモデル。"},{term:"サブワード分割",definition:"単語をより小さな部分単位に分割するトークン化手法。BPEやSentencePieceが代表的で、未知語に強い。"}],questions:[{id:"dl-tech-q01",chapterId:"dl-tech",question:"CNNの畳み込み層の役割として、最も適切なものを選べ。",choices:["特徴マップを縮小して位置ずれへの頑健性を高める","フィルタをスライドさせて積和演算を行い、局所的な特徴を抽出する","抽出された特徴をもとに最終的な分類結果を出力する","各層の入力分布を正規化して学習を安定させる"],answerIndex:1,explanation:"畳み込み層はフィルタ(カーネル)を入力画像上でスライドさせながら積和演算を行い、エッジなどの局所的な特徴を抽出して特徴マップを出力します。特徴マップの縮小はプーリング層、最終的な分類は全結合層、分布の正規化はバッチ正規化の役割です。CNNの各層の役割分担はG検定で頻出です。"},{id:"dl-tech-q02",chapterId:"dl-tech",question:"畳み込み処理におけるパディングの目的として、最も適切なものを選べ。",choices:["フィルタを動かす幅を大きくして計算量を減らすため","特徴マップの最大値のみを残して情報を圧縮するため","パラメータ数を削減して過学習を防ぐため","画像の周囲を0などで埋めて、端の情報の損失や特徴マップの縮小を防ぐため"],answerIndex:3,explanation:"パディングは入力画像の周囲を0などの値で埋める処理で、畳み込みのたびに特徴マップが小さくなることや、画像の端の情報が十分に使われないことを防ぎます。フィルタを動かす幅はストライド、最大値を残す圧縮は最大プーリングの説明です。パディング・ストライド・プーリングの区別は頻出ポイントです。"},{id:"dl-tech-q03",chapterId:"dl-tech",question:"CNNが全結合のネットワークに比べてパラメータ数を大幅に削減できる理由として、最も適切なものを選べ。",choices:["局所結合と重み共有により、同じフィルタを画像全体で使い回すため","プーリング層に学習すべき多数の重みが集約されているため","活性化関数にReLUを使用しているため","入力画像を必ず白黒に変換してから処理するため"],answerIndex:0,explanation:"CNNはニューロンが入力の一部領域のみと結合する局所結合と、同一のフィルタを画像全体で共有する重み共有により、全結合に比べてパラメータ数を劇的に削減しています。プーリング層には学習パラメータがない点も重要な頻出知識です。ReLUや画像のチャネル数はパラメータ削減の本質ではありません。"},{id:"dl-tech-q04",chapterId:"dl-tech",question:"福島邦彦が提案した、CNNの原型とされるモデルとして、最も適切なものを選べ。",choices:["LeNet","パーセプトロン","ネオコグニトロン","ボルツマンマシン"],answerIndex:2,explanation:"ネオコグニトロンは福島邦彦が提案した階層型ネットワークで、視覚野の単純型細胞(S細胞)・複雑型細胞(C細胞)の知見に基づいており、CNNの原型とされます。LeNetはヤン・ルカンによる初期の実用的CNN、パーセプトロンはローゼンブラット、ボルツマンマシンはヒントンらに関連するモデルです。「人名とモデルの対応」は頻出です。"},{id:"dl-tech-q05",chapterId:"dl-tech",question:"2012年のILSVRCで従来手法に大差をつけて優勝し、ディープラーニングブームの契機となったモデルとして、最も適切なものを選べ。",choices:["VGG","ResNet","GoogLeNet","AlexNet"],answerIndex:3,explanation:"AlexNetはヒントンらのチーム(SuperVision)が開発したCNNで、2012年のILSVRCでエラー率を大幅に下げて優勝し、第3次AIブーム・ディープラーニングブームの火付け役となりました。GoogLeNetとVGGは2014年(優勝はGoogLeNet)、ResNetは2015年の優勝モデルであり、ILSVRC優勝モデルの年代順(AlexNet→GoogLeNet→ResNet)は頻出です。"},{id:"dl-tech-q06",chapterId:"dl-tech",question:"ResNetが100層を超える深いネットワークの学習を可能にした仕組みとして、最も適切なものを選べ。",choices:["複数サイズのフィルタを並列に適用するインセプションモジュール","層をまたいで入力を足し合わせるスキップ結合による残差学習","3x3の小さなフィルタのみを多数積み重ねる構造","深さ・幅・解像度を複合的にスケーリングする手法"],answerIndex:1,explanation:"ResNetはスキップ結合(ショートカット結合)で数層先に入力をそのまま足し合わせ、層には入力との差分(残差)のみを学習させることで、深いネットワークでも勾配消失を起こしにくくしました。インセプションモジュールはGoogLeNet、3x3フィルタの積み重ねはVGG、複合スケーリングはEfficientNetの特徴で、モデルと工夫の対応は最頻出ポイントです。"},{id:"dl-tech-q07",chapterId:"dl-tech",question:"GoogLeNetの特徴であるインセプションモジュールの説明として、最も適切なものを選べ。",choices:["サイズの異なる複数のフィルタによる畳み込みを並列に行い、結果を結合する構造","ネットワークの一部の重みを削除して軽量化する構造","隠れ層の出力を次の時刻の入力として戻す再帰構造","2つのネットワークを敵対的に競わせる構造"],answerIndex:0,explanation:"インセプションモジュールは1x1、3x3、5x5など異なるサイズの畳み込みやプーリングを並列に実行して結果を結合する構造で、GoogLeNet(2014年ILSVRC優勝)の中核です。重みの削除はプルーニング、再帰構造はRNN、敵対的な競争はGANの説明です。1x1畳み込みによる次元削減も併用されている点も覚えておくとよいでしょう。"},{id:"dl-tech-q08",chapterId:"dl-tech",question:"画像認識の訓練データに対するデータ拡張の手法として、最も適切なものを選べ。",choices:["重要度の低い重みを削除して軽量化する","教師モデルの出力で生徒モデルを学習させる","画像の水平反転やランダムクロップ、Cutout、Mixupなどで画像を変換して訓練データを増やす","パラメータを少ないビット数で表現する"],answerIndex:2,explanation:"データ拡張は水平反転・ランダムクロップ・回転などの変換で訓練データを擬似的に増やし、過学習を抑える手法です。画像の一部を隠すCutoutや、2枚の画像とラベルを混合するMixupも代表的な拡張手法として頻出です。重みの削除はプルーニング、教師モデルの利用は蒸留、低ビット表現は量子化で、いずれもモデル圧縮の手法です。"},{id:"dl-tech-q09",chapterId:"dl-tech",question:"RNN(リカレントニューラルネットワーク)の説明として、最も適切なものを選べ。",choices:["フィルタをスライドさせて画像の局所特徴を抽出するネットワーク","入力と同じ出力を学習して特徴表現を獲得するネットワーク","生成器と識別器を競わせてデータを生成するネットワーク","隠れ層の出力を次の時刻の入力に戻す再帰構造を持ち、時系列データを扱えるネットワーク"],answerIndex:3,explanation:"RNNは隠れ層の状態を次の時刻に引き継ぐ再帰構造により、テキスト・音声・時系列などの系列データの文脈を扱えるネットワークです。フィルタによる特徴抽出はCNN、入力の復元はオートエンコーダ、生成器と識別器の競争はGANの説明です。RNNの学習にはBPTTが使われ、長い系列では勾配消失が課題となる点も併せて押さえましょう。"},{id:"dl-tech-q10",chapterId:"dl-tech",question:"LSTMが長期の依存関係を学習できる仕組みとして、最も適切なものを選べ。",choices:["CEC(セル)に情報を保持し、入力・出力・忘却の3つのゲートで情報の流れを制御する","過去と未来の両方向からの情報を組み合わせて処理する","注意機構により入力系列の重要な部分に重みを付ける","畳み込み演算により時系列の局所的なパターンを抽出する"],answerIndex:0,explanation:"LSTMはCEC(Constant Error Carousel)と呼ばれるセルに情報を保持し、入力ゲート・出力ゲート・忘却ゲートで情報の書き込み・読み出し・消去を制御することで、通常のRNNの勾配消失を抑えて長期依存を学習できます。両方向の処理は双方向RNN、重み付けはAttention機構の説明です。LSTMを簡略化したGRUとの対比も頻出です。"},{id:"dl-tech-q11",chapterId:"dl-tech",question:"GRUの説明として、最も適切なものを選べ。",choices:["LSTMにゲートを追加してより複雑な制御を可能にしたモデル","畳み込み層をRNNに組み込んだハイブリッドモデル","リセットゲートと更新ゲートの2つでLSTMを簡略化し、パラメータ数を減らしたモデル","未来から過去への方向のみで系列を処理するモデル"],answerIndex:2,explanation:"GRU(ゲート付き回帰型ユニット)はLSTMを簡略化したモデルで、リセットゲートと更新ゲートの2つのゲートにより、LSTMの3ゲート+CECの構造よりパラメータ数を減らしつつ長期依存の学習を可能にします。ゲートを増やしたのではなく減らした点が重要です。計算コストが小さいため、LSTMの代替として使われることがあります。"},{id:"dl-tech-q12",chapterId:"dl-tech",question:"seq2seq(エンコーダ・デコーダモデル)の説明として、最も適切なものを選べ。",choices:["画像を入力として物体の位置とクラスを同時に出力するモデル","入力系列をエンコーダで固定長ベクトルに変換し、デコーダで出力系列を生成するモデル","入力データを圧縮し、同じデータを復元するよう学習するモデル","ラベルのないデータをクラスタに分割するモデル"],answerIndex:1,explanation:"seq2seqはエンコーダが入力系列(例:日本語の文)を固定長のベクトルに変換し、デコーダがそのベクトルから出力系列(例:英語の文)を生成するモデルで、機械翻訳や文章要約などの系列変換タスクに用いられます。長い系列では固定長ベクトルに情報を詰め込みきれない課題があり、これがAttention機構の導入につながりました。入力の復元はオートエンコーダの説明です。"},{id:"dl-tech-q13",chapterId:"dl-tech",question:"seq2seqにAttention機構を導入する利点として、最も適切なものを選べ。",choices:["出力の生成時に入力系列のどの部分に注目すべきかを重み付けでき、長い系列でも情報の損失を抑えられる","ネットワークのパラメータ数を削減し、メモリ使用量を抑えられる","教師データがなくても学習できるようになる","画像と音声を同時に処理できるようになる"],answerIndex:0,explanation:"Attention機構は、デコーダが各時刻の出力を生成する際に入力系列のどの部分が重要かを重みとして計算する仕組みで、seq2seqが入力全体を固定長ベクトルに圧縮することで生じる情報損失を緩和します。特に長い文の翻訳精度が向上しました。パラメータ削減や教師なし学習化の手法ではなく、この発展形がTransformerにつながった流れが頻出です。"},{id:"dl-tech-q14",chapterId:"dl-tech",question:"Transformerの特徴として、最も適切なものを選べ。",choices:["再帰構造により系列を1ステップずつ順番に処理する","畳み込み層を多段に重ねて系列の特徴を抽出する","ゲート機構により長期の記憶を保持する","再帰構造を使わずSelf-Attentionで系列を処理するため、並列計算が可能である"],answerIndex:3,explanation:"Transformer(2017年の論文「Attention Is All You Need」で提案)は、RNNの再帰構造やCNNの畳み込みを使わず、Self-Attention(自己注意機構)のみで系列を処理します。逐次処理が不要なため並列計算が可能で学習を大幅に高速化でき、BERTやGPTなど大規模言語モデルの基盤になりました。再帰処理はRNN、ゲート機構はLSTMの特徴です。"},{id:"dl-tech-q15",chapterId:"dl-tech",question:"Transformerで位置エンコーディングが必要な理由として、最も適切なものを選べ。",choices:["勾配消失問題を防ぎ、深い層まで誤差を伝えるため","パラメータ数を削減して計算を軽量化するため","Self-Attentionは語順の情報を持たないため、単語の位置情報を別途与える必要があるため","出力を確率分布として解釈できるようにするため"],answerIndex:2,explanation:"Self-Attentionは系列内の全要素間の関連度を一括計算する仕組みのため、RNNと違って語順(位置)の情報をそれ自体では保持しません。そこでTransformerでは単語の位置を表す位置エンコーディングを入力の埋め込みに加えて語順情報を補います。勾配消失対策はスキップ結合など、確率化はソフトマックスの役割であり、目的が異なります。"},{id:"dl-tech-q16",chapterId:"dl-tech",question:"BERTの事前学習タスクとして、最も適切なものを選べ。",choices:["文中の一部の単語をマスクして予測するマスク言語モデルと、2文が連続するかを判定する次文予測","直前までの単語列から次の単語を一方向に予測するタスク","画像とテキストのペアの対応関係を学習するタスク","正解ラベル付きの感情分類データを使った教師あり学習"],answerIndex:0,explanation:"BERTはマスク言語モデル(MLM:文中の単語の一部を隠して前後双方向の文脈から予測)と次文予測(NSP:2つの文が連続しているかを判定)で事前学習されます。前後両方の文脈を使う「双方向」がBERTの特徴で、次の単語を一方向(自己回帰)に予測するのはGPTの事前学習です。BERTとGPTの対比はG検定最頻出の一つです。"},{id:"dl-tech-q17",chapterId:"dl-tech",question:"GPTのアーキテクチャと事前学習方式の組み合わせとして、最も適切なものを選べ。",choices:["Transformerのエンコーダを使用し、マスクされた単語を双方向の文脈から予測する","Transformerのデコーダを使用し、直前までの単語列から次の単語を自己回帰的に予測する","RNNのエンコーダ・デコーダを使用し、翻訳タスクで事前学習する","CNNを使用し、文を画像に変換してから分類する"],answerIndex:1,explanation:"GPTはTransformerのデコーダ部分をベースとし、直前までの単語列から次の単語を予測する自己回帰型の言語モデルです。エンコーダベースで双方向なのはBERTの説明で、両者は「エンコーダ/デコーダ」「双方向/自己回帰」という対で整理して覚えるのが定石です。RNNベースの翻訳モデルはseq2seqであり、GPTの構成ではありません。"},{id:"dl-tech-q18",chapterId:"dl-tech",question:"転移学習とファインチューニングの違いに関する説明として、最も適切なものを選べ。",choices:["転移学習はモデル全体を再学習し、ファインチューニングは出力層のみ学習する","両者は完全に同じ手法であり、呼び方が異なるだけである","転移学習は事前学習部分の重みを固定して追加した層のみ学習し、ファインチューニングはモデル全体の重みを再調整する","転移学習は画像専用、ファインチューニングは自然言語専用の手法である"],answerIndex:2,explanation:"一般に、転移学習は事前学習済みモデルの重みを固定し、付け替えた出力層など一部のみを学習させる方法を指し、ファインチューニングは事前学習済みの重みを初期値としてモデル全体(または大部分)を再調整する方法を指します。選択肢Aは両者が逆です。どちらも画像・自然言語を問わず使われ、少ないデータで高性能を得られる点が共通の利点です。"},{id:"dl-tech-q19",chapterId:"dl-tech",question:"知識蒸留(蒸留)の説明として、最も適切なものを選べ。",choices:["重要度の低い重みやニューロンを削除してモデルを軽量化する手法","大きな教師モデルの出力を教師データとして、小さな生徒モデルを学習させる手法","重みを8ビット整数などの少ないビット数で表現して軽量化する手法","ネットワーク構造そのものを自動探索して最適な構造を見つける手法"],answerIndex:1,explanation:"蒸留は、高精度だが大きな教師モデルの出力(ソフトな確率分布)を目標として小さな生徒モデルを学習させるモデル圧縮手法で、生徒モデル単体で学習するより高い精度が得やすくなります。重みの削除はプルーニング、低ビット表現は量子化、構造の自動探索はNASの説明です。圧縮3手法(蒸留・プルーニング・量子化)+NASの区別は頻出です。"},{id:"dl-tech-q20",chapterId:"dl-tech",question:"スマートフォンなどの計算資源が限られた環境向けに、畳み込みを空間方向とチャネル方向に分解して軽量化したモデルとして、最も適切なものを選べ。",choices:["VGG","ResNet","GoogLeNet","MobileNet"],answerIndex:3,explanation:"MobileNetはDepthwise Separable Convolution(空間方向のDepthwise畳み込みとチャネル方向のPointwise畳み込みへの分解)により計算量とパラメータ数を大幅に削減した軽量モデルで、モバイル端末などのエッジ環境での推論を想定しています。VGGとResNetは高精度だが重いモデル、GoogLeNetはインセプションモジュールが特徴であり、軽量化を主目的としたモデルはMobileNetです。"},{id:"dl-tech-q21",chapterId:"dl-tech",question:"CNNにおける受容野(receptive field)の説明として、最も適切なものを選べ。",choices:["ある出力ユニットの値に影響を与える入力画像側の領域のこと","1つのフィルタに含まれる学習対象の重みの個数のこと","プーリングによって縮小された後の特徴マップのサイズのこと","出力層のニューロン1つに割り当てられるクラスの数のこと"],answerIndex:0,explanation:"受容野とは、ある出力ユニット(特徴マップ上の1点)が反応する、入力画像側の対応領域を指します。畳み込みやプーリングを重ねて層を深くするほど受容野は広がり、より大域的な特徴を捉えられるようになります。選択肢Bはフィルタのパラメータ数、選択肢Cは特徴マップのサイズ、選択肢Dはクラス数の説明であり、受容野とは異なる概念です。"},{id:"dl-tech-q22",chapterId:"dl-tech",question:"Global Average Pooling(GAP)の説明として、最も適切なものを選べ。",choices:["特徴マップ内の最大値のみを取り出して位置ずれに頑健にする処理","各特徴マップ全体の平均値を1つの値に集約し、全結合層を置き換えてパラメータ数を削減する処理","入力画像の周囲を平均値で埋めて端の情報を保つ処理","ミニバッチ内の平均と分散で各層の入力を正規化する処理"],answerIndex:1,explanation:"Global Average Poolingは、各チャネルの特徴マップ全体の平均を取って1つの値にまとめる処理で、CNNの最後に置いて全結合層を置き換えることで大量のパラメータを削減し、過学習を抑える効果があります。選択肢Aは最大プーリング、選択肢Cはパディング、選択肢Dはバッチ正規化の説明であり、特徴マップ全体を平均するGAPとは異なります。"},{id:"dl-tech-q23",chapterId:"dl-tech",question:"Dilated Convolution(Atrous Convolution、拡張畳み込み)の特徴として、最も適切なものを選べ。",choices:["フィルタを空間方向とチャネル方向に分解して計算量を削減する","1×1のフィルタでチャネル方向の次元を圧縮する","フィルタの参照位置に間隔(隙間)を空けることで、パラメータを増やさずに受容野を広げる","重要度の低いフィルタを削除してモデルを軽量化する"],answerIndex:2,explanation:"Dilated(Atrous)畳み込みは、フィルタが参照する画素の間に一定の間隔を空けることで、フィルタのパラメータ数や計算量を増やさずに受容野を広げられる手法で、セグメンテーションなど広い文脈が必要なタスクで使われます。選択肢AはDepthwise Separable畳み込み、選択肢Bは1×1畳み込み、選択肢Dはプルーニングの説明であり、拡張畳み込みとは異なります。"},{id:"dl-tech-q24",chapterId:"dl-tech",question:"1×1畳み込み(ポイントワイズ畳み込み)の主な用途として、最も適切なものを選べ。",choices:["画像の周囲を0で埋めて特徴マップの縮小を防ぐ","特徴マップの最大値を取って位置ずれに頑健にする","フィルタの参照位置に間隔を空けて受容野を広げる","チャネル方向の次元削減や結合を行い、計算量を抑えつつ表現力を調整する"],answerIndex:3,explanation:"1×1畳み込みは空間方向には畳み込まず、チャネル方向にのみ重み付き和を取るため、チャネル数の削減や結合(次元の調整)に使われ、GoogLeNetのインセプションモジュールやResNetのボトルネック構造で計算量削減に活用されます。選択肢Aはパディング、選択肢Bは最大プーリング、選択肢CはDilated畳み込みの説明であり、1×1畳み込みの用途とは異なります。"},{id:"dl-tech-q25",chapterId:"dl-tech",question:"DenseNetの構造上の特徴として、最も適切なものを選べ。",choices:["各層の出力を、後続のすべての層へ入力として結合(concat)して再利用する","複数サイズのフィルタを並列に適用して結果を結合する","深さ・幅・解像度を複合的にスケーリングする","2つのネットワークを敵対的に競わせて学習する"],answerIndex:0,explanation:"DenseNetは、各層の出力を後続のすべての層に密に(dense)結合して入力として渡す構造を持ち、特徴の再利用を促して勾配の流れを改善し、少ないパラメータで高い性能を得ます。ResNetが出力を「足し合わせる」のに対し、DenseNetは「連結する」点が違いです。選択肢BはGoogLeNetのインセプション、選択肢CはEfficientNet、選択肢DはGANの説明です。"},{id:"dl-tech-q26",chapterId:"dl-tech",question:"SENet(Squeeze-and-Excitation Network)が導入した仕組みとして、最も適切なものを選べ。",choices:["層をまたいで入力をそのまま足し合わせるスキップ結合","各チャネルの重要度を学習し、チャネルごとに特徴マップを重み付けする機構","畳み込みを空間方向とチャネル方向に分解する軽量化","単語の位置情報を入力に加える位置エンコーディング"],answerIndex:1,explanation:"SENetは、各チャネルの特徴マップの重要度を学習し(Squeeze-and-Excitation)、重要なチャネルを強調し不要なチャネルを抑制するように特徴マップを重み付けする、チャネル方向のAttention的な機構を導入したモデルです。選択肢AはResNetのスキップ結合、選択肢CはMobileNetの軽量化、選択肢DはTransformerの位置エンコーディングの説明であり、SENetの特徴とは異なります。"},{id:"dl-tech-q27",chapterId:"dl-tech",question:"ViT(Vision Transformer)が画像をTransformerで処理する際の基本的な工夫として、最も適切なものを選べ。",choices:["画像を再帰的に処理して時系列のように扱う","画像を畳み込み層だけで特徴抽出してから全結合層に渡す","画像を小さなパッチに分割し、各パッチをトークンの列とみなして入力する","画像をすべて1×1に圧縮してから処理する"],answerIndex:2,explanation:"ViTは画像を固定サイズの小さなパッチ(例:16×16画素)に分割し、各パッチを1つのトークンとして系列に並べ、自然言語のTransformerと同様にSelf-Attentionで処理します。位置エンコーディングでパッチの位置情報も与えます。選択肢Aの再帰処理はRNN、選択肢Bは従来型CNNの構成であり、パッチ分割によってTransformerを画像に適用する点がViTの核心です。"},{id:"dl-tech-q28",chapterId:"dl-tech",question:"ドメイン適応(domain adaptation)の説明として、最も適切なものを選べ。",choices:["重要度の低い重みを削除してモデルを軽量化すること","1つのモデルを複数のデバイスに分割して学習させること","教師モデルの出力で生徒モデルを学習させること","学習元と異なるが関連するドメイン(データ分布)へモデルを適応させ、分布の違いを埋めること"],answerIndex:3,explanation:"ドメイン適応は、学習に使ったドメイン(ソース)と利用したいドメイン(ターゲット)で入力分布が異なる場合に、その違いを埋めてモデルを適応させる転移学習の一種です。例えば昼間の画像で学習したモデルを夜間の画像に適応させるような場面で使われます。選択肢Aはプルーニング、選択肢Bはモデル並列、選択肢Cは知識蒸留の説明であり、ドメイン適応とは異なります。"},{id:"dl-tech-q29",chapterId:"dl-tech",question:"RNNの学習で系列が長いときに起こる勾配爆発への対策として、最も適切なものを選べ。",choices:["勾配の大きさが一定のしきい値を超えたら抑える勾配クリッピングを行う","ニューロンをランダムに無効化するドロップアウトを行う","入力画像の周囲を0で埋めるパディングを行う","出力層にソフトマックス関数を用いる"],answerIndex:0,explanation:"勾配爆発は、長い系列のBPTTで勾配が極端に大きくなり学習が不安定になる現象で、勾配の大きさ(ノルム)が一定のしきい値を超えたらスケールを抑える勾配クリッピングが代表的な対策です。選択肢Bのドロップアウトは過学習対策、選択肢Cのパディングは畳み込みの処理、選択肢Dのソフトマックスは出力の確率化であり、勾配爆発への直接の対策ではありません。"},{id:"dl-tech-q30",chapterId:"dl-tech",question:"系列生成モデルの学習で用いられる教師強制(teacher forcing)の説明として、最も適切なものを選べ。",choices:["教師モデルの出力を生徒モデルの教師データとして学習させること","学習時にデコーダの次の入力として、モデル自身の予測ではなく正解の単語を与えること","正解ラベルの一部を意図的に誤らせてノイズ耐性を高めること","教師あり学習と教師なし学習を交互に切り替えて学習すること"],answerIndex:1,explanation:"教師強制は、seq2seqなどの系列生成の学習時に、デコーダの各ステップの入力としてモデル自身の前の予測ではなく正解(教師)の単語を与える手法で、学習を安定・高速化します。一方、推論時は正解がなく自分の予測を使うため、学習時との差(露出バイアス)が生じる点も頻出です。選択肢Aは知識蒸留の説明であり、教師強制とは別の概念です。"},{id:"dl-tech-q31",chapterId:"dl-tech",question:"双方向RNN(双方向LSTMなど)が適している場面として、最も適切なものを選べ。",choices:["入力が1単語ずつ到着する、リアルタイムの逐次生成タスク","未来の入力を一切参照できないオンライン予測タスク","文全体があらかじめ得られており、前後両方の文脈を使える固有表現抽出や文書分類などのタスク","画像の局所的なエッジを抽出するタスク"],answerIndex:2,explanation:"双方向RNNは、系列を前から読む方向と後ろから読む方向の2つのRNNを組み合わせ、各時点で前後両方の文脈を利用します。そのため文全体が事前に揃っている固有表現抽出や文書分類などに適します。一方、選択肢Aや選択肢Bのように未来の入力が未確定なリアルタイム生成には未来側の情報が使えず不向きです。選択肢Dの局所特徴抽出はCNNの役割です。"},{id:"dl-tech-q32",chapterId:"dl-tech",question:"Attention機構におけるQuery・Key・Valueの関係として、最も適切なものを選べ。",choices:["QueryとValueの類似度で重みを決め、その重みでKeyを足し合わせる","Key同士の類似度で重みを決め、その重みでQueryを足し合わせる","3つすべてを単純に足し合わせて出力する","QueryとKeyの類似度で各Valueの重みを決め、その重み付き和を出力する"],answerIndex:3,explanation:"Attentionは、Query(問い合わせ)と各Key(鍵)の類似度を計算して重み(注意の度合い)を求め、その重みで各Value(値)を加重平均して出力します。「QueryとKeyで重みを決め、Valueを重み付き和する」という対応が要点です。選択肢Aや選択肢Bは類似度を取る対象や足し合わせる対象が誤っています。Self-Attentionでは同一系列からQ・K・Vを作る点も頻出です。"},{id:"dl-tech-q33",chapterId:"dl-tech",question:"TransformerのMulti-Head Attention(マルチヘッドアテンション)の利点として、最も適切なものを選べ。",choices:["複数のAttentionを並列に計算し、異なる観点(語順や意味など)の関連性を同時に捉えられる","Attentionを1つに統合することで計算量を系列長によらず一定にできる","再帰構造を導入して長期記憶を保持できる","畳み込みを並列化して画像の局所特徴を抽出できる"],answerIndex:0,explanation:"Multi-Head Attentionは、入力を複数の部分空間に射影してAttentionを並列に複数(ヘッド)計算し、それぞれが異なる種類の関連性(例えば構文的な関係や意味的な関係)を捉えられるようにする仕組みで、最後に各ヘッドの結果を結合します。選択肢Bは計算量の説明として誤り、選択肢Cは再帰構造を使わないTransformerと矛盾、選択肢Dは畳み込みの説明であり、いずれも不適切です。"},{id:"dl-tech-q34",chapterId:"dl-tech",question:"Self-AttentionとCross-Attention(ソース・ターゲット注意)の違いとして、最も適切なものを選べ。",choices:["Self-Attentionは画像専用、Cross-Attentionはテキスト専用である","Self-Attentionは同一系列内の要素間で注意を計算し、Cross-Attentionは異なる系列(例:エンコーダ出力とデコーダ)間で注意を計算する","Self-Attentionは学習が不要で、Cross-Attentionのみ学習が必要である","Self-Attentionは1ヘッド、Cross-Attentionは複数ヘッドと決まっている"],answerIndex:1,explanation:"Self-Attentionは同じ系列内の要素同士でQuery・Key・Valueを作り関連度を計算するのに対し、Cross-Attentionはデコーダ側のQueryとエンコーダ側のKey・Valueのように異なる系列間で注意を計算します。Transformerの翻訳ではデコーダがCross-Attentionで入力文を参照します。選択肢Aの用途限定や選択肢Cの学習不要、選択肢Dのヘッド数の固定はいずれも誤りです。"},{id:"dl-tech-q35",chapterId:"dl-tech",question:"系列処理におけるTransformer(Self-Attention)とRNNの計算特性の比較として、最も適切なものを選べ。",choices:["Transformerは系列を逐次処理するためRNNより並列化しにくい","RNNは系列長に対して計算量が2乗で増えるが、Transformerは線形である","Self-Attentionは系列長の2乗に比例する計算量がかかるが逐次処理が不要で並列化でき、RNNは計算量は系列長に比例するが逐次処理が必要である","両者とも計算量・並列性に違いはない"],answerIndex:2,explanation:"Self-Attentionは系列内の全要素ペア間の関連度を計算するため計算量・メモリが系列長の2乗に比例しますが、各位置を同時に計算できるため並列化に優れます。一方RNNは計算量は系列長に比例するものの、前の時刻の状態を待つ逐次処理が必要で並列化しにくいです。この並列性の差がTransformerの大規模学習を可能にしました。選択肢Aや選択肢Bは特性が逆です。"},{id:"dl-tech-q36",chapterId:"dl-tech",question:"「あらゆる自然言語処理タスクを入力テキストから出力テキストへの変換として統一的に扱う」という方針で設計されたモデルとして、最も適切なものを選べ。",choices:["ResNet","MobileNet","GAN","T5"],answerIndex:3,explanation:"T5(Text-to-Text Transfer Transformer)は、翻訳・要約・分類・質問応答などあらゆるタスクを「テキストを入力しテキストを出力する」形式に統一して扱うTransformerベースのモデルです。タスクごとに出力形式を変えず、同じ枠組みで学習・推論できる点が特徴です。選択肢AのResNetと選択肢BのMobileNetは画像認識のCNN、選択肢CのGANは生成モデルであり、テキスト変換の統一とは関係ありません。"},{id:"dl-tech-q37",chapterId:"dl-tech",question:"BPEやSentencePieceに代表されるサブワード分割を用いる主な利点として、最も適切なものを選べ。",choices:["語彙にない未知語を既知の部分単位の組み合わせで表現でき、語彙サイズと未知語の問題を緩和できる","文を必ず1文字ずつに分割するため、語順の情報を完全に保持できる","単語の意味を人手で定義した辞書に基づいて厳密に分割できる","分割結果が言語に依存しないため、前処理が一切不要になる"],answerIndex:0,explanation:"サブワード分割は、頻出する文字列を1単位、まれな単語はより小さな部分単位に分割することで、語彙サイズを抑えつつ、語彙にない未知語も既知のサブワードの組み合わせで表現できるようにします。これにより未知語(OOV)問題を緩和できます。選択肢Bの1文字分割は別の方式、選択肢Cの人手辞書や選択肢Dの前処理不要はサブワード分割の説明として誤りです。"},{id:"dl-tech-q38",chapterId:"dl-tech",question:"大規模言語モデルにおけるトークンの説明として、最も適切なものを選べ。",choices:["モデルが学習に用いる正解ラベルそのもの","テキストをモデルが処理する単位に区切った各要素で、単語やサブワード、文字などに相当する","モデルの隠れ層に含まれるニューロンの個数","学習時に1回の更新で使うデータのまとまり"],answerIndex:1,explanation:"トークンは、テキストをモデルが扱えるよう区切った処理単位で、トークナイザによって単語・サブワード・文字などに分割されます。大規模言語モデルの入力長や課金は多くがトークン数を基準にします。選択肢Aの正解ラベルや選択肢Cのニューロン数とは無関係で、選択肢Dの1回の更新で使うまとまりはミニバッチの説明であり、トークンとは異なります。"},{id:"dl-tech-q39",chapterId:"dl-tech",question:"ALBERTやDistilBERTのようなBERTの派生モデルに共通する主な狙いとして、最も適切なものを選べ。",choices:["画像認識タスクへ対応できるよう畳み込み層を追加すること","再帰構造を導入して系列を逐次処理できるようにすること","パラメータ共有や知識蒸留などにより、BERTを軽量化・効率化すること","教師なし学習をやめて教師あり学習のみで事前学習すること"],answerIndex:2,explanation:"ALBERTはパラメータ共有や埋め込みの分解によってパラメータ数を削減し、DistilBERTは知識蒸留によって小型化したモデルで、いずれもBERTを軽量化・効率化しつつ性能をできるだけ維持することを狙っています。選択肢Aの畳み込み追加や選択肢Bの再帰構造導入はBERT系の方向性ではなく、選択肢Dの事前学習方式の変更も主眼ではありません。"},{id:"dl-tech-q40",chapterId:"dl-tech",question:"スマートフォンやIoT機器などのエッジ環境にディープラーニングモデルを搭載する際の軽量化アプローチとして、最も適切なものを選べ。",choices:["学習データを増やすために必ずデータ拡張を行う","必ず層を深くして表現力を高めてから搭載する","学習率を大きくして学習を高速化する","量子化・プルーニング・蒸留や軽量モデル(MobileNetなど)を組み合わせ、計算量とメモリを削減する"],answerIndex:3,explanation:"エッジ環境では計算資源やメモリ、消費電力が限られるため、パラメータを低ビット化する量子化、不要な重みを削るプルーニング、小型モデルへ知識を移す蒸留、そしてMobileNetのような軽量アーキテクチャを組み合わせてモデルを小さく速くする方針が有効です。選択肢Aのデータ拡張や選択肢Bの深層化はむしろモデルを重くしがちで、選択肢Cの学習率は軽量化とは無関係です。"}],contrasts:[{title:"CNNとRNN",left:{label:"CNN(畳み込み)",traits:["主に画像認識","局所特徴をフィルタで抽出","空間的な構造に強い"]},right:{label:"RNN(再帰)",traits:["主に時系列・系列","再帰構造で文脈を保持","BPTTで学習"]},point:"空間のCNN、時間のRNNで用途を区別"},{title:"LSTMとGRU",left:{label:"LSTM",traits:["CEC(セル)を持つ","入力・出力・忘却の3ゲート","長期依存に強い"]},right:{label:"GRU",traits:["セルなし","リセット・更新の2ゲート","パラメータ少なく軽量"]},point:"3ゲートのLSTM、簡略化した2ゲートのGRU"},{title:"BERTとGPT",left:{label:"BERT",traits:["エンコーダを利用","双方向の文脈","MLM・NSPで事前学習"]},right:{label:"GPT",traits:["デコーダを利用","自己回帰(一方向)","次単語予測で事前学習"]},point:"エンコーダ双方向のBERT、デコーダ自己回帰のGPT"},{title:"転移学習とファインチューニング",left:{label:"転移学習",traits:["事前学習の重みを固定","追加した層のみ学習","少データ・低コスト"]},right:{label:"ファインチューニング",traits:["重みを初期値に再調整","モデル全体を学習","多くのデータと計算が必要"]},point:"固定して足すのが転移学習、全体を作り直すのがファインチューニング"},{title:"モデル圧縮3手法",left:{label:"蒸留",traits:["教師モデルの出力を利用","小さな生徒を学習","知識を移し替える"]},right:{label:"プルーニング/量子化",traits:["プルーニング=重みを削除","量子化=低ビット表現","既存モデルを直接縮小"]},point:"教え移す蒸留、削るプルーニング、桁を減らす量子化"},{title:"Self-AttentionとRNNの逐次処理",left:{label:"Self-Attention",traits:["全要素を一括で関連付け","逐次処理が不要で並列化可","計算量は系列長の2乗"]},right:{label:"RNNの逐次処理",traits:["前の時刻の状態を待つ","並列化しにくい","計算量は系列長に比例"]},point:"並列のAttention、順番待ちのRNNで計算特性を区別"},{title:"畳み込み層とプーリング層",left:{label:"畳み込み層",traits:["フィルタで特徴抽出","学習する重みを持つ","特徴マップを出力"]},right:{label:"プーリング層",traits:["特徴マップを縮小","学習パラメータを持たない","位置ずれに頑健化"]},point:"重みを学ぶ畳み込み、学ばず縮めるプーリング"}]},lf={id:"dl-applications",number:5,title:"ディープラーニングの応用",subtitle:"画像・言語・生成AI・強化学習",sections:[{title:"画像認識タスク",points:["画像分類は画像全体に1つのラベルを割り当てるタスクで、物体検出は「何が・どこにあるか」を矩形(バウンディングボックス)で特定する点が異なる。","R-CNNは候補領域を切り出して個別にCNNへ入力する2段階方式で精度は高いが遅く、Faster R-CNNは候補領域の生成自体をRPNというネットワークで行い高速化した。","YOLOやSSDは候補領域の生成と分類を1つのネットワークで同時に行う1段階(ワンステージ)方式で、リアルタイム検出に向く。","セマンティックセグメンテーションは画素単位でクラス分類するが同一クラスの個体は区別せず、インスタンスセグメンテーション(Mask R-CNNなど)は個体ごとに区別する。","FCNは全結合層を畳み込み層に置き換えて画素単位の出力を可能にした最初期の手法で、U-Netはエンコーダとデコーダをスキップ結合でつなぎ医用画像分野で広く使われる。","姿勢推定は人体の関節点(キーポイント)を検出するタスクで、OpenPoseは複数人の姿勢を同時に推定できる代表的手法である。"],summary:"物体検出は1段階(YOLO・SSD)が速く2段階(R-CNN系・RPNのFaster R-CNN)が高精度。セグメンテーションはセマンティック(個体を区別しない)とインスタンス(Mask R-CNNで個体を区別)の違いが頻出。U-Netはスキップ結合で医用画像、OpenPoseは姿勢推定を押さえる。"},{title:"音声認識と音声合成",points:["従来の音声認識は隠れマルコフモデル(HMM)と音響・言語モデルを組み合わせていたが、現在は音声から文字列を直接出力するエンドツーエンド方式が主流になった。","CTC(Connectionist Temporal Classification)は入力音声と出力文字列の長さが異なっても対応付けを学習できる損失関数で、ブランク(空白)記号を導入して系列を整列する。","音声はそのままでは扱いにくいため、メル周波数ケプストラム係数(MFCC)などの特徴量に変換してからモデルへ入力することが多い。","WaveNetはDeepMindが開発した音声合成モデルで、音声波形そのものを自己回帰的に生成し、従来法より自然な音声を実現した。","WaveNetは因果的なダイレイト(拡張)畳み込みを用いることで、長い時間依存関係を効率よく扱える。"],summary:"音声認識は現在エンドツーエンド方式が主流で、入出力の系列長のずれはブランク記号を導入するCTCで対応付ける。特徴量はMFCCが定番。音声合成はWaveNetがダイレイト畳み込みで波形を自己回帰生成する点を押さえる。"},{title:"自然言語処理のタスクと単語埋め込み",points:["日本語は単語の区切りが明示されないため、形態素解析で文を最小の意味単位に分割し品詞を判定する処理が前段で必要になる。","構文解析は文の係り受けなど文法構造を解析し、固有表現抽出(NER)は人名・地名・組織名などを抽出し、感情分析は文章の肯定・否定を判定する。","word2vecは単語を低次元の密なベクトル(分散表現)で表す手法で、「王−男+女≒女王」のようにベクトル演算で意味関係を捉えられる。","word2vecにはスキップグラム(中心の単語から周辺の単語を予測)とCBOW(周辺の単語から中心の単語を予測)の2方式がある。","fastTextは単語を文字n-gram(部分文字列)の集合として扱うことで、活用形や学習時に存在しなかった未知語にも対応できる。","ELMoは双方向LSTMを使い、同じ単語でも文脈によって異なるベクトルを与える「文脈を考慮した分散表現」を実現した。"],summary:"日本語は形態素解析で単語分割するのが前処理の前提。word2vecは分散表現を学習し、スキップグラム(中心→周辺)とCBOW(周辺→中心)の向きの違いが頻出。fastTextは文字n-gramで未知語に強く、ELMoは文脈依存の分散表現を実現した点を押さえる。"},{title:"生成モデル",points:["GANは生成器(ジェネレータ)と識別器(ディスクリミネータ)を競わせる敵対的学習で本物そっくりのデータを生成する枠組みで、グッドフェローらが提案した。","生成器は識別器をだます偽データの生成を、識別器は本物と偽物の見分けを学習し、両者がいたちごっこを繰り返すことで生成品質が向上する。","DCGANはGANに畳み込み層を全面的に導入して高品質な画像生成を可能にした発展形である。","GANの学習は不安定で、生成器が少数のパターンしか生成しなくなるモード崩壊という問題が起こりやすい。","VAEは入力を潜在変数の確率分布に変換(エンコード)し、そこからサンプリングして復元(デコード)する生成モデルで、GANより学習が安定する一方、出力がぼやけやすい。","拡散モデルはデータに段階的にノイズを加える過程を逆向きに学習し、ノイズから画像を復元して生成する手法で、Stable Diffusionは潜在空間で拡散を行い計算量を抑えている。"],summary:"GANは生成器と識別器の敵対的学習で生成し、モード崩壊と学習の不安定さが弱点。VAEは潜在変数の分布を経由し学習は安定だが出力がぼやけやすい。拡散モデルはノイズ除去過程を学習しStable Diffusionの基盤となる点を押さえる。"},{title:"大規模言語モデルと基盤モデル",points:["GPT系はTransformerのデコーダを用いた自己回帰型言語モデルで、次の単語を予測する事前学習を大量のテキストで行う。","スケーリング則とは、モデルのパラメータ数・データ量・計算量を増やすほど性能がべき乗則に従って向上するという経験則である。","モデルの規模を大きくすると、小規模では見られなかった能力が突然現れる現象を創発的能力(emergent abilities)と呼ぶ。","RLHF(人間のフィードバックによる強化学習)は、人間の好みを学習した報酬モデルを使ってLLMの出力を人間の意図に沿うよう調整する手法で、ChatGPTにも使われた。","プロンプトに少数の例を示すFew-shotや、推論の途中過程を書かせるChain-of-Thought(思考の連鎖)で、追加学習なしに性能を引き出せる。","LLMは事実と異なる内容をもっともらしく生成するハルシネーションを起こすことがあり、外部知識を検索して回答に利用するRAG(検索拡張生成)が対策の1つとなる。","大量のデータで事前学習され多様なタスクに転用できるモデルをファウンデーションモデル(基盤モデル)と呼び、CLIPは画像とテキストを対照学習で結び付けゼロショット分類を可能にしたマルチモーダルモデルである。"],summary:"GPT系はTransformerデコーダの自己回帰モデルで、スケーリング則と創発的能力が頻出。RLHFは人間の好みに沿わせる調整、Few-shotやChain-of-Thoughtは追加学習なしで性能を引き出す。ハルシネーション対策はRAG、CLIPは対照学習のマルチモーダル基盤モデルと押さえる。"},{title:"深層強化学習とロボティクス・自動運転",points:["Q学習は状態と行動の組み合わせの価値(Q値)を学習する強化学習手法で、DQNはQ値の推定にCNNを使い、Atariゲームを人間レベルでプレイできることを示した。","DQNでは過去の経験をためてランダムに取り出して学習する経験再生(experience replay)と、目標値を固定するターゲットネットワークで学習を安定化させた。","AlphaGoは方策ネットワーク・価値ネットワークとモンテカルロ木探索を組み合わせて囲碁のプロ棋士に勝利し、AlphaGo Zeroは人間の棋譜を一切使わず自己対戦のみで学習してさらに強くなった。","A3Cは複数のエージェントが非同期・並列に学習するActor-Critic系の手法で、経験再生を使わずに学習を安定化できる。","ロボティクスでは試行錯誤のコストが高いため、シミュレーション環境での学習やsim-to-real転移が活用される。","自動運転ではLiDAR(レーザー光による測距センサ)で周囲の3次元点群を取得し、SAEの自動運転レベルではレベル3以上でシステムが運転の主体となる(レベル5は完全自動運転)。"],summary:"Q学習(価値ベース)を深層化したDQNは経験再生とターゲットネットワークで安定化。AlphaGoは木探索と学習の組み合わせ、AlphaGo Zeroは自己対戦のみで学習。A3Cは非同期並列のActor-Critic。自動運転はLiDARとSAEレベル(3以上でシステム主体)を押さえる。"},{title:"物体検出の発展と評価指標(深掘り)",points:["物体検出の歴史は2段階(2ステージ)方式の高精度化と1段階(1ステージ)方式の高速化という2つの流れで整理でき、R-CNN→Fast R-CNN→Faster R-CNNが前者、YOLO・SSDが後者の代表である。","初代R-CNNはSelective Searchで約2000個の候補領域を切り出し1つずつCNNに通すため非常に遅く、Fast R-CNNは画像全体を1回だけCNNに通しROIプーリングで領域特徴を切り出すことで高速化した。","Faster R-CNNは候補領域の生成を外部アルゴリズムからRPN(領域提案ネットワーク)に置き換え、検出全体を1つのネットワークでエンドツーエンドに学習可能にした点が最大の改良である。","RPNはアンカーボックス(あらかじめ用意した複数サイズ・縦横比の基準矩形)を各位置に配置し、それぞれが物体らしいか・どうずらすべきかを予測することで候補領域を効率よく生成する。","IoU(Intersection over Union)は予測した矩形と正解矩形の重なり面積÷和集合面積で、検出が正解かの判定や重複検出を除く後処理NMS(非最大値抑制)のしきい値に使われる。","FPN(Feature Pyramid Network)は深さの異なる特徴マップを組み合わせ、小さな物体は浅い高解像度の層・大きな物体は深い層で捉えることで、サイズの異なる物体への頑健性を高める。","1段階方式は領域提案を省いて格子状の各位置で直接クラスと矩形を回帰するため高速だが、背景と物体のクラス不均衡などで2段階方式より精度が劣る傾向があり、Focal Lossなどで改善が図られた。","物体検出の評価には、再現率と適合率のバランスを各クラスで平均したmAP(mean Average Precision)が標準的に用いられる。"],summary:"2段階(R-CNN系)は領域提案→分類で高精度、1段階(YOLO・SSD)は同時処理で高速という対比が軸。Faster R-CNNのRPNとアンカーボックス、重なりを測るIoUと重複除去のNMS、マルチスケールに効くFPN、評価指標mAPまで押さえる。"},{title:"画像タスクの広がりとセグメンテーション(深掘り)",points:["セグメンテーションはセマンティック(画素ごとにクラス分類・個体は区別しない)、インスタンス(個体も区別)に加え、両者を統合し背景まで含めて全画素を説明するパノプティックセグメンテーションがある。","FCNは全結合層を畳み込み層に置き換え、ダウンサンプリングで小さくなった特徴マップをアップサンプリング(逆畳み込み)して入力と同じ解像度の画素単位出力を得る、セグメンテーションの先駆けである。","U-NetはFCNを発展させ、エンコーダの各段の特徴をデコーダの対応段にスキップ結合で渡すことで、ダウンサンプリングで失われる位置の詳細を補い、少ない学習データでも高精度を出せるため医用画像で標準的に使われる。","Mask R-CNNはFaster R-CNNに各物体のマスク(画素単位の領域)を出力する分岐を加えた手法で、物体検出とインスタンスセグメンテーションを同時に行える。","姿勢推定(骨格検出)は人体の関節点(キーポイント)を検出してつなぐタスクで、OpenPoseはボトムアップ方式で複数人の姿勢を同時に・人数に依らず高速に推定できる。","超解像は低解像度画像から高解像度画像を復元するタスクで、SRGANはGANの敵対的学習を使い、単純な誤差最小化ではぼやけがちな細部をより自然でくっきりと復元する。","顔認証は顔画像を低次元の埋め込みベクトルに変換し、ベクトル間の距離(類似度)で判定する仕組みで、本人かを確認する1対1認証と、登録者の中から探す1対多の識別(検索)に分けられる。","異常検知ではオートエンコーダを正常データのみで学習させ、入力をうまく復元できず復元誤差が大きいものを異常とみなす、教師なし的なアプローチがよく使われる。"],summary:"セグメンテーションはセマンティック・インスタンス・パノプティックの3段階で整理し、FCN(画素単位出力の先駆け)とU-Net(スキップ結合・医用画像)、Mask R-CNN(検出+マスク)の役割を押さえる。姿勢推定OpenPose、超解像SRGAN、顔認証の埋め込みベクトル、オートエンコーダ異常検知まで幅広く頻出。"},{title:"生成モデルの仕組みを深掘り",points:["GANはミニマックスゲームとして定式化され、識別器は本物に高い・偽物に低いスコアを付けるよう、生成器は識別器をだますよう交互に学習し、理想的には生成分布が本物のデータ分布に一致する。","DCGANはGANの生成器・識別器に畳み込み層・転置畳み込みを全面導入し、プーリングを使わずストライド付き畳み込みで解像度を変えるなどの設計指針を示して、安定した高品質画像生成への道を開いた。","pix2pixは線画→着色画像のような対応付け(ペア)のある画像対で入力から出力への変換を学習する条件付きGANで、CycleGANはペアのない2つのドメイン間でも変換を学習できる点が決定的に異なる。","CycleGANはA→B→Aと変換して元に戻したとき入力と一致すべきというサイクル一貫性損失を導入することで、対応付けのないデータでも対応関係を保った変換を実現する。","VAEはエンコーダで入力を潜在変数の確率分布(平均と分散)に写し、そこからサンプリングしてデコーダで復元する生成モデルで、潜在空間が連続的なため中間的な生成や補間がしやすい。","拡散モデルは画像に少しずつノイズを加えて純粋なノイズにする前向き過程を定義し、その逆の各ステップのノイズ除去をニューラルネットで学習し、ノイズから少しずつ画像を生成する。","Stable Diffusionはオートエンコーダで圧縮した低次元の潜在空間で拡散を行う潜在拡散モデルで、画素空間で直接拡散するより計算量を大きく削減し、テキスト条件付け(CLIP系)で文章から画像を生成する。","拡散モデルはGANに比べ学習が安定し生成品質・多様性に優れる一方、生成に多数のステップを要し推論が遅いという速度面のトレードオフがある。"],summary:"GANはミニマックスゲーム、DCGANは畳み込み導入の設計指針。画像変換はペアありpix2pixとペアなしCycleGAN(サイクル一貫性損失)の対比が要。VAEは潜在変数の分布を経由、拡散モデルはノイズ除去の反復で安定・高品質だが遅く、Stable Diffusionは潜在空間で計算量を削減する点を押さえる。"},{title:"自然言語処理の基礎技術と機械翻訳(深掘り)",points:["テキストを数値化する古典的手法にBag of Words(BoW=語の出現回数のみで語順を無視)やn-gram(連続するn個の単語・文字の並び)があり、文脈や語順の情報量はn-gramのほうが多い。","TF-IDFは単語の出現頻度(TF)に、多くの文書に現れるありふれた語ほど重みを下げる逆文書頻度(IDF)を掛けて重要度を測り、「は」「の」のような頻出語の影響を抑えて特徴的な語を強調する。","word2vecの分散表現は「王−男+女≒女王」のようにベクトルの足し引きで意味の関係を表現でき、スキップグラム(中心語→周辺語)は低頻度語に強く、CBOW(周辺語→中心語)は学習が速いという違いがある。","機械翻訳はルールベース→統計的機械翻訳(SMT)→ニューラル機械翻訳(NMT)と発展し、NMTでは入力文をエンコーダで意味ベクトルに、デコーダで訳文に変換するseq2seq(エンコーダ・デコーダ)構造が基礎となった。","seq2seqは長文で情報が固定長ベクトルに圧縮しきれない問題を抱えたが、出力の各語生成時に入力のどこを見るかを動的に重み付けするアテンション(注意機構)の導入で精度が大きく向上した。","BLEUは機械翻訳の出力と人間の参照訳とのn-gram一致度に基づく自動評価指標で、値が高いほど参照訳に近いが、語順や意味の妥当性を完全には捉えられない。","GLUEは含意関係認識・感情分析・文の類似度など複数の自然言語理解タスクをまとめ、モデルの総合的な言語理解力を横断評価するベンチマークで、難易度を上げたSuperGLUEもある。","トピックモデルのLDA(潜在的ディリクレ配分法)は各文書が複数の潜在トピックの混合から生成されると仮定し、教師なしで文書集合の話題構造を抽出する。"],summary:"古典手法はBoW・n-gram・TF-IDFで語の数値化と重要度評価を行う。機械翻訳はSMT→NMTへ進み、seq2seq(エンコーダ・デコーダ)とアテンションが転換点。評価はn-gram一致のBLEU、総合理解力はGLUE、教師なしトピック抽出はLDAと押さえる。"},{title:"Transformerと大規模言語モデルの仕組み(深掘り)",points:["Transformerはアテンション(自己注意機構)のみで系列を並列処理する構造で、RNNのように逐次処理しないため学習を大規模・高速に行え、現在の大規模言語モデル(LLM)の共通基盤となっている。","自己注意機構は文中の各単語が他のどの単語にどれだけ関連するかを計算し、文脈を捉える仕組みで、「it」が何を指すかといった長距離の依存関係も直接扱える。","BERTはTransformerのエンコーダを使い文の前後両方向の文脈を見る双方向モデルで分類・抽出などの理解タスクに強く、GPTはデコーダを使い次単語を予測する自己回帰モデルで文章生成に強い。","事前学習で広範な知識を身につけたモデルを、指示と模範解答の対で追加学習して指示に従いやすくするのがインストラクションチューニングで、さらにRLHFで人間の好みに沿わせる流れが標準である。","大量データで事前学習し多様な下流タスクに転用できるモデルを基盤モデル(ファウンデーションモデル)と呼び、言語だけでなく画像・音声なども含む汎用的な土台として位置づけられる。","CLIPは大量の画像・テキストのペアを対照学習で同じ埋め込み空間に対応づけ、追加学習なしに任意のラベル候補で画像分類するゼロショット分類を可能にしたマルチモーダルモデルである。","プロンプトエンジニアリングには、例を示さないZero-shot、少数例を示すFew-shot、推論過程を書かせるChain-of-Thought(思考の連鎖)があり、いずれもモデルを再学習せず推論時に性能を引き出す。","ハルシネーション(もっともらしい誤情報の生成)対策には外部知識を検索して回答に使うRAGが有効で、温度パラメータを下げると出力がより確定的になり逸脱を抑えやすい。"],summary:"Transformerは自己注意で並列処理しLLMの基盤。BERT(双方向エンコーダ・理解)とGPT(自己回帰デコーダ・生成)の対比が頻出。インストラクションチューニング→RLHFで指示と好みに沿わせ、基盤モデルやCLIP、Zero/Few-shot・Chain-of-Thought、ハルシネーション対策のRAGまで押さえる。"},{title:"深層強化学習の手法体系(深掘り)",points:["強化学習はエージェントが環境との試行錯誤で得る報酬の累積(収益)を最大化する行動方策を学ぶ枠組みで、教師あり学習と違い正解ラベルではなく報酬という弱い信号から学習する。","価値ベースの手法は状態や行動の価値を学習してから行動を選び、Q学習・DQNが代表で、方策ベースの手法は方策そのものを直接最適化し、方策勾配法(REINFORCE)が代表である。","DQNはQ値の推定にCNNを使い、過去の経験をためてランダムに取り出す経験再生で時系列の相関を断ち、目標値計算用のターゲットネットワークを一定期間固定することで学習を安定化させた。","Actor-Critic法は行動を選ぶActor(方策)と価値を評価するCritic(価値関数)を併用し、方策勾配法の推定値のばらつき(分散)をCriticで抑えて学習を安定・効率化する。","A3Cは複数のエージェントを非同期・並列に走らせてパラメータ更新を共有することで、経験再生を使わずに学習データの相関を減らし安定した学習を実現するActor-Critic系の手法である。","AlphaGoは人間の棋譜による教師あり学習・自己対戦による強化学習・モンテカルロ木探索を組み合わせて囲碁のトップ棋士に勝利し、AlphaGo Zeroは人間の棋譜を使わず自己対戦のみで上回った。","AlphaStarはリアルタイムで情報が一部しか見えない(不完全情報)StarCraft IIでプロ級に達し、OpenAI FiveはDota 2で成果を上げ、複雑なゲームへの深層強化学習の応用例として知られる。","ロボット制御では実機での試行錯誤はコストや危険が大きいため、シミュレーション内で大量に学習し実機へ移すsim2real(sim-to-real)転移が重視され、両者の差を埋める工夫が課題となる。"],summary:"強化学習は報酬最大化の枠組みで、価値ベース(Q学習・DQN)と方策ベース(方策勾配法)に大別。DQNは経験再生とターゲットネットワーク、Actor-CriticはActorとCriticの併用、A3Cは非同期並列。AlphaGo/Zero・AlphaStar・OpenAI Fiveの応用とsim2real転移を押さえる。"}],terms:[{term:"Faster R-CNN",definition:"候補領域の生成をRPN(領域提案ネットワーク)で行うことで、検出処理全体をエンドツーエンドで学習可能にした2段階物体検出手法。"},{term:"YOLO",definition:"画像を一度見るだけで候補領域の生成と分類を同時に行う1段階の物体検出手法。高速でリアルタイム処理に向く。"},{term:"SSD",definition:"複数のスケールの特徴マップから物体を検出する1段階の物体検出手法。YOLOと並ぶ高速な検出器として知られる。"},{term:"FCN(完全畳み込みネットワーク)",definition:"全結合層をすべて畳み込み層に置き換え、画素単位の予測を可能にしたセマンティックセグメンテーションの先駆的手法。"},{term:"U-Net",definition:"エンコーダ・デコーダ構造にスキップ結合を加えたセグメンテーション用ネットワーク。医用画像解析で広く利用される。"},{term:"CTC",definition:"入力と出力の系列長が一致しない音声認識などで、ブランク記号を導入して対応付けを学習可能にする損失関数。"},{term:"WaveNet",definition:"DeepMindが開発した音声合成モデル。ダイレイト畳み込みを用いて音声波形を直接自己回帰生成し、自然な音声を実現した。"},{term:"word2vec",definition:"単語を低次元の密なベクトル(分散表現)に変換する手法。スキップグラムとCBOWの2方式があり、ベクトル演算で意味関係を表現できる。"},{term:"fastText",definition:"単語を文字n-gramの集合として扱う単語埋め込み手法。活用形や未知語にも対応でき、word2vecより語彙の変化に頑健。"},{term:"ELMo",definition:"双方向LSTMによる言語モデルから、文脈に応じて変化する単語の分散表現を得る手法。多義語の扱いを改善した。"},{term:"GAN(敵対的生成ネットワーク)",definition:"生成器と識別器を競わせる敵対的学習によりデータを生成するモデル。グッドフェローらが提案し、画像生成で大きな成果を上げた。"},{term:"モード崩壊",definition:"GANの学習で生成器が少数のパターンしか生成しなくなり、出力の多様性が失われる問題。"},{term:"VAE(変分オートエンコーダ)",definition:"入力を潜在変数の確率分布として表現し、そこからのサンプリングでデータを生成するモデル。学習は安定するが出力がぼやけやすい。"},{term:"拡散モデル",definition:"データにノイズを加える過程を逆向きに学習し、ノイズの除去を繰り返して画像などを生成するモデル。Stable Diffusionの基盤技術。"},{term:"RLHF",definition:"人間のフィードバックから報酬モデルを学習し、強化学習で言語モデルの出力を人間の意図に沿うよう調整する手法。"},{term:"RAG(検索拡張生成)",definition:"外部の知識ベースから関連情報を検索し、それをプロンプトに組み込んでLLMに回答させる手法。ハルシネーションの軽減に有効。"},{term:"CLIP",definition:"大量の画像とテキストのペアを対照学習で結び付けたマルチモーダルモデル。追加学習なしのゼロショット画像分類を可能にした。"},{term:"経験再生",definition:"DQNで導入された、過去の経験をメモリにためてランダムに取り出して学習する仕組み。データ間の相関を減らし学習を安定させる。"},{term:"超解像",definition:"低解像度の画像から高解像度の画像を復元・生成するタスク。SRGANなどGANを用いた手法で精細な復元が可能になった。"},{term:"CycleGAN",definition:"ペア(対応付け)のない画像同士でも、サイクル一貫性損失により異なるドメイン間の画像変換を学習できるGANの一種。"},{term:"画像キャプション生成",definition:"画像を入力としてその内容を説明する文章を出力するタスク。CNNで抽出した特徴を言語モデルに渡す、画像と言語をまたぐマルチモーダル処理。"},{term:"TF-IDF",definition:"単語の出現頻度(TF)と、多くの文書に現れる語ほど重みを下げる逆文書頻度(IDF)の積で単語の重要度を測る古典的手法。"},{term:"BLEU",definition:"機械翻訳などの生成文を、人間の参照訳とのn-gramの一致度に基づいて自動評価する指標。"},{term:"潜在的ディリクレ配分法(LDA)",definition:"文書が複数の潜在トピックの混合から生成されると仮定し、文書集合から教師なしでトピックを抽出する代表的なトピックモデル。"},{term:"方策勾配法",definition:"価値関数を経由せず、期待報酬を最大化するように方策そのものを勾配法で直接更新する強化学習手法。REINFORCEが代表例。"},{term:"AlphaFold",definition:"DeepMindが開発した、アミノ酸配列からタンパク質の立体構造を高精度に予測するモデル。創薬や基礎生物学の研究を加速させた。"},{term:"OpenPose",definition:"画像から人体の関節点(キーポイント)を検出し、複数人の姿勢を同時に推定できる代表的な姿勢推定手法。"},{term:"pix2pix",definition:"対応付け(ペア)のある画像対を用い、入力画像から対応する出力画像への変換を学習する条件付きGAN。ペアのないCycleGANと対比される。"},{term:"ニューラルスタイル変換",definition:"コンテンツ画像の構図を保ったまま別画像の画風(スタイル)を転写する技術。CNNの中間層の特徴でコンテンツとスタイルを分離・再合成する。"},{term:"MFCC(メル周波数ケプストラム係数)",definition:"人間の聴覚特性を反映したメル尺度に基づき音声信号から抽出する特徴量。音声認識の入力として古くから広く用いられる。"},{term:"GLUE",definition:"複数の自然言語理解タスクをまとめ、モデルの総合的な言語理解能力を横断的に評価するベンチマーク。含意関係認識なども含む。"},{term:"文脈内学習(In-context Learning)",definition:"大規模言語モデルが、パラメータを更新せずプロンプト内の例示や指示だけから推論時にタスクへ適応する能力。Few-shotの背景にある現象。"},{term:"温度パラメータ",definition:"言語モデルの生成で確率分布の鋭さを調整する値。大きくすると多様で創造的、小さくすると確定的な出力になる推論時のパラメータ。"},{term:"Actor-Critic法",definition:"行動を選ぶ方策(Actor)と価値を評価する関数(Critic)を同時に学習する強化学習の枠組み。A3CやA2Cがその発展形である。"}],questions:[{id:"dl-applications-q01",chapterId:"dl-applications",question:"物体検出手法のうち、候補領域の生成と物体の分類を単一のネットワークで同時に行う1段階方式の手法として、最も適切なものを選べ。",choices:["R-CNN","Fast R-CNN","YOLO","Faster R-CNN"],answerIndex:2,explanation:"YOLOは画像全体を一度の処理で解析し、領域提案と分類を同時に行う1段階方式で、リアルタイム検出に向く。R-CNN・Fast R-CNN・Faster R-CNNはいずれも候補領域の生成と分類を分けて行う2段階方式である。同じ1段階方式のSSDとセットで頻出なので覚えておきたい。"},{id:"dl-applications-q02",chapterId:"dl-applications",question:"Faster R-CNNがFast R-CNNから改良された点として、最も適切なものを選べ。",choices:["候補領域の生成をRPNというニューラルネットワークで行うようにした","全結合層をすべて畳み込み層に置き換えた","画素単位のクラス分類を可能にした","生成器と識別器の敵対的学習を導入した"],answerIndex:0,explanation:"Faster R-CNNは、従来Selective Searchなどの外部手法に頼っていた候補領域生成をRPN(領域提案ネットワーク)に置き換え、検出全体をエンドツーエンドで学習・高速化した。全結合層の畳み込み化や画素単位の分類はセグメンテーション手法FCNの特徴、敵対的学習はGANの特徴である。"},{id:"dl-applications-q03",chapterId:"dl-applications",question:"画像内の画素ごとにクラスを割り当て、さらに同じクラスに属する個々の物体も区別するタスクとして、最も適切なものを選べ。",choices:["セマンティックセグメンテーション","インスタンスセグメンテーション","画像分類","姿勢推定"],answerIndex:1,explanation:"インスタンスセグメンテーションは画素単位の分類に加えて「1人目の人」「2人目の人」のように個体を区別し、Mask R-CNNが代表的手法である。セマンティックセグメンテーションは画素単位の分類は行うが同一クラスの個体を区別しない。両者の違いはG検定で頻出の比較ポイントである。"},{id:"dl-applications-q04",chapterId:"dl-applications",question:"セグメンテーション手法U-Netの特徴として、最も適切なものを選べ。",choices:["領域提案ネットワークにより候補領域を高速に生成する","モンテカルロ木探索と価値ネットワークを組み合わせる","アンカーボックスを用いて複数スケールの物体を検出する","エンコーダとデコーダをスキップ結合でつなぎ、医用画像分野で広く使われる"],answerIndex:3,explanation:"U-NetはU字型のエンコーダ・デコーダ構造を持ち、スキップ結合で位置の詳細情報をデコーダに伝えることで高精度なセグメンテーションを実現し、特に医用画像で標準的に使われる。領域提案ネットワークはFaster R-CNN、モンテカルロ木探索はAlphaGo、アンカーボックスによるマルチスケール検出はSSDなどの物体検出の特徴である。"},{id:"dl-applications-q05",chapterId:"dl-applications",question:"音声認識において、入力音声の系列と出力文字の系列の長さが異なる問題に対処するため、ブランク記号を導入して対応付けを学習可能にする手法として、最も適切なものを選べ。",choices:["MFCC","CTC","HMM","WaveNet"],answerIndex:1,explanation:"CTC(Connectionist Temporal Classification)はブランク記号を導入し、長さの異なる入出力系列の対応付け(アライメント)を明示的に与えずに学習できる損失関数で、エンドツーエンド音声認識の中核技術である。MFCCは音声の特徴量、HMMは従来型音声認識の確率モデル、WaveNetは音声合成モデルであり、いずれも系列の対応付けを学習する損失関数ではない。"},{id:"dl-applications-q06",chapterId:"dl-applications",question:"音声合成モデルWaveNetの説明として、最も適切なものを選べ。",choices:["ダイレイト畳み込みを用いて音声波形を直接自己回帰的に生成する","隠れマルコフモデルにより音素の状態遷移を確率的にモデル化する","双方向LSTMにより文脈を考慮した単語の分散表現を獲得する","潜在変数の確率分布からのサンプリングによりデータを生成する"],answerIndex:0,explanation:"WaveNetはDeepMindが開発した音声合成モデルで、因果的なダイレイト(拡張)畳み込みにより長い時間依存を捉えつつ、音声波形そのものを1サンプルずつ自己回帰生成する。HMMは従来型音声認識・合成の技術、双方向LSTMによる文脈依存の分散表現はELMo、潜在変数からの生成はVAEの説明である。"},{id:"dl-applications-q07",chapterId:"dl-applications",question:"日本語の自然言語処理において、文を意味を持つ最小単位に分割し品詞を判定する処理として、最も適切なものを選べ。",choices:["構文解析","固有表現抽出","形態素解析","感情分析"],answerIndex:2,explanation:"形態素解析は文を形態素(意味を持つ最小単位)に分割して品詞を付与する処理で、単語間に空白のない日本語では前処理として不可欠である。構文解析は係り受けなど文法構造の解析、固有表現抽出は人名・地名・組織名などの抽出、感情分析は文章の極性判定であり、いずれも形態素解析の後段で行われるタスクである。"},{id:"dl-applications-q08",chapterId:"dl-applications",question:"word2vecのスキップグラム(skip-gram)の学習方法として、最も適切なものを選べ。",choices:["周辺の単語から中心の単語を予測する","文全体から次の文を予測する","単語を文字n-gramの集合として表現する","中心の単語から周辺の単語を予測する"],answerIndex:3,explanation:"スキップグラムは中心の単語を入力として周辺の単語を予測するタスクを通じて分散表現を学習する。周辺の単語から中心の単語を予測するのは逆方向のCBOWであり、両者の違いは頻出ポイント。文字n-gramによる表現はfastTextの特徴である。"},{id:"dl-applications-q09",chapterId:"dl-applications",question:"学習時に存在しなかった未知語や活用形にも対応しやすい単語埋め込み手法として、最も適切なものを選べ。",choices:["fastText","CBOW","スキップグラム","潜在的ディリクレ配分法(LDA)"],answerIndex:0,explanation:"fastTextは単語を文字n-gram(部分文字列)の集合として表現するため、未知語でも構成する部分文字列からベクトルを合成でき、活用形の多い言語にも強い。CBOWとスキップグラムはword2vecの方式で単語単位の表現のため未知語に弱く、LDAはトピックモデルであり単語埋め込み手法ではない。"},{id:"dl-applications-q10",chapterId:"dl-applications",question:"同じ単語であっても文脈に応じて異なるベクトル表現を与える手法として、最も適切なものを選べ。",choices:["word2vec","ELMo","fastText","one-hotエンコーディング"],answerIndex:1,explanation:"ELMoは双方向LSTMによる言語モデルの内部状態を使い、文脈に依存した動的な分散表現を与えるため、「bank(銀行/土手)」のような多義語を文脈で使い分けられる。word2vecやfastTextは1単語につき1つの固定ベクトルしか持たず、one-hotは単語間の意味的類似を全く表現できない。文脈考慮型表現はBERTなどにつながる流れとして頻出である。"},{id:"dl-applications-q11",chapterId:"dl-applications",question:"GAN(敵対的生成ネットワーク)の学習の仕組みとして、最も適切なものを選べ。",choices:["入力データを潜在変数の確率分布に変換し、サンプリングして復元する","データに加えたノイズを段階的に除去する過程を学習する","正解ラベル付きデータとの誤差を最小化するよう生成器のみを学習する","生成器が識別器をだまし、識別器が本物と偽物を見分けるよう競い合って学習する"],answerIndex:3,explanation:"GANは生成器(ジェネレータ)と識別器(ディスクリミネータ)が敵対的に競い合うことで、本物に近いデータの生成を学習する枠組みである。潜在変数の分布への変換とサンプリングはVAE、ノイズ除去過程の学習は拡散モデルの説明である。GANは正解ラベルとの誤差最小化ではなく2つのネットワークのミニマックスゲームとして定式化される点が特徴である。"},{id:"dl-applications-q12",chapterId:"dl-applications",question:"GANの学習で発生する「モード崩壊」の説明として、最も適切なものを選べ。",choices:["勾配が層を遡るにつれて小さくなり学習が進まなくなる現象","訓練データに過剰に適合し未知データへの性能が下がる現象","生成器が少数のパターンしか生成しなくなり出力の多様性が失われる現象","学習を続けるとモデルの性能が実運用環境で徐々に劣化する現象"],answerIndex:2,explanation:"モード崩壊は、生成器が識別器をだませる特定のパターンばかりを生成するようになり、データ分布の多様なモードを覆えなくなる、GAN特有の学習の失敗である。選択肢の他の現象はそれぞれ勾配消失、過学習、コンセプトドリフトによるモデル劣化の説明であり、いずれもGAN固有の問題ではない。"},{id:"dl-applications-q13",chapterId:"dl-applications",question:"Stable Diffusionなどの画像生成AIの基盤となっている拡散モデルの仕組みとして、最も適切なものを選べ。",choices:["データにノイズを段階的に加える過程の逆をたどり、ノイズを除去しながら画像を生成する","識別器をだますような画像を生成器が出力するよう敵対的に学習する","画像をパッチに分割して自己注意機構で処理し、次のパッチを予測する","決定木を多数組み合わせたアンサンブルで画素値を回帰する"],answerIndex:0,explanation:"拡散モデルは、データに少しずつノイズを加えて完全なノイズにする前向き過程を定義し、その逆向きのノイズ除去過程をニューラルネットワークで学習することで、ノイズから画像を生成する。Stable Diffusionは潜在空間で拡散を行い計算量を削減している点も押さえたい。敵対的学習はGANの仕組みであり、拡散モデルはGANより学習が安定し高品質な生成ができるとされる。"},{id:"dl-applications-q14",chapterId:"dl-applications",question:"大規模言語モデルにおける「スケーリング則」の説明として、最も適切なものを選べ。",choices:["学習率を学習の進行に応じて段階的に小さくすると収束が速まる法則","パラメータ数・データ量・計算量を増やすほど性能がべき乗則に従って向上する経験則","層を深くしすぎると勾配消失により性能が劣化する法則","半導体の集積密度が約2年ごとに倍増するという法則"],answerIndex:1,explanation:"スケーリング則は、言語モデルの損失がモデルサイズ・データ量・計算量の増加に対してべき乗則的に改善するという経験則で、GPT-3以降の大規模化競争の理論的背景となった。学習率の調整は学習率スケジューリング、集積密度の倍増はムーアの法則であり混同しやすい。規模拡大に伴い突然新しい能力が現れる創発的能力とあわせて頻出である。"},{id:"dl-applications-q15",chapterId:"dl-applications",question:"ChatGPTなどの開発で用いられた、LLMの出力を人間の意図や価値観に沿わせるための手法として、最も適切なものを選べ。",choices:["経験再生","敵対的学習","ドロップアウト","RLHF"],answerIndex:3,explanation:"RLHF(人間のフィードバックによる強化学習)は、人間が出力の良し悪しを評価したデータから報酬モデルを学習し、それを使った強化学習でLLMを調整する手法で、InstructGPTやChatGPTで採用された。経験再生はDQNの学習安定化技術、敵対的学習はGAN、ドロップアウトは過学習抑制の正則化手法であり、目的が異なる。"},{id:"dl-applications-q16",chapterId:"dl-applications",question:"LLMに対するプロンプトで、最終的な答えだけでなく推論の途中過程を段階的に出力させることで複雑な問題の正答率を高める手法として、最も適切なものを選べ。",choices:["Zero-shotプロンプティング","ファインチューニング","Chain-of-Thought(思考の連鎖)プロンプティング","ネガティブプロンプト"],answerIndex:2,explanation:"Chain-of-Thoughtは「ステップごとに考えて」のように推論過程を明示的に書かせることで、算数や論理問題などの多段階推論の精度を高めるプロンプト技法である。Zero-shotは例示なしで指示するだけの方法、ファインチューニングはモデル自体を追加学習する手法でプロンプト技法ではない。少数の例を示すFew-shotとあわせてプロンプトエンジニアリングの頻出用語である。"},{id:"dl-applications-q17",chapterId:"dl-applications",question:"LLMのハルシネーション対策として、外部の知識ベースから関連文書を検索しプロンプトに組み込んで回答を生成させる手法として、最も適切なものを選べ。",choices:["RLHF","RAG","蒸留","データ拡張"],answerIndex:1,explanation:"RAG(Retrieval-Augmented Generation:検索拡張生成)は、質問に関連する文書を検索してLLMに与えることで、モデルが持たない最新情報や社内情報に基づいた回答を可能にし、事実に反する生成(ハルシネーション)を抑制する。RLHFは人間の好みへの調整、蒸留は大きなモデルの知識を小さなモデルへ移す圧縮技術、データ拡張は訓練データを水増しする手法である。"},{id:"dl-applications-q18",chapterId:"dl-applications",question:"OpenAIが開発したCLIPの説明として、最も適切なものを選べ。",choices:["大量の画像とテキストのペアを対照学習で結び付け、ゼロショットの画像分類を可能にした","音声波形を自己回帰的に生成して自然な音声合成を実現した","自己対戦のみの強化学習で囲碁の世界チャンピオンレベルに到達した","ノイズ除去過程の学習により高品質な画像生成を実現した"],answerIndex:0,explanation:"CLIPは約4億組の画像・テキストペアを対照学習し、画像と言語を同じ埋め込み空間で扱えるようにしたマルチモーダルモデルで、追加学習なしに任意のラベル候補で画像分類(ゼロショット分類)ができる。音声合成はWaveNet、自己対戦のみの学習はAlphaGo Zero、ノイズ除去による画像生成は拡散モデルの説明である。CLIPは画像生成AIのテキスト理解部分にも活用される。"},{id:"dl-applications-q19",chapterId:"dl-applications",question:"DQN(Deep Q-Network)で学習を安定化させるために導入された工夫として、最も適切なものを選べ。",choices:["人間の棋譜データによる教師あり事前学習","報酬モデルを用いた人間のフィードバックの反映","複数エージェントによる非同期並列学習","経験再生とターゲットネットワーク"],answerIndex:3,explanation:"DQNは、過去の経験をメモリにためてランダムに取り出すことで時系列の相関を断つ経験再生と、目標値の計算に使うネットワークを一定期間固定するターゲットネットワークにより、深層強化学習の不安定さを克服した。人間の棋譜による事前学習は初代AlphaGo、報酬モデルによる調整はRLHF、非同期並列学習はA3Cの特徴である。"},{id:"dl-applications-q20",chapterId:"dl-applications",question:"AlphaGo Zeroが初代AlphaGoと異なる点として、最も適切なものを選べ。",choices:["モンテカルロ木探索を使わずに着手を決定する","畳み込みニューラルネットワークを使用しない","人間の棋譜を一切使わず、自己対戦のみで学習する","強化学習を使わず教師あり学習のみで学習する"],answerIndex:2,explanation:"AlphaGo Zeroは人間の棋譜データによる教師あり学習を排し、ルールのみを与えられた状態からの自己対戦による強化学習だけで初代AlphaGoを上回った。モンテカルロ木探索とニューラルネットワークは引き続き使用しており、教師あり学習のみという説明は逆である。人間の知識なしで超人的性能に達した点が「ゼロ」の名前の由来として頻出である。"},{id:"dl-applications-q21",chapterId:"dl-applications",question:"画像から人体の関節点(キーポイント)を検出し、複数人の姿勢を同時に推定できる代表的な手法として、最も適切なものを選べ。",choices:["OpenPose","Mask R-CNN","YOLO","WaveNet"],answerIndex:0,explanation:"選択肢AのOpenPoseは人体の関節点(キーポイント)を検出してつなぎ合わせ、複数人の姿勢を同時に推定できる代表的手法である。選択肢BのMask R-CNNはインスタンスセグメンテーション、選択肢CのYOLOは物体検出、選択肢DのWaveNetは音声合成の手法であり、姿勢推定そのものを目的とはしない。姿勢推定はスポーツ解析や見守りなどに応用される頻出タスクである。"},{id:"dl-applications-q22",chapterId:"dl-applications",question:"ディープラーニングを用いた顔認証の仕組みとして、最も適切なものを選べ。",choices:["登録した顔画像と入力画像のピクセルを1つずつ完全一致で比較する","顔画像を低次元の埋め込みベクトルに変換し、ベクトル間の距離(類似度)で同一人物かを判定する","顔の領域を矩形で囲む物体検出のみを行い、個人の特定はしない","音声の声紋を周波数解析して本人確認を行う"],answerIndex:1,explanation:"選択肢Bのとおり、顔認証は深層学習で顔画像を低次元の埋め込みベクトル(特徴量)に変換し、ベクトル間の距離や類似度で同一人物かを判定する。選択肢Aのピクセル完全一致は照明や角度の変化に弱く実用的でない。選択肢Cは顔検出にとどまり本人特定ではなく、選択肢Dは声紋認証の説明である。1対1の本人確認と1対多の本人検索の区別もあわせて押さえたい。"},{id:"dl-applications-q23",chapterId:"dl-applications",question:"オートエンコーダを用いた異常検知の仕組みとして、最も適切なものを選べ。",choices:["異常データを大量に集めて教師あり分類器を学習する","正常・異常を問わず全データの平均から外れた次元を削除する","正常データのみで学習し、入力をうまく復元できず復元誤差が大きいものを異常とみなす","ラベルの一致度を測ってアノテーションの品質を評価する"],answerIndex:2,explanation:"選択肢Cのとおり、オートエンコーダを正常データだけで学習させると正常パターンはうまく復元できるが異常データは復元誤差が大きくなるため、この誤差を異常スコアとして検知に利用できる。選択肢Aの教師あり分類は異常データが希少な現実では集めにくく、異常検知が教師なし的手法を使う理由である。選択肢Bは次元削減、選択肢Dはアノテーションの品質管理の話で異常検知とは無関係である。"},{id:"dl-applications-q24",chapterId:"dl-applications",question:"低解像度の画像から高解像度の画像を復元・生成するタスクとして、最も適切なものを選べ。",choices:["セマンティックセグメンテーション","ニューラルスタイル変換","物体検出","超解像(super-resolution)"],answerIndex:3,explanation:"選択肢Dの超解像は低解像度の画像を高解像度に変換・復元するタスクで、SRGANなどGANを用いた手法により細部まで自然な復元が可能になった。選択肢Aは画素単位の分類、選択肢Bは画像の画風変換、選択肢Cは物体の位置特定であり、いずれも解像度を高める処理ではない。"},{id:"dl-applications-q25",chapterId:"dl-applications",question:"対応付け(ペア)のある画像対を用い、入力画像から対応する出力画像への変換を学習する条件付きGANとして、最も適切なものを選べ。",choices:["pix2pix","CycleGAN","DCGAN","VAE"],answerIndex:0,explanation:"選択肢Aのpix2pixは、線画と着色済み画像のように対応付け(ペア)のある画像対を用い、入力から対応する出力への変換を学習する条件付きGANである。選択肢BのCycleGANはペアのない画像同士でドメイン変換を学習する点が対照的で、両者の違いは頻出。選択肢CのDCGANはノイズから画像を生成する基本的なGAN、選択肢DのVAEは別系統の生成モデルである。"},{id:"dl-applications-q26",chapterId:"dl-applications",question:"ある画像の構図を保ちながら、別の画像の画風(スタイル)を適用する技術として、最も適切なものを選べ。",choices:["超解像","ニューラルスタイル変換","データ拡張","セマンティックセグメンテーション"],answerIndex:1,explanation:"選択肢Bのニューラルスタイル変換は、コンテンツ画像の構図を保ったまま絵画などのスタイル画像の画風を転写する技術で、CNNの中間層の特徴を用いてコンテンツとスタイルを分離・再合成する。選択肢Aは解像度を高める処理、選択肢Cは訓練データの水増し、選択肢Dは画素単位の領域分割であり、画風の転写を目的とはしない。"},{id:"dl-applications-q27",chapterId:"dl-applications",question:"画像を入力として、その内容を説明する自然言語の文を生成するタスクとして、最も適切なものを選べ。",choices:["物体検出","セマンティックセグメンテーション","画像キャプション生成","固有表現抽出"],answerIndex:2,explanation:"選択肢Cの画像キャプション生成は、CNNなどで抽出した画像特徴を言語モデル(RNNやTransformer)に渡し、画像を説明する文章を生成する、画像と言語をまたぐマルチモーダルなタスクである。選択肢Aは物体の位置検出、選択肢Bは画素単位の分類で文章は生成しない。選択肢Dの固有表現抽出はテキストから人名・地名などを抜き出す言語処理タスクである。"},{id:"dl-applications-q28",chapterId:"dl-applications",question:"音声認識の前処理として、人間の聴覚特性を考慮して音声信号から抽出する代表的な特徴量として、最も適切なものを選べ。",choices:["word2vec","one-hotベクトル","TF-IDF","メル周波数ケプストラム係数(MFCC)"],answerIndex:3,explanation:"選択肢DのMFCC(メル周波数ケプストラム係数)は、人間の聴覚が低周波に敏感な特性を反映したメル尺度に基づき音声から抽出する特徴量で、音声認識の入力として古くから広く使われる。選択肢Aのword2vecと選択肢CのTF-IDFはテキスト(単語)を対象とする手法、選択肢Bのone-hotは離散値の符号化であり、音声波形の特徴量抽出には用いない。"},{id:"dl-applications-q29",chapterId:"dl-applications",question:"テキストから音声を生成する、ディープラーニングを用いたエンドツーエンドの音声合成(TTS)モデルとして、最も適切なものを選べ。",choices:["Tacotron","word2vec","YOLO","BERT"],answerIndex:0,explanation:"選択肢AのTacotronは、入力テキストからメルスペクトログラムを生成し、ボコーダで波形に変換するエンドツーエンドの音声合成(TTS)モデルである。選択肢Bのword2vecは単語の分散表現、選択肢CのYOLOは物体検出、選択肢DのBERTは文脈理解のための言語モデルであり、いずれも音声を合成するモデルではない。波形を直接生成するWaveNetとあわせて音声合成の代表例として押さえたい。"},{id:"dl-applications-q30",chapterId:"dl-applications",question:"各文書が複数の潜在的な話題(トピック)の混合から生成されると仮定し、文書集合から教師なしでトピックを抽出する手法として、最も適切なものを選べ。",choices:["TF-IDF","潜在的ディリクレ配分法(LDA)","word2vec","BLEU"],answerIndex:1,explanation:"選択肢BのLDA(潜在的ディリクレ配分法)は、各文書が複数トピックの混合分布から生成されると仮定する代表的なトピックモデルで、教師なしで文書集合の話題構造を抽出できる。選択肢AのTF-IDFは単語の重要度を測る指標、選択肢Cのword2vecは単語の分散表現、選択肢DのBLEUは機械翻訳の評価指標であり、いずれもトピック抽出を目的とはしない。"},{id:"dl-applications-q31",chapterId:"dl-applications",question:"文書中の単語の重要度を、出現頻度と「多くの文書に現れる語ほど重みを下げる指標」の積で評価する古典的手法として、最も適切なものを選べ。",choices:["word2vec","BLEU","TF-IDF","形態素解析"],answerIndex:2,explanation:"選択肢CのTF-IDFは、単語の出現頻度(TF)と、多くの文書に共通して現れる語ほど価値を下げる逆文書頻度(IDF)の積で単語の重要度を数値化する手法である。選択肢Aのword2vecは意味的な分散表現を学習する手法、選択肢BのBLEUは生成文の評価指標、選択肢Dの形態素解析は文を単語に分割する前処理であり、単語の重要度の重み付けとは目的が異なる。"},{id:"dl-applications-q32",chapterId:"dl-applications",question:"機械翻訳など生成された文の品質を、人間による参照訳とのn-gramの一致度に基づいて自動評価する指標として、最も適切なものを選べ。",choices:["正解率(Accuracy)","F値","AUC","BLEU"],answerIndex:3,explanation:"選択肢DのBLEUは、機械翻訳の出力と参照訳との間でn-gram(連続する単語列)がどれだけ一致するかを基に翻訳品質を自動評価する指標である。選択肢Aの正解率、選択肢BのF値、選択肢CのAUCはいずれも分類タスクの評価指標であり、文の生成品質の評価には適さない。生成系の評価指標としてBLEUを押さえておきたい。"},{id:"dl-applications-q33",chapterId:"dl-applications",question:"自然言語理解モデルの性能を、複数のタスクを通じて横断的に評価するために作られたベンチマークとして、最も適切なものを選べ。",choices:["GLUE","ImageNet","MNIST","COCO"],answerIndex:0,explanation:"選択肢AのGLUE(General Language Understanding Evaluation)は、含意関係認識や感情分析など複数の自然言語理解タスクをまとめ、モデルの総合的な言語理解能力を評価するベンチマークである。選択肢BのImageNetと選択肢DのCOCOは画像認識、選択肢CのMNISTは手書き数字認識のデータセットであり、いずれも言語理解の評価用ではない。"},{id:"dl-applications-q34",chapterId:"dl-applications",question:"前提となる文が与えられたとき、別の文の内容がそこから導けるか(含意するか)を判定するタスクとして、最も適切なものを選べ。",choices:["固有表現抽出","含意関係認識(textual entailment)","機械翻訳","形態素解析"],answerIndex:1,explanation:"選択肢Bの含意関係認識は、前提文が与えられたとき仮説文が含意・矛盾・中立のいずれかを判定するタスクで、自然言語理解の深さを測る代表的な課題でありGLUEにも含まれる。選択肢Aは固有表現の抽出、選択肢Cは言語間の翻訳、選択肢Dは単語分割の前処理であり、文間の論理的関係の判定とは異なる。"},{id:"dl-applications-q35",chapterId:"dl-applications",question:"実体(エンティティ)とその関係をノードとエッジで構造化して表現し、検索や質問応答に活用される知識表現として、最も適切なものを選べ。",choices:["決定木","畳み込みニューラルネットワーク","知識グラフ","オートエンコーダ"],answerIndex:2,explanation:"選択肢Cの知識グラフは、人物・場所・概念などの実体をノード、それらの関係をエッジとして表現したグラフ構造の知識表現で、検索エンジンや質問応答システムで活用される。選択肢Aの決定木は分類・回帰のモデル、選択肢BのCNNは画像処理に強いネットワーク、選択肢Dのオートエンコーダは次元圧縮や異常検知に使うモデルであり、知識の構造化表現そのものではない。"},{id:"dl-applications-q36",chapterId:"dl-applications",question:"大規模言語モデルが、パラメータを更新せずにプロンプト内の少数の例から推論時にタスクを学習・遂行する能力として、最も適切なものを選べ。",choices:["ファインチューニング","蒸留","転移学習","文脈内学習(In-context Learning)"],answerIndex:3,explanation:"選択肢Dの文脈内学習(In-context Learning)は、LLMがプロンプト中に示された例示や指示だけから、モデルの重みを更新せずに推論時にタスクへ適応する能力で、Few-shotプロンプティングの背景にある現象である。選択肢Aのファインチューニング、選択肢Bの蒸留、選択肢Cの転移学習はいずれもモデルのパラメータを学習・更新する手法であり、推論時のみで完結する文脈内学習とは区別される。"},{id:"dl-applications-q37",chapterId:"dl-applications",question:"言語モデルの文章生成において、値を大きくするほど出力の多様性(ランダム性)が増し、小さくするほど確定的な出力になるパラメータとして、最も適切なものを選べ。",choices:["温度(temperature)パラメータ","学習率","ドロップアウト率","バッチサイズ"],answerIndex:0,explanation:"選択肢Aの温度パラメータは、次の単語の確率分布の鋭さを調整する値で、高くすると低確率の語も選ばれやすく多様で創造的な出力に、低くすると高確率の語に偏った確定的な出力になる。選択肢Bの学習率、選択肢Cのドロップアウト率、選択肢Dのバッチサイズはいずれも学習時のハイパーパラメータであり、推論時の生成の多様性を制御する温度とは役割が異なる。"},{id:"dl-applications-q38",chapterId:"dl-applications",question:"価値関数を介さず、期待される報酬が大きくなるように方策(行動の選び方)そのものを直接最適化する強化学習の手法として、最も適切なものを選べ。",choices:["Q学習","方策勾配法(REINFORCEなど)","経験再生","モンテカルロ木探索"],answerIndex:1,explanation:"選択肢Bの方策勾配法は、状態に対する行動の確率分布である方策をパラメータ化し、期待報酬を最大化するよう勾配法で直接更新する手法で、REINFORCEが代表的なアルゴリズムである。選択肢AのQ学習は行動価値(Q値)を学習してから行動を選ぶ価値ベースの手法、選択肢Cの経験再生はDQNの学習安定化技術、選択肢Dのモンテカルロ木探索は探索アルゴリズムであり、方策を直接最適化するものではない。"},{id:"dl-applications-q39",chapterId:"dl-applications",question:"行動を選ぶ方策(Actor)と、その良し悪しを評価する価値関数(Critic)を同時に学習する強化学習の枠組みとして、最も適切なものを選べ。",choices:["Q学習","経験再生","Actor-Critic法","敵対的生成ネットワーク"],answerIndex:2,explanation:"選択肢CのActor-Critic法は、方策を担うActorと価値評価を担うCriticを併用し、方策勾配法の分散の大きさを価値関数で抑えながら学習する枠組みで、A3CやA2Cがその発展形である。選択肢AのQ学習は価値ベースのみ、選択肢Bの経験再生はDQNの技術、選択肢DのGANは生成モデルであり、ActorとCriticを協調させる強化学習の枠組みではない。"},{id:"dl-applications-q40",chapterId:"dl-applications",question:"深層強化学習を用いて、リアルタイムストラテジーゲーム「StarCraft II」でプロ級のプレイを実現したDeepMindのAIとして、最も適切なものを選べ。",choices:["AlphaGo","AlphaFold","Watson","AlphaStar"],answerIndex:3,explanation:"選択肢DのAlphaStarはDeepMindが開発し、不完全情報かつリアルタイムなStarCraft IIでプロ級の強さを示した深層強化学習エージェントである。選択肢AのAlphaGoは囲碁、選択肢BのAlphaFoldはタンパク質構造予測のモデルでありゲームAIではない。選択肢CのWatsonはIBMの質問応答システムである。OpenAIがDota 2で成果を上げたOpenAI Fiveとあわせ、複雑なゲームへの強化学習の応用例として頻出である。"}],contrasts:[{title:"物体検出の2方式",left:{label:"YOLO/SSD(1段階)",traits:["領域生成と分類を同時","高速・リアルタイム向き","精度はやや劣る傾向"]},right:{label:"R-CNN系(2段階)",traits:["候補領域→分類の2段階","高精度","処理が遅い"]},point:"「速さの1段階、精度の2段階」"},{title:"セグメンテーションの2種",left:{label:"セマンティック",traits:["画素単位でクラス分類","同一クラスの個体は区別しない","FCN・U-Net"]},right:{label:"インスタンス",traits:["画素単位+個体を区別","Mask R-CNN","「1人目・2人目」を分ける"]},point:"個体を区別するならインスタンス"},{title:"GAN と VAE",left:{label:"GAN",traits:["生成器と識別器の敵対的学習","鮮明な生成","学習が不安定・モード崩壊"]},right:{label:"VAE",traits:["潜在変数の分布を経由","学習が安定","出力がぼやけやすい"]},point:"鮮明だが不安定のGAN、安定だがぼやけるVAE"},{title:"GAN と拡散モデル",left:{label:"GAN",traits:["敵対的学習で一気に生成","高速生成","学習が不安定"]},right:{label:"拡散モデル",traits:["ノイズ除去を反復","高品質で学習が安定","生成が遅い"]},point:"Stable Diffusionの基盤は拡散モデル"},{title:"skip-gram と CBOW",left:{label:"スキップグラム",traits:["中心の単語→周辺を予測","低頻度語に強い"]},right:{label:"CBOW",traits:["周辺の単語→中心を予測","学習が高速"]},point:"予測の向きが逆(中心起点か周辺起点か)"},{title:"価値ベースと方策ベース",left:{label:"Q学習(価値ベース)",traits:["Q値を学習し行動を選ぶ","DQNが代表"]},right:{label:"方策勾配法(方策ベース)",traits:["方策を直接最適化","REINFORCEが代表"]},point:"価値を経由するか方策を直接更新するか"},{title:"AlphaGo と AlphaGo Zero",left:{label:"AlphaGo",traits:["人間の棋譜で教師あり事前学習","木探索+方策・価値網"]},right:{label:"AlphaGo Zero",traits:["人間の棋譜を使わない","自己対戦のみで学習"]},point:"「Zero」は人間の知識ゼロ"},{title:"RAG とファインチューニング",left:{label:"RAG(検索拡張生成)",traits:["外部知識を検索して回答","最新情報に対応","モデルは再学習しない"]},right:{label:"ファインチューニング",traits:["モデルを追加学習","知識を重みに取り込む","更新にコスト"]},point:"外部から引くRAG、重みに刻むFT"}]},of={id:"implementation",number:6,title:"AIの社会実装",subtitle:"プロジェクト推進・データ・MLOps",sections:[{title:"AIプロジェクトの進め方",points:["AIプロジェクトは一般に「課題設定(構想)→PoC(概念実証)→開発→運用・保守」の段階を踏み、各段階でゴーサインを判断しながら進める。","最初に行うべきは「その課題はAIで解くべきか」の見極めで、ルールベースや業務改善で十分なら無理にAIを使わない判断も重要である。","CRISP-DMはデータ分析プロジェクトの標準プロセスで、ビジネス理解→データ理解→データ準備→モデリング→評価→展開の6フェーズを行き来しながら進める。","KDDはデータベースからの知識発見プロセスで、データ選択→前処理→変換→データマイニング→解釈・評価という流れをとる。","機械学習は試行錯誤が前提で要件を事前に確定しにくいため、ウォーターフォール型よりも短いサイクルを繰り返すアジャイル型開発と相性が良い。","PoCは本格開発の前に技術的な実現可能性や効果を小規模に検証する工程だが、目的やGo/No-Goの判断基準を決めずに行うとPoCばかり繰り返して実用化に至らない「PoC貧乏(PoC死)」に陥る。"],summary:"AIプロジェクトは課題設定→PoC→開発→運用の段階を踏み、各段階でGo/No-Goを判断する。まず「AIで解くべきか」を見極める。データ分析の標準プロセスはCRISP-DM(6フェーズ反復)、知識発見の流れはKDD。試行錯誤前提なのでアジャイルと相性が良い点を押さえる。"},{title:"データの収集",points:["データ収集には自社データの活用のほか、ImageNetなどのオープンデータセットの利用、ウェブスクレイピング、外部からの購入などの手段がある。","オープンデータセットには利用条件(ライセンス)があり、研究用は商用利用が制限されている場合があるため、利用規約の確認が必須である。","ウェブスクレイピングでは、対象サイトの利用規約やrobots.txtの確認、サーバーに過剰な負荷をかけないこと、個人情報や著作物の扱いに注意が必要である。","日本の著作権法には情報解析のための著作物利用を一定条件下で認める規定(30条の4など)があり、AIの学習目的でのデータ利用に関わる。","「カメラ画像利活用ガイドブック」はIoT推進コンソーシアムと総務省・経済産業省が策定したもので、カメラ画像を事業に活用する際のプライバシー配慮や告知のあり方を示している。","教師データは量だけでなく質と分布が重要で、特定の属性や条件に偏ったデータで学習するとモデルにバイアスが生じ、公平性や精度の問題につながる。"],summary:"データ収集はオープンデータ・スクレイピング・購入などがあり、ライセンスやrobots.txt・利用規約の確認が必須。著作権法30条の4は情報解析目的の利用を一定条件で認める。カメラ画像利活用ガイドブックの策定主体と、データの偏りがバイアスを生む点を押さえる。"},{title:"データの前処理とアノテーション",points:["欠損値への対処には、欠損を含む行の削除、平均値・中央値などによる補完、欠損自体を情報として扱う方法などがあり、欠損の発生メカニズムを考慮して選ぶ。","外れ値は入力ミスなどの異常なら除去・修正するが、不正検知のように外れ値こそが検出対象の場合もあるため、機械的に削除すべきではない。","正規化は値を0〜1などの一定範囲に収める変換、標準化は平均0・標準偏差1に変換する処理で、特徴量のスケールをそろえて学習を安定させる。","アノテーションは教師ラベルを付与する作業で、判断基準を明文化したガイドラインの整備と、複数人の結果の一致度確認などの品質管理が精度を左右する。","アノテーションの品質が低い(ラベルノイズが多い)と、データ量を増やしてもモデルの精度向上には結びつきにくい。","十分なデータが集められない場合は、学習済みモデルを流用する転移学習やファインチューニング、データ拡張の活用が有効である。"],summary:"正規化は0〜1などの範囲に収める変換、標準化は平均0・標準偏差1への変換で定義の入れ替えがひっかけ。外れ値は検出対象のこともあり機械的に削除しない。アノテーションはガイドラインと一致度確認で品質を担保し、データ不足には転移学習やデータ拡張が有効と押さえる。"},{title:"MLOpsと運用",points:["MLOpsは機械学習(ML)と運用(Operations)を組み合わせた言葉で、モデルの開発から運用までを継続的・自動的に回すための実践や仕組みを指す。","通常のソフトウェアと異なり、機械学習システムはコードに加えてデータとモデルのバージョン管理が必要で、CI/CDパイプラインに再学習やモデル評価を組み込む。","運用中のモデルは、入力データの傾向や予測対象の性質が時間とともに変化するコンセプトドリフトによって精度が劣化するため、監視と再学習の仕組みが不可欠である。","推論環境は、計算資源が豊富でスケールしやすいクラウドと、低遅延・通信不要・プライバシー保護に優れるエッジ(端末側)を要件に応じて使い分ける。","エッジ推論ではデバイスの計算資源が限られるため、量子化や蒸留などでモデルを軽量化する工夫が用いられる。","運用開始前に設定したKPI(重要業績評価指標)に基づき効果を継続的に検証し、ビジネス価値が出ているかを確認することが社会実装の成否を分ける。"],summary:"MLOpsはコードに加えデータとモデルのバージョン管理を行い、CI/CDに再学習を組み込む実践。コンセプトドリフトによる精度劣化への監視と再学習が不可欠。推論環境はクラウド(スケール)とエッジ(低遅延・軽量化)を使い分け、KPIで効果を継続検証する点を押さえる。"},{title:"説明可能AIと品質保証",points:["ディープラーニングは判断根拠が人間に分かりにくいブラックボックス問題を抱え、融資審査や医療などの高リスク領域では説明責任が課題となる。","XAI(説明可能AI)は予測の根拠を人間が理解できる形で提示する技術の総称で、米国DARPAの研究プロジェクトをきっかけに広まった用語である。","LIMEは個々の予測の近傍を単純な解釈可能モデルで近似して局所的な説明を与え、SHAPはゲーム理論のシャープレイ値に基づき各特徴量の寄与度を算出する。","Grad-CAMは勾配情報を使ってCNNが画像のどこに注目したかをヒートマップで可視化する手法で、画像認識の判断根拠の確認に使われる。","機械学習システムの品質保証では、精度だけでなく公平性・頑健性・安全性も評価対象となり、従来のテスト手法だけでは保証しきれないため新たな品質ガイドラインの整備が進んでいる。"],summary:"ディープラーニングのブラックボックス問題に対し、XAIは予測根拠を人間に理解可能な形で示す。LIMEは局所を単純モデルで近似、SHAPはシャープレイ値で特徴量寄与を算出、Grad-CAMはCNNの注目領域をヒートマップ化。この3手法の対応と、品質保証が公平性・頑健性も含む点を押さえる。"},{title:"体制づくりと契約",points:["AIプロジェクトにはデータサイエンティストやエンジニアだけでなく、業務知識を持つドメイン専門家の協働が不可欠で、課題設定やデータの解釈で重要な役割を果たす。","経済産業省の「AI・データの利用に関する契約ガイドライン」は、AI開発をアセスメント→PoC→開発→追加学習の段階に分け、段階ごとに契約を結ぶ探索的段階型の開発方式を提示している。","AI開発は成果物の性能を事前に保証しにくいため、仕事の完成を約束する請負契約よりも、業務の遂行を約束する準委任契約が適する場面が多い。","学習済みモデルや学習用データセットの知的財産の帰属・利用条件は争いになりやすく、契約で明確に取り決めておく必要がある。","開発をベンダーに委託する場合、再委託の可否や責任範囲、データの取り扱い(秘密保持・目的外利用の禁止)を契約で定めることが重要である。"],summary:"AIプロジェクトには業務知識を持つドメイン専門家の協働が不可欠。経産省の契約ガイドラインはアセスメント→PoC→開発→追加学習の探索的段階型を提示。性能を事前保証しにくいため請負より準委任が適し、モデルやデータの知財帰属は契約で明確化する点を押さえる。"},{title:"プロジェクトの進め方を深掘り",points:["CRISP-DMの6フェーズは、ビジネス理解(課題と目標の明確化)→データ理解(収集と探索)→データ準備(前処理・特徴量作成)→モデリング→評価→展開(デプロイ・運用)で、必要に応じて前のフェーズへ戻る反復が前提である。","KDDはデータ選択→前処理→変換→データマイニング→解釈・評価という流れで、CRISP-DMがビジネス理解から始まるのに対しデータ選択から始まる点が両者の見分けどころである。","ウォーターフォール型は要件定義→設計→実装→テストと工程を一方向に進め後戻りを想定しないのに対し、アジャイル型は短いサイクルを反復し、精度が学習してみないと分からない機械学習と相性が良い。","PoC(概念実証)は本格開発の前に実現可能性や効果を小規模に検証する工程で、Go/No-Go(続行・中止)の判断基準を事前に決めておかないと、検証ばかり繰り返して実用化に至らないPoC貧乏(PoC死)に陥る。","AI導入ではまず対象を限定して小さく始め、効果を見ながら拡大するスモールスタートが、不確実性の高い投資のリスクを抑える定石とされる。","ROI(投資対効果)は得られる効果を投資額で評価する指標で、モデルの正解率が高くてもコスト削減や売上向上などの業務成果につながらなければ社会実装としては失敗である。","BPR(ビジネスプロセス・リエンジニアリング)はAIを既存業務にそのまま当てはめるのではなく、業務プロセス自体を抜本的に見直して再設計することで効果を最大化する考え方である。","「その課題はAIで解くべきか」の見極めが最初の関門で、ルールベースや単純な業務改善で十分な場合は無理にAIを使わない判断も重要である。"],summary:"CRISP-DMはビジネス理解始まりの6フェーズ反復、KDDはデータ選択始まりの流れで対比が頻出。試行錯誤前提でアジャイルが適し、PoCはGo/No-Go基準が必須(なければPoC貧乏)。スモールスタートとROIで投資リスクを抑え、BPRは業務プロセスごと再設計する点を押さえる。"},{title:"データの収集と権利・ライセンス(深掘り)",points:["代表的なオープンデータセットには画像認識のImageNet・物体検出のCOCO・手書き数字のMNISTなどがあり、研究用途に限られるものや商用利用に条件があるものがあるため利用規約の確認が必須である。","「公開されている=著作権が放棄されている」ではなく、公開データにも著作権やライセンス条件が及ぶため、自由に商用利用してよいと考えるのは誤りである。","クリエイティブ・コモンズ(CC)ライセンスは、表示(BY)・非営利(NC)・改変禁止(ND)・継承(SA)の条件の組み合わせで利用範囲を示すため、商用利用や改変の可否を記号から確認する必要がある。","日本の著作権法第30条の4は、情報解析など著作物に表現された思想・感情の享受を目的としない利用を一定条件下で許諾なく認めており、AIの学習用データ利用の根拠としてよく取り上げられる。","ウェブスクレイピングでは、対象サイトの利用規約とrobots.txt(クローラ向けのアクセス可否の指示)の確認、アクセス間隔を空けてサーバーに過剰な負荷をかけない配慮が基本である。","取得データに個人情報が含まれれば個人情報保護法上の義務(利用目的の特定など)が生じるため、収集段階からの配慮が必要である。","「カメラ画像利活用ガイドブック」はIoT推進コンソーシアムと総務省・経済産業省が策定した自主的な指針で、法的拘束力のある規則ではなく、生活者への告知やプライバシー配慮のあり方を示す。","教師データは量だけでなく質と分布が重要で、特定の属性や条件に偏ったデータで学習するとモデルがその偏りを学習・増幅し、採用や顔認識などで不公平な予測を生むおそれがある。"],summary:"ImageNet・COCO・MNISTなどのデータセットはライセンス確認が必須で、公開イコール著作権放棄ではない。CCライセンスの条件記号、著作権法30条の4(情報解析利用)、スクレイピングのrobots.txtと負荷配慮、カメラ画像利活用ガイドブックの策定主体、データの偏りが生むバイアスを押さえる。"},{title:"MLOpsとモデルの運用(深掘り)",points:["MLOpsはDevOpsを機械学習に拡張した概念で、コードに加えてデータとモデルのバージョン管理が必要になる点が通常のソフトウェア開発と大きく異なる。","通常のCI/CD(継続的インテグレーション/継続的デリバリー)に加え、新しいデータでモデルを自動的に再学習・再デプロイし続けるCT(Continuous Training:継続的学習)を回す点が機械学習システム運用の特徴である。","データドリフトは入力データそのものの分布が変化する現象、コンセプトドリフトは入力と出力(予測対象)の関係性が変化する現象で、いずれも運用中のモデル精度劣化の原因となり監視が必要である。","特徴量ストア(Feature Store)は計算済みの特徴量を一元管理し、学習時と推論時で同じ定義の特徴量を再利用できるようにする仕組みで、両者で特徴量の作り方がずれるトレーニング/サービングスキューを防ぐ。","モデルレジストリは学習済みモデルをバージョン管理し、本番への適用や過去バージョンへの切り戻し(ロールバック)を統制する仕組みで、再現性と運用統制の要となる。","A/Bテストは利用者をランダムに2群に分けて新旧モデルなどを提示し、コンバージョン率などの指標を比較して効果を統計的に検証する手法である。","デプロイ手法には、新版を少数のユーザーから段階的に広げるカナリアリリースや、本番と並行して新モデルに実トラフィックを流し挙動だけを確認するシャドーデプロイがあり、リスクを抑えつつ更新できる。","運用開始前に設定したKPI(重要業績評価指標)に基づき効果を継続的に検証し、ビジネス価値が出ているかを確認することが社会実装の成否を分ける。"],summary:"MLOpsはコード+データ+モデルの管理で、CI/CDにCT(継続的学習)を加えて回す。劣化の監視ではデータドリフト(入力分布)とコンセプトドリフト(入出力関係)を区別。特徴量ストアとモデルレジストリで再現性を担保し、A/Bテスト・カナリア・シャドーデプロイで安全に更新する点を押さえる。"},{title:"プライバシー保護と軽量化の技術(深掘り)",points:["連合学習(フェデレーテッドラーニング)は、データを各端末・拠点に置いたまま局所的に学習し、モデルの更新内容(勾配やパラメータ)のみを中央に集約することで、生データを共有せずに全体モデルを構築する。","差分プライバシーは、出力に数学的に制御されたノイズを加え、特定個人がデータに含まれるか否かで結果がほとんど変わらないようにすることで、個人を特定されにくくする技術である。","k-匿名化はノイズではなく属性をまるめて(一般化して)同じ属性値を持つ人をk人以上にすることで個人を特定しにくくする手法で、差分プライバシーとはアプローチが異なる。","秘密計算(秘匿計算)は準同型暗号や秘密分散などを用い、データを暗号化・秘匿したまま計算を行う技術で、複数組織が互いにデータの中身を開示せずに共同で分析・学習できる。","推論環境は、計算資源が豊富で需要に応じてスケールできるクラウドと、低遅延・通信不要・プライバシー保護に優れるエッジ(端末側)を要件に応じて使い分ける。","エッジ推論では端末の計算資源が限られるため、数値の表現精度を下げる量子化、結合を削るプルーニング(枝刈り)、大きな教師モデルの出力を小さな生徒モデルに模倣させる知識蒸留などでモデルを軽量化する。","量子化は推論を高速化しメモリを削減できる一方、表現精度が下がるため精度劣化とのトレードオフがあり、用途に応じてビット数を選ぶ必要がある。","既製のクラウドAIサービス(API)は学習済みの高度な機能を短期間・低コストで導入できる反面、独自要件への細かなカスタマイズが難しく、入力データを外部へ送信する機密性・プライバシーの懸念がある。"],summary:"連合学習はデータを動かさず更新内容のみ集約、差分プライバシーは出力にノイズ、k-匿名化は属性のまるめ、秘密計算は暗号化したまま計算とアプローチを区別。推論はクラウドとエッジを使い分け、エッジでは量子化・プルーニング・知識蒸留で軽量化する点を押さえる。"},{title:"説明可能AIとAIの品質保証(深掘り)",points:["ブラックボックス問題とは、ディープラーニングが膨大なパラメータの組み合わせで判断するため判断根拠を人間が解釈しにくいことで、融資審査・採用・医療など人の人生に関わる領域で説明責任の課題となる。","XAI(説明可能AI)は予測の根拠を人間が理解できる形で提示する技術の総称で、米国DARPAの研究プロジェクトを契機に広まった用語である。","LIMEは個々の予測の近傍を解釈可能な単純モデルで近似して局所的な説明を与え、モデルの種類によらず適用できる。","SHAPはゲーム理論のシャープレイ値に基づき各特徴量の予測への寄与度を一貫した基準で算出する手法で、LIMEと並び主に表形式データの説明に使われる。","Grad-CAMは出力クラスに対する勾配情報を使い、CNNが画像のどの領域に注目して判断したかをヒートマップで可視化し、誤分類の原因分析やモデルの妥当性確認に用いられる。","モデルカードはモデルの目的・性能・適用範囲・既知の限界やバイアスを文書化して利用者の誤用を防ぐ取り組みで、データセット側の素性を記述するデータシートと対の概念である。","機械学習システムの品質保証では精度だけでなく公平性・頑健性・安全性も評価対象となり、入力のわずかな変化で誤るなど従来のテスト手法では保証しきれないため、新たな品質ガイドラインの整備が進んでいる。","組織横断でデータの品質・セキュリティ・プライバシー・利用ルールを管理し、データを適切かつ安全に活用できる体制を整える取り組みをデータガバナンスと呼ぶ。"],summary:"ブラックボックス問題に対しXAIが根拠を提示。LIMEは局所を単純モデルで近似、SHAPはシャープレイ値で寄与度、Grad-CAMはCNNの注目領域をヒートマップ化と役割を対応づける。モデルカード(モデル)とデータシート(データ)の対、公平性・頑健性も含む品質保証とデータガバナンスを押さえる。"},{title:"体制づくりと契約・知財(深掘り)",points:["AIプロジェクトには、モデルを作るデータサイエンティスト、基盤を整えるエンジニア、業務知識を持つドメイン専門家、価値と優先順位を決めるプロダクトマネージャー(PdM)など多様な役割の協働が必要である。","ドメイン専門家は、解くべき課題の設定・データ項目の業務上の意味の解釈・モデル出力が現場感覚として妥当かの検証で不可欠で、技術者と補完関係で協働する。","経済産業省の「AI・データの利用に関する契約ガイドライン」は、AI開発の不確実性を踏まえアセスメント→PoC→開発→追加学習と段階を分け、各段階で契約を結ぶ探索的段階型の開発方式を提示している。","AI開発は成果物の性能を事前に保証しにくいため、仕事の完成を約束する請負契約より、業務の遂行自体を約束する準委任契約が適する場面が多い。","準委任契約でもベンダーは善管注意義務(善良な管理者としての注意義務)を負うため、責任を一切負わないわけではない。","学習済みモデルや学習用データセットの知的財産の帰属・利用条件は争いになりやすく、誰が成果物の権利を持ち、どこまで再利用できるかを契約で明確に取り決めておく必要がある。","開発をベンダーに委託する場合、再委託の可否や責任範囲、データの取り扱い(秘密保持・目的外利用の禁止)を契約で定めることが重要である。","AIの出力をそのまま使う場合の責任の所在や、生成物が第三者の権利を侵害しないかなど、運用後のリスクも含めて契約・体制で備える必要がある。"],summary:"AIプロジェクトはデータサイエンティスト・エンジニア・ドメイン専門家・PdMの協働が要。経産省の契約ガイドラインはアセスメント→PoC→開発→追加学習の探索的段階型を提示。性能を事前保証しにくいため準委任が適し(善管注意義務は負う)、モデルやデータの知財帰属を契約で明確化する点を押さえる。"}],terms:[{term:"CRISP-DM",definition:"データ分析プロジェクトの標準プロセスモデル。ビジネス理解・データ理解・データ準備・モデリング・評価・展開の6フェーズを反復的に進める。"},{term:"KDD",definition:"データベースからの知識発見(Knowledge Discovery in Databases)のプロセス。データ選択・前処理・変換・データマイニング・解釈評価の流れをとる。"},{term:"PoC(概念実証)",definition:"本格開発の前に、技術的な実現可能性や期待効果を小規模に検証する工程。判断基準を決めずに繰り返すと実用化に至らない「PoC貧乏」に陥る。"},{term:"アジャイル開発",definition:"短い開発サイクルを繰り返しながら要件の変化に柔軟に対応する開発手法。試行錯誤が前提の機械学習開発と相性が良い。"},{term:"カメラ画像利活用ガイドブック",definition:"IoT推進コンソーシアムと総務省・経済産業省が策定した、カメラ画像を事業活用する際のプライバシー配慮や生活者への告知のあり方を示す指針。"},{term:"アノテーション",definition:"データに教師ラベルを付与する作業。ガイドラインの整備や作業者間の一致度確認といった品質管理がモデルの精度を左右する。"},{term:"正規化",definition:"特徴量の値を0〜1などの一定範囲に収める変換。スケールの異なる特徴量をそろえ、学習を安定させる前処理。"},{term:"標準化",definition:"特徴量を平均0・標準偏差1になるよう変換する前処理。正規化と並ぶ代表的なスケーリング手法。"},{term:"欠損値",definition:"データに値が記録されていない箇所。行の削除や平均値・中央値による補完などで対処するが、欠損の発生メカニズムの考慮が必要。"},{term:"MLOps",definition:"機械学習モデルの開発から運用までを継続的・自動的に回すための実践や仕組み。DevOpsの考え方を機械学習に拡張したもの。"},{term:"コンセプトドリフト",definition:"時間の経過とともにデータの傾向や予測対象の性質が変化し、運用中のモデルの精度が劣化する現象。監視と再学習で対処する。"},{term:"エッジAI",definition:"クラウドではなく端末側で推論を行う方式。低遅延・通信不要・プライバシー保護に優れるが、計算資源の制約からモデルの軽量化が必要。"},{term:"XAI(説明可能AI)",definition:"AIの予測根拠を人間が理解できる形で提示する技術の総称。米国DARPAの研究プロジェクトを契機に広まった。"},{term:"LIME",definition:"個々の予測の近傍を解釈可能な単純モデルで近似することで、モデルの種類によらず局所的な判断根拠を説明する手法。"},{term:"SHAP",definition:"ゲーム理論のシャープレイ値に基づき、予測に対する各特徴量の寄与度を算出する説明手法。"},{term:"Grad-CAM",definition:"勾配情報を利用して、CNNが画像のどの領域に注目して判断したかをヒートマップで可視化する手法。"},{term:"準委任契約",definition:"仕事の完成ではなく業務の遂行自体を約束する契約形態。性能を事前に保証しにくいAI開発では請負契約より適する場面が多い。"},{term:"転移学習",definition:"大規模データで学習済みのモデルを別タスクに流用する手法。自前のデータが少なくても高い精度を得やすく、開発コストを削減できる。"},{term:"AutoML",definition:"特徴量エンジニアリング・モデル選択・ハイパーパラメータ最適化など、機械学習の構築工程を自動化する技術の総称。導入のハードルを下げる。"},{term:"RPA",definition:"あらかじめ定義した手順に従い定型的な事務作業を自動化する技術。データから判断を学習するAIとは役割が異なり、AIと連携して使うこともある。"},{term:"データドリフト",definition:"運用中に入力データそのものの分布が変化する現象。入力と出力の関係性が変化するコンセプトドリフトと区別され、ともにモデル劣化の原因となる。"},{term:"連合学習(フェデレーテッドラーニング)",definition:"データを各端末・拠点に置いたまま局所的に学習し、モデルの更新内容のみを集約して全体モデルを構築する手法。生データを共有せずプライバシー保護に有効。"},{term:"差分プライバシー",definition:"出力に数学的に制御されたノイズを加え、特定個人のデータが結果に与える影響を抑えることで、個人を特定されにくくする技術。"},{term:"モデルカード",definition:"モデルの目的・性能・適用範囲・既知の限界やバイアスなどを文書化し、利用者が適切に使えるよう情報を共有する取り組み。データシートと対になる概念。"},{term:"知識蒸留",definition:"大きな教師モデルの出力を小さな生徒モデルに模倣させ、精度を保ちつつ軽量化する手法。量子化やプルーニングと並ぶモデル軽量化技術。"},{term:"A/Bテスト",definition:"利用者をランダムに2群に分け、それぞれ異なる案(新旧モデルなど)を提示して指標を比較し、施策の効果を統計的に検証する手法。"}],questions:[{id:"implementation-q01",chapterId:"implementation",question:"データ分析プロジェクトの標準プロセスであるCRISP-DMの説明として、最も適切なものを選べ。",choices:["ビジネス理解から展開までを一方向に進め、後戻りは想定されていない","ビジネス理解・データ理解・データ準備・モデリング・評価・展開の6フェーズを反復的に進める","要件定義・設計・実装・テストの順に工程を完了させてから次へ進む","データ選択・前処理・変換・データマイニング・解釈評価の5段階で知識を発見する"],answerIndex:1,explanation:"CRISP-DMは6つのフェーズで構成され、フェーズ間を行き来しながら反復的に進めることが前提のプロセスモデルである。一方向にのみ進むという説明は誤りで、後戻りを想定しない工程順の進行はウォーターフォール型開発の説明に近い。データ選択から始まる5段階のプロセスはKDDの説明であり、両者の区別はG検定で頻出である。"},{id:"implementation-q02",chapterId:"implementation",question:"機械学習システムの開発にアジャイル型開発が適しているとされる理由として、最も適切なものを選べ。",choices:["開発開始前に成果物の仕様と性能を完全に確定できるから","ドキュメント作成が一切不要になり開発が高速化するから","一度作ったモデルは修正の必要がないから","精度が実際に学習してみないと分からず、試行錯誤を前提に要件を見直す必要があるから"],answerIndex:3,explanation:"機械学習はデータに依存して性能が決まるため、事前に仕様や達成精度を確定することが難しく、実験と評価を繰り返しながら要件を調整できるアジャイル型が適している。仕様を事前に完全確定できるなら、むしろウォーターフォール型が機能する。アジャイルはドキュメント不要という意味ではなく、モデルも運用後の再学習・修正が前提である。"},{id:"implementation-q03",chapterId:"implementation",question:"AIプロジェクトにおけるPoC(概念実証)の落とし穴として、最も適切なものを選べ。",choices:["Go/No-Goの判断基準を決めずに検証を繰り返し、実用化に至らないまま費用がかさむ","本格開発よりも大規模な予算と体制が必須になる","PoCを実施すると本番システムの開発が法律で義務付けられる","PoCの成功により以後の精度検証が不要になる"],answerIndex:0,explanation:"PoCは小規模に実現可能性を検証する工程だが、目的や判断基準が曖昧なまま行うと検証ばかり繰り返して本格導入に進めない「PoC貧乏(PoC死)」に陥る。これを防ぐには、事前に評価指標と撤退条件を含むGo/No-Go基準を定めることが重要である。PoCは本格開発より小規模に行うものであり、開発が義務化されることも、本番での検証が不要になることもない。"},{id:"implementation-q04",chapterId:"implementation",question:"ウェブスクレイピングによるデータ収集の注意点として、最も適切なものを選べ。",choices:
