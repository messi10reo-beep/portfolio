<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約管理 — Bone Studios 管理画面</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23d97757'/%3E%3Ctext x='16' y='23' font-size='18' font-family='Georgia,serif' font-weight='bold' fill='%23fbf6ee' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --canvas: #f4f2ec; --surface: #ffffff; --ink: #1f1e1d; --muted: #6b675f; --faint: #9a958a;
        --line: #e3dfd4; --line-strong: #d6d1c4; --clay: #d97757; --clay-deep: #bd5d3a; --clay-soft: #f6e7df;
        --blue: #1e5fa5; --blue-soft: #e6f1fb; --amber: #9a6308; --amber-soft: #faeeda;
        --green: #2f6d2f; --green-soft: #e8f3df; --red: #a32d2d; --red-soft: #fbe9e9; --gray-soft: #ece9e2;
        --font: "Hanken Grotesk", "Zen Kaku Gothic New", system-ui, sans-serif;
        --radius: 14px; --shadow: 0 1px 2px rgba(31,30,29,.05), 0 14px 34px -22px rgba(31,30,29,.25);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: var(--font); background: var(--canvas); color: var(--ink); -webkit-font-smoothing: antialiased; line-height: 1.6; }
      button { font-family: inherit; cursor: pointer; }
      .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

      /* login */
      #gate { position: fixed; inset: 0; background: var(--canvas); display: grid; place-items: center; z-index: 100; padding: 20px; }
      .gate-card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); padding: 34px 30px; width: 100%; max-width: 380px; text-align: center; }
      .gate-card .logo { width: 46px; height: 46px; border-radius: 11px; background: var(--clay); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 22px; margin: 0 auto 16px; font-family: Georgia, serif; }
      .gate-card h1 { font-size: 19px; margin: 0 0 6px; }
      .gate-card p { font-size: 13.5px; color: var(--muted); margin: 0 0 20px; }
      .gate-card input { width: 100%; height: 48px; font-size: 17px; text-align: center; letter-spacing: .3em; border: 1px solid var(--line-strong); border-radius: 11px; margin-bottom: 12px; }
      .gate-card .err { color: var(--red); font-size: 13px; min-height: 18px; margin-bottom: 8px; }
      .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid transparent; border-radius: 11px; font-weight: 600; font-size: 15px; padding: 12px 20px; transition: background .15s, border-color .15s, transform .1s; }
      .btn:active { transform: scale(.98); }
      .btn-primary { background: var(--clay); color: #fff; width: 100%; }
      .btn-primary:hover { background: var(--clay-deep); }
      .btn-ghost { background: var(--surface); border-color: var(--line-strong); color: var(--ink); }
      .btn-ghost:hover { border-color: var(--clay); color: var(--clay-deep); }
      .btn-sm { padding: 8px 14px; font-size: 13.5px; border-radius: 9px; }
      .btn-danger { background: var(--surface); border-color: var(--line-strong); color: var(--red); }
      .btn-danger:hover { background: var(--red-soft); border-color: var(--red); }

      header.top { background: var(--surface); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 30; }
      .top-in { display: flex; align-items: center; gap: 12px; height: 62px; }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
      .brand .dot { width: 30px; height: 30px; border-radius: 8px; background: var(--clay); color: #fff; display: grid; place-items: center; font-family: Georgia, serif; font-size: 16px; }
      .brand small { display: block; font-weight: 500; font-size: 11.5px; color: var(--faint); }
      .top-in .spacer { margin-left: auto; }

      .tabs { display: flex; gap: 8px; padding: 16px 0 0; }
      .tab { background: transparent; border: 1px solid var(--line-strong); border-radius: 999px; padding: 9px 20px; font-weight: 600; font-size: 14.5px; color: var(--muted); }
      .tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

      .panel { padding: 22px 0 60px; }
      .panel.hidden { display: none; }
      .panel-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
      .panel-head h2 { font-size: 22px; margin: 0; }
      .panel-head .hint { font-size: 13px; color: var(--faint); width: 100%; }
      .panel-head .spacer { margin-left: auto; }

      .summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
      .sum { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px; text-align: center; }
      .sum .n { font-size: 24px; font-weight: 700; }
      .sum .l { font-size: 12px; color: var(--muted); margin-top: 2px; }
      @media (max-width: 680px) { .summary { grid-template-columns: repeat(2, 1fr); } }

      .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
      .toolbar input[type=search], .toolbar select { height: 42px; border: 1px solid var(--line-strong); border-radius: 10px; padding: 0 14px; font-size: 14.5px; font-family: inherit; background: var(--surface); }
      .toolbar input[type=search] { flex: 1; min-width: 180px; }

      .cards { display: flex; flex-direction: column; gap: 10px; }
      .row { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start; }
      .row .main { min-width: 0; }
      .row .when { font-size: 13px; color: var(--clay-deep); font-weight: 600; }
      .row .name { font-size: 16px; font-weight: 600; margin: 2px 0; }
      .row .meta { font-size: 13px; color: var(--muted); }
      .row .note { font-size: 12.5px; color: var(--faint); margin-top: 4px; }
      .row .side { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
      .row .acts { display: flex; gap: 6px; }
      select.status { height: 36px; border-radius: 999px; border: 1px solid var(--line-strong); padding: 0 12px; font-weight: 600; font-size: 13px; font-family: inherit; }

      .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 11px; border-radius: 999px; }
      .b-新規 { background: var(--blue-soft); color: var(--blue); }
      .b-確認済 { background: var(--amber-soft); color: var(--amber); }
      .b-確定 { background: var(--green-soft); color: var(--green); }
      .b-キャンセル { background: var(--red-soft); color: var(--red); }
      .b-来店済 { background: var(--gray-soft); color: var(--muted); }

      .mrow { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; }
      .mrow.off { opacity: .55; }
      .mrow .order { display: flex; flex-direction: column; gap: 2px; }
      .mrow .order button { width: 30px; height: 26px; border: 1px solid var(--line-strong); background: var(--surface); border-radius: 7px; font-size: 12px; color: var(--muted); }
      .mrow .mname { font-size: 16px; font-weight: 600; }
      .mrow .mmeta { font-size: 13px; color: var(--muted); }
      .mrow .price { font-weight: 700; }

      .empty { text-align: center; color: var(--faint); padding: 40px 0; font-size: 14px; }

      /* modal */
      .modal-bg { position: fixed; inset: 0; background: rgba(31,30,29,.45); display: grid; place-items: center; z-index: 60; padding: 18px; }
      .modal { background: var(--surface); border-radius: 16px; box-shadow: var(--shadow); width: 100%; max-width: 460px; max-height: 90vh; overflow: auto; }
      .modal h3 { margin: 0; padding: 20px 22px; border-bottom: 1px solid var(--line); font-size: 18px; }
      .modal .body { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
      .field label { display: block; font-size: 13.5px; font-weight: 600; margin-bottom: 6px; }
      .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--line-strong); border-radius: 10px; padding: 10px 12px; font-size: 15px; font-family: inherit; }
      .field textarea { min-height: 64px; resize: vertical; }
      .field .sub { font-size: 12px; color: var(--faint); margin-top: 4px; }
      .modal .foot { padding: 16px 22px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }
      .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

      /* toast */
      #toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 80; }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      #loading { text-align: center; padding: 50px 0; color: var(--faint); }
    </style>
  </head>
  <body>
    <!-- Login gate -->
    <div id="gate">
      <div class="gate-card">
        <div class="logo">B</div>
        <h1>予約管理にログイン</h1>
        <p>パスコードを入力してください</p>
        <input id="passInput" type="password" inputmode="numeric" placeholder="••••" autocomplete="off" />
        <div class="err" id="passErr"></div>
        <button class="btn btn-primary" id="passBtn">ログイン</button>
        <p style="margin-top:16px;font-size:12px;color:var(--faint);">デモ用パスコード：<b>2026</b></p>
      </div>
    </div>

    <header class="top">
      <div class="wrap top-in">
        <span class="brand"><span class="dot">B</span><span>予約管理<small>Bone Studios 管理画面（デモ）</small></span></span>
        <span class="spacer"></span>
        <button class="btn btn-ghost btn-sm" id="reloadBtn">↻ 最新に更新</button>
      </div>
    </header>

    <div class="wrap">
      <div class="tabs">
        <button class="tab active" data-tab="yoyaku">📅 予約</button>
        <button class="tab" data-tab="menu">📋 メニュー</button>
      </div>

      <!-- 予約 -->
      <section class="panel" id="panel-yoyaku">
        <div class="panel-head">
          <h2>予約一覧</h2>
          <span class="spacer"></span>
          <button class="btn btn-ghost btn-sm" id="exportBtn">⬇ CSV出力</button>
          <button class="btn btn-primary btn-sm" id="addResBtn">＋ 予約を追加</button>
          <span class="hint">お客様の予約を確認・追加できます。ステータスは右の選択肢から変えると自動で保存されます。</span>
        </div>
        <div class="summary" id="summary"></div>
        <div class="toolbar">
          <input type="search" id="resSearch" placeholder="🔍 お名前・連絡先・メニューで検索" />
          <select id="resFilter">
            <option value="">すべてのステータス</option>
            <option value="新規">新規</option>
            <option value="確認済">確認済</option>
            <option value="確定">確定</option>
            <option value="来店済">来店済</option>
            <option value="キャンセル">キャンセル</option>
          </select>
        </div>
        <div class="cards" id="resList"></div>
      </section>

      <!-- メニュー -->
      <section class="panel hidden" id="panel-menu">
        <div class="panel-head">
          <h2>メニュー</h2>
          <span class="spacer"></span>
          <button class="btn btn-primary btn-sm" id="addMenuBtn">＋ メニューを追加</button>
          <span class="hint">お店のメニューを追加・編集できます。「公開」にしたメニューが予約フォームに表示されます。↑↓で並び替え。</span>
        </div>
        <div class="cards" id="menuList"></div>
      </section>
    </div>

    <div id="loading">読み込み中…</div>
    <div id="toast"></div>

    <script src="app.js"></script>
  </body>
</html>
